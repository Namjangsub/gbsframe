<html lang="ko">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="icon" href="/static/favicon.ico" type="image/x-icon">

<style>
	input[type="datetime-local"].form-control { height: 30px; font-size: 12px; }
	textarea.form-control { overflow: hidden; resize: none; height: 70px; font-size: 12px; }
	.form-control { font-size: 12px; }
	select.form-control { font-size: 12px; height: 30px; }
	.popup_table th { font-size: 11px; }
	.popup_table td { font-size: 11px; }
	.no-click { pointer-events: none; background-color: #e6e6e6; }
	#main_area { padding: 0px 0px; overflow: auto; }
	button { margin: 1px; }
	.card { display: table; border: 1px solid #EEEEEE; margin-bottom: 5px; width: 100%; }
	.tg { border-collapse: collapse; border-spacing: 0; width: 100%; }
	.tg td { border-color: black; border-width: 0.5px; font-size: 11px;
		overflow: hidden; padding: 8px 5px; word-break: normal; }
	.tg .tg-menu { background-color: #EEEEEE; text-align: right;
		vertical-align: middle; font-size: 11px; padding-right: 5px; }
	.tg .tg-rspn { text-align: left; vertical-align: middle; font-size: 11px; padding-left: 5px; }
</style>
</head>

<body>
	<div id="head_area" class="off">
		<div class="left_btn" onclick="history.back(-1)">
			<a class="back_btn"></a>
		</div>
		<h1 class="logo">
			<img src="/static/img/Logo_gunyangitt.gif" alt="건양ITT" />
		</h1>
	</div>

	<div id="main_area">
		<div class="popup_area">
			<div class="tit_contents">
				<h4 class="tit">업무 요청 등록</h4>
			</div>

			<form id="popForm" onSubmit="return false;">
				<input type="hidden" id="pgmId" name="pgmId" value="CM1601M01">
				<input type="hidden" id="reqDept" name="reqDept" value="">
				<input type="hidden" id="issNo" name="issNo" value="">

				<div class="form-group popup_table" style="width:100%;">
					<table>
						<colgroup>
							<col width="25%"><col width="75%">
						</colgroup>
						<tr>
							<th class="hit">회사</th>
							<td>
								<select id="coCd" name="coCd" class="form-control" data-kind="CO" required msg="회사"></select>
							</td>
						</tr>
						<tr>
							<th>요청번호</th>
							<td>
								<input type="text" id="fileTrgtKey" name="fileTrgtKey" class="form-control" readonly>
							</td>
						</tr>
						<tr>
							<th class="hit">요청일시</th>
							<td>
								<input type="datetime-local" id="reqDttm" name="reqDttm" class="form-control" required msg="업무 요청일시" max="9999-12-31T00:00" onfocus="setCurrentDateTime(this)">
							</td>
						</tr>
						<tr>
							<th class="hit">요청자</th>
							<td>
								<div class="search_form">
									<input type="hidden" id="reqId" name="reqId" required msg="요청자">
									<a onclick="openUserSearchMobile();"><i class="i_search_w"></i></a>
									<input type="text" id="reqIdNm" name="reqIdNm" class="form-control" readonly required msg="업무 요청자">
								</div>
							</td>
						</tr>
						<tr>
							<th class="hit">요청분류</th>
							<td>
								<select class="form-control" id="reqType" name="reqType" data-kind="ITSMREQ" onchange="selectCodeList();" required msg="요청 분류">
									<option value="">선택 하세요</option>
								</select>
							</td>
						</tr>
						<tr>
							<th class="hit">상세구분</th>
							<td>
								<select class="form-control" id="reqType2" name="reqType2" data-kind="ITSMREQ2" required msg="요청상세구분">
									<option value="">선택 하세요</option>
								</select>
							</td>
						</tr>
						<tr>
							<th class="hit">조치상태</th>
							<td>
								<select class="form-control" id="actCd" name="actCd" data-kind="ISSSTS" required msg="조치상태">
									<option value="">선택</option>
								</select>
							</td>
						</tr>
						<tr>
							<th class="hit">처리자</th>
							<td>
								<div class="search_form">
									<input type="hidden" id="actId" name="actId" msg="처리자ID">
									<a onclick="openActUserSearchMobile();"><i class="i_search_w"></i></a>
									<input type="text" id="actIdNm" name="actIdNm" class="form-control" readonly required msg="업무 처리자">
								</div>
							</td>
						</tr>
						<tr class="issAct">
							<th>처리완료일시</th>
							<td>
								<input type="datetime-local" id="actDttm" name="actDttm" class="form-control" msg="처리완료일시" max="9999-12-31T00:00" onfocus="setCurrentDateTime(this)">
							</td>
						</tr>
						<tr class="issAct">
							<th>투입시간</th>
							<td>
								<input type="text" class="form-control" id="actProcTm" name="actProcTm" msg="담당자투입시간"
								oninput="this.value=setWorkRptHour(this.value)" onblur="this.value=setWorkRptHour2(this.value)">
							</td>
						</tr>
						<tr>
							<th class="hit">요청내용</th>
							<td>
								<textarea rows="4" class="form-control" id="issue" name="issue" required msg="요청 내용"></textarea>
							</td>
						</tr>
						<tr>
							<th>비고</th>
							<td>
								<textarea rows="2" class="form-control" id="rmk" name="rmk" msg="비고"></textarea>
							</td>
						</tr>
						<tr class="issAct">
							<th>처리결과</th>
							<td>
								<textarea rows="4" class="form-control" id="actDesc" name="actDesc" msg="요청처리 결과"></textarea>
							</td>
						</tr>
					</table>
				</div>

				<!-- 공유 및 결재 영역 -->
				<div class="form-group popup_table" id="approval_trgt" style="width:100%;">
					<table style="border:0px;">
						<tr style="height:20px;">
							<td style="text-align:left;border-right:0px;font-size:13px;font-weight:bold;">※ 공유 및 결재</td>
							<td>
								<div class="add_btn_small pdl10" id="plus-minus">
									<a id="btn_plus1" onclick="insertShareUserModalMobile();" style="height:30px;line-height:28px;" authchk>+</a>
									<a id="btn_minus1" onclick="deleteShareUser();" style="height:30px;line-height:28px;" authchk>-</a>
								</div>
							</td>
						</tr>
						<tr>
							<td colspan="2">
								<!-- 결재라인 그리드 -->
								<div data-ax5grid="first-grid-modal" data-ax5grid-config="{}" style="height: 150px; min-height: 100px;"></div>
							</td>
						</tr>
					</table>
				</div>
			</form>

			<!-- 공통 파일 영역 -->
			<div id="fileList_area"></div>

			<!-- 하단 버튼 -->
			<div id="bottomActionArea" style="text-align:center;padding:15px;">
				<button type="button" id="actionBtn" class="btn btn-primary" style="width:45%;height:40px;font-size:14px;" authchk>등록</button>
				<button type="button" class="btn btn-default" style="width:45%;height:40px;font-size:14px;" onclick="history.back(-1);">닫기</button>
			</div>
			<div id="approvalWrapper" style="display:none;text-align:center;width:100%;height:30%;">
				<div id="wbsPopup">
					<div id="approval_area"></div>
				</div>
			</div>
		</div>
	</div>

<script type="text/javascript">
	var actionType = null;
	var fileTrgtKey = null;
	var teleNo = "";
	var kakaoCnt = 0;
	var kakaoErr = [];
	var lastPosition = 0;

	function getParams() {
		var url = window.location.search.replace('?', '');
		var params = {};
		var urlArray = url.split('&');

		for ( var i in urlArray) {
			var param = urlArray[i].split('=');
			params[param[0]] = param[1];
		}
		return params;
	}

	/*todo 결재*/
	var btnApproval = null;
	//div area id 
	var htmlParam = {
		htmlArea : "approval_area"
	};

	//세션에 정보를 활용하여 승인처리3
	//JSON.parse : JSON.stringify를 받을 때 / 문자열-> 자바스크립트로 변환
	var paramObj = JSON.parse(sessionStorage.getItem('paramObj') || '{}');
	var isTodoApprovalView = paramObj && (
		paramObj.actionType == 'S' ||
		paramObj.actionType == 'T' ||
		(!paramObj.actionType && (
			paramObj.todoDiv2CodeId == 'TODODIV2130' ||
			paramObj.todoDiv2CodeId == 'TODODIV1130'
		))
	);
	//sessionStorage.removeItem('paramObj');
	if (isTodoApprovalView) {
		$('#approvalWrapper').show();
		//to-do 에서 넘어온 param;
		var popParam = $.extend({}, paramObj);
		//추가로 넣어줄 param
		var approvalParam = {
			coCd : paramObj.coCd,
			todoDiv1CodeId : paramObj.todoDiv1CodeId,
			todoDiv2CodeId : paramObj.todoDiv2CodeId,
			pgmId : paramObj.pgmId
		};
		//삭제할 키가 있으면 쓴다.
		delete popParam.sanctnSn;
		delete popParam.pgmId;
		//결재/승인버튼 생성하기
		var commApproval = new Approval(htmlParam, approvalParam, popParam);
		commApproval.makeHtml();
	}

	$(document).ready(function() {
		setCommonSelect($(".popup_area select[data-kind]"));

		// sessionStorage에서 파라미터 수신
		var paramObj = JSON.parse(sessionStorage.getItem('paramObj') || '{}');
		actionType = paramObj.actionType || (paramObj.todoDiv2CodeId == 'TODODIV2130' ? 'S' : (paramObj.todoDiv2CodeId == 'TODODIV1130' ? 'T' : 'C'));
		fileTrgtKey = paramObj.fileTrgtKey || '';

		// 첨부파일 초기화
		var fileParam = {
			fileTrgtTyp: $("#popForm #pgmId").val(),
			fileTrgtKey: fileTrgtKey,
			todoNo: fileTrgtKey
		};
		if (typeof treeModule !== 'undefined') {
			treeModule.initAll('deptTreeOrdars', 'file-grid', 'FILETREE', fileParam, 'fileList_area');
			$('#fileList_area #button_file').attr('onclick', 'fromWebToApp(1);');
			$('#fileList_area #button_file').text('파일선택');
		}

		// 조치상태 변경 이벤트
		$('#actCd').change(function() {
			handleActCdChange();
		});

		// 상세구분 변경 시 처리자 자동 설정
		$('#reqType2').on('change', function() {
			var selectedOption = $(this).find('option:selected');
			var codeRprc = selectedOption.attr('data-rprc');
			var codeDesc = selectedOption.attr('data-desc');

			if ($('#reqType2').val() == 'ITSMREQ0405') {
				$('#issue').val("1. 목적 : \n2. 반출파일 내용 : \n3. 기간 : ");
			} else {
				$('#issue').val('');
				$('#issue').attr('placeholder', codeDesc || '요청 내용을 입력해주세요.');
			}

			if (codeRprc) {
				$('#actId').val(codeRprc);
				var paramObj2 = { "coCd": "", "useYn": "Y" };
				postAjaxSync("/admin/cm/cm06/selectUserTree", paramObj2, null, function(data) {
					if (data && data.userTree) {
						var matchedUser = null;
						for (var i = 0; i < data.userTree.length; i++) {
							if (data.userTree[i].id === codeRprc) {
								matchedUser = data.userTree[i];
								break;
							}
						}
						$('#actIdNm').val(matchedUser ? matchedUser.text : '');
					}
				});
			} else {
				$('#actId').val('');
				$('#actIdNm').val('');
			}
		});

		// ── 모드별 초기화 ──
		if (actionType == "C") {
			// 등록 모드
			$.each(paramObj, function(key, val) {
				if ($("#popForm").find("#" + key).length > 0) {
					$("#popForm").find("#" + key).val(val);
				}
				if (key == 'reqType') {
					selectCodeList();
				}
			});
			$('#reqType2').change();

			$("#popForm #reqId").val(jwt.userId);
			$("#popForm #reqIdNm").val(jwt.userNm);
			$("#popForm #coCd").val(jwt.coCd);

			$('#actCd').val('ISSSTS01');
			$('#actCd').change();
			$('#actCd').addClass('no-click');

			$('#reqDttm').focus();

			$("#actionBtn").text("등록");
			$('#actionBtn').on("click", function() {
				insertItoaIssue();
			});

			$('#coCd').trigger('change');

		} else if (actionType == "U" || actionType == "S" || actionType == "T") {
			$('.tit').text('업무 요청 수정');
			selectItoaIssueInfo();

			if (actionType == "U") {
				if (!canUpdateItoaIssue()) {
					$('#popForm select, #popForm input, #popForm textarea').each(function() {
						$(this).attr('readonly', true);
						$(this).css({'background-color': '#e6e6e6', 'pointer-events': 'none'});
					});
					$('#actionBtn').hide();
					$('#btn_plus1, #btn_minus1').hide();
				} else {
					$('#popForm select, #popForm input, #popForm textarea').each(function() {
						$(this).removeAttr('readonly');
						$(this).css({'background-color': '', 'pointer-events': ''});
						if ($('#actCd').val() === 'ISSSTS01') {
							$('#actCd').addClass('no-click');
						}
					});
					$('#actionBtn').show().removeAttr('disabled');
				}

				$('#actCd').change();

				$('#actionBtn').text("수정");
				$('#actionBtn').on('click', function() {
					updateItoaIssue();
				});
			} else {
				// S, T (결재/공유 조회)
				$('.tit').text('업무 요청 조회');
				$('#bottomActionArea').hide();
				$('.i_search_w').remove();

				$.each($('#popForm select, #popForm input, #popForm textarea'), function(idx, elem) {
					var id = $(elem).attr("id");
					if (id) {
						var eleId = "#popForm #" + id;
						if ($(elem).prop('tagName') == "INPUT") $(eleId).attr("readonly", true);
						if ($(elem).prop('tagName') == "TEXTAREA") $(eleId).attr("readonly", true);
						if ($(elem).prop('tagName') == "SELECT") $(eleId).css({'background-color':'#e6e6e6', 'pointer-events':'none'});
					}
				});
			}
		}

		// 결재라인 로드
		gridViewPop.initView();
		if (fileTrgtKey) {
			gridViewPop.setData(0);
		}

		authChk();
	});

	// ── 조치상태 변경 처리 ──
	function handleActCdChange() {
		if ($("#actCd").val() == 'ISSSTS03') {
			$('#actDttm').closest('td').prev('th').addClass("hit");
			$('#actDttm').attr('required', 'true');
			$('#actDttm').css({'background-color': '', 'pointer-events': ''});
			$('#actProcTm').parent('td').prev('th').addClass('hit');
			$('#actProcTm').attr('required', 'true');
			$('#actProcTm').css({'background-color': '', 'pointer-events': ''});
			$('#actDesc').parent('td').prev('th').addClass('hit');
			$('#actDesc').attr('required', 'true');
			$('#actDesc').css({'background-color': '', 'pointer-events': ''});
			$('#btn_plus1').show();
			$('#btn_minus1').show();
			if (actionType == 'T' || (actionType == 'U' && !canUpdateItoaIssue())) {
				$('#actionBtn').hide();
			} else {
				$('#actionBtn').show();
			}
			$('.issAct').show();
		} else {
			$('#actDttm').closest('td').prev('th').removeClass('hit');
			$('#actDttm').removeAttr('required');
			$('#actDttm').css({'background-color': '#e6e6e6', 'pointer-events': 'none'});
			$('#actProcTm').parent('td').prev('th').removeClass('hit');
			$('#actProcTm').removeAttr('required');
			$('#actProcTm').css({'background-color': '#e6e6e6', 'pointer-events': 'none'});
			$('#actDesc').parent('td').prev('th').removeClass('hit');
			$('#actDesc').removeAttr('required');
			$('#actDesc').css({'background-color': '#e6e6e6', 'pointer-events': 'none'});
			$('#btn_plus1').hide();
			$('#btn_minus1').hide();
			if (actionType == 'T' || (actionType == 'U' && !canUpdateItoaIssue())) {
				$('#actionBtn').hide();
			} else {
				$('#actionBtn').show();
			}
			if ($("#actCd").val() == 'ISSSTS01') {
				$('#btn_plus1').show();
				$('#btn_minus1').show();
			}
			$('.issAct').hide();
		}
	}

	// ── 상세 정보 조회 ──
	function selectItoaIssueInfo() {
		var formData = {
			"fileTrgtKey": fileTrgtKey
		};
		postAjaxSync("/admin/cm/cm16/selectItoaIssueInfo", formData, null, function(data) {
			var paramObj = JSON.parse(sessionStorage.getItem('paramObj') || '{}');
			var reqDept = data.result.reqDept || paramObj.reqDept;
			$('#reqDept').val(reqDept);

			$.each(data.result, function(key, value) {
				if ($('#popForm #' + key)[0]) {
					$('#popForm #' + key).val(value);

					if ($('#popForm #' + key).is('[comma]')) {
						onlyNumber($('#popForm #' + key)[0]);
					}
					if (key == 'reqType') {
						selectCodeList();
					}
					if (key == 'actCd' && value == 'ISSSTS02') {
						$('#actCd option').each(function() {
							if ($(this).text() === "선택" || $(this).text() === "접수") {
								$(this).remove();
							}
						});
					}
				}
			});

			$('#actCd').val(data.result.actCd);
			$('#actCd').change();
			$('#coCd').trigger('change');
		});
	}

	var gridViewPop = {
		initView : function() {
			this.target = new ax5.ui.grid();
			this.target.setConfig({
				showRowSelector: true,
				multipleSelect: false,
				sortable: false,
				target: $('[data-ax5grid="first-grid-modal"]'),
				header: {
					align: "center",
					selector: true
				},
				body: {
					onClick: function () {
						this.self.select(this.dindex);
					},
					onDBLClick: function () {
					},
					mergeCells : ["gb"]
				},
				columns : [
					{key: "gb",               label: "구분",         align: "center",   width: 40},
					{key: "sanctnSn",          label: "순번",       align: "center",   width: 50, hidden: true},
					{key: "coCd",               label: "coCd",      align: "center",   width: 50, hidden: true},
					{key: "usrNm",            label: "ID",         align: "center",   width: 130, hidden: true},
					{key: "name",             label: "성명",         align: "center",   width: 70},
					{key: "jik",                label: "직위",         align: "center",   width: 50},
					{key: "todoCfDt",            label: "결재일자",      align: "center",   width: 80},
					{key: "todoCfOpn",         label: "확인의견",    align: "center",     width: 130},
					{key: "todoKey",            label: "todoKey",      align: "center",   width: 130, hidden: true},
					{key: "sanctnSttus",         label: "sanctnSttus",      align: "center",   width: 130, hidden: true},
					{key: "todoId",            label: "todoId",      align: "center",   width: 130, hidden: true},

	// ── FormData 생성 ──
	function makeFormData() {
		if (!inputValidation($('.popup_area [required]'))) {
			return false;
		}

		var actCd = $('#actCd').val();
		var reqDttm = $('#reqDttm').val();
		var actDttm = $('#actDttm').val();

		if (actCd === 'ISSSTS02' || actCd === 'ISSSTS03') {
			if (reqDttm && actDttm) {
				var reqDate = new Date(reqDttm);
				var actDate = new Date(actDttm);
				if (actDate < reqDate) {
					alert('처리일시는 요청일시보다 빠를 수 없습니다.');
					return false;
				}
			}
		}

		var reqType2Label = $('#reqType2').find("option:selected").text();

		// 결재자 자동등록
		selectTeamManagerApprovalAdd();

		var formData = new FormData($("#popForm")[0]);
		formData.append('reqType', $('#reqType').val());
		formData.append('reqType2', $('#reqType2').val());
		formData.append('actCd', $('#actCd').val());

		// 첨부파일 처리
		formData.append("ordrsNo", '');
		formData.append("userId", jwt.userId);
		formData.append("clntCd", '');
		formData.append("prdtCd", '');
		formData.append("itemCd", '');
		formData.append("prjctCd", '');

		var treeRef = (typeof treeModule !== 'undefined') ? treeModule : null;
		formData.append("comonCd", treeRef ? treeRef.getFileNodeId() : '');

		var fileUploadArr = [];
		var totalFileSize = 0;

		if (treeRef) {
			var tempArr = treeRef.getFileArr();
			$.each(tempArr, function(idx, obj) {
				if (obj.fileKey == 0) {
					formData.append("files", obj.file);
					if (obj.file && obj.file.size) {
						totalFileSize += obj.file.size;
					}
					var cloneObj = $.extend({}, obj);
					cloneObj.file = '';
					fileUploadArr.push(cloneObj);
				}
			});
		}

		if (totalFileSize > 0) {
			var MAX_SIZE = 2000 * 1024 * 1024;
			postAjaxSync("/admin/cm/cm08/getMaxFileSize", null, null, function(data) {
				if (data.resultCode == 200 && data.maxFileSize) {
					var mbStr = data.maxFileSize.toUpperCase().replace("MB", "").replace("GB", "").trim();
					var mbInt = parseInt(mbStr, 10);
					if (!isNaN(mbInt)) {
						if (data.maxFileSize.toUpperCase().indexOf("GB") > -1) {
							mbInt = mbInt * 1024;
						}
						MAX_SIZE = mbInt * 1024 * 1024;
					}
				}
			});
			if (totalFileSize >= MAX_SIZE) {
				var limitMb = Math.round(MAX_SIZE / (1024 * 1024));
				var attachMb = Math.round(totalFileSize / (1024 * 1024));
				alert("첨부파일 자료 용량이 많습니다. 한도:" + limitMb + "MB < 첨부:" + attachMb + "MB\n분리해서 UPload하세요!");
				return false;
			}
		}

		formData.append("uploadFileArr", JSON.stringify(fileUploadArr));
		formData.append("deleteFileArr", JSON.stringify(treeRef ? treeRef.getDeleteFileArr() : []));

		// 결재라인 처리
		var paramObj = JSON.parse(sessionStorage.getItem('paramObj') || '{}');
		var approvalArr = [];
		var approvalUserMap = {};
		function pushApprovalIfNotExists(item) {
			var userKey = item.todoId;
			if (!userKey || approvalUserMap[userKey]) {
				return false;
			}
			approvalUserMap[userKey] = true;
			approvalArr.push(item);
			return true;
		}

		$("#reqDept").val(jwt.deptId);
		var tempTitl = $("#reqIdNm").val() + '님의 ' + reqType2Label + ' 관련 문제 ' + $("#actCd option:selected").text();

		var addParam = {
			coCd: $('#coCd').val(),
			salesCd: $("#fileTrgtKey").val(),
			issNo: $("#fileTrgtKey").val(),
			pgmId: $("#pgmId").val(),
			pgPath: "/admin/cm/cm16/CM1601P01.html",
			sanctnSttus: "N",
			todoCoCd: $('#coCd').val(),
			todoNo: $("#fileTrgtKey").val(),
			todoFileTrgtKey: $("#fileTrgtKey").val(),
			userId: jwt.userId,
			todoTitl: wordRemove(tempTitl),
			todoTitle: wordRemove(tempTitl),
			todoKey: "",
			todoCodeKind: "",
			todoCodeId: ""
		};

		var apprSn = 0;
		var shareSn = 0;

		var appshaList = gridViewPop.target.list;
		if (appshaList && appshaList.length > 0) {
			$.each(appshaList, function(idx, elem) {
				if (elem.usrNm && elem.usrNm.indexOf('gyrsult') > -1) {
					return true; // skip
				}
				var approvalListObj = $.extend({}, elem);

				addParam["todoId"] = elem.usrNm || elem.todoId;
				addParam["empNo"] = elem.empNo;
				addParam["name"] = elem.name;
				addParam["telNo"] = elem.telNo;
				addParam["email"] = elem.eMail || elem.email;
				addParam["gb"] = elem.gb;

				paramObj["actionType"] = (elem.gb == '공유') ? "T" : "S";
				addParam["pgParam"] = JSON.stringify(paramObj);

				if (elem.gb == '공유') {
					shareSn += 1;
					approvalListObj["sanctnSn"] = shareSn;
					approvalListObj["todoDiv1CodeId"] = "TODODIV10";
					approvalListObj["todoDiv2CodeId"] = "TODODIV1130";
				} else if (elem.gb == '결재') {
					apprSn += 1;
					approvalListObj["sanctnSn"] = apprSn;
					approvalListObj["todoDiv1CodeId"] = "TODODIV20";
					approvalListObj["todoDiv2CodeId"] = "TODODIV2130";
				}

				var mergedParam = $.extend({}, addParam, approvalListObj);
				pushApprovalIfNotExists(mergedParam);
			});
		}

		if (!$("#reqId").val().includes('gyrsult') && jwt.userId != $("#reqId").val()) {
			addParam["todoId"] = $("#reqId").val();
			addParam["usrNm"] = $("#reqId").val();
			addParam["empNo"] = $("#reqId").val();
			addParam["name"] = $('#reqIdNm').val();
			addParam["telNo"] = '';
			addParam["email"] = '';
			addParam["gb"] = '공유';
			paramObj["actionType"] = "T";
			addParam["pgParam"] = JSON.stringify(paramObj);

			var approvalListObj = {};
			shareSn += 1;
			approvalListObj["sanctnSn"] = shareSn;
			approvalListObj["todoDiv1CodeId"] = "TODODIV10";
			approvalListObj["todoDiv2CodeId"] = "TODODIV1130";

			var mergedParam = $.extend({}, addParam, approvalListObj);
			pushApprovalIfNotExists(mergedParam);
		}

		formData.append("approvalArr", JSON.stringify(approvalArr));
		formData.append("S_todoDiv1CodeId", "TODODIV10");
		formData.append("S_todoDiv2CodeId", "TODODIV1130");

		return formData;
	}

	function selectTeamManagerApprovalAdd() {
		var tempActId = $("#actId").val();
		var tempReqId = $("#reqId").val();
		if (!tempActId || tempActId.substring(0, 7) == 'gyrsult') return false;

		var appArray = [];
		var shaArray = [];
		var appshaList = gridViewPop.target.list;
		if (appshaList) {
			$.each(appshaList, function(idx, item) {
				if (item.gb === "결재") {
					appArray.push(item);
				} else {
					if (item.usrNm != tempActId) {
						shaArray.push(item);
					}
				}
			});

			var userKey = item.todoId || item.usrNm || item.empNo;

				mergedList.push(item);

		});

	}

	// ── 업무 처리자 정보 자동 추가 ──
	function approvalUserInfoData(appUserId, appArray) {
		var formData = { "userId": appUserId };
		postAjaxSync("/user/wb/wb24/selectRsltsMemberList", formData, null, function(data) {
			if (data.resultList != '' && data.resultList != null) {
				var list = data.resultList[0];
				var exists = false;
				for (var i = 0; i < appArray.length; i++) {
					if (appArray[i].usrNm === list.usrNm) { exists = true; break; }
				}
				if (!exists) {
					appArray.push({
						gb: "결재",
						usrNm: list.usrNm,
						name: list.name,
						jik: list.jik,
						dtNm: list.deptNm,
						telNo: list.telNo,
						offTelNo: list.offTelNo,
						email: list.email
					});
				}
			}
		});
		return appArray;
	}

	// ── 유틸리티 함수 ──
	function wordRemove(originalWord) {
		var tempWord = originalWord.replace(/주식회사/g, '');
		tempWord = tempWord.replace(/\(주\)/g, '');
		tempWord = tempWord.replace(/,,/g, ',');
		tempWord = tempWord.replace(/ ,/g, ',');
		return tempWord;
	}

	function setWorkRptHour(_value) {
		var value = _value.replace(/[^0-9.]/g, "");
		if (value != "" && value > 24) {
			alert("작업시간을 24시간 이상 입력 할 수 없습니다.");
			return 24;
		}
		return value;
	}

	function setWorkRptHour2(_value) {
		var value = parseFloat(_value.replace(/[^0-9.]/g, "")).toFixed(2);
		value = value == 'NaN' ? 0 : value;
		if (value != "" && value > 24) {
			alert("작업시간을 24시간 이상 입력 할 수 없습니다.");
			return 24;
		}
		if (value == 0) return "";
		return value;
	}

	function setCurrentDateTime(input) {
		if (!input.value) {
			var now = new Date();
			var year = now.getFullYear();
			var month = String(now.getMonth() + 1).padStart(2, '0');
			var day = String(now.getDate()).padStart(2, '0');
			var hours = String(now.getHours()).padStart(2, '0');
			var minutes = String(now.getMinutes()).padStart(2, '0');
			input.value = year + '-' + month + '-' + day + 'T' + hours + ':' + minutes;
		}
	}

	function commKaKaoSendTodo(param) {
		var maxMessageId = null;
		var talkMessage = null;
		var mobile = null;
		var todoDiv2CodeNm = null;
		var sendList = [];
		var talkParam = {};
		var talkBody = {};
		var sendCnt = 0;

		postAjaxSync("/user/bm/bm18/selectMaxMessageIdTodo", param, null, function(data) {
			if (data.resultList.length > 0) {
				if (data.resultList[0].maxMessageId != "") {
					sendList = data.resultList;
				} else {
					alert("알림톡 발송을 위한 messageId 생성에 실패 했습니다.");
					return;
				}
			}
		});

		if ($("#actCd").val() === 'ISSSTS03') {
			sendList = sendList.filter(function(user) {
				return user.todoId !== $("#actId").val();
			});
		}

		$.each(sendList, function(key, sendObj) {
			maxMessageId = sendObj.maxMessageId;
			talkMessage = sendObj.messageDesc;
			mobile = sendObj.telNo;
			param.rcvId = sendObj.todoId;
			param.rcvNm = sendObj.name;
			param.nameTo = sendObj.name;
			todoDiv2CodeNm = sendObj.todoTitl;
			param.todoDiv2CodeNm = todoDiv2CodeNm;
			param.sendDt = sendObj.sendDt;

			if (mobile == "" || mobile == null) {
				return true; // skip
			}
			if (talkMessage == "" || talkMessage == null) {
				return true; // skip
			}

			var message = talkMessage;
			var regex = /\{(.*?)\}/g;
			var match;
			while ((match = regex.exec(message)) !== null) {
				var compKey = match[1];
				if (compKey != "" && compKey != "undefined") {
					if (typeof(param[compKey]) != "undefined") {
						message = message.split('#' + match[0]).join(param[compKey]);
					}
				}
			}

			talkParam.authToken = "e/eDfZOFCsrBqadaECQ0+g==";
			talkParam.serverName = "gyitt2400";
			talkParam.paymentType = "P";
			talkBody.service = "2310086157";
			talkBody.messageId = maxMessageId;
			if (param.title.length > 50) {
				param.title = param.title.substring(0, 49);
			}
			talkBody.title = param.title;
			talkBody.message = message;
			talkBody.mobile = mobile;
			talkBody.template = "10003";
			var talkJson = JSON.stringify(talkBody);
			sendCnt = kakaoSendReal(talkJson, talkParam, param);
		});

		if (sendCnt > 0) {
			kakaoCnt++;
		}
	}
