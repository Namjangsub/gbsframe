<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" href="/static/css/gnb.css" />
	<link rel="stylesheet" href="/static/css/main.css" />
	<link rel="stylesheet" href="/static/css/sub.css" />
	<link rel="stylesheet" href="/static/css/m_common.css" />
	<link rel="stylesheet" href="/static/css/mobile.css" />

	<script src="/static/js/jquery-latest.min.js"></script>
	<script src="/static/js/jquery.serializeObject.js"></script>
	<script src="/static/bootstrap/js/bootstrap.min.js"></script>
	<script src="/static/js/moment/moment-with-locales.js"></script>
	<script src="/static/js/global.js"></script>
	<script src="/static/js/jquery.blockUI.js"></script>
<style>
	/* M08.html 카드형 레이아웃 스타일 */
	.card {
		display: table;
		border: 1px solid #EEEEEE;
		margin-bottom: 10px;
		width: 100%;
	}
	.card.selected {
		border: 2px solid #0054a6;
		background-color: #f0f7ff;
	}
	.tg { border-collapse: collapse; border-spacing: 0; width: 100%; }
	.tg td { border-color: black; border-width: 0.5px; font-size: 11px;
		overflow: hidden; padding: 10px 5px; word-break: normal; }
	.tg .tg-title { background-color: #EEEEEE; text-align: left;
		vertical-align: middle; font-size: 12px; font-weight: bold; }
	.tg .tg-menu { background-color: #EEEEEE; text-align: right;
		vertical-align: middle; font-size: 11px; padding-right: 5px; }
	.tg .tg-rspn { width: 10px; text-align: left;
		vertical-align: middle; font-size: 11px; padding-left: 5px; }
	.card-container {
		display: table;
		width: 100%;
		margin-bottom: 1px;
	}
	/* 상태 색상 */
	.status-dot { font-size: 14px; margin-right: 3px; }
	.status-ISSSTS01 { color: red; }
	.status-ISSSTS02 { color: gray; }
	.status-ISSSTS03 { color: blue; }
	#main_area { padding: 0px 0px; overflow: auto; }
	button { margin: 1px; }
</style>
</head>

<body>
	<div id="head_area" class="off">
		<div class="left_btn" onclick="history.back(-1)">
			<a class="back_btn"></a>
		</div>
		<h1 class="logo">
			<img src="/static/img/Logo_gunyangitt.gif" alt="건양ITT" />
		</h1>
	</div>

	<div id="main_area">
		<div class="popup_area">
			<div class="tit_contents">
				<h4 class="tit">업무 요청 현황</h4>
			</div>

			<!-- 검색 영역 -->
			<div class="form-group popup_table" style="width:100%;">
				<table>
					<colgroup>
						<col width="20%"><col width="30%"><col width="20%"><col width="30%">
					</colgroup>
					<tr>
						<th style="text-align:right;">조회년</th>
						<td>
							<select id="searchYear" onchange="resetAndLoad();"></select>
						</td>
						<th style="text-align:right;">월</th>
						<td>
							<select id="searchMonth" onchange="resetAndLoad();"></select>
						</td>
					</tr>
					<tr>
						<th style="text-align:right;">상태</th>
						<td>
							<select id="actCd_S" data-kind="ISSSTS" onchange="resetAndLoad();">
								<option value="">전체</option>
							</select>
						</td>
						<td colspan="2">
							<div class="add_btn_small pdl10">
								<a onclick="openIssuePopup('C')"
								   style="height:30px;width:60px;line-height:28px;font-size:14px;" authchk>등록</a>
							</div>
						</td>
					</tr>
				</table>
			</div>

			<!-- 카드 목록 컨테이너 (M08.html 패턴) -->
			<div id="cardContainer" class="card-container"></div>

			<!-- 더보기 버튼 (ROWNUM 오프셋 페이징) -->
			<div id="loadMoreArea" style="text-align:center;padding:15px;display:none;">
				<button type="button" id="btnLoadMore"
						onclick="loadNextPage();"
						style="width:90%;height:45px;font-size:16px;font-weight:bold;
							   background:#0054a6;color:#fff;border:none;border-radius:8px;">
					더보기 (<span id="loadedCount">0</span> / <span id="totalCount">0</span>)
				</button>
			</div>
		</div>
	</div>

<script type="text/javascript">
// ── ROWNUM 오프셋 페이징 상태 ──
var PAGE_SIZE = 20;
var currentPage = 0;
var allLoadedList = [];
var totalCount = 0;
var selectedIndex = -1;

// ── 페이징 리셋 후 첫 페이지 로드 ──
function resetAndLoad() {
	allLoadedList = [];
	currentPage = 0;
	totalCount = 0;
	selectedIndex = -1;
	$("#cardContainer").empty();
	loadNextPage();
}

// ── 다음 페이지 로드 (ROWNUM 오프셋 방식) ──
function loadNextPage() {
	var selectedYear = $("#searchYear").val();
	var selectedMonth = $("#searchMonth").val();
	var firstDay = selectedYear + "-" + selectedMonth + "-01";
	var lastDay = moment(firstDay, 'YYYY-MM-DD').endOf("month").add(1, 'days').format("YYYY-MM-DD");

	var firstIndex = (currentPage * PAGE_SIZE) + 1;
	var lastIndex = firstIndex + PAGE_SIZE - 1;

	var formData = {
		"coCd"			: "",
		"reqDtFrom"		: firstDay,
		"reqDtTo"		: lastDay,
		"actCd"			: $("#actCd_S").val(),
		"firstIndex"	: firstIndex,
		"lastIndex"		: lastIndex,
		"recordCnt"		: PAGE_SIZE,
		"pageNo"		: currentPage + 1,
		"userId"		: jwt.userId,
		"reqId"			:  ""
	};

	postAjax("/admin/cm/cm16/selectItoaIssueList", formData, null, function(data) {
		var newList = data.result || [];
		totalCount = data.paginationInfo ? data.paginationInfo.totalRecordCount : totalCount;

		var startIdx = allLoadedList.length;
		allLoadedList = allLoadedList.concat(newList);
		currentPage++;

		// 카드 렌더링 (새로 온 데이터만 append)
		renderCards(newList, startIdx);

		// 더보기 버튼 갱신
		$("#loadedCount").text(allLoadedList.length);
		$("#totalCount").text(totalCount);
		if (allLoadedList.length < totalCount) {
			$("#loadMoreArea").show();
		} else {
			$("#loadMoreArea").hide();
		}

		// 데이터 없을 때 메시지
		if (allLoadedList.length === 0) {
			$("#cardContainer").html(
				'<h6 style="font-size:16px;text-align:center;padding:30px;color:#999;">' +
				'조회된 업무요청이 없습니다.</h6>'
			);
		}
	});
}

// ── 카드 렌더링 (M08.html 패턴) ──
function renderCards(list, startIdx) {
	var cardContainer = $("#cardContainer");

	$.each(list, function(i, item) {
		var idx = startIdx + i;
		var statusClass = 'status-' + (item.actCd || '');
		var statusDot = '<span class="status-dot ' + statusClass + '">●</span>';
		var issueTxt = item.issue || '';
		if (issueTxt.length > 40) issueTxt = issueTxt.substring(0, 40) + '...';

		var cardHtml =
			'<div class="square-box">' +
			'  <div class="card card-' + idx + '" onclick="selectCard(' + idx + ')">' +
			'    <table class="tg">' +
			'      <tr>' +
			'        <td class="tg-title" colspan="4">' +
						statusDot + (item.actCdNm || '') +
			'          <span style="float:right;font-weight:normal;font-size:10px;color:#666;">' +
						(item.reqDttm || '') + '</span>' +
			'        </td>' +
			'      </tr>' +
			'      <tr>' +
			'        <td class="tg-menu">요청자</td>' +
			'        <td class="tg-rspn">' + (item.reqIdNm || '') + '</td>' +
			'        <td class="tg-menu">구분</td>' +
			'        <td class="tg-rspn">' + (item.reqTypeNm || '') + '</td>' +
			'      </tr>' +
			'      <tr>' +
			'        <td class="tg-menu">요청내용</td>' +
			'        <td class="tg-rspn" colspan="3">' + issueTxt + '</td>' +
			'      </tr>' +
			'      <tr>' +
			'        <td class="tg-menu">처리자</td>' +
			'        <td class="tg-rspn">' + (item.actIdNm || '') + '</td>' +
			'        <td class="tg-rspn" colspan="2" style="text-align:right;">' +
			'          <button class="btn btn-primary btn-sm" style="height:28px;" ' +
			'                  onclick="event.stopPropagation(); openIssuePopupByIndex(' + idx + ')">' +
			'            상세조회</button>' +
			'          <button class="btn btn-danger btn-sm" style="height:28px;" ' +
			'                  onclick="event.stopPropagation(); deleteByIndex(' + idx + ')">' +
			'            삭제</button>' +
			'        </td>' +
			'      </tr>' +
			'    </table>' +
			'  </div>' +
			'</div>';

		cardContainer.append(cardHtml);
	});
}

// ── 카드 선택 ──
function selectCard(index) {
	$(".card").removeClass("selected");
	$(".card-" + index).addClass("selected");
	selectedIndex = index;
}

// ── 상세 팝업 이동 (index 기반) ──
function openIssuePopupByIndex(index) {
	var row = allLoadedList[index];
	if (!row) { alert("항목을 선택해 주세요."); return; }

	var paramObj = {
		"actionType": "U",
		"coCd":   jwt.coCd,
		"userId": jwt.userId,
		"pgmId":  "CM1601M01"
	};
	paramObj["fileTrgtKey"] = row.fileTrgtKey;
	$.each(row, function(key, val) {
		if (typeof val === "undefined") val = "";
		paramObj[key] = val;
	});

	sessionStorage.setItem('paramObj', JSON.stringify(paramObj));
	var nextUrl = '/static/mobile/html/admin/cm/cm16/CM1601P01_M.html';
	insertPgmHistory(nextUrl);
	location.href = nextUrl;
}

// ── 등록 팝업 이동 ──
function openIssuePopup(type) {
	var paramObj = {
		"actionType": type,
		"coCd":   jwt.coCd,
		"userId": jwt.userId,
		"pgmId":  "CM1601M01"
	};
	sessionStorage.setItem('paramObj', JSON.stringify(paramObj));
	var nextUrl = '/static/mobile/html/admin/cm/cm16/CM1601P01_M.html';
	insertPgmHistory(nextUrl);
	location.href = nextUrl;
}

// ── 삭제 처리 (index 기반) ──
function deleteByIndex(index) {
	var row = allLoadedList[index];
	if (!row) { alert("삭제할 항목을 선택해 주세요."); return; }

	if (row.reqId !== jwt.userId) {
		alert("업무 요청자만 삭제할 수 있습니다.");
		return;
	}

	var formData = {
		"fileTrgtKey": row.fileTrgtKey,
		"salesCd": row.fileTrgtKey,
		"reqNo": row.fileTrgtKey,
		"coCd": row.coCd,
		"userId": jwt.userId,
		"fileTrgtTyp": "CM1601M01"
	};

	if (!confirm("선택한 업무요청을 삭제하시겠습니까?")) return;

	postAjaxSync("/user/qm/qm01/selectApprovalChk", formData, null, function(data) {
		var list = data.result[0];
		if (list === 'Y') {
			alert("결재가 진행 중입니다.");
		} else {
			postAjax("/admin/cm/cm16/deleteItoaIssue", formData, null, function(data) {
				if (data.resultCode == 200) {
					alert("삭제되었습니다.");
					resetAndLoad();
				} else {
					alert(data.resultMessage || "삭제 실패");
				}
			});
		}
	});
}

// ── 초기화 ──
$(document).ready(function() {
	$(window).on('pageshow', function(e) {
		var evt = e.originalEvent;
		var isBFCache = evt && evt.persisted;
		var navEntries = performance.getEntriesByType('navigation');
		var navType = navEntries && navEntries.length ? navEntries[0].type : null;
		if (isBFCache || navType === 'back_forward') {
			resetAndLoad();
		}
	});

	SetYm();
	setCommonSelect($("select[data-kind]"));
	resetAndLoad();
	authChk();
});

function SetYm() {
	var now = new Date();
	var nyear = now.getFullYear();
	var nmon = (now.getMonth() + 1) > 9 ? '' + (now.getMonth() + 1) : '0' + (now.getMonth() + 1);
	for (var sy = 2020; sy <= nyear; sy++) {
		$("#searchYear").append("<option value='" + sy + "'>" + sy + "년</option>");
	}
	for (var i = 1; i <= 12; i++) {
		var sm = i > 9 ? i : "0" + i;
		$("#searchMonth").append("<option value='" + sm + "'>" + i + "월</option>");
	}
	$("#searchYear option[value=" + nyear + "]").attr("selected", true);
	$("#searchMonth option[value=" + nmon + "]").attr("selected", true);
}
</script>
</body>
</html>
