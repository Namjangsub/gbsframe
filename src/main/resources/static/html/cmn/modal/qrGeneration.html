<style>
	/* 팝업 전체 */
	#qrGenerationPopup {
		padding: 20px;
		background: #fafafa;
		text-align: center;
	}

	/* 제목 */
	#qrGenerationPopup .tit_contents .tit {
		margin: 0;
		font-size: 18px;
		font-weight: 600;
		color: #333;
	}

	/* 그리드: 왼쪽 정렬, 2행 이상이면 세로 스크롤 */
	.qr-slider {
		display: flex;
		flex-wrap: wrap;
		justify-content: flex-start;
		gap: 40px 20px;
		/* 열간 40px, 행간 20px */
		overflow-y: auto;
		margin-top: 20px;
		margin-left: 80px;
		/* 두 줄까지만 보여주고, 그 이상엔 스크롤 */
		max-height: 580px;
	}

	/* 각 아이템: 고정 크기 */
	.qr-item {
		flex: 0 0 auto;
		width: 200px;
		text-align: center;
	}

	.qr-item .salesCd {
		font-size: 20px;
		font-weight: bold;
		margin-bottom: 6px;
	}

	.qr-item .sjNm {
		font-size: 13px;
		color: #555;
		margin-bottom: 6px;
	}

	.qr-item .qrcode {
		width: 200px;
		height: 200px;
		margin: 0 auto;
	}
</style>

<div id="qrGenerationPopup">
	<!-- QR들을 한 줄로 보여주는 컨테이너 -->
	<div class="qr-slider"></div>
	<!-- 닫기 버튼 -->
	<div class="popup_bottom_btn">
		<button type="button" onclick="downloadAllQRCodes()">QR 다운로드</button>
		<button type="button" class="close_btn" onclick="modalStack.close();">닫기</button>
	</div>
</div>

<script>

	var salesList = [];
	var sjNmList = [];
	const baseUrl = window.location.origin; // protocol + '//' + hostname + ':' + port 형식 추출 --> https://www.example.com:8000
	//정규식으로 추출
	// 	const baseUrl= window.location.href.match(/^.*?:\/\/.*?(?=\/|$)/)[0] + "/";
	var siteUrl = baseUrl + "/static/mobile/html/user/pm/pm50/PM5001P01_M.html";
	var shortUrl = ''; // 서버에서 만들어진 shortUrl

	$(document).ready(function () {
		// 파라미터에서 salesCd 배열 가져오기
		salesList = modalStack.last().paramObj.salesCd;
		sjNmList = modalStack.last().paramObj.sjNm;
		renderAllQR();
	});

	// 들어온 모든 salesCd 로 QR 생성
	function renderAllQR() {
		var $slider = $(".qr-slider");
		$slider.empty();

		if (!salesList.length) {
			$slider.text("생성할 코드가 없습니다.");
			return false;
		}

		salesList.forEach(function (cd, index) {
			var sj = sjNmList[index] || "";

			// 각 아이템 마크업
			var $item = $(
				'<div class="qr-item">' +
				'<div class="salesCd"></div>' +
				'<div class="sjNm"></div>' +
				'<div class="qrcode"></div>' +
				"</div>"
			);
			$item.find(".salesCd").text(cd);
			$item.find(".sjNm").text(sj);

			var longUrl = siteUrl + "?salesCd=" + encodeURIComponent(cd)
			var formData = {
				"longUrl": longUrl,
				"hostAddress": baseUrl,
				"userId": jwt.userId,
				"pgmId": "WB2201M02"
			}
			postAjaxSync("/user/wb/wb22/generateShortUrl", formData, null, function (data) {
				if (data.resultCode == 200) {
					shortUrl = data.shortUrl;
				} else {
					alert("단축 URL 생성에 실패했습니다. 전산실에 문의하세요.");
					return false;
				}
			});

			// QRCode 인스턴스 (200px 규격 최적화)
			var qrDom = $item.find(".qrcode")[0];
			new QRCode(qrDom, {
				text: shortUrl,
				width: 200,
				height: 200,
				correctLevel: QRCode.CorrectLevel.H // [필수] 텍스트 가림 면적을 방어하여 완벽한 복구력 제공
			});

			// 텍스트 기반 "GUNYANGITT" 엠블럼 동적 오버레이 삽입 (200px에 비례 조정한 1.67배 크기)
			var $qrWrapper = $item.find(".qrcode");
			$qrWrapper.css("position", "relative");
			$qrWrapper.append('<div style="position: absolute; width: 156px; height: 40px; top: 80px; left: 22px; background: #0f172a; color: #38bdf8; border: 3px solid #ffffff; border-radius: 8px; font-size: 16px; font-weight: 800; letter-spacing: 0.8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 8px rgba(0,0,0,0.25); font-family: \'Inter\', sans-serif;">GUNYANGITT</div>');
			// $item.find(".qrcode")
			//      .wrap($('<a>')
			//        .attr('href', shortUrl)
			//        .attr('target', '_blank')
			//        .css('cursor', 'pointer')
			//      );

			$slider.append($item);
		});
	}

	// QR 코드 이미지 내려받기 (상단 텍스트 + 중앙 텍스트 엠블럼 물리 병합 다운로드 구현)
	function downloadAllQRCodes() {
		// .qr-item 각각에 대해
		$(".qr-item").each(function () {
			const $item = $(this);
			const cd = $item.find(".salesCd").text().trim();
			const sj = $item.find(".sjNm").text().trim(); // [신규] 상단의 프로젝트/설비 설명 추출
			const $qr = $item.find(".qrcode");

			// QRCode.js 가 <img> 태그를 만들었는지, <canvas>를 만들었는지 확인
			const imgEl = $qr.find("img")[0];
			const canvasEl = $qr.find("canvas")[0];

			// 1. 소스 이미지 데이터 추출 및 이미지 로딩 객체 생성
			const sourceImg = new Image();
			sourceImg.onload = function() {
				// 2. 물리적 병합 작업을 수행할 오프스크린 임시 캔버스 생성 (상단 여백 80px 확보를 위해 가로 200px, 세로 280px 확장)
				const tempCanvas = document.createElement("canvas");
				tempCanvas.width = 200;
				tempCanvas.height = 280;
				const ctx = tempCanvas.getContext("2d");

				// 3. 전체 카드 배경 흰색 채우기 (라벨지 인쇄 최적화)
				ctx.fillStyle = "#ffffff";
				ctx.fillRect(0, 0, 200, 280);

				// 4. 상단 텍스트 정보(HRI) 드로잉
				// 4-1. 영업번호 (salesCd) - 굵고 선명한 검은색 Bold 18px
				ctx.fillStyle = "#000000";
				ctx.font = "700 18px 'Inter', sans-serif";
				ctx.textAlign = "center";
				ctx.textBaseline = "top";
				ctx.fillText(cd, 100, 15); // 정중앙 x=100, 상단여백 y=15

				// 4-2. 프로젝트명/설비명 (sjNm) - 보조적인 회색 13px Medium
				ctx.fillStyle = "#555555";
				ctx.font = "500 13px 'Inter', sans-serif";
				ctx.fillText(sj, 100, 42); // 정중앙 x=100, 간격여백 y=42

				// 5. 하단 영역(y=80px 지점부터)에 원본 QR 코드 렌더링
				ctx.drawImage(sourceImg, 0, 80, 200, 200);

				// 6. QR 코드 중앙 'GUNYANGITT' 텍스트 엠블럼 병합 드로잉 (1.67배 스케일 치수 기준, y축 오프셋 보정)
				const badgeW = 156;
				const badgeH = 40;
				const badgeX = (200 - badgeW) / 2;      // 22px
				const badgeY = 80 + (200 - badgeH) / 2; // QR시작오프셋(80px) + 중앙여백(80px) = 160px
				const radius = 8;                       // border-radius

				// 6-1. 엠블럼 외곽 순백색 보더 드로잉 준비 (border: 3px solid #ffffff)
				ctx.lineWidth = 6; // 선 두께 (중심선 기준 안팎으로 렌더링되므로 6px 설정 시 실질적 3px 오프셋 제공)
				ctx.strokeStyle = "#ffffff";
				
				// 6-2. 엠블럼 배경 색상 설정 (#0f172a)
				ctx.fillStyle = "#0f172a";
				
				// 라운드 코너 사각형 경로(Rounded Path) 동적 구성
				ctx.beginPath();
				ctx.moveTo(badgeX + radius, badgeY);
				ctx.lineTo(badgeX + badgeW - radius, badgeY);
				ctx.quadraticCurveTo(badgeX + badgeW, badgeY, badgeX + badgeW, badgeY + radius);
				ctx.lineTo(badgeX + badgeW, badgeY + badgeH - radius);
				ctx.quadraticCurveTo(badgeX + badgeW, badgeY + badgeH, badgeX + badgeW - radius, badgeY + badgeH);
				ctx.lineTo(badgeX + radius, badgeY + badgeH);
				ctx.quadraticCurveTo(badgeX, badgeY + badgeH, badgeX, badgeY + badgeH - radius);
				ctx.lineTo(badgeX, badgeY + radius);
				ctx.quadraticCurveTo(badgeX, badgeY, badgeX + radius, badgeY);
				ctx.closePath();
				
				// 엠블럼 채우기 및 아웃라인 드로잉 실행
				ctx.fill();
				ctx.stroke();

				// 6-3. 엠블럼 텍스트 드로잉 (font: extra-bold 16px Inter, color: #38bdf8)
				ctx.fillStyle = "#38bdf8";
				ctx.font = "800 16px 'Inter', sans-serif";
				ctx.textAlign = "center";
				ctx.textBaseline = "middle";
				
				// 텍스트 정중앙 배치 (y축 80 + 100 = 180px 지점)
				ctx.fillText("GUNYANGITT", 100, 180 + 1); // 렌더링 정밀 수직 얼라인먼트 미세 조정 (+1px)

				// 7. 병합이 완벽히 끝난 통합 라벨 카드 이미지 내려받기 트리거
				const dataURL = tempCanvas.toDataURL("image/png");
				triggerDownload(dataURL, cd + ".png");
			};

			// 이미지 소스 매핑 및 로드 트리거
			if (imgEl && imgEl.src) {
				sourceImg.src = imgEl.src;
			} else if (canvasEl) {
				sourceImg.src = canvasEl.toDataURL("image/png");
			} else {
				console.warn("QR DOM 없음:", $qr);
			}
		});
	}

	// dataURL → 실제 파일로 다운로드 트리거
	function triggerDownload(dataURL, filename) {
		const a = document.createElement("a");
		a.href = dataURL;
		a.download = filename;
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
	}
</script>
