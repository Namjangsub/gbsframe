	function enableBlobImageCopyToClipboard(editor) {
	  editor.on('copy', async (e) => {
	    try {
	      // 1) 현재 선택 노드에서 IMG를 최대한 안정적으로 찾기
	      let node = editor.selection && editor.selection.getNode ? editor.selection.getNode() : null;

	      // IMG가 직접 선택되지 않은 경우(figure/a/span 등) 대비
	      let img = null;
	      if (node) {
	        if (node.nodeName === 'IMG') img = node;
	        else if (node.querySelector) img = node.querySelector('img');
	        if (!img && node.closest) img = node.closest('img');
	      }

	      // 그래도 없으면 종료(텍스트 복사 등은 기본 동작 유지)
	      if (!img) return;

	      const src = img.getAttribute('src') || '';
	      if (!src.startsWith('blob:')) return; // blob 아닌 이미지는 기본복사로 놔둠

	      // 2) 여기서만 기본복사 막고, 실제 이미지로 클립보드에 쓰기 시도
	      e.preventDefault();

	      const blob = await fetch(src).then(r => r.blob());
	      const mime = blob.type || 'image/png';

	      await navigator.clipboard.write([
	        new ClipboardItem({ [mime]: blob })
	      ]);

	    } catch (err) {
	      // 실패하면 사용자는 "복사가 안됨"으로 느끼므로,
	      // 최소한 로깅으로 원인 파악 가능하게 남김
	      console.error('Blob image copy failed:', err);

	      // 필요하면 여기서 preventDefault를 하지 않도록 구조를 바꾸면
	      // "기본 HTML 복사"는 유지되는데, PPT에는 여전히 안 붙을 가능성이 큽니다.
	    }
	  });
	}

	function downloadFile(idx) {
		if (notiFileArr[idx].fileDown != 'Y') {
			alert('파일 다운로드 권한이 없습니다.');
			return false;
		}

		var fileKey = notiFileArr[idx].fileKey;
		var paramObj = {
			"coCd"	  	: jwt.coCd,
			"fileKey"	: fileKey,
			"userId"	: jwt.userId
		};

		postAjax("/admin/cm/cm08/fileDownInfoUser", paramObj, null, function(data) {
			if (data.resultCode == 200) {
				// 권한 체크가 완료되었으므로, 실제 파일 다운로드 요청 수행
				var xhr = new XMLHttpRequest();
				xhr.open("GET", "/admin/cm/cm08/fileDownloadAuth2?fileKey=" + fileKey + "&userId=" + jwt.userId + "&coCd=" + $('#coCd').val(), true);
				xhr.responseType = "blob";
				xhr.setRequestHeader("Authorization", authorizationToken);
				xhr.setRequestHeader("X-GBS-Source", "pdfjs-viewer");
				xhr.onload = function () {
					if (xhr.status === 200) {
						var contentType = xhr.getResponseHeader("Content-Type");
						// 만약 응답 Content-Type이 text/plain이면, 오류 메시지가 담겨있는 경우입니다.
						if (contentType && contentType.indexOf("text/plain") !== -1) {
							var reader = new FileReader();
							reader.onload = function (e) {
								alert("전산실 연락바랍니다.\n\n" + e.target.result);
							};
							reader.readAsText(xhr.response);
						} else {
							// 정상적인 파일이면 바로 다운로드 진행
							var blob = xhr.response;
							var downloadUrl = URL.createObjectURL(blob);
							var a = document.createElement("a");
							a.href = downloadUrl;
							a.download = notiFileArr[idx].fileName || 'download';
							document.body.appendChild(a);
							a.click();
							document.body.removeChild(a);
							URL.revokeObjectURL(downloadUrl);
						}
					} else {
						console.error("백엔드 오류 발생: " + xhr.status + " - " + xhr.statusText);
					}
				};
				xhr.onerror = function () {
					console.error("네트워크 오류가 발생했습니다.");
				};
				xhr.send();
			} else {
				alert("다운로드 권한이 없습니다.");
			}
		});
	}

			});
		});
		
		// 첨부파일 그리드 set
		fileGridView.setData();
	}
	
	function setNotiFile(elem){
		var tempFiles = elem.files;
		
		var totalFileSize = 0; // 신규 첨부파일 사이즈 처리용 변수
		
		// 1. 기존에 추가해둔 '신규 파일' 사이즈 합산
		$.each(notiFileArr, function(idx, obj) {
			if (obj.fileKey == 0) {
				totalFileSize += obj.fileSize;
			}
		});

		// 2. 방금 팝업창에서 선택한 파일 사이즈 합산
		$.each(tempFiles, function(idx, obj) {
			if (obj && obj.size) {
				totalFileSize += obj.size;
			}
		});

		// 3. 첨부파일 자료 용량이 yml 설정값(max-file-size) 이상인 경우 경고 후 중지
		if (totalFileSize > 0) {
			var MAX_SIZE = 2000 * 1024 * 1024; // Default fallback
			postAjaxSync("/admin/cm/cm08/getMaxFileSize", null, null, function(data) {
				if (data.resultCode == 200 && data.maxFileSize) {
					var mbStr = data.maxFileSize.toUpperCase().replace("MB", "").replace("GB", "").trim();
					var mbInt = parseInt(mbStr, 10);
					if (!isNaN(mbInt)) {
						if(data.maxFileSize.toUpperCase().indexOf("GB") > -1) {
							mbInt = mbInt * 1024;
						}
						MAX_SIZE = mbInt * 1024 * 1024;
					}
				}
			});
			
			if (totalFileSize >= MAX_SIZE) {
				var limitMb = Math.round(MAX_SIZE / (1024 * 1024));
				var attachMb = Math.round(totalFileSize / (1024 * 1024));
				alert("첨부파일 자료 용량이 많습니다. 한도:" + limitMb + "MB < 첨부:" + attachMb + "MB\n분리해서 UPload하세요!");
				$(elem).val("");
				return false;
			}
		}

		$.each(tempFiles, function(idx, obj){
			var testArr = obj.name.split(".");
			notiFileArr.push({
				'fileKey' : 0,
		      	'fileName' : obj.name,
		      	'fileType' : testArr[testArr.length-1],
		      	'fileSize' : obj.size,
		      	'file' : obj,
		      	'fileDelete' : 'Y',
			});
		});
		fileGridView.setData();
		$(elem).val("");
	}
	
	function deleteFile(rowIndex) {
        if (notiFileArr[rowIndex].fileDelete != 'Y') {
        	alert('파일 삭제 권한이 없습니다.')
        	return false;
        };
		
		fileGridView.target.removeRow(rowIndex);
		
		if(notiFileArr[rowIndex].fileKey){
		// 기 등록되어 있는 파일 삭제시
			deleteFileArr.push(notiFileArr[rowIndex].fileKey);
		}
		
		notiFileArr.splice(rowIndex, 1);
	}
	

	
	function setContentInEditor(editorId, content) {
        var editor = tinymce.get(editorId);
        if (editor) {
            editor.setContent(content);
            editor.save(); // 에디터 내용을 저장하여 화면에 즉시 반영
        } else {
            console.error('Editor not found: ' + editorId);
        }
    }
</script>
