<script type="text/javascript">
	var actionType = null;
	var odrSeq = null;
	var odrDtlSeqArr = [];
	var baseDeptOption;
	var upperDeptOption;
	var lastDeptOption;

	function getDefaultColumns() {
		return [
			{key: "coCd", hidden: true},
			{key: "creatId", hidden: true}, // 생성, 수정 구분을 위한 컬럼. creatId 가 있으면 조직을 변경 불가
			{key: "coNm",    label: "회사",   align: "left",   width: 120, styleClass: "grid-cell-blue" },
			{key: "prftYm",  label: "년월",   align: "center", width: 100, styleClass: "grid-cell-blue"},
			{key: "baseDept",label: "조직",   align: "left",   width: 140, styleClass: "grid-cell-blue",
				editor: {type:"select",
					config:{columnKeys:{optionValue: "cd", optionText: "nm"},
						options : baseDeptOption
					},
					disabled : function(){
						return this.item.creatId; // creatId 여부로 수정 가능여부 판단
					}
				}
			},
			{key: "sellAmt",       label: "매출액",     align: "right", width: 120,  formatter: "money", editor: {type:"text"}},
			{key: "sellPrftAmt",   label: "매출이익",    align: "right", width: 120,  formatter: "money", editor: {type:"text"}},
			{key: "sellMngAmt",    label: "판권비",     align: "right", width: 120,  formatter: "money", editor: {type:"text"}},
			{key: "salesPrftAmt",  label: "영업이익",    align: "right", width: 120,  formatter: "money", editor: {type:"text"}},
			{key: "bfrxPrftAmt",   label: "세전이익",    align: "right", width: 120,  formatter: "money", editor: {type:"text"}},
			{key: "rmk",           label: "비고",       align: "left",  width: 150,  editor: {type:"text"}},
			{key: "upperDept",     label: "상위조직",    align: "left",  width: 140,
				editor: { type:"select", config:{
					columnKeys:{optionValue: "cd", optionText: "nm"},
					options : upperDeptOption
					}
				}
			},
			{key: "lastDept",     label: "최상위조직",   align: "left",    width: 140,
				editor: { type:"select", config:{
					columnKeys:{optionValue: "cd", optionText: "nm"},
					options : lastDeptOption
					}
				}
			},
		];
	}

	var gridView = {
		initView : function() {
			this.target = new ax5.ui.grid();
			this.target.setConfig({
				showRowSelector : true,
				multipleSelect : true,
				sortable : true,
				target : $('[data-ax5grid="first-grid"]'),
				header : {
					align : "center",
					selector : false
				},
				body : {
					onClick : function() {
					}
				},
				page : {
					navigationItemCount : 10,
					height : 30,
					display : true,
					firstIcon : '<i class="fa fa-step-backward" aria-hidden="true"></i>',
					prevIcon : '<i class="fa fa-caret-left" aria-hidden="true"></i>',
					nextIcon : '<i class="fa fa-caret-right" aria-hidden="true"></i>',
					lastIcon : '<i class="fa fa-step-forward" aria-hidden="true"></i>',
					onChange : function() {
						gridView.setData(this.page.selectPage);
					}
				},
				contextMenu: {
					iconWidth: 20,
					acceleratorWidth: 100,
					itemClickAndClose: false,
					icons: {'arrow': '<i class="fa fa-caret-right"></i>'},
					items: [
						{type: 1, label: "붙여넣기"},
						{divide: true},
						{type: 1, label: "줄추가"},
						{type: 1, label: "내용 삭제"},
						{type: 2, label: "줄삭제"},
					],
					popupFilter: function (item, param) {
						if (param.element) {
							return true;
						} else {
							return item.type == 1;
						}
					},
					onClick: function (item, param) {
						var thisGridRow = param.dindex;
						var thisGridCol = param.colIndex;
						if (item.label == "붙여넣기") {
							gridPaste(gridView.target, thisGridRow, thisGridCol);
						} else if (item.label == "줄추가") {
							var newRow = $.extend({}, gridView.target.getList()[param.dindex]);
							delete newRow.creatId;
							gridView.target.addRow(newRow, param.dindex + 1);
						} else if (item.label == "내용 삭제") {
							['baseDept','sellAmt','sellPrftAmt','sellMngAmt','salesPrftAmt','bfrxPrftAmt','rmk'].forEach(function(key) {
								gridView.target.setValue(param.dindex, key, '');
							});
						} else if (item.label == "줄삭제") {
							gridView.target.removeRow(param.dindex);
						}
						gridView.target.contextMenu.close();
					}
				},
				columns: GridColumnConfig.apply("FI0201M01", "first-grid", getDefaultColumns())
			});
			return this;
		},
		setData : function(_pageNo) {
			var targetObj = this.target;
			var paramObj = {"pageNo" : _pageNo + 1,
		                    "recordCnt" : $("#recordCnt").val(),
		                    "coCd" : $("#coCd").val(),
		                    "prftYm" : $("#prftYm").val()};
			for(var i=0;i<$('[data-search]').length;i++){
				var tempElem = $('[data-search]')[i];
				paramObj[$(tempElem).data("search")] = $(tempElem).val();
			}

			postAjax("/user/fi/fi02/selectPalBillList", paramObj, null, function(data) {
				try {
					var list = data.resultList;
					targetObj.setData({
						list : list,
						page : {
							currentPage : _pageNo,
							pageSize : data.paginationInfo.pageSize,
							totalElements : data.paginationInfo.totalRecordCount,
							totalPages : data.paginationInfo.totalPageCount
						}
					});
					gridHeightResize(gridView, 189); // 189 = 919 - 730 : 화면 Body 높이 - 그리드 기본크기 730
				} catch (error) {
					alert("오류 발생!! 전산실 연락 바랍니다", error.message);
					return null; // 오류 발생 시 null 반환
				} finally {
					// console.log("함수 실행 완료.");
				}
			});
		}
	}

	$(document).ready(function() {
		// 페이지 타이틀 set
		mainDefaultLoad("회계업무", "이익등록");
		// 공통코드 set
		setCommonSelect($("#main_area select[data-kind]"));
		// 접속자 회사 set
		$('[data-search="coCd"]').val(jwt.coCd);

		// 기준년월 set
		$('#prftYm').val(new Date().toISOString().slice(0, 7));

		selectBaseDept();
		authChk();
	});

	function selectBaseDept(){
		var formData = {
			"coCd" : $("#coCd").val()
		}
		postAjax("/user/fi/fi02/selectDeptOptionList", formData, null, function(data){
			baseDeptOption = data.baseDeptOption;
			upperDeptOption = data.upperDeptOption;
			lastDeptOption = data.lastDeptOption;
			gridView.initView().setData(0);
		});
	}

	// 그리드 컬럼 설정 팝업
	function openGridColumnEdit() {
		GridColumnConfig.openEditor("FI0201M01", "first-grid", getDefaultColumns(), function() {
			$('[data-ax5grid="first-grid"]').empty();
			gridView.initView().setData(0);
		});
	}

	// 검색조건 초기화
	function initSearch() {

		// 접속자 회사 set
		$('[data-search="coCd"]').val(jwt.coCd);

		// 사용여부 set
		$('[data-search="useYn"]').val("Y");

		// 재검색
		selectBaseDept();
	}

	function addRow(){
		gridView.target.addRow($.extend({}, "last", false));
		var row = gridView.target.getList().length - 1;
		gridView.target.setValue(row, "coCd", $("#coCd").val());
		gridView.target.setValue(row, "coNm", $("#coCd option:selected").text());
		gridView.target.setValue(row, "prftYm", $("#prftYm").val());

	}

	// 이익등록 삭제
	function deletePalBill(){
		var row = gridView.target.getList("selected");
		var isInsertRow = false;
		for(var i = 0; i < row.length; i++){
			if(!row[i].creatId){
				gridView.target.removeRow(row[i].__index);
				isInsertRow = true;
			}
		}
		if(isInsertRow){
			row = gridView.target.getList("selected");
		}
		if(row.length < 1){
			return false;
		}
		var formData = {
				"userId" : jwt.userId,
				"pgmId" : "FI0201M01"
		}
		formData["detailArr"] = JSON.stringify(row);
		if(confirm("삭제하시겠습니까?")){
			putAjax("/user/fi/fi02/deletePalBill", formData, null, function(data){
				if(data.resultCode == 200){
					$.each(row, function(idx, obj){
						gridView.target.removeRow("selected");
					});
				} else {
					alert(data.resultMessage);
				}
			});
		}
	}

	// 이익등록 저장
	function savePalBill(){
		var formData = {
			"userId" : jwt.userId,
			"pgmId" : "FI0201M01"
		}
		var detailArr = gridView.target.getList();
		formData["detailArr"] = JSON.stringify(detailArr);

		for(var i = 0; i < detailArr.length; i++){
			for(var j = i + 1; j < detailArr.length; j++){
				if (detailArr[i].baseDept == detailArr[j].baseDept){
					alert("조직이 중복되었습니다.");
					return false;
				}
			}
			if(!detailArr[i].baseDept){
				alert("조직은 필수 항목입니다.");
				return false;
			}
		}

// 		if(confirm("저장하시겠습니까?")){
			putAjax("/user/fi/fi02/savePalBill", formData, null, function(data){
				if(data.resultCode == 200){
					gridView.setData(0);
				} else {
					alert(data.resultMessage);
				}
			});
// 		}
	}

	function copyPrevMonth(){
		var row = gridView.target.getList().length;
		if(row > 0){
			if(confirm($("#prftYm").val()  +" 월에 데이터가 존재합니다. 덮어씌우시겠습니까?")){
				callCopyPrevMonth();
			}
		} else {
			if(confirm("전월 복사 하시겠습니까?")){
				callCopyPrevMonth();
			}
		}
	}

	function callCopyPrevMonth(){
		var formData = {
				"userId" : jwt.userId,
				"pgmId" : "FI0201M01",
				"coCd" : $("#coCd").val(),
				"prftYm" : $("#prftYm").val()
			}
			putAjax("/user/fi/fi02/copyPrevMonth", formData, null, function(data){
				alert(data.resultMessage);
				if(data.resultCode == 200){
					gridView.setData(0);
				}
			});
	}


	function gridPaste(thisGrid, thisGridRow, thisGridCol) {
		navigator.clipboard.readText()
		.then(function(pasteData) {
			if (!pasteData || thisGridRow === undefined) return;

			var pasteRows = pasteData.replace(/[\r\n]+$/, '').split('\n').map(function(row) {
				return row.split('\t');
			});

			// hidden 컬럼 제외한 visible 컬럼 목록 (원본 훼손 방지)
			var tempColumns = (thisGrid.colGroup || []).filter(function(c) { return !c.hidden; });

			var currGridData = thisGrid.list;
			var startRowIndex = thisGridRow;
			var startColIndex = thisGridCol;
			var numRows = pasteRows.length;
			var numCols = pasteRows[0].length;

			var templateRow = JSON.parse(JSON.stringify(currGridData[thisGridRow] || {}));
			delete templateRow.creatId;

			for (var i = 0; i < numRows; i++) {
				var calRow = startRowIndex + i;
				if (calRow >= currGridData.length) {
					currGridData.push(JSON.parse(JSON.stringify(templateRow)));
				}
				for (var j = 0; j < numCols; j++) {
					var calCol = startColIndex + j;
					if (calCol >= tempColumns.length) break;
					var tkey = tempColumns[calCol].key;
					var cellData = pasteRows[i][j].replace(/\r/g, '');
					currGridData[calRow][tkey] = cellData;
				}
			}

			thisGrid.setData({ list: currGridData, page: { totalElements: currGridData.length } });
		})
		.catch(function() {});
	}
</script>
