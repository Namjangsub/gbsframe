		var color = this.value == "Y" ? "color-circle_02.png" : "color-circle_01.png";
		if (this.value == "E"){
			return 'E';
		} else {

	var gridViewPopBm19 = {
		initView : function() {
			this.target = new ax5.ui.grid();
			this.target.setConfig({
				// frozenColumnIndex : 5,
				showLineNumber    : true,
				showRowSelector   : false,
				multipleSelect    : false,

				body: {
					//columnHeight: 26,
					// mergeCells : ["clntNm", "clntPjtNm", "ctrtNm", "ordrsAmt", "ioDt"],
					mergeCells : ["clntCd", "clntNm", "inDt", "salesCd", "dsgnNo"],
					onClick: function () {
						var list = gridViewPopBm19.target.getList("selected");
                        $.each(list, function(idx, obj){
                            gridViewPopBm19.target.select(obj.__index, {selected: false});
                        });
	                    this.self.select(this.dindex);
					},
					onDataChanged: function () {
						changeCheck(this);
					}
				},
			
				columns : [
					{key: "rn"			, label: "No."      , align: "center", width: 60 , hidden: true},
					{key: "coCd"		, label: "회사코드" , align: "center", width: 70 , hidden: true},
					{key: "coNm"		, label: "회사"     , align: "center", width: 80 , hidden: true},					
					{key: "inDt"		, label: "매입일자" , align: "center", width: 80},
					{key: "clntCd"		, label: "거래처"   , align: "center", width: 100, hidden: true},
					{key: "clntNm"		, label: "거래처"   , align: "left"  , width: 120},
					{key: "inPrc"		, label: "단가"    , align: "right" , width: 70 , formatter: "money"},
					{key: "inQty"		, label: "수량"    , align: "right" , width: 70 , formatter: "money"},
					{key: "inDtlAmt"	, label: "금액"    , align: "right" , width: 80 , formatter: "money"},
					{key: "salesCd"		, label: "SalesCode", align: "center", width: 110},
					{key: "dsgnNo"		, label: "도번"     , align: "left"  , width: 200},
					{key: "ordrgNo"		, label: "발주번호"   , align: "center", width: 80},
					{key: "inNo"		, label: "입고번호"   , align: "center", width: 80}
				],
				
				page: {
	                navigationItemCount: 10,
	                height: 30,
	                display: true,
	                firstIcon: '<i class="fa fa-step-backward" aria-hidden="true"></i>',
	                prevIcon: '<i class="fa fa-caret-left" aria-hidden="true"></i>',
	                nextIcon: '<i class="fa fa-caret-right" aria-hidden="true"></i>',
	                lastIcon: '<i class="fa fa-step-forward" aria-hidden="true"></i>',
	                onChange: function () {
	                    gridViewPopBm19.setData(this.page.selectPage);
	                }
	            }
			});
			return this;
		},
		
		setData : function(_pageNo) {
			if (isFirst) return;
			var targetObj = this.target;
			if (inputValidation($('input[required]'))) {
				var formData = {};
				formData["matrCd"] = matrCd;
				//debugger;
				// formData["strtDt"]    = $("#strtDt_S").val().replace(/\-/g, '');
				// formData["endDt"]     = $("#endDt_S").val().replace(/\-/g, '');
				formData["pageNo"]    = _pageNo + 1;
				formData["recordCnt"] = 50;
				//debugger;
				postAjax("/user/sm/sm50/select_sm50_matr_List", formData, null, function(data) {
					try {
						var list = data.result;
						for (let i = 0; i < list.length; i++) {
							list[i].recnpyQty = gPasIntChk(list[i].recnpyQty);
							list[i].inoutPrc = gPasIntChk(list[i].inoutPrc);
							list[i].inoutAmt = gPasIntChk(list[i].inoutAmt);
						}
						targetObj.setData({
							list : list,
							page : {
								currentPage   : _pageNo,
								pageSize      : data.paginationInfo.pageSize,
								totalElements : data.paginationInfo.totalRecordCount,
								totalPages    : data.paginationInfo.totalPageCount
							}
						});
						gridHeightResize(gridViewPopBm19, 194); // 194 = 919 - 725 : 화면 Body 높이 - 그리드 기본크기 725
					} catch (error) {
						alert("오류 발생!! 전산실 연락 바랍니다", error.message);
						return null; // 오류 발생 시 null 반환
					} finally {
						// console.log("함수 실행 완료.");
					}					
				});
  			}
  		}
  	}

	function excelDown() {
		var paramObj = {"pageNo": 1};
		$.each($('#main_area [data-search]'), function(idx, elem){
			paramObj[$(elem).data('search')] = elem.value;
		});
		paramObj.recordCnt = 99999999;
		// paramObj["strtDt"] = $("#strtDt_S").val().replace(/\-/g, '');
		// paramObj["endDt"]  = $("#endDt_S").val().replace(/\-/g, '');
		
		postAjax("/user/sm/sm19/select_sm19_List", paramObj, null, function(data) {
			var list = data.result;
			excelViewPopBm19.target.setData({
				list : list,
				page : {
					totalElements : list.length,
				}
			});
			var todayDate = new Date().format('yyyyMMddHHmmss');
			excelViewPopBm19.target.exportExcel("재고변동목록_"+todayDate+".xls");
		});
	}
