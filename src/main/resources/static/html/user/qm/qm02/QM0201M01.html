	// ===== 월 범위 피커 =====
	var MonthRangePicker = (function(){
	    var s = { startYm:null, endYm:null, onApply:null, justOpened:false };
	    var MN = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
	    var _sy = new Date().getFullYear();
	    var _ey = new Date().getFullYear();
	    var _built = false;

	    var HTML =
	        '<div id="mrpPicker" style="display:none;position:fixed;z-index:99999;background:#fff;' +
	        'border:1px solid #d0d0d0;border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.18);' +
	        'padding:12px 16px 14px;user-select:none;font-size:13px;">' +
	        '<div class="drp-top"><span class="drp-title">월 선택</span>' +
	        '<button class="drp-close" id="mrpClose">&#x2715;</button></div>' +
	        '<div class="drp-body">' +
	        '<div class="drp-col">' +
	        '  <div class="drp-col-label">시작월</div>' +
	        '  <div style="display:flex;align-items:center;justify-content:space-between;margin:6px 0 6px;">' +
	        '    <button id="mrpSPrev" type="button" style="background:none;border:none;font-size:18px;cursor:pointer;padding:0 6px;line-height:1;">&#8249;</button>' +
	        '    <span id="mrpSYear" style="font-weight:bold;font-size:13px;"></span>' +
	        '    <button id="mrpSNext" type="button" style="background:none;border:none;font-size:18px;cursor:pointer;padding:0 6px;line-height:1;">&#8250;</button>' +
	        '  </div>' +
	        '  <div id="mrpSGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;"></div>' +
	        '  <div class="drp-sel-val" id="mrpSVal"></div>' +
	        '</div>' +
	        '<div class="drp-col">' +
	        '  <div class="drp-col-label">종료월</div>' +
	        '  <div style="display:flex;align-items:center;justify-content:space-between;margin:6px 0 6px;">' +
	        '    <button id="mrpEPrev" type="button" style="background:none;border:none;font-size:18px;cursor:pointer;padding:0 6px;line-height:1;">&#8249;</button>' +
	        '    <span id="mrpEYear" style="font-weight:bold;font-size:13px;"></span>' +
	        '    <button id="mrpENext" type="button" style="background:none;border:none;font-size:18px;cursor:pointer;padding:0 6px;line-height:1;">&#8250;</button>' +
	        '  </div>' +
	        '  <div id="mrpEGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;"></div>' +
	        '  <div class="drp-sel-val" id="mrpEVal"></div>' +
	        '</div>' +
	        '</div>' +
	        '<div class="drp-footer">' +
	        '<button class="drp-btn-apply" id="mrpApply">선택완료</button>' +
	        '<button class="drp-btn-cancel" id="mrpCancel">취소</button>' +
	        '</div></div>';

	    function pad(m){ return (m<10?'0':'')+m; }
	    function ym(y,m){ return y+'-'+pad(m); }
	    function fmtYm(v){ return v ? v.substr(0,4)+'년 '+parseInt(v.substr(5))+'월' : ''; }

	    function cellStyle(v, mode){
	        var sel = (mode === 'start') ? s.startYm : s.endYm;
	        var isSelected = sel && v === sel;
	        var bg  = isSelected ? '#2a7cdf' : '#f7f7f7';
	        var clr = isSelected ? '#fff' : '#333';
	        var bdr = isSelected ? '#1a6cce' : '#ddd';
	        return 'padding:8px 2px;border:1px solid '+bdr+';border-radius:4px;background:'+bg+
	               ';color:'+clr+';cursor:pointer;font-size:12px;width:100%;margin:0;text-align:center;box-sizing:border-box;';
	    }

	    function renderGrid(gridId, year, mode){
	        var html='';
	        for(var i=1;i<=12;i++){
	            var v=ym(year,i);
	            html+='<button type="button" data-ym="'+v+'" style="'+cellStyle(v,mode)+'">'+MN[i-1]+'</button>';
	        }
	        $('#'+gridId).html(html);
	    }

	    function render(){
	        renderGrid('mrpSGrid', _sy, 'start');
	        renderGrid('mrpEGrid', _ey, 'end');
	        $('#mrpSYear').text(_sy+'년');
	        $('#mrpEYear').text(_ey+'년');
	        $('#mrpSVal').text(fmtYm(s.startYm));
	        $('#mrpEVal').text(fmtYm(s.endYm));
	    }

	    function build(){
	        if(_built) return;
	        _built = true;
	        $('body').append(HTML);

	        $('#mrpSPrev').on('click',function(e){e.stopPropagation();_sy--;render();});
	        $('#mrpSNext').on('click',function(e){e.stopPropagation();_sy++;render();});
	        $('#mrpEPrev').on('click',function(e){e.stopPropagation();_ey--;render();});
	        $('#mrpENext').on('click',function(e){e.stopPropagation();_ey++;render();});

	        $(document).on('click','#mrpSGrid button[data-ym]',function(e){
	            e.stopPropagation();
	            s.startYm=$(this).attr('data-ym');
	            if(s.endYm && s.endYm<s.startYm) s.endYm=s.startYm;
	            render();
	        });
	        $(document).on('click','#mrpEGrid button[data-ym]',function(e){
	            e.stopPropagation();
	            s.endYm=$(this).attr('data-ym');
	            if(s.startYm && s.startYm>s.endYm) s.startYm=s.endYm;
	            render();
	        });

	        $('#mrpApply').on('click',function(e){
	            e.stopPropagation();
	            if(!s.startYm){alert('시작월을 선택하세요.');return;}
	            if(!s.endYm){alert('종료월을 선택하세요.');return;}
	            var cb=s.onApply, sy=s.startYm, ey=s.endYm;
	            hide();
	            if(typeof cb==='function') cb(sy,ey);
	        });

	        $('#mrpCancel,#mrpClose').on('click',function(e){e.stopPropagation();hide();});

	        $(document).on('click.mrpOutside',function(e){
	            if(s.justOpened) return;
	            if($('#mrpPicker').is(':hidden')) return;
	            if($(e.target).closest('#mrpPicker').length) return;
	            if($(e.target).is('#reqDtFrom,#reqDtTo')) return;
	            hide();
	        });
	    }

	    function open(opts){
	        opts=opts||{};
	        s.startYm=opts.startYm||null;
	        s.endYm=opts.endYm||null;
	        s.onApply=opts.onApply||null;

	        build();

	        _sy = s.startYm ? parseInt(s.startYm) : new Date().getFullYear();
	        _ey = s.endYm   ? parseInt(s.endYm)   : new Date().getFullYear();
	        render();

	        var $p=$('#mrpPicker');
	        if($p.parent()[0]!==document.body) $('body').append($p);
	        $p.css({visibility:'hidden',display:'block'});
	        var pw=$p.outerWidth()||480, ph=$p.outerHeight()||300;
	        $p.css({visibility:'',display:'none'});

	        var ww=$(window).width(), wh=$(window).height();
	        var left=(ww-pw)/2, top=(wh-ph)/2;
	        var $t=opts.$trigger;
	        if($t&&$t.length){
	            var off=$t.offset();
	            left=Math.min(off.left, ww-pw-10);
	            top=off.top+$t.outerHeight()+4;
	            if(top+ph>wh) top=off.top-ph-4;
	        }
	        $p.css({left:Math.max(left,4), top:Math.max(top,4), display:'block'});

	        s.justOpened=true;
	        setTimeout(function(){s.justOpened=false;},200);
	    }

	    function hide(){ $('#mrpPicker').hide(); }

	    return { open:open, hide:hide };
	})();
	// ===== 월 범위 피커 End =====

	var userDeptId = jwt.deptId; //소속부서
	var userDept = userDeptId.substr(0, 5); //상위 소속부서

	});

 	//고찰 보고서 출력 - report 출력
 	function setReportQM02Detail(jobCode, _type = "") {
		let row = gridView.target.getList("selected")[0];
		if (!row) return false;
		jobCode = (row.resDiv == "팀") ? "T" : "P";	//개인, 팀 구분자 적용

 		let fileName = (jobCode == "P") ? "QM0201R01.jrf" :  "QM0201R02.jrf";  //여러 발주서 번호 처리 (in 처리)
 		let arg =
 			  "coCd#"		+  row.coCd
 		    + "#userId#"	+  row.ordrgId
 		    + "#statYm#"	+  row.statYm
 		    + "#fileTrgtKey#"	+ row.fileTrgtKey
 		    + "#member#"	+ DeptNameRtv(row.deptId.slice(0,5))
 	    	+ "#";

 		if (_type == '' || _type == undefined ) {
 			callReport(fileName, arg, 1150, 720, '발주요청서고찰');
 		} else { //Export 작업
 			ubiExportAjax(fileName, arg, function(response) {
 				if (response.resultCode === 200) {
 					var base64FileData = response.base64FileData;
 					var fileName = response.exportFileName;
 					downloadPDFFromBase64(base64FileData, fileName);
 				} else {
 					alert('PDF 내보내기 실패: ' + response.resultText);
 				}

 			});
 		}
 	}

	//부서원을 PIVOT조건으로 생성함
    function DeptNameRtv(_deptCd){
    	let formData = {
    			"deps" : _deptCd
    		}
		let userName = "";
    	postAjaxSync("/user/qm/qm02/select_all_modal", formData, null, function(data) {
    		var list = data.result;
			 if (list.length > 0) {
                 $.each(list, function(idx, elem){
                 	userName += list[idx].name;
	             	if(idx != (list.length-1)){
	             		userName += ",";
	             	}
                 });
			 }
		});
		return userName;
    }
