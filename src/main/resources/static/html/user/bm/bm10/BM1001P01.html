	<!-- 공통 파일 영역 -->
	<div id="fileList_area"></div>
	
</div>

<!-- 하단 버튼 -->
<div class ="popup_bottom_btn">
	<button type="button" id="actionBtn" authChk>등록</button>
	<button type="button" class="close_btn" onclick="modalStack.close();">닫기</button>
</div>

<script type="text/javascript">
	// debugger;
	var actionType = null;
	var fileTrgtKey = null;
	
	$(document).ready(function() {
		setCommonSelect($(".popup_area select[data-kind]"));
		setByCoCd(modalStack.last().paramObj.coCd);

		$("#popForm #userId").val(jwt.userId);
		
		authChk(); //권한체크
		
		actionType = modalStack.last().paramObj.actionType;
		fileTrgtKey = modalStack.last().paramObj.fileTrgtKey;
		
		if (actionType == "C") {
			//단가
			$("#prodUpr").prop("readonly", true);
			//단가기준일
			$("#prodUprDt").prop("readonly", true);
			
			//버튼명 변경
			$("#actionBtn").text("등록");

			//버튼 클릭 시
			$('#actionBtn').on("click", function() {
				insert_bm10();
			});
		} else if (actionType == "U") {
			
			//타이틀명 변경
			$('.tit').text('제품마스터 수정')
			
			//회사
			// $("#coCd").prop("disabled", true);
			//회사 비활성화
			$('#coCd').css({'background-color':'#e6e6e6', 'pointer-events':'none'});
			//품번
			$("#prodCd").prop("readonly", true);
			//품명
			$("#prodNm").prop("readonly", true);
			//품목구분
			$("#goodsDiv").prop("disabled", true);
			//제품구분
			$("#prdtCd").prop("readonly", true);
			$("#prdtNm").prop("readonly", true);
			//아이템구분
			$("#itemDiv").prop("disabled", true);
			//작업구분
			$("#prodDtlDiv20").prop("disabled", true);
			//자체구분
			$("#prodDtlDiv30").prop("disabled", true);
			//고객사PJT
			$("#clntPjt").prop("readonly", true);
			$("#clntPjt").prop("disabled", true);
			//단가
			$("#prodUpr").prop("readonly", true);
			//단가기준일
			$("#prodUprDt").prop("readonly", true);

			//수정 모드 데이터 가져오기
			select_bm10_Info();
			
			//버튼명 변경
			$('#actionBtn').text("수정");

			//버튼 클릭 시
			$('#actionBtn').on("click", function() {
				update_bm10();
			});
		}
		
		//---------------------------------------------------------------
		//첨부 화일 처리 시작
		//---------------------------------------------------------------
		fileParam = {
			fileTrgtTyp	: $("#popForm #pgmId").val(),
			fileTrgtKey : fileTrgtKey
		}
		
		treeModule.initAll('deptTreeOrdars', 'file-grid', 'FILETREE', fileParam);
		//---------------------------------------------------------------
		//첨부 화일 처리 끝
		//---------------------------------------------------------------
	});
	
	//그리드에 뿌리는 데이터
	function select_bm10_Info() {
		var formData = {
			"fileTrgtKey" : fileTrgtKey,
		}
		
		postAjax("/user/bm/bm10/select_bm10_Info", formData, null, function(data) {
			$.each(data.result, function(key, value) {
				if ($('#popForm #' + key)[0]) {
					$('#popForm #' + key).val(value);
					
					if ($('#popForm #' + key).is('[comma]')) {
						onlyNumber($('#popForm #' + key)[0]);
					}
				}
			});
		});
	}
	
	// 등록
	function insert_bm10() {
		if (inputValidation($('.popup_area [required]'))) {		// 필수 필드의 유효성 검사
			var formData = makeFormData();						// 요청이 통과하면 makeFormData() 함수를 이용해 formData를 생성
			if (formData) {
				filePostAjax("/user/bm/bm10/insert_bm10", formData,	// 파일을 포함한 데이터를 서버로 전송하는 비동기적인 AJAX 요청을 수행
							function(data) {
								alert(data.resultMessage);			// 결과 메시지를 alert으로 출력
								
								if (data.resultCode == 200) {		//  요청이 성공(200)한 경우, gridView.setData(0)를 호출하여 그리드 뷰를 업데이트하고,
									gridView.setData(0);
									modalStack.close();				// 모달을 닫음
								}
							}
				);
			}
		}
	}
	
	// 수정
	function update_bm10() {
		if (inputValidation($('.popup_area [required]'))) {						// 필수 필드의 유효성 검사
			var formData = makeFormData();										// 요청이 통과하면 makeFormData() 함수를 이용해 formData를 생성
			debugger;
			if (formData) {
				filePostAjax("/user/bm/bm10/update_bm10", formData,function(data) {
					alert(data.resultMessage);
					if (data.resultCode == 200) {
						gridView.setData(0);
						modalStack.close();
					}
				});
			}
			
		}
	}
	
	function makeFormData() {
		// 금액 콤마 제거
		$.each($('.popup_area input[comma]'), function(idx, elem) {
			deleteComma(elem);
		});
		
		// 날짜 하이픈 제거
		$.each($('.popup_area input[date]'), function(idx, elem) {
			deleteHyphen(elem);
		});
		
		// 폼데이터 생성
		var formData = new FormData($("#popForm")[0]);
		// console.log(formData);
		//---------------------------------------------------------------
		//-------itemarr  --첨부화일 처리를 위한 부분 시작
		//---------------------------------------------------------------
		// 유저아이디 추가
		formData.append("userId", jwt.userId);
		//formData.append("clntCd", $('#vendCd').val());   //첨부화일용
		formData.append("prdtCd", $('#prdtCd').val());   //첨부화일용
		formData.append("itemCd", $('#itemDiv').val());  //첨부화일용
		formData.append("prjctCd", $('#clntPjt').val()); //첨부화일용
		formData.append("salesCd", $('#prodCd').val()); //첨부화일용
		
		//-------itemarr  --첨부화일 처리를 위한 부분 시작
		formData.append("comonCd", treeModule.getFileNodeId());	//첨부화일용
		
		var fileUploadArr = [];
		var tempArr = [];
		var totalFileSize = 0; // 첨부파일 사이즈 처리용 변수
		
		tempArr = treeModule.getFileArr();
		
		$.each(tempArr, function(idx, obj) {
			if (obj.fileKey == 0) {
                formData.append("files", obj.file);
                
                // 파일 사이즈 단위 누적 (바이트 단위)
                if (obj.file && obj.file.size) {
                    totalFileSize += obj.file.size;
                }
                
                var cloneObj = $.extend({}, obj);
                cloneObj.file = '';
                fileUploadArr.push(cloneObj);
			}
		});
		// 첨부파일 자료 용량이 yml 설정값(max-file-size) 이상인 경우 경고 후 중지
		if (totalFileSize > 0) {
			var MAX_SIZE = 2000 * 1024 * 1024; // Default fallback
			postAjaxSync("/admin/cm/cm08/getMaxFileSize", null, null, function(data) {
				if (data.resultCode == 200 && data.maxFileSize) {
					var mbStr = data.maxFileSize.toUpperCase().replace("MB", "").replace("GB", "").trim();
					var mbInt = parseInt(mbStr, 10);
					if (!isNaN(mbInt)) {
						if(data.maxFileSize.toUpperCase().indexOf("GB") > -1) {
							mbInt = mbInt * 1024;
						}
						MAX_SIZE = mbInt * 1024 * 1024;
					}
				}
			});
			
			if (totalFileSize >= MAX_SIZE) {
				var limitMb = Math.round(MAX_SIZE / (1024 * 1024));
				var attachMb = Math.round(totalFileSize / (1024 * 1024));
				alert("첨부파일 자료 용량이 많습니다. 한도:" + limitMb + "MB < 첨부:" + attachMb + "MB\n분리해서 UPload하세요!");
				return false;
			}
		}
		
		formData.append("uploadFileArr", JSON.stringify(fileUploadArr));
		formData.append("deleteFileArr", JSON.stringify(treeModule.getDeleteFileArr()));
		//---------------------------------------------------------------
		//--첨부화일 처리를 위한 부분 끝
		//---------------------------------------------------------------
		return formData;
	}

	//제품구분 검색
	function PrdtSearch(){
		var paramObj = {
			"coCd"  : $('#coCd').val(),
			"prdtCd": $('#prdtCd').val(),
			"prdtNm": $('#prdtNm').val(),
			"useYn" : "Y"
		}

		//등록일 경우만 팝업오픈
		if (actionType == "C") {
			openSecondModal("/static/html/cmn/modal/prdtSearch.html", 800, 600, "제품 검색", paramObj, function (grid) {
				var row = grid.target.getList("selected")[0];
				$("#prdtCd").val(row.prdtCd);
				$("#prdtNm").val(row.prdtNm);
			});
		}
	}
		
	function setByCoCd(value) {
		$('#coCd option:not([value="'+value+'"])').remove();
	}

</script>
