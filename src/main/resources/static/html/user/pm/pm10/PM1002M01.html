<script type="text/javascript">

	let fileRowInserted = false;
	let currentFileRow = null;
	let currentFileColumn = null;
	var mnFileArr = [];
	var deleteFileArr = [];
	let attendFlag = true;	// 구분이 회의결과일 때 참석자 리스트 update를 위한 flag
	let lastEditedCell = null;
	let currentLockInfo = null;
	let lastClickedColKey = null;
	var isSyncing = false;

	// === Soft Lock 3단계 방어 체계 ===
	var isEditing = false;			// 1. 편집 중 플래그 (폴링 제어)
	var pollInterval = null;		// 2. 폴링 인터벌 ID
	var isPolling = false;			// 2. 폴링 중 여부 (unlockUserLocks 스킵용)
	var idleTimer = null;			// 3. 유휴 타이머
	var IDLE_TIMEOUT_MS = 10 * 60 * 1000;	// 3. 유휴 타임아웃 10분
	var isPopupView = false;

	const DEFAULT_ATTEND_LIST = [
		{ id: 'EMJ8105', name: '김태호', title: '부사장' },
		{ id: 'kimjhv', name: '김재현', title: '전 무' },
		{ id: 'kimihz', name: '김일희', title: '상 무' },
		{ id: 'K98452000', name: '김동현', title: '상 무' },
		{ id: 'shjung', name: '정상훈', title: '부 장' },
		{ id: 'h4ng10', name: '허상렬', title: '부 장' },
		{ id: 'canmtb', name: '한동주', title: '과 장' },
		{ id: 'js.nam', name: '남장섭', title: '실 장' },
		{ id: 'cyh', name: '조영희', title: '부 장' },
		{ id: 'jwc', name: '조완철', title: '차 장' },
		{ id: 'sms', name: '손민성', title: '차 장' },
	];
	let attendList = DEFAULT_ATTEND_LIST.map(u => ({ ...u }));

	const FIXED_ORDER = DEFAULT_ATTEND_LIST.map(u => u.id);

	//formatter 공통 함수
	function valueFormatter() {
		const colKey = this.key;
		const item = this.item;
		const lockInfo = getCellLockInfo(item, colKey);
		let badge = '';
		if (lockInfo && lockInfo.lockYn === 'Y' && lockInfo.lockUserNm) {
			badge = '<span class="lock-badge">' + lockInfo.lockUserNm + ' 편집 중</span><br>';
		}
		return (this.value) ? badge + '<span style="display: block; white-space: pre;">' + this.value + '</span>' : badge;
	}

	// 셀별 잠금 정보 조회 함수
	function getCellLockInfo(item, colKey) {
		if (!item || item.isFileRow || item.isNoticeRow) return null;
		const currentUserId = $('#userId').val();
		// D01 컬럼 (mnSubject, mnEtcAll, mnStatus)
		if (colKey === 'mnSubject' || colKey === 'mnEtcAll' || colKey === 'mnStatus') {
			if (item.d01LockYn === 'Y' && item.d01LockUserNm) {
				return { lockYn: item.d01LockYn, lockUserNm: item.d01LockUserNm };
			}
			return null;
		}
		// D03 컬럼 (부서별)
		if (deptCodeMap[colKey]) {
			const deptCd = deptCodeMap[colKey];
			const lockYnKey = deptCd.toLowerCase().replace(/([a-z])(\d)/g, '$1$2') + 'LockYn';
			const lockNmKey = deptCd.toLowerCase().replace(/([a-z])(\d)/g, '$1$2') + 'LockUserNm';
			// CamelMap 키: gun00LockYn, gun30LockUserNm 등
			if (item[lockYnKey] === 'Y' && item[lockNmKey]) {
				return { lockYn: item[lockYnKey], lockUserNm: item[lockNmKey] };
			}
		}
		return null;
	}

	// 파일 첨부 셀 함수
	function fileCellFormatter() {
		if (!this.item.isFileRow) {
			// 일반 행: 잠금 뱃지 포함하여 표시
			return valueFormatter.call(this);
		}

		const colKey = this.key;
		const files = (this.item.filesByColumn && this.item.filesByColumn[colKey]) || [];

		// 1) 파일 리스트
		const listHtml = files.length ?
			`<ul class="file-list" style="padding:0; margin:0; list-style:none;">
			${files.map((f, i) =>
				`<li data-idx="${i}" data-col="${colKey}" style="margin:6px 0; display:flex; align-items:center;">
					${$('#mnDiv_S').val() !== 'MNDIV99' ?
					`<button class="file-remove" data-idx="${i}" data-col="${colKey}" style="font-size:11px; padding:4px 10px; margin-right:6px; background-color:rgb(255,50,0); cursor:pointer;">삭제</button>`
					: ''}
					<span class="file-preview"
						style="white-space: nowrap; text-decoration:underline; cursor:pointer;" 
						data-col="${colKey}" data-filekey="${f.fileKey}" data-filename="${f.name}" data-filetype="${f.fileType}">${f.name}
					</span>
				</li>`
			).join('')}
		</ul>`
			: '';

		// 2) 추가 버튼
		const btnHtml = (files.length && $('#mnDiv_S').val() !== 'MNDIV99') ?
			`<div class="file-add-wrap" style="width:100%; text-align:center; margin-top:12px;">
			<button class="file-add-btn" data-col="${colKey}"style="font-size:11px; padding:4px 10px; cursor:pointer;">추가</button>
		</div>`
			: '';

		return listHtml + btnHtml;
	}

	const baseFileCol = {
		editor: {
			type: "textarea",
			disabled: function () {
				return this.item.isFileRow
					|| $('#mnDiv_S').val() === 'MNDIV99'
					|| !lockCellForEdit(this.item, this.key);
			}
		},
		formatter: fileCellFormatter
	};

	const mnStatusCode = [
		{ 'CD': '', 'NM': '' },
		{ 'CD': 'N', 'NM': '진행' },
		{ 'CD': 'Y', 'NM': '완료' }
	]

	// 부서 코드 매핑
	const deptCodeMap = {
		gun00MnCnts: 'GUN00', gun60MnCnts: 'GUN60', gun30MnCnts: 'GUN30',
		gun40MnCnts: 'GUN40', trn5010MnCnts: 'TRN5010', trn5020MnCnts: 'TRN5020',
		gun10MnCnts: 'GUN10', gun80MnCnts: 'GUN80', gun70MnCnts: 'GUN70', gun75MnCnts: 'GUN75'
	};

	function getLockTarget(item, colKey) {
		if (!item || !colKey) return null;
		if (item.isFileRow || item.isNoticeRow) return null;

		if (colKey === 'mnSubject' || colKey === 'mnEtcAll' || colKey === 'mnStatus') {
			return {
				targetType: 'D01',
				mnDate: item.mnDate || $('#mnDate_S').val(),
				mnSubSeq: item.mnSubSeq
			};
		}
		if (deptCodeMap[colKey]) {
			return {
				targetType: 'D03',
				mnDate: item.mnDate || $('#mnDate_S').val(),
				mnSubSeq: item.mnSubSeq,
				mnDeptCd: deptCodeMap[colKey]
			};
		}
		return null;
	}

	function isSameLock(a, b) {
		if (!a || !b) return false;
		return a.targetType === b.targetType
			&& a.mnDate === b.mnDate
			&& String(a.mnSubSeq) === String(b.mnSubSeq)
			&& String(a.mnDeptCd || '') === String(b.mnDeptCd || '');
	}

	let popupObserver = null;
	function syncPopupTextareaValue(value) {
		if (value === undefined) return;
		const $popup = $('[data-ax5grid-popup="textarea"] textarea');
		if ($popup.length) {
			$popup.val(value);
			return;
		}
		if (popupObserver) {
			popupObserver.disconnect();
			popupObserver = null;
		}
		popupObserver = new MutationObserver(function () {
			const $newPopup = $('[data-ax5grid-popup="textarea"] textarea');
			if ($newPopup.length) {
				$newPopup.val(value);
				popupObserver.disconnect();
				popupObserver = null;
			}
		});
		popupObserver.observe(document.body, { childList: true, subtree: true });
	}

	function applyCellDataFromLock(item, colKey, cellData) {
		if (!cellData || !item) return;
		let targetKey = colKey;
		if (cellData.mnDeptCd) {
			for (const key in deptCodeMap) {
				if (deptCodeMap[key] === cellData.mnDeptCd) {
					targetKey = key;
					break;
				}
			}
		}
		if (colKey === 'mnSubject' && cellData.mnSubject !== undefined) {
			item.mnSubject = cellData.mnSubject;
			syncPopupTextareaValue(item.mnSubject);
		}
		if (colKey === 'mnEtcAll' && cellData.mnEtcAll !== undefined) {
			item.mnEtcAll = cellData.mnEtcAll;
			syncPopupTextareaValue(item.mnEtcAll);
		}
		if (colKey === 'mnStatus' && cellData.mnStatus !== undefined) {
			item.mnStatus = cellData.mnStatus;
		}
		if (deptCodeMap[targetKey]) {
			const mnDiv = $("#mnDiv_S").val();
			let value = null;
			if (mnDiv === 'MNDIV02') {
				value = (cellData.mnResult && cellData.mnResult !== '') ? cellData.mnResult : cellData.mnCnts;
			} else {
				value = cellData.mnCnts;
			}
			if (value !== undefined) {
				item[targetKey] = value;
				syncPopupTextareaValue(value);
			}
		}
		// 에디터가 내부 캐시값을 쓰는 경우가 있어 그리드 값도 동기화
		const grid = mnGridView && mnGridView.target ? mnGridView.target : null;
		if (grid && typeof grid.setValue === "function") {
			const rowIndex = Array.isArray(grid.list) ? grid.list.indexOf(item) : -1;
			if (rowIndex >= 0) {
				isSyncing = true;
				try {
					grid.setValue(rowIndex, targetKey, item[targetKey], true);
				} finally {
					isSyncing = false;
				}
				return;
			}
		}
		mnGridView.target.repaint();
	}

	function lockCellForEdit(item, colKey) {
		// [추가] 주제(mnSubject)가 비어있는데 부서 내용(D03)을 먼저 편집하려 하면 차단 (부모 없는 자식 데이터 방지)
		if (deptCodeMap[colKey]) {
			if (!item.mnSubject || item.mnSubject.trim() === '') {
				alert("주제를 먼저 입력해야 부서 내용을 작성할 수 있습니다.");
				return false;
			}
		}

		const lockTarget = getLockTarget(item, colKey);
		if (!lockTarget) return true;
		if (!lockTarget.mnSubSeq || lockTarget.mnSubSeq <= 0) return true;

		if (currentLockInfo && !isSameLock(currentLockInfo, lockTarget)) {
			unlockCell(currentLockInfo);
		}

		const paramObj = {
			targetType: lockTarget.targetType,
			mnDate: lockTarget.mnDate,
			mnSubSeq: lockTarget.mnSubSeq,
			mnDeptCd: lockTarget.mnDeptCd,
			userId: $('#userId').val(),
			pgmId: $('#pgmId').val()
		};

		let lockOk = false;
		postAjaxSync("/user/pm/pm10/pm10_lock_cell", paramObj, null, function (data) {
			if (data.resultCode === 200) {
				lockOk = true;
				currentLockInfo = { ...lockTarget, colKey };
				isEditing = true;		// 1. 편집 시작 → 폴링 중단
				startIdleTimer();		// 3. 유휴 타이머 시작
				applyCellDataFromLock(item, colKey, data.cellData);
			} else if (data.resultCode === 409) {
				alert((data.resultMessage || '다른 사용자') + "님이 수정 중인 셀입니다.");
				mnGridView.setData(0);
				lockOk = false;
				return false;
			} else {
				alert("락 처리 실패: " + (data.resultMessage || ""));
				lockOk = false;
			}
		});
		return lockOk;
	}

	function unlockCell(lockInfo) {
		if (!lockInfo) return;
		const paramObj = {
			targetType: lockInfo.targetType,
			mnDate: lockInfo.mnDate,
			mnSubSeq: lockInfo.mnSubSeq,
			mnDeptCd: lockInfo.mnDeptCd,
			userId: $('#userId').val()
		};
		postAjax("/user/pm/pm10/pm10_unlock_cell", paramObj, null, function () {
			mnGridView.updateData(true);	// unlock 완료 후 다른 사용자 변경사항 반영
		});
		currentLockInfo = null;
		isEditing = false;			// 1. 편집 종료 → 폴링 재개
		clearTimeout(idleTimer);		// 3. 유휴 타이머 해제
	}

	function unlockUserLocks() {
		if (isPolling) return;		// 2. 폴링 중에는 unlock 스킵
		const paramObj = {
			mnDate: $('#mnDate_S').val(),
			userId: $('#userId').val()
		};
		postAjaxSync("/user/pm/pm10/pm10_unlock_user_cells", paramObj, null, function () { });
		currentLockInfo = null;
	}

	// 3. 유휴 타이머 시작 함수
	function startIdleTimer() {
		clearTimeout(idleTimer);
		idleTimer = setTimeout(function () {
			if (currentLockInfo) {
				unlockCell(currentLockInfo);
				alert("10분간 활동이 없어 편집 잠금이 해제되었습니다.");
				isEditing = false;
				mnGridView.setData(0);
			}
		}, IDLE_TIMEOUT_MS);
	}

	// 3. 유휴 타이머 리셋 함수 (키보드/마우스 입력 시)
	function resetIdleTimer() {
		if (currentLockInfo) startIdleTimer();
	}

	function focusLastEditedCell() {
		if (!lastEditedCell) return;
		var grid = mnGridView.target;

		// 행 찾기
		var rowIndex = findRowIndex(grid, lastEditedCell);
		if (rowIndex < 0) { lastEditedCell = null; return; }

		// 선택 + 포커스 (focus가 자동으로 스크롤 처리)
		grid.select(rowIndex);
		if (lastEditedCell.colKey) {
			var colIndex = grid.colGroup.findIndex(c => c && c.key === lastEditedCell.colKey);
			if (colIndex >= 0) {
				grid.focus(rowIndex, colIndex);
			}
		}

		lastEditedCell = null;
	}

	function findRowIndex(grid, editInfo) {
		if (editInfo.isNoticeRow) return grid.list.findIndex(r => r.isNoticeRow);
		if (editInfo.isFileRow) return grid.list.findIndex(r => r.isFileRow);
		if (String(editInfo.mnSubSeq) === '0') {
			// 신규 행: 가장 큰 mnSubSeq
			var maxSeq = 0, maxIdx = -1;
			grid.list.forEach((r, idx) => {
				if (!r.isFileRow && !r.isNoticeRow && Number(r.mnSubSeq) > maxSeq) {
					maxSeq = Number(r.mnSubSeq); maxIdx = idx;
				}
			});
			return maxIdx;
		}
		return grid.list.findIndex(r =>
			!r.isFileRow && !r.isNoticeRow &&
			String(r.mnSubSeq) === String(editInfo.mnSubSeq)
		);
	}

		processGridData: function (data) {
			if (!data) return [];
			var list = Array.isArray(data.result) ? data.result : [];

			// rnum이 있는 회의록만 추출
			var rows = list.filter(r => r.rnum !== undefined);

			// 공지사항 기본 구조
			let noticeRow = rows.find(r => r.mnSubject === '공지사항');
			if (!noticeRow) {
				noticeRow = {
					mnDate: $('#mnDate_S').val(),
					mnWeeks: $('#mnWeeks_S').val(),
					mnSubSeq: 0,
					mnSubject: '공지사항',
					mnSortNo: 0,
					isNoticeRow: true,
					gun00MnCnts: '', gun30MnCnts: '', gun40MnCnts: '', gun60MnCnts: '',
					trn5010MnCnts: '', trn5020MnCnts: '', gun10MnCnts: '', gun80MnCnts: '',
					mnStatus: '', mnEtcAll: ''
				};
			} else {
				noticeRow.isNoticeRow = true;
			}

			// 파일첨부 처리: data.result 중 files 키를 가진 객체에서 JSON 파싱
			const fileEntry = list.find(r => typeof r.files === 'string');
			const parsedFiles = fileEntry ? JSON.parse(fileEntry.files) : [];

			// fileRow 기본 구조
			const fileRow = {
				mnDate: $('#mnDate_S').val(),
				mnWeeks: $('#mnWeeks_S').val(),
				mnSubSeq: 0,
				mnSubject: '파일첨부',
				gun00MnCnts: '', gun30MnCnts: '', gun40MnCnts: '', gun60MnCnts: '',
				trn5010MnCnts: '', trn5020MnCnts: '', gun10MnCnts: '', gun80MnCnts: '',
				mnStatus: '',
				mnEtcAll: '',
				mnSortNo: 0,
				isFileRow: true,
				filesByColumn: {}
			};

			// parsedFiles 배열 돌면서 deptCodeMap에 맞춰 바로 filesByColumn에 추가
			parsedFiles.forEach(f => {
				const deptCode = String(f.fileTrgtKey).split('-').length >= 2 ? String(f.fileTrgtKey).split('-')[1] : '';
				const colKey = Object.keys(deptCodeMap)
					.find(key => deptCodeMap[key] === deptCode);
				if (!colKey) return;

				if (!fileRow.filesByColumn[colKey]) {
					fileRow.filesByColumn[colKey] = [];
				}
				fileRow.filesByColumn[colKey].push({
					name: f.fileName,
					fileKey: f.fileKey,
					fileType: f.fileType
				});
			});

			// merged 배열 생성
			const nonNoticeRows = rows.filter(r => r.mnSubject !== '공지사항');
			const merged = [...nonNoticeRows, noticeRow, fileRow].sort((a, b) => {
				if (a.isFileRow) return 1;
				if (b.isFileRow) return -1;
				if (a.isNoticeRow) return 1;
				if (b.isNoticeRow) return -1;
				return ((a.mnSortNo || 0) - (b.mnSortNo || 0));
			});

			// 구분에 따른 그리드 화면 조회
			const deptCols = Object.keys(deptCodeMap);
			const mnDivVal = $('#mnDiv_S').val();

			merged.forEach(item => {
				deptCols.forEach(colKey => {
					const cntsVal = item[colKey] || '';
					const resultKey = colKey.replace('MnCnts', 'MnResult');
					const resultVal = item[resultKey] || '';

					if (mnDivVal === 'MNDIV01') {
						// 사전공지
						item[colKey] = cntsVal;
					}
					else if (mnDivVal === 'MNDIV02') {
						// 회의결과가 없으면 사전공지자료를 보여줌
						item[colKey] = (resultVal) ? resultVal : cntsVal;
					}
					else if (mnDivVal === 'MNDIV99') {
						// 전체조회: 빈 값은 섹션에서 제외
						let parts = [];
						if (cntsVal) {
							parts.push(`[사전공지]\n${cntsVal}`);
						}
						if (resultVal) {
							parts.push(`[회의결과]\n${resultVal}`);
						}
						// 둘 다 비어 있으면 빈 문자열
						item[colKey] = parts.length ? parts.join('\n\n') : '';
					}
				});
			});

			return merged;
		},
		updateData: function (isPolling) {
			if (isPopupView) return false;
			var targetObj = this.target;
			var paramObj = {};
			$.each($('#main_area [data-search]'), function (idx, elem) {
				if ($(elem).hasClass("input_calendar")) {
					paramObj[$(elem).data("search")] = deleteHyphenStr($(elem).val());
				} else {
					paramObj[$(elem).data("search")] = $(elem).val();
				}
			});
			paramObj.userId = jwt.userId;
			paramObj.deptCodes = JSON.stringify(Object.values(deptCodeMap));

			postAjax("/user/pm/pm10/selectMnList", paramObj, null, function (data) {
				try {
					var newList = mnGridView.processGridData(data);
					var oldList = mnGridView.target.list;

					// [수정] 델타 버그 (망가진 polling) 해결 
					// 로컬 전용(아직 DB에 안 들어간) 빈 행 추출
					var localUnsaved = oldList.filter(oldItem => 
						!oldItem.isFileRow && !oldItem.isNoticeRow && 
						String(oldItem.mnSubSeq) !== '0' &&
						(!oldItem.mnSubject || oldItem.mnSubject.trim() === '') && // 작성된 적 없는 로컬 빈 칸
						!newList.some(newItem => String(newItem.mnSubSeq) === String(oldItem.mnSubSeq))
					);

					// 뉴 리스트에 로컬 빈 껍데기를 병합하여 oldList와 동일한 비교선상에 올림
					if (localUnsaved.length > 0) {
						localUnsaved.forEach(u => newList.push(u));
						// 다시 정렬
						var dRows = newList.filter(r => !r.isFileRow && !r.isNoticeRow);
						dRows.sort((a,b) => (a.mnSortNo || 0) - (b.mnSortNo || 0));
						var fRow = newList.find(r => r.isFileRow);
						var nRow = newList.find(r => r.isNoticeRow);
						newList = [...dRows, nRow, fRow].filter(x => x);
					}

					// 행 구성 요소가 완전히 바뀌었는지(남이 새 행을 추가했는지) 정밀 비교
					var isStructureChanged = false;
					if (newList.length !== oldList.length) {
						isStructureChanged = true;
					} else {
						// 길이가 같아도 PK(mnSubSeq) 풀이 서로 다르면 구조가 바뀐 것
						for(var i=0; i<newList.length; i++) {
							var nr = newList[i];
							var found = oldList.some(or => 
								(nr.isNoticeRow && or.isNoticeRow) || 
								(nr.isFileRow && or.isFileRow) || 
								(!nr.isNoticeRow && !nr.isFileRow && String(nr.mnSubSeq) === String(or.mnSubSeq))
							);
							if (!found) { isStructureChanged = true; break; }
						}
					}

					// 누군가 새 행을 쌌거나 지웠다면 풀 리로드
					if (isStructureChanged) {
						mnGridView.target.setData({ list: newList, page: { totalElements: newList.length } });
						if (data.d02List) select_p10_d02_List(data.d02List);
						return;
					}

					var deptCols = Object.keys(deptCodeMap);
					var otherCols = ['mnStatus', 'mnEtcAll'];
					var hasLockChange = false;

					// 부서별 Lock Key 매핑 미리 생성
					var deptLockKeys = {};
					deptCols.forEach(colKey => {
						const deptCd = deptCodeMap[colKey];
						const prefix = deptCd.toLowerCase().replace(/([a-z])(\d)/g, '$1$2');
						deptLockKeys[colKey] = {
							yn: prefix + 'LockYn',
							nm: prefix + 'LockUserNm'
						};
					});

					newList.forEach(newItem => {
						var oldItemIndex = -1;
						if (newItem.isNoticeRow) {
							oldItemIndex = oldList.findIndex(r => r.isNoticeRow);
						} else if (newItem.isFileRow) {
							oldItemIndex = oldList.findIndex(r => r.isFileRow);
						} else {
							oldItemIndex = oldList.findIndex(r =>
								!r.isNoticeRow && !r.isFileRow &&
								String(r.mnDate) === String(newItem.mnDate) &&
								String(r.mnSubSeq) === String(newItem.mnSubSeq)
							);
						}

						if (oldItemIndex >= 0) {
							var oldItem = oldList[oldItemIndex];
							let isItemLockChanged = false;

							// 0. 첨부파일(isFileRow) 항목의 파일 리스트 변경 감지
							if (newItem.isFileRow) {
								let fileChanged = false;
								for (var colKey of deptCols) {
									var newFiles = (newItem.filesByColumn && newItem.filesByColumn[colKey]) || [];
									var oldFiles = (oldItem.filesByColumn && oldItem.filesByColumn[colKey]) || [];
									if (newFiles.length !== oldFiles.length) {
										fileChanged = true;
										break;
									} else {
										// 갯수가 같아도 안의 파일키가 다른지 비교
										for (let f = 0; f < newFiles.length; f++) {
											if (String(newFiles[f].fileKey) !== String(oldFiles[f].fileKey)) {
												fileChanged = true;
												break;
											}
										}
										if (fileChanged) break;
									}
								}
								// 변경되었다면 데이터 덮어쓰고 강제 그리드 반영
								if (fileChanged) {
									oldItem.filesByColumn = newItem.filesByColumn; // 데이터 교체
									// 파일 셀들은 모두 repaint를 통해 새로 그려짐
									hasLockChange = true; 
								}
							}

							// 1. D01 Lock Check
							if ((oldItem.d01LockYn !== newItem.d01LockYn) || (oldItem.d01LockUserNm !== newItem.d01LockUserNm)) {
								isItemLockChanged = true;
							}

							// 2. Dept Lock Check
							if (!isItemLockChanged) {
								for (var colKey of deptCols) {
									const keys = deptLockKeys[colKey];
									if ((oldItem[keys.yn] !== newItem[keys.yn]) || (oldItem[keys.nm] !== newItem[keys.nm])) {
										isItemLockChanged = true;
										break;
									}
								}
							}

							if (isItemLockChanged) {
								hasLockChange = true;
								Object.assign(oldItem, newItem); // 데이터 전체 동기화
							} else {
								// 락 변경이 없으면 값 변경 체크 (락 변경 시엔 repaint 하므로 setValue 불필요하거나, 스크롤 유지를 위해 둘다 해도 됨)
								// 여기선 효율성을 위해 락 변경 없을 때만 setValue (어차피 repaint되면 값도 갱신됨)
								// 하지만 repaint가 비동기거나 깜빡임을 줄이기 위해 setValue도 호출하는 게 안전.
							}

							// 값 변경 체크 및 setValue (isSyncing으로 onDataChanged 트리거 방지)
							isSyncing = true;
							try {
								deptCols.forEach(colKey => {
									if (String(oldItem[colKey] || '') !== String(newItem[colKey] || '')) {
										mnGridView.target.setValue(oldItemIndex, colKey, newItem[colKey]);
									}
								});
								otherCols.forEach(colKey => {
									if (String(oldItem[colKey] || '') !== String(newItem[colKey] || '')) {
										mnGridView.target.setValue(oldItemIndex, colKey, newItem[colKey]);
									}
								});
								if (String(oldItem.mnSubject || '') !== String(newItem.mnSubject || '')) {
									mnGridView.target.setValue(oldItemIndex, 'mnSubject', newItem.mnSubject);
								}
								if (String(oldItem.mnSortNo || 0) !== String(newItem.mnSortNo || 0)) {
									mnGridView.target.setValue(oldItemIndex, "mnSortNo", newItem.mnSortNo);
								}
							} finally {
								isSyncing = false;
							}
						}
					});

					if (data.d02List) select_p10_d02_List(data.d02List);

					// 락 정보 변경이 감지되면 전체 리페인트 (뱃지 갱신)
					if (!isPolling) {
						syncRowHeights();
						focusLastEditedCell();
					} else if (hasLockChange) {
						mnGridView.target.repaint();
					}
				} catch (error) {
				}
			}, false);
		}

	}

	// 행 추가
	function insertMn() {
		if ($('#mnDiv_S').val() === 'MNDIV99') {
			alert('전체조회 화면에서는 행을 추가할 수 없습니다.');
			return false;
		}
		const grid = mnGridView.target;
		const selected = grid.getList("selected");  // 선택된 행 배열

		// 공지사항 행의 인덱스 (공지사항·파일첨부 위에 삽입하기 위한 기준)
		const noticeIndex = grid.list.findIndex(r => r.isNoticeRow);
		const defaultInsertIndex = noticeIndex >= 0 ? noticeIndex : grid.list.length;

		let insertIndex;
		if (selected.length > 0) {
			const sel = selected[0];

			// 공지사항·파일첨부 행이 선택되어 있으면 공지사항 바로 위(defaultInsertIndex)에 삽입
			if (sel.isNoticeRow || sel.isFileRow) {
				insertIndex = defaultInsertIndex;
			} else {
				insertIndex = grid.list.findIndex(r =>
					r.mnDate === sel.mnDate &&
					r.mnSubSeq === sel.mnSubSeq
				) + 1;
			}
		} else {
			// 아무것도 선택되지 않은 경우 공지사항 바로 위에 삽입
			insertIndex = defaultInsertIndex;
		}

		postAjaxSync('/user/pm/pm10/getNextSubSeq', {}, null, function(data) {
			if (data.resultCode === 200) {
				// 새 행 객체 생성
				const newRow = {
					mnDate: $('#mnDate_S').val(),
					mnWeeks: $('#mnWeeks_S').val(),
					mnSubSeq: data.newSubSeq, // 서버에서 미리 채번한 발급 번호 적용
					mnSubject: '',
					mnSortNo: 0,      // 임시값
					isNoticeRow: false,
					isFileRow: false
				};

				// 행 추가 및 리페인트
				grid.addRow(newRow, insertIndex);
				grid.repaint();
			} else {
				alert('행 번호 채번 실패: ' + data.resultMessage);
			}
		});
	}

	// 행 삭제
	function deleteMn() {
		if ($('#mnDiv_S').val() === 'MNDIV99') {
			alert('전체조회 화면에서는 행을 삭제할 수 없습니다.');
			return false;
		}
		const grid = mnGridView.target;
		const fileRow = grid.list.find(r => r.isFileRow);
		const sel = grid.getList("selected")[0];
		if (!sel) {
			alert("삭제할 주제를 선택하세요!");
			return false;
		}

		if (sel.mnSubject == "파일첨부" || ((sel.mnSubSeq == 0) && (sel.mnSubject == '공지사항'))) {
			return false;
		}

		// 빈행(mnSubSeq===0) 삭제
		if (!sel.mnSubSeq) {
			const idx = grid.list.findIndex(r =>
				r.mnDate === sel.mnDate &&
				r.mnSubSeq === sel.mnSubSeq
			);
			if (idx >= 0) {
				// 그리드 데이터 배열에서 제거
				grid.list.splice(idx, 1);
				// 다시 렌더링 및 순서 재계산
				grid.setData({ list: grid.list, page: { totalElements: grid.list.length } });
				// recalcSortOrder();
			}
			return;
		}

		// 행(mnSubSeq > 0) 삭제
		const deptCols = Object.keys(deptCodeMap);
		const hasResult = deptCols.some(colKey => {
			const resultKey = colKey.replace('MnCnts', 'MnResult');
			return sel[resultKey] && sel[resultKey].toString().trim() !== '';
		});
		if (hasResult) {
			alert("회의결과가 있는 행은 삭제할 수 없습니다.");
			return false;
		}
		if (!confirm("선택한 행을 정말 삭제하시겠습니까?")) {
			return false;
		}
		var paramObj = {
			mnDate: sel.mnDate,
			mnSubSeq: sel.mnSubSeq,
			fileInfoJson: JSON.stringify(fileRow.filesByColumn)
		}
		postAjax("/user/pm/pm10/deleteMn", paramObj, null, function (data) {
			if (data.resultCode == 200) {
				mnGridView.setData();
			} else {
				alert("삭제 실패: " + data.resultMessage);
			}
		});
	}

	//회의 주제 Insert, Update
	function pm10_d01_update(item, colKey, value) {
		item[colKey] = value;

		// 일반 주제행 목록
		const normalRows = mnGridView.target.list.filter(r => !r.isFileRow && !r.isNoticeRow);

		let newSubSeq;
		let newSortNo;

		if (item.isNoticeRow) {
			// 신규 공지사항: 추가 시 미리 받은 번호 유지
			newSubSeq = item.mnSubSeq;
			newSortNo = normalRows.length + 1;
			// 화면에도 반영
			item.mnSortNo = newSortNo;
		}
		else {
			// 일반 주제: 위치에 맞춰 계산, 서버에서 미리 받은 seq 유지
			newSubSeq = item.mnSubSeq;
			newSortNo = normalRows.findIndex(r => r === item) + 1;
			item.mnSortNo = newSortNo;
		}

		lastEditedCell = {
			mnDate: $('#mnDate_S').val(),
			mnSubSeq: newSubSeq,
			colKey: colKey,
			isNoticeRow: !!item.isNoticeRow
		};

		var paramObj = {
			mnDate: $('#mnDate_S').val(),
			mnWeeks: $('#mnWeeks_S').val(),
			mnSubSeq: newSubSeq,
			mnSubject: item.mnSubject,
			mnSortNo: newSortNo,
			mnEtcAll: item.mnEtcAll,
			mnStatus: item.mnStatus,
			userId: $('#userId').val(),
			pgmId: $('#pgmId').val()
		};

		postAjax('/user/pm/pm10/pm10_d01_update', paramObj, null, function (data) {
			if (currentLockInfo) unlockCell(currentLockInfo);
			if (data.resultCode !== 200) {
				alert('수정 실패: ' + data.resultMessage);
				mnGridView.setData(); // 실패 시에만 전체 리로드
			} else {
				if (data.newSubSeq) {
					item.mnSubSeq = parseInt(data.newSubSeq);
					// 동기화 후 다시 렌더링이나 findIndex 처리를 원활하게 하기 위함
				}
			}
		});
	}

	//팀별 회의 내용 Insert, Update
	function pm10_d03_update(item, colKey, value) {
		// 기존 행들 중 공지·파일 행을 제외하고, seq가 0보다 큰 행만 모은다
		const dataRows = mnGridView.target.list.filter(r =>
			!r.isFileRow && !r.isNoticeRow && r.mnSubSeq > 0
		);

		// 현재 존재하는 mnSubSeq의 최대값을 구한다. 없으면 0
		const maxSeq = dataRows.reduce((max, r) => Math.max(max, r.mnSubSeq || 0), 0);

		// 신규 행도 미리 서버에서 시퀀스를 받아왔으므로 기존 item.mnSubSeq 그대로 사용
		const newSubSeq = item.mnSubSeq;

		lastEditedCell = {
			mnDate: $('#mnDate_S').val(),
			mnSubSeq: newSubSeq,
			colKey: colKey,
			isNoticeRow: !!item.isNoticeRow
		};

		var paramObj = {
			mnDate: $('#mnDate_S').val(),
			mnWeeks: $('#mnWeeks_S').val(),
			mnDiv: $("#mnDiv_S").val(),
			mnSubject: item.mnSubject,
			mnSubSeq: newSubSeq,
			mnSortNo: item.isNoticeRow ? (dataRows.length + 1) : gPasIntChk(item.mnSortNo),
			mnDeptCd: deptCodeMap[colKey],
			mnCnts: $("#mnDiv_S").val() === 'MNDIV01' ? value : '',  // 사전공지
			mnEtc: '',
			mnEtcAll: item.mnEtcAll,
			mnResult: $("#mnDiv_S").val() === 'MNDIV02' ? value : '',  // 회의결과
			mnStatus: item.mnStatus,
			clntPjt: '',
			clntCd: '',
			userId: $('#userId').val(),
			pgmId: $('#pgmId').val()
		};
		postAjax('/user/pm/pm10/pm10_d03_update', paramObj, null, function (data) {
			if (currentLockInfo) unlockCell(currentLockInfo);
			if (data.resultCode !== 200) {
				alert('수정 실패: ' + data.resultMessage);
				mnGridView.setData(); // 실패 시에만 전체 리로드
			} else {
				if (data.newSubSeq) {
					item.mnSubSeq = parseInt(data.newSubSeq);
				}
			}
		});
	}

	// 참석자 update
	function pm10_d02_update() {
		if ($("#mnDiv_S").val() == 'MNDIV99') {
			return false;
		}
		const list = attendList.map(item => {
			const isChecked = $(`#attendCheckboxContainer .attend-item[data-id="${item.id}"] .attend-checkbox`)
				.is(':checked');
			return {
				attendId: item.id,
				reasonCd: isChecked ? 'Y' : 'N',
				reasonRmk: ''
			};
		});
		var paramObj = {
			mnDate: $('#mnDate_S').val(),
			userId: $('#userId').val(),
			pgmId: $('#pgmId').val(),
			attendList: list
		}
		postAjax('/user/pm/pm10/pm10_d02_update', paramObj, null, data => {
			if (data.resultCode == 200) {
				if ($("#mnDiv_S").val() == 'MNDIV02') {
					attendFlag = false;			// 프래그 해제
				}
			} else {
				alert('참석자 저장 실패: ' + data.resultMessage);
			}
		});
	}

	// 참석자 삭제
	function pm10_d02_delete() {
		// 삭제할 대상으로 마킹된 ID 목록
		const toRemoveIds = $('.attend-item.to-remove')
			.map((_, el) => $(el).data('id'))
			.get();
		if (!toRemoveIds.length) {
			alert('삭제할 대상을 클릭해 선택하세요.');
			return;
		}

		// 고정멤버는 체크 해제만, 나머지는 삭제
		const fixedToUncheck = toRemoveIds.filter(id => FIXED_ORDER.includes(id));
		const nonFixedToDelete = toRemoveIds.filter(id => !FIXED_ORDER.includes(id));

		if (fixedToUncheck.length) {
			attendList = attendList.map(u =>
				fixedToUncheck.includes(u.id)
					? { ...u, reasonCd: 'N' }
					: u
			);
			renderAttendList();
			pm10_d02_update(); // 전체 리스트를 보내서 변경된 reasonCd만 반영
		}

		if (nonFixedToDelete.length) {
			postAjax('/user/pm/pm10/pm10_d02_delete', {
				mnDate: $('#mnDate_S').val(),
				attendIds: nonFixedToDelete
			}, null, data => {
				if (data.resultCode === 200) {
					attendList = attendList.filter(u => !nonFixedToDelete.includes(u.id));
					renderAttendList();
				} else {
					alert('참석자 삭제 실패: ' + data.resultMessage);
				}
			});
		}
	}


	// 첨부파일 Start
	function mnUploadFile() {
		// 파일 첨부인 경우 lastEditedCell 명시적 지정
		if (currentFileRow && currentFileColumn) {
			lastEditedCell = { isFileRow: true, colKey: currentFileColumn };
		}

		var formData = new FormData();

		formData.append("userId", $("#userId").val());
		formData.append("pgmId", $("#pgmId").val());

		// 신규 업로드 파일들
		$.each(mnFileArr, function (idx, obj) {
			if (obj.fileKey === 0) {
				formData.append("files", obj.file);
			}
		});

		// 삭제할 파일 키들
		formData.append("deleteFileArr", JSON.stringify(deleteFileArr));
		formData.append("fileTrgtKey", $("#mnDate_S").val().replace(/-/g, "") + "-" + deptCodeMap[currentFileColumn]);

		filePostAjax("/user/pm/pm10/mnUploadFile", formData, function (data) {
			mnGridView.setData();
			mnFileArr = [];
			deleteFileArr = [];
		});
	}

	// 엑셀다운로드
	function jsonToExcel(grid) {
		const list = grid.target.getList().map(row => {
			const newRow = { ...row };
			if (newRow.isFileRow && newRow.filesByColumn) {
				Object.keys(newRow.filesByColumn).forEach(colKey => {
					const files = newRow.filesByColumn[colKey];
					if (files && files.length > 0) {
						newRow[colKey] = files.map(f => f.name).join('\r\n');
					}
				});
			}
			return newRow;
		});
		const raw = grid.target.colGroup;

		const header = raw.map(col => ({
			...col,
			label: String(col.label)
				.replace(/<br\s*\/?>/gi, "\r\n")
				.replace(/<\/?[^>]+>/g, "")
		}));

		exportJSONToExcel(list, header, "임팀장주간회의록");
	}

	// 체크박스 렌더링 함수
	function renderAttendList() {
		const container = $('#attendCheckboxContainer').empty();
		attendList.forEach(item => {
			// 체크 상태( reasonCd === 'Y' )를 반영해서 input 에 checked 속성 추가
			const isChecked = item.reasonCd === 'Y';
			const $item = $(`
				<div class="attend-item" data-id="${item.id}">
					<input type="checkbox" class="attend-checkbox" ${isChecked ? 'checked' : ''}/>
					${item.name} ${item.title}
				</div>`
			);

			$item.on('click', function (e) {
				if (!$(e.target).hasClass('attend-checkbox')) {
					$(this).toggleClass('to-remove');
				}
			});

			$item.find('.attend-checkbox').on('change', function () {
				pm10_d02_update();
			});
			container.append($item);
		});
	}

	function syncRowHeights(forceFullScan) {
		var grid = mnGridView.target;
		var $gridEl = $('[data-ax5grid="mnGrid-grid"]');
		var oldConfig = grid.config.body || {};

		// 주제(mnSubject) 편집 시 or 초기 로드(forceFullScan):
		// 틀고정 패널은 DOM 높이가 고정되므로 임시 해제 후 측정
		var editedKey = lastEditedCell ? lastEditedCell.colKey : null;
		var needFullScan = forceFullScan || (editedKey === 'mnSubject');
		if (needFullScan) {
			$gridEl.css('visibility', 'hidden');
			grid.setConfig({ frozenColumnIndex: 0 });
		}

		var maxHeight = 30;
		$gridEl.find('[data-ax5grid-panel-scroll="body"] tr').each(function () {
			var h = $(this).outerHeight() || 0;
			if (h > maxHeight) maxHeight = h;
		});

		if (needFullScan) {
			// 틀고정 복원 + columnHeight 적용 후 표시
			grid.setConfig({
				frozenColumnIndex: 1,
				body: $.extend({}, oldConfig, { columnHeight: maxHeight })
			});
			grid.repaint();
			$gridEl.css('visibility', '');
		} else {
			// 다른 컬럼: 스크롤 위치 유지하며 높이만 적용
			grid.setConfig({
				body: $.extend({}, oldConfig, { columnHeight: maxHeight })
			});
			grid.repaint();
		}
	}



	// 선택된 행 하나를 위로 한 칸 이동
	function moveSelectedUp() {
		if ($('#mnDiv_S').val() === 'MNDIV99') {
			alert('전체조회 화면에서는 행을 이동할 수 없습니다.');
			return false;
		}
		const grid = mnGridView.target;
		const list = grid.list;
		const sel = grid.getList("selected")[0];

		if (!sel) {
			alert("이동할 행을 선택하세요");
			return;
		}
		// 공지사항/파일첨부 행은 이동 금지
		if (sel.isNoticeRow || sel.isFileRow) return;

		// 현재 선택된 행의 실제 인덱스
		const idx = list.findIndex(r =>
			r.mnDate === sel.mnDate &&
			r.mnSubSeq === sel.mnSubSeq
		);
		// 가장 앞(0)이거나 유효하지 않은 인덱스면 리턴
		if (idx <= 0) return;

		// 한 칸 위로 스왑
		[list[idx - 1], list[idx]] = [list[idx], list[idx - 1]];

		grid.setData({ list, page: { totalElements: list.length } });
		recalcSortOrder();
	}

	// 선택된 행 하나를 아래로 한 칸 이동
	function moveSelectedDown() {
		if ($('#mnDiv_S').val() === 'MNDIV99') {
			alert('전체조회 화면에서는 행을 이동할 수 없습니다.');
			return false;
		}
		const grid = mnGridView.target;
		const list = grid.list;
		const sel = grid.getList("selected")[0];

		if (!sel) {
			alert("이동할 행을 선택하세요");
			return;
		}
		// 공지사항/파일첨부 행은 이동 금지
		if (sel.isNoticeRow || sel.isFileRow) return;

		// 현재 선택된 행의 실제 인덱스
		const idx = list.findIndex(r =>
			r.mnDate === sel.mnDate &&
			r.mnSubSeq === sel.mnSubSeq
		);
		// 유효하지 않거나 마지막 인덱스이면 리턴
		if (idx < 0 || idx >= list.length - 1) return;

		// 공지사항 행 경계 체크 (공지사항 위치를 넘어갈 수 없음)
		const noticeIdx = list.findIndex(r => r.isNoticeRow);
		if (noticeIdx >= 0 && idx + 1 >= noticeIdx) return;

		// 한 칸 아래로 스왑
		[list[idx], list[idx + 1]] = [list[idx + 1], list[idx]];

		grid.setData({ list, page: { totalElements: list.length } });
		recalcSortOrder();
	}

	// 정렬순서 함수
	function recalcSortOrder() {
		const grid = mnGridView.target;
		const allRows = grid.list;

		const fileRow = allRows.find(r => r.isFileRow);
		const noticeRow = allRows.find(r => r.isNoticeRow);
		const dataRows = allRows.filter(r => !r.isFileRow && !r.isNoticeRow);

		// 로우가 없으면 정렬순서 계산 return
		if (dataRows.length == 0 && noticeRow && noticeRow.mnSortNo == 0) {
			return false;
		}

		dataRows.forEach((row, idx) => {
			row.mnSortNo = idx + 1;
		});

		if (noticeRow) {
			noticeRow.mnSortNo = noticeRow.mnSubSeq > 0
				? dataRows.length + 1
				: 0;
		}

		// setData 대신 list를 직접 교체하고 repaint (스크롤 유지)
		const newList = [
			...dataRows,
			...(noticeRow ? [noticeRow] : []),
			...(fileRow ? [fileRow] : [])
		];
		grid.list = newList;
		grid.repaint();

		// 정렬순서 서버 저장
		const sortSave = allRows
			.filter(r => !r.isFileRow && r.mnSubSeq > 0)
			.map(r => ({
				mnSubSeq: r.mnSubSeq,
				mnSortNo: r.mnSortNo
			}));

		var paramObj = {
			mnDate: $('#mnDate_S').val(),
			userId: $('#userId').val(),
			pgmId: $('#pgmId').val(),
			list: sortSave
		};

		postAjax('/user/pm/pm10/pm10_d01_sortNo_update', paramObj, null, function (data) {});
	}

	//Select 선택 코드값 체크하여 명을 출력
	function getComboName(comboArray, key) {
		let rtnNm = "";
		for (const element of comboArray) {
			if (key.value == element.CD) {
				rtnNm = element.NM;
				break;
			}
		}
		return rtnNm;
	}

	// 참석자 정렬 함수
	function reorderAttendList() {
		attendList.sort((a, b) => {
			const ia = FIXED_ORDER.indexOf(a.id);
			const ib = FIXED_ORDER.indexOf(b.id);
			if (ia !== -1 && ib !== -1) return ia - ib;  // 둘 다 기본 → 순서대로
			if (ia !== -1) return -1;                    // a는 기본, b는 신규 → a 우선
			if (ib !== -1) return 1;                     // b는 기본, a는 신규 → b 우선
			return 0;                                    // 둘 다 신규 → 추가된 순서 유지
		});
	}

					alert('PDF 내보내기 실패: ' + response.resultText);
				}

			});
		}
	}
