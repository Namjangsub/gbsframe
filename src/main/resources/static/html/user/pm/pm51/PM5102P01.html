					<td>

							<a onclick="addExpenseDetailRow();" style="height: 30px; line-height: 28px;" authchk>+</a>

			<!-- 정산 요약 -->

					<colgroup>
						<col width="28%">
						<col width="72%">
					</colgroup>
					<tr>
						<th colspan="2" style="text-align: center; background: #f0f0f0; padding: 5px;">KRW 정산</th>

					</tr>
					<tr>
						<th>현금소계</th>

					</tr>
					<tr>
						<th>사용합계</th>

					</tr>

						<th>수령금</th>
						<td><input type="text" id="advRcvAmtKrw" name="advRcvAmtKrw" onkeyup="this.value=this.value.replace(/[^0-9]/g,''); calcSettlementKrw();" style="text-align: right; width: 100%;"></td>
					</tr>
					<tr>
						<th>정산결과</th>

					</tr>
				</table>

				<table style="width: 49%;">
					<colgroup>
						<col width="28%">
						<col width="72%">
					</colgroup>
					<tr>
						<th colspan="2" style="text-align: center; background: #f0f0f0; padding: 5px;">USD 정산</th>
					</tr>
					<tr>
						<th>카드소계</th>
						<td><input type="text" id="cardSubtotalUsd" name="cardSubtotalUsd" readonly style="text-align: right; width: 100%; background: #fff;"></td>
					</tr>
					<tr>
						<th>현금소계</th>
						<td><input type="text" id="cashSubtotalUsd" name="cashSubtotalUsd" readonly style="text-align: right; width: 100%; background: #fff;"></td>
					</tr>
					<tr>
						<th>사용합계</th>
						<td><input type="text" id="usedTotalUsd" name="usedTotalUsd" readonly style="text-align: right; width: 100%; background: #fff;"></td>
					</tr>
					<tr>
						<th>수령금</th>
						<td><input type="text" id="advRcvAmtUsd" name="advRcvAmtUsd" onkeyup="this.value=this.value.replace(/[^0-9.]/g,''); calcSettlementUsd();" style="text-align: right; width: 100%;"></td>
					</tr>
					<tr>
						<th>정산결과</th>
						<td><input type="text" id="settleAmtUsd" name="settleAmtUsd" readonly style="text-align: right; width: 100%; background: #fff;"></td>
					</tr>
				</table>
			</div>

			<!-- 결재선 -->
			<div style="display: flex; justify-content: space-between;">
				<div style="width: 49%;">
					<table style="border: 0px; width: 100%;" class="issAct">
						<tr style="height: 30px;">
							<td style="text-align: LEFT; border-right: 0px;; font-size: 13px; font-weight: bold; color: blue;">결재 및 공유</td>
							<td>
								<div class="add_btn_small pdl10">
									<a onclick="insertShareUserModal();" style="height: 30px; line-height: 28px;" authchk>+</a>
									<a onclick="deleteShareUser();" style="height: 30px; line-height: 28px;" authchk>-</a>
								</div>
							</td>

						<tr>
							<td colspan="2">
								<div class="ax5_grid" data-ax5grid="approval_grid_modal" data-ax5grid-config="{}" style="min-height: 100px; width: 100%;"></div>
							</td>

				</div>
				
				<div style="width: 49%;">
					<table style="border: 0px; width: 100%;" class="issAct">
						<tr style="height: 30px;">
							<td style="text-align: LEFT; border-right: 0px;; font-size: 13px; font-weight: bold; color: blue;">관리부서 결재 및 공유</td>
							<td>
								<div class="add_btn_small pdl10">
									<a onclick="insertShareUserModalMng();" style="height: 30px; line-height: 28px;" authchk>+</a>
									<a onclick="deleteShareUserMng();" style="height: 30px; line-height: 28px;" authchk>-</a>
								</div>
							</td>
						</tr>
						<tr>
							<td colspan="2">
								<div class="ax5_grid" data-ax5grid="approval_grid_mng_modal" data-ax5grid-config="{}" style="min-height: 100px; width: 100%;"></div>
							</td>

				</div>
			</div>
		</div>
	</form>

	<!-- 첨부파일 -->
	<div class="contents_tit" style="margin-top: 20px;">
		<span style="height: 30px; line-height: 30px;">첨부파일</span>
	</div>
	<div id="fileList_area" style="min-height: 60px; padding: 10px; border: 1px solid #ddd; background: #fafafa;"></div>

	<!-- 하단 버튼 -->
	<div class="popup_bottom_btn">
		<button type="button" id="saveBtn" onclick="saveTripRpt();" authchk>저장</button>
		<button type="button" id="deleteBtn" onclick="deleteTripRpt();" authchk style="display:none;">삭제</button>
		<button type="button" class="close_btn" onclick="modalStack.close();">닫기</button>
	</div>
</div>

<script type="text/javascript">

	// 결제방법 코드 매핑 (TODO: 실제 코드값 확인 필요)
	const PM51_PAY_METHODS = {
		card: 'PM51PAY01',      // 카드
		cash: 'PM51PAY02',      // 현금
		coupon: 'PM51PAY03'     // 쿠폰
	};

	var tripReqTravelerGridView = null;
	var rptTravelerGridView = null;
	var expenseDetailGridView = null;
	var popParam = null;
	var commApproval = null;
	var gridViewApproval = null;
	var gridViewApprovalMng = null;
	var currentTripRptMaster = null;

	$(document).ready(function () {
		setTimeout(function () {
		popParam = modalStack.last().paramObj;

		initTripReqTravelerGrid();
		initRptTravelerGrid();
		initExpenseDetailGrid();
		initFileTree();
		
		gridViewApprovalMng = createApprovalGrid('[data-ax5grid="approval_grid_mng_modal"]');
		initApprovalArea();
		gridViewApprovalMng.initView();

		setCommonSelect($("#popForm select[data-kind]"));
		initAutoResizeTextareas();

		if (popParam.actionType === 'U' || popParam.actionType === 'V' || popParam.tripRptNo) {
			$('#deleteBtn').toggle(popParam.actionType !== 'V');
			$('#popTitle').text(popParam.actionType === 'V' ? '출장복명서 조회' : '출장복명서 수정');
			loadTripRptDetail(popParam.tripRptNo);
			loadApprovalLine(popParam.tripRptNo, ['TODODIV2200', 'TODODIV1200']);
		} else {
			$('#popTitle').text('출장복명서 등록');
			$('#actionType').val('C');
			loadTripReqCitation(popParam.tripReqNo);
		}
		}, 0);
	});

	// 출장신청서 출장자 그리드 초기화 (읽기전용)
	function initTripReqTravelerGrid() {
		tripReqTravelerGridView = { target: new ax5.ui.grid() };
		tripReqTravelerGridView.target.setConfig({
			target: $('[data-ax5grid="tripReqTravelerGrid"]'),
			showRowSelector: false,
			multipleSelect: false,
			sortable: false,
			header: {
				align: "center",
				selector: true
			},
			body: { onClick: function () { this.self.select(this.dindex); } },
			page: { display: false },
			footSum: [
				[
					{ label: "합계", colspan: 7, align: "center" },
					{ key: "nightCnt", collector: "sum", formatter: "money", align: "center" },
					{ key: "dayCnt", collector: "sum", formatter: "money", align: "center" },
					{ key: "eatCnt", collector: "sum", formatter: "money", align: "center" },
					{ key: "trafficAmt", collector: "sum", formatter: "money", align: "right" },
					{ key: "lodgingAmt", collector: "sum", formatter: "money", align: "right" },
					{ key: "mealAmt", collector: "sum", formatter: "money", align: "right" },
					{ key: "dailyAmt", collector: "sum", formatter: "money", align: "right" },
					{ key: "specialAmt", collector: "sum", formatter: "money", align: "right" },
					{ key: "totalAmt", collector: "sum", formatter: "money", align: "right" },
					{ key: "etc", label: "" }
				]
			],
			columns: [
				{ key: 'userNm', label: '이름', width: 60, align: 'center' },
				{ key: 'positionNm', label: '직급', width: 60, align: 'center' },
				{ key: 'deptNm', label: '소속', width: 100, align: 'left' },
				{ key: undefined, label: "출장기간", columns: [
					{ key: 'tripStDt', label: '출발일자', width: 90, align: 'center' },
					{ key: 'tripStTm', label: '출발시간', width: 60, align: 'center' },
					{ key: 'tripEdDt', label: '도착일자', width: 90, align: 'center' },
					{ key: 'tripEdTm', label: '도착시간', width: 60, align: 'center' }
				]},
				{ key: undefined, label: "출장경비", columns: [
					{ key: 'nightCnt', label: '박', width: 40, align: 'center' },
					{ key: 'dayCnt', label: '일', width: 40, align: 'center' },
					{ key: 'eatCnt', label: '식', width: 40, align: 'center' },
					{ key: 'trafficAmt', label: '교통비', width: 90, align: 'right', formatter: "money" },
					{ key: 'lodgingAmt', label: '숙박비', width: 90, align: 'right', formatter: "money" },
					{ key: 'mealAmt', label: '식대', width: 85, align: 'right', formatter: "money" },
					{ key: 'dailyAmt', label: '일비', width: 85, align: 'right', formatter: "money" },
					{ key: 'specialAmt', label: '특별비', width: 90, align: 'right', formatter: "money" },
					{ key: 'totalAmt', label: '합계', width: 95, align: 'right', formatter: "money" }
				]},
				{ key: 'etc', label: '비고', width: 160, align: 'left' }
			]
		});
	}

	function initRptTravelerGrid() {
		rptTravelerGridView = { target: new ax5.ui.grid() };
		rptTravelerGridView.target.setConfig({
			target: $('[data-ax5grid="rptTravelerGrid"]'),
			showRowSelector: true,
			multipleSelect: true,
			sortable: false,
			header: {
				align: "center",
				selector: true
			},
			body: {
				onClick: function () {
					this.self.select(this.dindex);
					if (isRptTravelerGridEditBlocked()) return;
					var key = this.column && this.column.key;
					if (key === 'tripStDt' || key === 'tripEdDt') {
						var dindex = this.dindex;
						var row = this.item;
						openRptDateTimePicker(dindex, row);
					} else if (key === 'tripStTm' || key === 'tripEdTm') {
						openRptTimeSelectPopup(this.dindex);
					}
				},
				onDataChanged: function () {
					updateRptTravelerRowTotal(this.dindex);
					updateActualTripPeriodFromRptTravelers();
					resizeRptTravelerGrid();
				}
			},
			page: { display: false },
			contextMenu: {
				iconWidth: 20, itemClickAndClose: false,
				items: [{ type: 1, label: "붙여넣기" }, { divide: true }, { type: 1, label: "줄추가" }, { type: 1, label: "내용 삭제" }, { type: 2, label: "줄삭제" }],
				popupFilter: function() { return !isRptTravelerGridEditBlocked(); },
				onClick: function(item, param) {
					if (isRptTravelerGridEditBlocked()) return;
					if (item.label === "붙여넣기") pasteRptTravelerGrid(param.dindex, param.colIndex);
					else if (item.label === "줄추가") addRptTravelerRow();
					else if (item.label === "내용 삭제") clearRptTravelerRow(param.dindex);
					else if (item.label === "줄삭제") deleteRptTravelerRowByIndex(param.dindex);
					rptTravelerGridView.target.contextMenu.close();
				}
			},
			footSum: [
				[
					{ label: "합계", colspan: 7, align: "center" },
					{ key: "nightCnt", collector: "sum", formatter: "money", align: "center" },
					{ key: "dayCnt", collector: "sum", formatter: "money", align: "center" },
					{ key: "eatCnt", collector: "sum", formatter: "money", align: "center" },
					{ key: "trafficAmt", collector: "sum", formatter: "money", align: "right" },
					{ key: "lodgingAmt", collector: "sum", formatter: "money", align: "right" },
					{ key: "mealAmt", collector: "sum", formatter: "money", align: "right" },
					{ key: "dailyAmt", collector: "sum", formatter: "money", align: "right" },

	function buildRptTravelerRow(row) {
		var copied = $.extend({}, row || {});
		copied.tripStDt = copied.tripStDt || formatToDate(copied.tripStDtm || '');
		copied.tripStTm = copied.tripStTm || formatToTime(copied.tripStDtm || '');
		copied.tripEdDt = copied.tripEdDt || formatToDate(copied.tripEdDtm || '');
		copied.tripEdTm = copied.tripEdTm || formatToTime(copied.tripEdDtm || '');
		copied.nightCnt = copied.nightCnt || 0;
		copied.dayCnt = copied.dayCnt || 0;
		copied.eatCnt = copied.eatCnt || 0;
		copied.trafficAmt = copied.trafficAmt || 0;
		copied.lodgingAmt = copied.lodgingAmt || 0;
		copied.mealAmt = copied.mealAmt || 0;
		copied.dailyAmt = copied.dailyAmt || 0;
		copied.specialAmt = copied.specialAmt || 0;
		copied.totalAmt = calcRptTravelerTotal(copied);
		copied.etc = copied.etc || '';
		return copied;
	}

	function calcRptTravelerTotal(row) {
		return Number(row.trafficAmt || 0)
			+ Number(row.lodgingAmt || 0)
			+ Number(row.mealAmt || 0)
			+ Number(row.dailyAmt || 0)
			+ Number(row.specialAmt || 0);
	}

	function updateRptTravelerRowTotal(dindex) {
		if (dindex === undefined || dindex === null || !rptTravelerGridView || !rptTravelerGridView.target) return;
		var row = rptTravelerGridView.target.getList()[dindex];
		if (!row) return;
		var total = calcRptTravelerTotal(row);
		if (Number(row.totalAmt || 0) !== total) {
			rptTravelerGridView.target.setValue(dindex, 'totalAmt', total);
		}
	}

	function updateActualTripPeriodFromRptTravelers() {
		if (!rptTravelerGridView || !rptTravelerGridView.target) return;
		var minStart = '';
		var maxEnd = '';

		$.each(rptTravelerGridView.target.getList() || [], function(idx, row) {
			var start = buildComparableDateTime(row.tripStDt, row.tripStTm);
			var end = buildComparableDateTime(row.tripEdDt, row.tripEdTm);
			if (start && (!minStart || start < minStart)) minStart = start;
			if (end && (!maxEnd || end > maxEnd)) maxEnd = end;
		});

		$('#actStDtm').val(formatComparableDateTime(minStart));
		$('#actEdDtm').val(formatComparableDateTime(maxEnd));
		onActDateChange();
	}

	function buildComparableDateTime(dateText, timeText) {
		var dt = normalizeDateText(dateText);
		if (!dt) return '';
		var tm = normalizeTimeText(timeText) || '00:00';
		return dt.replace(/-/g, '') + tm.replace(':', '');
	}

	function normalizeDateText(dateText) {
		if (!dateText) return '';
		var text = String(dateText).trim();
		if (/^\d{8}$/.test(text)) {
			return text.substring(0, 4) + '-' + text.substring(4, 6) + '-' + text.substring(6, 8);
		}
		if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
		var m = moment(text);
		return m.isValid() ? m.format('YYYY-MM-DD') : '';
	}

	function normalizeTimeText(timeText) {
		if (!timeText) return '';
		var text = String(timeText).trim();
		if (/^\d{4}$/.test(text)) {
			return text.substring(0, 2) + ':' + text.substring(2, 4);
		}
		if (/^\d{2}:\d{2}$/.test(text)) return text;
		if (/^\d{1,2}$/.test(text)) return ('0' + text).slice(-2) + ':00';
		return '';
	}

	function formatComparableDateTime(yyyymmddhhmm) {
		if (!yyyymmddhhmm || yyyymmddhhmm.length < 12) return '';
		return formatToDate(yyyymmddhhmm) + ' ' + formatToTime(yyyymmddhhmm);
	}

	function buildExpenseDetailRowsFromTripReq(m01, travelerList, expenseList) {
		var personCnt = (travelerList || []).length;
		var useDt = formatToDate(m01.tripStDtm || '');
		var rows = [];
		$.each(expenseList || [], function(idx, row) {
			if (row.expItemCd === '지급합계') return true;
			var amt = Number(row.payAmt || 0);
			if (!amt) return true;
			rows.push({
				useDt: useDt,
				useDesc: row.calcBasis || row.expItemCd || '',
				personCnt: personCnt,
				amt: amt,
				currCd: row.currCd || 'KRW',
				expItemCd: row.expItemCd || '',
				payMthdCd: PM51_PAY_METHODS.cash,
				remark: row.remark || ''
			});
		});
		if (rows.length === 0) {
			rows = buildExpenseDetailRowsFromTravelers(m01, travelerList);
		}
		return rows;
	}

	function buildExpenseDetailRowsFromTravelers(m01, travelerList) {
		var useDt = formatToDate(m01.tripStDtm || '');
		var personCnt = (travelerList || []).length;
		var currCd = m01.currCd || 'KRW';
		var itemDefs = [
			{ key: 'trafficAmt', name: '교통비' },
			{ key: 'lodgingAmt', name: '숙박비' },
			{ key: 'mealAmt', name: '식대' },
			{ key: 'dailyAmt', name: '일비' },
			{ key: 'specialAmt', name: '특별비' }
		];
		var rows = [];
		$.each(itemDefs, function(idx, def) {
			var total = 0;
			$.each(travelerList || [], function(_, traveler) {
				total += Number(traveler[def.key] || 0);
			});
			if (!total) return true;
			rows.push({
				useDt: useDt,
				useDesc: '출장신청서 출장자별 ' + def.name + ' 합계',
				personCnt: personCnt,
				amt: total,
				currCd: currCd,
				expItemCd: def.name,
				payMthdCd: PM51_PAY_METHODS.cash,
				remark: ''
			});
		});
		return rows;
	}

	function buildTripResultDraft(m01, travelerList) {
		var travelerNames = $.map(travelerList || [], function(row) { return row.userNm; }).join(', ');
		var lines = [];
		if (m01.tripPurpose) lines.push('출장목적: ' + m01.tripPurpose);
		if (m01.tripPlace) lines.push('출장지: ' + m01.tripPlace);
		if (m01.equipNm) lines.push('장비명: ' + m01.equipNm);
		if (travelerNames) lines.push('출장자: ' + travelerNames);
		lines.push('출장결과: ');
		return lines.join('\n');
	}

	function buildSpecialNoteDraft(m01, travelerList, expenseList) {
		var notes = [];
		var payAmtKrw = Number(m01.payAmtKrw || 0);
		var payAmtUsd = Number(m01.payAmtUsd || 0);
		var expenseCnt = $.grep(expenseList || [], function(row) {
			return row.expItemCd !== '지급합계' && Number(row.payAmt || 0);
		}).length;
		if (payAmtKrw) notes.push('신청서 지급금액(KRW): ' + payAmtKrw.toLocaleString());
		if (payAmtUsd) notes.push('신청서 지급금액(USD): ' + payAmtUsd.toLocaleString());
		if (expenseCnt > 0) notes.push('신청서 경비항목 ' + expenseCnt + '건을 경비 세부내역 초기값으로 반영');
		return notes.join('\n');
	}

		var reqPeriodArr = reqPeriod.split(' ~ ');

		var actStDate = moment(stDtm).format('YYYYMMDD');
		var actEdDate = moment(edDtm).format('YYYYMMDD');

		var reqEdDate = reqEd.replace(/-/g, '');

		// 출장 기간 초과 여부 판단
		if (actStDate < reqStDate || actEdDate > reqEdDate) {
			$('#extendRsn').show();

			$('#extendRsn').hide();

	// KRW 정산 계산
	function calcSettlementKrw() {
		var list = expenseDetailGridView.target.getList();
		var cardSubtotal = 0;
		var cashSubtotal = 0;

		list.forEach(row => {
			if (row.currCd !== 'KRW') return;

			var amt = parseInt(row.amt) || 0;
			if (row.payMthdCd === PM51_PAY_METHODS.card) {
				cardSubtotal += amt;
			} else if (row.payMthdCd === PM51_PAY_METHODS.cash || row.payMthdCd === PM51_PAY_METHODS.coupon) {
				cashSubtotal += amt;
			}
		});

		var usedTotal = cardSubtotal + cashSubtotal;
		var advRcvAmt = parseInt($('#advRcvAmtKrw').val()) || 0;
		var settleAmt = advRcvAmt - usedTotal;

		$('#cardSubtotalKrw').val(cardSubtotal);
		$('#cashSubtotalKrw').val(cashSubtotal);
		$('#usedTotalKrw').val(usedTotal);
		$('#settleAmtKrw').val(settleAmt);
	}

	// USD 정산 계산
	function calcSettlementUsd() {
		var list = expenseDetailGridView.target.getList();
		var cardSubtotal = 0;
		var cashSubtotal = 0;

		list.forEach(row => {
			if (row.currCd !== 'USD') return;

			var amt = parseFloat(row.amt) || 0;
			if (row.payMthdCd === PM51_PAY_METHODS.card) {
				cardSubtotal += amt;
			} else if (row.payMthdCd === PM51_PAY_METHODS.cash || row.payMthdCd === PM51_PAY_METHODS.coupon) {
				cashSubtotal += amt;
			}
		});

		var usedTotal = cardSubtotal + cashSubtotal;
		var advRcvAmt = parseFloat($('#advRcvAmtUsd').val()) || 0;
		var settleAmt = advRcvAmt - usedTotal;

		$('#cardSubtotalUsd').val(cardSubtotal.toFixed(2));
		$('#cashSubtotalUsd').val(cashSubtotal.toFixed(2));
		$('#usedTotalUsd').val(usedTotal.toFixed(2));
		$('#settleAmtUsd').val(settleAmt.toFixed(2));
	}

	// 유틸 함수: YYYY-MM-DD 또는 YYYY-MM-DD HH:mm -> YYYYMMDDHH24MI
	function formatToYYYYMMDDHHMM(dtLocal) {
		if (!dtLocal) return '';
		var m = moment(dtLocal, ['YYYY-MM-DD HH:mm', 'YYYY-MM-DD', moment.ISO_8601], true);
		if (!m.isValid()) return '';
		return m.format('YYYYMMDDHHmm');
	}

	// 유틸 함수: YYYYMMDDHH24MI -> YYYY-MM-DD
	function formatToDate(yyyymmddhhmi) {
		if (!yyyymmddhhmi || yyyymmddhhmi.length < 8) return '';
		var year = yyyymmddhhmi.substring(0, 4);
		var month = yyyymmddhhmi.substring(4, 6);
		var day = yyyymmddhhmi.substring(6, 8);
		return year + '-' + month + '-' + day;
	}

	function formatToTime(yyyymmddhhmi) {
		if (!yyyymmddhhmi || yyyymmddhhmi.length < 10) return '';
		var time = yyyymmddhhmi.length >= 12 ? yyyymmddhhmi.substring(8, 12) : yyyymmddhhmi.substring(8, 10) + '00';
		return time.substring(0, 2) + ':' + time.substring(2, 4);
	}

	function formatDateFromAny(value) {
		if (!value) return '';
		if (typeof value === 'number') {
			return moment(value).isValid() ? moment(value).format('YYYY-MM-DD') : '';
		}
		var text = String(value);
		if (/^\d{8}/.test(text)) {
			return formatToDate(text);
		}
		return moment(text).isValid() ? moment(text).format('YYYY-MM-DD') : text;
	}

	function formatNumberText(value) {
		if (value === null || value === undefined || value === '') return '';
		var num = Number(String(value).replace(/,/g, ''));
		return isNaN(num) ? value : num.toLocaleString();
	}

	function isApprovalEntryMode() {
		if (!popParam) return false;
		return popParam.actionType === 'V' || !!popParam.todoFileTrgtKey || !!popParam.sanctnSn || !!popParam.todoDiv1CodeId;
	}

	function hasCompletedRptApproval() {
		var hasCompleted = false;
		if (gridViewApproval && gridViewApproval.target && gridViewApproval.target.getList) {
			$.each(gridViewApproval.target.getList(), function(idx, elem) {
				if ($.trim(elem.todoCfDt || '') || elem.sanctnSttus === 'Y') {
					hasCompleted = true;
					return false;
				}
			});
		}
		if (!hasCompleted && gridViewApprovalMng && gridViewApprovalMng.target && gridViewApprovalMng.target.getList) {
			$.each(gridViewApprovalMng.target.getList(), function(idx, elem) {
				if ($.trim(elem.todoCfDt || '') || elem.sanctnSttus === 'Y') {
					hasCompleted = true;
					return false;
				}
			});
		}
		return hasCompleted;
	}

	function hasStartedRptApproval() {
		var list = gridViewApproval && gridViewApproval.target && gridViewApproval.target.getList ? gridViewApproval.target.getList() : [];
		return $.grep(list, function(item) {
			return item.gb === '결재' && (item.todoKey || item.flag === 'U');
		}).length > 0;
	}

	function setRptGridEditable(editable) {
		if (rptTravelerGridView && rptTravelerGridView.target && rptTravelerGridView.target.setOption) {
			rptTravelerGridView.target.setOption({ editable: editable });
		}
		if (expenseDetailGridView && expenseDetailGridView.target && expenseDetailGridView.target.setOption) {
			expenseDetailGridView.target.setOption({ editable: editable });
		}
	}

	function applyRptEditPolicy() {
		if ($('#actionType').val() === 'C') return;

		var locked = isApprovalEntryMode() || hasStartedRptApproval() || hasCompletedRptApproval();
		var $popArea = $('#popForm').closest('.popup_area');

		if (locked) {
			$('#popForm').find('input, select, textarea').prop('disabled', true);
			$popArea.find('#saveBtn, #deleteBtn').hide();
			$popArea.find('.add_btn_small a').hide();
			setRptGridEditable(false);
		} else {
			$('#popForm').find('input, select, textarea').prop('disabled', false);
			$popArea.find('#saveBtn').show();
			$popArea.find('#deleteBtn').toggle(!!$('#tripRptNo').val());
			$popArea.find('.add_btn_small a').show();
			setRptGridEditable(true);
		}
	}

	function isTripRptLocked() {
		var locked = isApprovalEntryMode() || hasStartedRptApproval() || hasCompletedRptApproval();
		if (locked) {
			alert("결재가 진행중입니다.");
			applyRptEditPolicy();
		}
		return locked;
	}

	function isRptTravelerGridEditBlocked() {
		return isApprovalEntryMode() || hasStartedRptApproval() || hasCompletedRptApproval();
	}
