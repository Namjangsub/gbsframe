<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=0.6, user-scalable=no">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/bootstrap/css/bootstrap-theme.min.css">
<link rel="stylesheet" href="/static/bootstrap/css/dashboard.css">
<link rel="stylesheet" href="/static/bootstrap/css/bootstrap-datepicker.css">
<link rel="stylesheet" href="/static/fontawesome/css/all.css">
<link rel="stylesheet" href="/static/css/ax5/ax5mask.css">
<link rel="stylesheet" href="/static/css/ax5/ax5modal.css">
<link rel="stylesheet" href="/static/css/ax5/ax5toast.css">
<link rel="stylesheet" href="/static/css/tui-grid/4.21.22/tui-grid.css">
<link rel="stylesheet" href="/static/css/jstree/style.min.css">
<link rel="stylesheet" href="/static/css/gnb.css">
<link rel="stylesheet" href="/static/css/main.css">
<link rel="stylesheet" href="/static/css/sub.css">
<link rel="stylesheet" href="/static/css/common.css">

<script src="/static/js/jquery-latest.min.js"></script>
<script src="/static/js/jquery.serializeObject.js"></script>
<script src="/static/bootstrap/js/bootstrap.min.js"></script>
<script src="/static/bootstrap/js/bootstrap-datepicker.min.js"></script>
<script src="/static/bootstrap/js/bootstrap-datepicker.ko.min.js"></script>
<script src="/static/js/moment/moment-with-locales.js"></script>
<script src="/static/js/ax5/ax5core.min.js"></script>
<script src="/static/js/ax5/ax5mask.min.js"></script>
<script src="/static/js/ax5/ax5modal.min.js"></script>
<script src="/static/js/ax5/ax5toast.min.js"></script>
<script src="/static/js/tui-grid/4.21.22/tui-grid.min.js"></script>
<script src="/static/js/jstree/jstree.min.js"></script>
<script src="/static/js/global.js"></script>

<script src="/static/js/jquery.blockUI.js"></script>
<script src="/static/js/commApproval.js"></script>
</head>

<body>

<div class="popup_area of_a" style="width: 100%; height: 100%;">
	<div class="tit_contents">
		<h4 class="tit" id="popTitle">출장복명서</h4>
	</div>

	<form id="popForm" onSubmit="return false;">
		<div class="form-group popup_table">
			<input type="hidden" id="pgmId" name="pgmId" value="PM5102P01">
			<input type="hidden" id="tripRptNo" name="tripRptNo">
			<input type="hidden" id="tripReqNo" name="tripReqNo">
			<input type="hidden" id="fileTrgtKey" name="fileTrgtKey">
			<input type="hidden" id="actionType" name="actionType">

			<!-- 신청서 인용 정보 (읽기전용) -->
			<div style="background: #f9f9f9; padding: 10px; border: 1px solid #ddd; margin-bottom: 15px;">
				<h5 style="margin-top: 0;">신청서 인용정보</h5>
				<table>
					<colgroup>
						<col width="15%">
						<col width="20%">
						<col width="15%">
						<col width="20%">
						<col width="15%">
						<col width="15%">
					</colgroup>
					<tr>
						<th>신청번호</th>
						<td><input type="text" id="reqTripReqNo" name="reqTripReqNo" readonly style="width: 100%; background: #fff;"></td>
						<th>출장자</th>
						<td><input type="text" id="reqTravelerNm" name="reqTravelerNm" readonly style="width: 100%; background: #fff;"></td>
						<th>출장지</th>
						<td><input type="text" id="reqTripPlace" name="reqTripPlace" readonly style="width: 100%; background: #fff;"></td>
					</tr>
					<tr>
						<th>장비명</th>
						<td><input type="text" id="reqEquipNm" name="reqEquipNm" readonly style="width: 100%; background: #fff;"></td>
						<th>예상기간</th>
						<td colspan="3"><input type="text" id="reqTripPeriod" name="reqTripPeriod" readonly style="width: 100%; background: #fff;"></td>
					</tr>
				</table>
			</div>

			<!-- 출장기간 및 사유 -->
			<table>
				<colgroup>
					<col width="15%">
					<col width="20%">
					<col width="15%">
					<col width="20%">
					<col width="15%">
					<col width="15%">
				</colgroup>
				<tr>
					<th class="hit">실제출장기간</th>
					<td>
						<input type="datetime-local" id="actStDtm" name="actStDtm" required msg="시작일시" onchange="onActDateChange();">
					</td>
					<td>
						<input type="datetime-local" id="actEdDtm" name="actEdDtm" required msg="종료일시" onchange="onActDateChange();">
					</td>
					<th>출장연장사유</th>
					<td colspan="2">
						<textarea id="extendRsn" name="extendRsn" style="width: 100%; height: 40px; display: none;"></textarea>
						<div id="extendRsnHidden" style="padding: 5px; background: #fff;">-</div>
					</td>
				</tr>
				<tr>
					<th>회의록누락사유</th>
					<td colspan="5"><textarea id="minutesMissRsn" name="minutesMissRsn" style="width: 100%; height: 40px;"></textarea></td>
				</tr>
			</table>

			<!-- 출장목적 및 결과 -->
			<table style="margin-top: 10px;">
				<colgroup>
					<col width="15%">
					<col width="85%">
				</colgroup>
				<tr>
					<th class="hit">출장목적</th>
					<td><textarea id="tripPurpose" name="tripPurpose" required msg="출장목적" style="width: 100%; height: 60px;"></textarea></td>
				</tr>
				<tr>
					<th class="hit">출장결과</th>
					<td><textarea id="tripResult" name="tripResult" required msg="출장결과" style="width: 100%; height: 60px;"></textarea></td>
				</tr>
			</table>

			<!-- 평가 -->
			<table style="margin-top: 10px;">
				<colgroup>
					<col width="15%">
					<col width="20%">
					<col width="15%">
					<col width="20%">
					<col width="15%">
					<col width="15%">
				</colgroup>
				<tr>
					<th>자기평가</th>
					<td>
						<select id="selfEvalCd" name="selfEvalCd" data-kind="PM51EVAL" style="width: 100%;">
							<option value="">선택</option>
						</select>
					</td>
					<th>부서장평가</th>
					<td>
						<select id="deptEvalCd" name="deptEvalCd" data-kind="PM51EVAL" disabled style="width: 100%;">
							<option value="">선택</option>
						</select>
					</td>
					<th>최종평가</th>
					<td>
						<select id="finalEvalCd" name="finalEvalCd" data-kind="PM51EVAL" disabled style="width: 100%;">
							<option value="">선택</option>
						</select>
					</td>
				</tr>
			</table>

			<!-- 경비 세부내역 그리드 -->
			<div class="contents_tit" style="margin-top: 20px;">
				<span style="height: 30px; line-height: 30px;">경비 세부내역</span>
				<div class="add_btn_small pdl10">
					<a onclick="addExpenseDetailRow();" style="height: 30px; line-height: 28px; width: 60px;" authchk>+</a>
					<a onclick="deleteExpenseDetailRow();" style="height: 30px; line-height: 28px; width: 60px;" authchk>-</a>
				</div>
			</div>
			<div class="contents" style="height: 250px;">
				<div id="expenseDetailGrid" style="height: 100%; width: 100%;"></div>
			</div>

			<!-- 정산 요약 -->
			<table style="margin-top: 10px;">
				<colgroup>
					<col width="15%">
					<col width="20%">
					<col width="15%">
					<col width="20%">
					<col width="15%">
					<col width="15%">
				</colgroup>
				<tr>
					<th colspan="6" style="text-align: center; background: #f0f0f0; padding: 5px;">KRW 정산</th>
				</tr>
				<tr>
					<th>카드소계</th>
					<td><input type="text" id="cardSubtotalKrw" name="cardSubtotalKrw" readonly style="text-align: right; width: 100%; background: #fff;"></td>
					<th>현금소계</th>
					<td><input type="text" id="cashSubtotalKrw" name="cashSubtotalKrw" readonly style="text-align: right; width: 100%; background: #fff;"></td>
					<th>사용합계</th>
					<td><input type="text" id="usedTotalKrw" name="usedTotalKrw" readonly style="text-align: right; width: 100%; background: #fff;"></td>
				</tr>
				<tr>
					<th>수령금</th>
					<td><input type="text" id="advRcvAmtKrw" name="advRcvAmtKrw" onkeyup="this.value=this.value.replace(/[^0-9]/g,''); calcSettlementKrw();" style="text-align: right; width: 100%;"></td>
					<th>정산결과</th>
					<td colspan="3"><input type="text" id="settleAmtKrw" name="settleAmtKrw" readonly style="text-align: right; width: 100%; background: #fff;"></td>
				</tr>
				<tr>
					<th colspan="6" style="text-align: center; background: #f0f0f0; padding: 5px;">USD 정산</th>
				</tr>
				<tr>
					<th>카드소계</th>
					<td><input type="text" id="cardSubtotalUsd" name="cardSubtotalUsd" readonly style="text-align: right; width: 100%; background: #fff;"></td>
					<th>현금소계</th>
					<td><input type="text" id="cashSubtotalUsd" name="cashSubtotalUsd" readonly style="text-align: right; width: 100%; background: #fff;"></td>
					<th>사용합계</th>
					<td><input type="text" id="usedTotalUsd" name="usedTotalUsd" readonly style="text-align: right; width: 100%; background: #fff;"></td>
				</tr>
				<tr>
					<th>수령금</th>
					<td><input type="text" id="advRcvAmtUsd" name="advRcvAmtUsd" onkeyup="this.value=this.value.replace(/[^0-9.]/g,''); calcSettlementUsd();" style="text-align: right; width: 100%;"></td>
					<th>정산결과</th>
					<td colspan="3"><input type="text" id="settleAmtUsd" name="settleAmtUsd" readonly style="text-align: right; width: 100%; background: #fff;"></td>
				</tr>
			</table>

			<!-- 특기사항 -->
			<table style="margin-top: 10px;">
				<colgroup>
					<col width="15%">
					<col width="85%">
				</colgroup>
				<tr>
					<th>특기사항</th>
					<td><textarea id="specialNote" name="specialNote" style="width: 100%; height: 60px;"></textarea></td>
				</tr>
			</table>

			<!-- 첨부파일 -->
			<div class="contents_tit" style="margin-top: 20px;">
				<span style="height: 30px; line-height: 30px;">첨부파일</span>
			</div>
			<div id="fileList_area" style="min-height: 60px; padding: 10px; border: 1px solid #ddd; background: #fafafa;"></div>

			<!-- 결재선 -->
			<div class="contents_tit" style="margin-top: 20px;">
				<span style="height: 30px; line-height: 30px;">결재선</span>
			</div>
			<div id="approval_area" style="height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 5px;"></div>
		</div>
	</form>

	<!-- 하단 버튼 -->
	<div class="popup_bottom_btn">
		<button type="button" id="saveBtn" onclick="saveTripRpt();" authchk>저장</button>
		<button type="button" id="deleteBtn" onclick="deleteTripRpt();" authchk style="display:none;">삭제</button>
		<button type="button" class="close_btn" onclick="modalStack.close();">닫기</button>
	</div>
</div>

<script type="text/javascript">

	// 결제방법 코드 매핑 (TODO: 실제 코드값 확인 필요)
	const PM51_PAY_METHODS = {
		card: 'PM51PAY01',      // 카드
		cash: 'PM51PAY02',      // 현금
		coupon: 'PM51PAY03'     // 쿠폰
	};

	var expenseDetailGridView = null;
	var popParam = null;

	$(document).ready(function () {
		popParam = modalStack.last().paramObj;

		initExpenseDetailGrid();
		initFileTree();
		initApprovalArea();

		setCommonSelect($("#popForm select[data-kind]"));

		if (popParam.actionType === 'U') {
			$('#deleteBtn').show();
			$('#popTitle').text('출장복명서 수정');
			loadTripRptDetail(popParam.tripRptNo);
		} else {
			$('#popTitle').text('출장복명서 등록');
			$('#actionType').val('C');
			loadTripReqCitation(popParam.tripReqNo);
		}
	});

	// 경비 세부내역 그리드 초기화
	function initExpenseDetailGrid() {
		tui.Grid.applyTheme('default', {
			cell: {
				normal: { showVerticalBorder: true, showHorizontalBorder: true, border: '#dcdcdc' },
				header: { showVerticalBorder: true, showHorizontalBorder: true, border: '#dcdcdc', background: '#f7f7f7' }
			}
		});

		expenseDetailGridView = new tui.Grid({
			el: document.getElementById('expenseDetailGrid'),
			scrollX: false,
			scrollY: true,
			bodyHeight: 'fitToParent',
			rowHeight: 'auto',
			minRowHeight: 40,
			columns: [
				{ header: '사용일자', name: 'useDt', width: 100, align: 'center', editor: { type: 'text' } },
				{ header: '사용내역', name: 'useDesc', width: 150, align: 'left', editor: { type: 'text' } },
				{ header: '인원(일)', name: 'personCnt', width: 80, align: 'right', editor: { type: 'text' } },
				{ header: '금액', name: 'amt', width: 120, align: 'right', editor: { type: 'text' } },
				{ header: '통화', name: 'currCd', width: 80, align: 'center', editor: { type: 'select', options: { listItems: [{ text: 'KRW', value: 'KRW' }, { text: 'USD', value: 'USD' }] } } },
				{ header: '경비구분', name: 'expItemCd', width: 100, align: 'center', editor: { type: 'select', options: { listItems: [] } } },
				{ header: '결제방법', name: 'payMthdCd', width: 100, align: 'center', editor: { type: 'select', options: { listItems: [] } } },
				{ header: '비고', name: 'remark', width: 150, align: 'left', editor: { type: 'text' } }
			]
		});

		// 그리드 데이터 변경 시 정산 계산
		expenseDetailGridView.on('afterChange', function () {
			calcSettlementKrw();
			calcSettlementUsd();
		});
	}

	// 파일트리 초기화
	function initFileTree() {
		var fileTrgtKey = $('#fileTrgtKey').val();
		if (!fileTrgtKey) {
			fileTrgtKey = 'PM52_' + moment().format('YYYYMMDDHHmmss');
			$('#fileTrgtKey').val(fileTrgtKey);
		}

		$('#fileList_area').empty();
		fileTree.makeTree($('#fileList_area'), 'PM52', fileTrgtKey, jwt.userId, 'single');
	}

	// 결재선 초기화
	function initApprovalArea() {
		var approvalParam = {
			htmlArea: 'approval_area',
			todoDiv1CodeId: 'TODODIV20',
			todoDiv2CodeId: 'TODODIV2020',
			ordrgId: jwt.userId,
			coCd: jwt.coCd
		};

		postAjax("/user/pm/pm51/selectSignResUserlstInit", approvalParam, null, function (data) {
			var approvalList = data.result || [];
			var approvalHtml = '<table style="width: 100%; border-collapse: collapse; border: 1px solid #ddd;">';
			approvalHtml += '<tr style="border-bottom: 1px solid #ddd;"><th style="padding: 5px; text-align: center; border-right: 1px solid #ddd;">순번</th><th style="padding: 5px; text-align: center;">결재자</th></tr>';

			$.each(approvalList, function (idx, item) {
				approvalHtml += '<tr style="border-bottom: 1px solid #ddd;"><td style="padding: 5px; text-align: center; border-right: 1px solid #ddd;">' + (idx + 1) + '</td><td style="padding: 5px;">' + item.userNm + '</td></tr>';
			});
			approvalHtml += '</table>';
			$('#approval_area').html(approvalHtml);
		});
	}

	// 신청서 인용 정보 로드
	function loadTripReqCitation(tripReqNo) {
		postAjax("/user/pm/pm51/selectTripReqDtl", { tripReqNo: tripReqNo }, null, function (data) {
			if (!data.result) return;

			var m01 = data.result.m01 || {};
			var d01 = data.result.d01 || [];

			$('#tripReqNo').val(tripReqNo);
			$('#reqTripReqNo').val(m01.tripReqNo);
			$('#reqTripPlace').val(m01.tripPlace);
			$('#reqEquipNm').val(m01.equipNm);

			// 출장자 목록
			var travelerNames = d01.map(t => t.userNm).join(', ');
			if (d01.length > 1) {
				travelerNames = d01[0].userNm + ' 외 ' + (d01.length - 1);
			}
			$('#reqTravelerNm').val(travelerNames);

			// 예상기간
			var stDtm = (m01.tripStDtm || '').substring(0, 8);
			var edDtm = (m01.tripEdDtm || '').substring(0, 8);
			$('#reqTripPeriod').val(stDtm + ' ~ ' + edDtm);

			// 출장목적 (수정가능)
			$('#tripPurpose').val(m01.tripPurpose);

			// 지급금액 기본값 (수령금)
			$('#advRcvAmtKrw').val(m01.payAmtKrw || 0);
			$('#advRcvAmtUsd').val(m01.payAmtUsd || 0);
		});
	}

	// 복명서 상세 정보 로드
	function loadTripRptDetail(tripRptNo) {
		postAjax("/user/pm/pm51/selectTripRptDtl", { tripRptNo: tripRptNo }, null, function (data) {
			if (!data.result) return;

			var m02 = data.result.m02 || {};
			var d03 = data.result.d03 || [];
			var m01 = data.result.m01 || {};
			var d01 = data.result.d01 || [];

			// 신청서 인용 정보
			$('#tripReqNo').val(m02.tripReqNo);
			$('#reqTripReqNo').val(m02.tripReqNo);
			$('#reqTripPlace').val(m01.tripPlace);
			$('#reqEquipNm').val(m01.equipNm);

			var travelerNames = d01.map(t => t.userNm).join(', ');
			if (d01.length > 1) {
				travelerNames = d01[0].userNm + ' 외 ' + (d01.length - 1);
			}
			$('#reqTravelerNm').val(travelerNames);

			var stDtm = (m01.tripStDtm || '').substring(0, 8);
			var edDtm = (m01.tripEdDtm || '').substring(0, 8);
			$('#reqTripPeriod').val(stDtm + ' ~ ' + edDtm);

			// 복명서 정보
			$('#tripRptNo').val(m02.tripRptNo);
			$('#actionType').val('U');

			// 실제 출장기간
			if (m02.actStDtm) {
				$('#actStDtm').val(formatToDatetimeLocal(m02.actStDtm));
			}
			if (m02.actEdDtm) {
				$('#actEdDtm').val(formatToDatetimeLocal(m02.actEdDtm));
			}

			// 출장기간 초과 체크
			onActDateChange();

			// 사유들
			$('#extendRsn').val(m02.extendRsn);
			$('#minutesMissRsn').val(m02.minutesMissRsn);

			// 목적 및 결과
			$('#tripPurpose').val(m02.tripPurpose);
			$('#tripResult').val(m02.tripResult);

			// 평가
			$('#selfEvalCd').val(m02.selfEvalCd);
			$('#deptEvalCd').val(m02.deptEvalCd);
			$('#finalEvalCd').val(m02.finalEvalCd);

			// 경비 세부내역
			if (d03 && d03.length > 0) {
				expenseDetailGridView.setData(d03);
			}

			// 정산 금액
			$('#advRcvAmtKrw').val(m02.advRcvAmtKrw || 0);
			$('#advRcvAmtUsd').val(m02.advRcvAmtUsd || 0);
			$('#settleAmtKrw').val(m02.settleAmtKrw || 0);
			$('#settleAmtUsd').val(m02.settleAmtUsd || 0);

			// 특기사항
			$('#specialNote').val(m02.specialNote);

			// 파일 및 결재선
			$('#fileTrgtKey').val(m02.fileTrgtKey);
			initFileTree();

			// 정산 계산 갱신
			calcSettlementKrw();
			calcSettlementUsd();
		});
	}

	// 실제 출장기간 변경 시 처리
	function onActDateChange() {
		var stDtm = $('#actStDtm').val();
		var edDtm = $('#actEdDtm').val();
		var reqSt = $('#reqTripPeriod').val().split(' ~ ')[0];
		var reqEd = $('#reqTripPeriod').val().split(' ~ ')[1];

		if (!stDtm || !edDtm) return;

		var actStDate = moment(stDtm).format('YYYYMMDD');
		var actEdDate = moment(edDtm).format('YYYYMMDD');
		var reqStDate = reqSt.replace(/-/g, '');
		var reqEdDate = reqEd.replace(/-/g, '');

		// 출장 기간 초과 여부 판단
		if (actStDate < reqStDate || actEdDate > reqEdDate) {
			$('#extendRsn').show();
			$('#extendRsnHidden').hide();
		} else {
			$('#extendRsn').hide();
			$('#extendRsnHidden').show();
		}
	}

	// 경비 행 추가
	function addExpenseDetailRow() {
		expenseDetailGridView.appendRow({
			useDt: '',
			useDesc: '',
			personCnt: 0,
			amt: 0,
			currCd: 'KRW',
			expItemCd: '',
			payMthdCd: '',
			remark: ''
		});
	}

	// 경비 행 삭제
	function deleteExpenseDetailRow() {
		var selectedRows = expenseDetailGridView.getCheckedRows();
		if (selectedRows.length === 0) {
			alert("삭제할 행을 선택해주세요.");
			return;
		}

		var rowKeys = selectedRows.map(row => row.rowKey);
		rowKeys.forEach(rowKey => {
			expenseDetailGridView.removeRow(rowKey);
		});

		calcSettlementKrw();
		calcSettlementUsd();
	}

	// KRW 정산 계산
	function calcSettlementKrw() {
		var list = expenseDetailGridView.getData();
		var cardSubtotal = 0;
		var cashSubtotal = 0;

		list.forEach(row => {
			if (row.currCd !== 'KRW') return;

			var amt = parseInt(row.amt) || 0;
			if (row.payMthdCd === PM51_PAY_METHODS.card) {
				cardSubtotal += amt;
			} else if (row.payMthdCd === PM51_PAY_METHODS.cash || row.payMthdCd === PM51_PAY_METHODS.coupon) {
				cashSubtotal += amt;
			}
		});

		var usedTotal = cardSubtotal + cashSubtotal;
		var advRcvAmt = parseInt($('#advRcvAmtKrw').val()) || 0;
		var settleAmt = advRcvAmt - usedTotal;

		$('#cardSubtotalKrw').val(cardSubtotal);
		$('#cashSubtotalKrw').val(cashSubtotal);
		$('#usedTotalKrw').val(usedTotal);
		$('#settleAmtKrw').val(settleAmt);
	}

	// USD 정산 계산
	function calcSettlementUsd() {
		var list = expenseDetailGridView.getData();
		var cardSubtotal = 0;
		var cashSubtotal = 0;

		list.forEach(row => {
			if (row.currCd !== 'USD') return;

			var amt = parseFloat(row.amt) || 0;
			if (row.payMthdCd === PM51_PAY_METHODS.card) {
				cardSubtotal += amt;
			} else if (row.payMthdCd === PM51_PAY_METHODS.cash || row.payMthdCd === PM51_PAY_METHODS.coupon) {
				cashSubtotal += amt;
			}
		});

		var usedTotal = cardSubtotal + cashSubtotal;
		var advRcvAmt = parseFloat($('#advRcvAmtUsd').val()) || 0;
		var settleAmt = advRcvAmt - usedTotal;

		$('#cardSubtotalUsd').val(cardSubtotal.toFixed(2));
		$('#cashSubtotalUsd').val(cashSubtotal.toFixed(2));
		$('#usedTotalUsd').val(usedTotal.toFixed(2));
		$('#settleAmtUsd').val(settleAmt.toFixed(2));
	}

	// 저장
	function saveTripRpt() {
		if (!inputValidation($('#popForm [required]'))) return;

		var formData = new FormData();

		// 마스터 정보
		formData.append('tripRptNo', $('#tripRptNo').val());
		formData.append('tripReqNo', $('#tripReqNo').val());
		formData.append('actionType', $('#actionType').val());

		// 날짜 변환: datetime-local (2026-03-15T09:00) → YYYYMMDDHH24MI
		var actStDtm = formatToYYYYMMDDHHMM($('#actStDtm').val());
		var actEdDtm = formatToYYYYMMDDHHMM($('#actEdDtm').val());
		formData.append('actStDtm', actStDtm);
		formData.append('actEdDtm', actEdDtm);

		formData.append('tripPurpose', $('#tripPurpose').val());
		formData.append('tripResult', $('#tripResult').val());
		formData.append('selfEvalCd', $('#selfEvalCd').val());
		formData.append('deptEvalCd', $('#deptEvalCd').val());
		formData.append('finalEvalCd', $('#finalEvalCd').val());
		formData.append('specialNote', $('#specialNote').val());
		formData.append('extendRsn', $('#extendRsn').val());
		formData.append('minutesMissRsn', $('#minutesMissRsn').val());
		formData.append('advRcvAmtKrw', $('#advRcvAmtKrw').val());
		formData.append('advRcvAmtUsd', $('#advRcvAmtUsd').val());
		formData.append('settleAmtKrw', $('#settleAmtKrw').val());
		formData.append('settleAmtUsd', $('#settleAmtUsd').val());

		// 경비 세부내역 배열
		var expenseDtlList = expenseDetailGridView.getData();
		formData.append('expenseDtlArr', JSON.stringify(expenseDtlList));

		// 결재선 (stub)
		formData.append('approvalArr', JSON.stringify([]));
		formData.append('sharngArr', JSON.stringify([]));

		formData.append('fileTrgtKey', $('#fileTrgtKey').val());
		formData.append('pgmId', $('#pgmId').val());
		formData.append('userId', jwt.userId);
		formData.append('coCd', jwt.coCd);
		formData.append('todoDiv2CodeId', 'TODODIV2020');

		var url = $('#actionType').val() === 'C' ? '/user/pm/pm51/insertTripRpt' : '/user/pm/pm51/updateTripRpt';

		openProgress(true);
		filePostAjax(url, formData, function (data) {
			if (data.resultCode === 200) {
				alert(data.resultMessage);
				modalStack.close();
			} else if (data.resultCode === 900) {
				alert(data.resultMessage);
			} else {
				alert("저장 중 오류 발생: " + data.resultMessage);
			}
			openProgress(false);
		});
	}

	// 삭제
	function deleteTripRpt() {
		var tripRptNo = $('#tripRptNo').val();
		if (!tripRptNo) return;

		if (!confirm("삭제하시겠습니까?")) return;

		postAjax("/user/pm/pm51/deleteTripRpt", { tripRptNo: tripRptNo }, null, function (data) {
			if (data.resultCode === 200) {
				alert(data.resultMessage);
				modalStack.close();
			} else if (data.resultCode === 900) {
				alert(data.resultMessage);
			} else {
				alert("삭제 중 오류 발생: " + data.resultMessage);
			}
		});
	}

	// 유틸 함수: datetime-local → YYYYMMDDHH24MI
	function formatToYYYYMMDDHHMM(dtLocal) {
		if (!dtLocal) return '';
		var m = moment(dtLocal);
		if (!m.isValid()) return '';
		return m.format('YYYYMMDDHHmm');
	}

	// 유틸 함수: YYYYMMDDHH24MI → datetime-local
	function formatToDatetimeLocal(yyyymmddhhmi) {
		if (!yyyymmddhhmi || yyyymmddhhmi.length < 12) return '';
		var year = yyyymmddhhmi.substring(0, 4);
		var month = yyyymmddhhmi.substring(4, 6);
		var day = yyyymmddhhmi.substring(6, 8);
		var hour = yyyymmddhhmi.substring(8, 10);
		var min = yyyymmddhhmi.substring(10, 12);
		return year + '-' + month + '-' + day + 'T' + hour + ':' + min;
	}

</script>
