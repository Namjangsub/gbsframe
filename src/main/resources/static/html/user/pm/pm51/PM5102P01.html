<script type="text/javascript">


	function setComboOptionCode(selectComobo) {
		var optionCode = [];
		postAjaxSync("/admin/cm/cm05/selectChildCodeList", {"codeKind" : selectComobo} , null, function(data) {
			if (data && data.childCodeList) {
				$.each(data.childCodeList, function (index, item) {
					optionCode.push({ 'CD': item.codeId, 'NM': item.codeNm });
				});
			}
		});
		return optionCode;
	}

	function getComboName(comboArray, key) {
		if (key && typeof key == "object") {
			key = key.value;
		}
		if (key === undefined || key === null) return "";
		for (var i = 0; i < comboArray.length; i++) {
			if (comboArray[i].CD == key) {
				return comboArray[i].NM;
			}
		}
		return key;
	}

	var comboCurrCd = setComboOptionCode("CURR");
	var comboPayMthdCd = setComboOptionCode("PM51PAY");

	// 통화값을 공통코드로 정규화 (CURR01=원화, CURR02=달러) - 'WON'/'KRW' 등 문자열 저장 방지
	function toCurrCode(value) {
		if (value) {
			for (var i = 0; i < comboCurrCd.length; i++) {
				if (comboCurrCd[i].CD === value) return value;	// 이미 공통코드
			}
			if (isUsdCurrency(value)) return 'CURR02';
			if (isKrwCurrency(value)) return 'CURR01';
		}
		return 'CURR01';
	}

	// 결재방법 '현금' 공통코드 조회
	function getCashPayMthdCd() {
		var cash = comboPayMthdCd.filter(function(c) { return c.NM.indexOf('현금') > -1; })[0];
		return cash ? cash.CD : '';
	}

	var tripReqTravelerGridView = null;
	var rptTravelerGridView = null;
	var expenseDetailGridView = null;
	var popParam = null;
	var commApproval = null;
	var gridViewApproval = null;
	var gridViewApprovalMng = null;
	var currentTripRptMaster = null;

	$(document).ready(function () {
		setTimeout(function () {
		// 공통 fileTree.js의 JSON.parse("") 크래시를 회피하기 위한 파라미터 선제 보정
		if (modalStack && modalStack.last() && modalStack.last().paramObj) {
			var paramObj = modalStack.last().paramObj;
			if (typeof paramObj.gridObj === 'string' && !paramObj.gridObj.trim()) {
				paramObj.gridObj = undefined;
			}
		}
		popParam = modalStack.last().paramObj;
		if (popParam && !popParam.tripRptNo && popParam.todoNo) {
			popParam.tripRptNo = popParam.todoNo;
		}

		initTripReqTravelerGrid();
		initRptTravelerGrid();
		initExpenseDetailGrid();
		initFileTree();

		gridViewApprovalMng = createApprovalGrid('[data-ax5grid="approval_grid_mng_modal"]');
		initApprovalArea();
		gridViewApprovalMng.initView();
		gridResize(gridViewApproval, 0);
		gridResize(gridViewApprovalMng, 0);

		setCommonSelect($("#popForm select[data-kind]"));
		initAutoResizeTextareas();

		// 프로젝트명, 영업PM명, 장비명, 출장지 마우스 오버 시 SalesCode 미선택 시 툴팁 표시
		$('#reqViewClntPjtNm, #reqViewPmNm, #reqViewEquipNm, #reqViewTripPlace').on('mouseenter', function() {
			if (!$('#reqViewSalesCd').val()) {
				$(this).attr('title', 'SalesCode를 선택하세요!');
			} else {
				$(this).removeAttr('title');
			}
		});

		// 출장자 그리드 마우스 오버 시 이름, 직급, 출장기간 누락 건 툴팁
		$('[data-ax5grid="rptTravelerGrid"]').on('mouseenter', function() {
			var list = (rptTravelerGridView && rptTravelerGridView.target) ? rptTravelerGridView.target.getList() : [];
			var hasEmpty = false;
			if (list.length > 0) {
				$.each(list, function(idx, item) {
					if (!item.userNm || !item.positionNm || !item.tripStDt || !item.tripEdDt) {
						hasEmpty = true;
						return false;
					}
				});
			}
			if (hasEmpty) {
				$(this).attr('title', '이름 직급 출장기간을 선택하세요!');
			} else {
				$(this).removeAttr('title');
			}
		});

		if (popParam.actionType === 'U' || popParam.actionType === 'V' || popParam.tripRptNo) {
			$('#deleteBtn').toggle(popParam.actionType !== 'V');
			$('#popTitle').text(popParam.actionType === 'V' ? '출장복명서 조회' : '출장복명서 수정');
			loadTripRptDetail(popParam.tripRptNo, function() {
				loadApprovalLine(popParam.tripRptNo, ['TODODIV2200', 'TODODIV1200']);
			});
		} else {
			$('#popTitle').text('출장복명서 등록');
			$('#actionType').val('C');
			loadTripReqCitation(popParam.tripReqNo);
		}
		}, 0);
	});

	// 출장신청서 출장자 그리드 초기화 (읽기전용)
	function initTripReqTravelerGrid() {
		tripReqTravelerGridView = { target: new ax5.ui.grid() };
		tripReqTravelerGridView.target.setConfig({
			target: $('[data-ax5grid="tripReqTravelerGrid"]'),
			showRowSelector: false,
			multipleSelect: false,
			sortable: false,
			header: {
				align: "center",
				selector: true
			},
			body: { onClick: function () { this.self.select(this.dindex); } },

	function setApplicantDefaultApprovalLine(reqId, reqNm) {
		if (!reqId || !gridViewApproval || !gridViewApproval.target) return;
		var autoList = [{
			gb: '결재', usrNm: reqId, todoId: reqId, name: reqNm || reqId,
			todoDiv2CodeId: 'TODODIV2200', flag: 'I', autoApplicantApproval: 'Y', coCd: jwt.coCd
		}];
		postAjaxSync('/user/wb/wb24/selectTeamManagerInfo', { userId: reqId }, null, function(data) {
			var manager = data.result;
			if (manager && manager.id && manager.id !== reqId) {
				autoList.push({
					gb: '결재', usrNm: manager.id, todoId: manager.id, name: manager.name,
					jik: manager.levelNm, dtNm: manager.deptNm,
					todoDiv2CodeId: 'TODODIV2200', flag: 'I', autoApplicantApproval: 'Y', coCd: jwt.coCd
				});
			}
		});

		// DB에서 재로드된 행에는 autoApplicantApproval 표시가 없으므로, 자동 행과 같은 ID의 기존 행도 제거 (중복 누적 방지)
		var autoIds = $.map(autoList, function(r) { return r.usrNm; });
		var preservedList = $.grep(gridViewApproval.target.getList() || [], function(row) {
			var rowId = row.usrNm || row.todoId;
			return row.autoApplicantApproval !== 'Y' && $.inArray(rowId, autoIds) === -1;
		});
		var newList = autoList.concat(preservedList);
		gridViewApproval.setData2(newList);
		gridResize(gridViewApproval, newList.length);
	}

	// 신청서 인용 정보 로드
	function loadTripReqCitation(tripReqNo) {
		postAjax("/user/pm/pm51/selectTripReqDtl", { tripReqNo: tripReqNo }, null, function (data) {
			if (!data.result) return;

			var m01 = data.result.m01 || {};
			var d01 = data.result.d01 || [];
			var d02 = data.result.d02 || [];

			$('#tripReqNo').val(tripReqNo);
			bindTripReqView(m01, d01);
			if (popParam.actionType !== 'U') {
				setApplicantDefaultApprovalLine(m01.userId || jwt.userId, m01.userNm || m01.userId || jwt.userNm);
			}
			bindRptTravelerGrid(d01);

			// 예상기간
			var stDtm = (m01.tripStDtm || '').substring(0, 8);
			var edDtm = (m01.tripEdDtm || '').substring(0, 8);
			$('#reqTripPeriod').val(formatToDate(stDtm) + ' ~ ' + formatToDate(edDtm));
			updateActualTripPeriodFromRptTravelers();

			// 출장목적 (수정가능)
			$('#tripPurpose').val(m01.tripPurpose || '');
			$('#tripResult').val(buildTripResultDraft(m01, d01));
			$('#minutesMissRsn').val('');
			$('#specialNote').val(buildSpecialNoteDraft(m01, d01, d02));

			// 지급금액 기본값 (수령금)
			$('#advRcvAmtKrw').val(m01.payAmtKrw || 0);
			$('#advRcvAmtUsd').val(m01.payAmtUsd || 0);

			var expenseRows = buildExpenseDetailRowsFromTripReq(m01, d01, d02);
			expenseDetailGridView.target.setData({ list: expenseRows, page: { totalElements: expenseRows.length } });
			resizeExpenseDetailGrid(expenseRows.length);
			resizeAutoTextareas();
			calcSettlementKrw();
			calcSettlementUsd();
		});
	}

	function bindRptTravelerGrid(travelerList) {
		var rows = $.map(travelerList || [], function(row) {
			return buildRptTravelerRow(row);
		});
		rptTravelerGridView.target.setData({
			list: rows,
			page: { totalElements: rows.length }
		});
		updateActualTripPeriodFromRptTravelers();

	function buildRptTravelerRow(row) {
		var copied = $.extend({}, row || {});
		copied.tripStDt = copied.tripStDt || formatToDate(copied.tripStDtm || '');
		copied.tripStTm = copied.tripStTm || formatToTime(copied.tripStDtm || '');
		copied.tripEdDt = copied.tripEdDt || formatToDate(copied.tripEdDtm || '');
		copied.tripEdTm = copied.tripEdTm || formatToTime(copied.tripEdDtm || '');
		copied.nightCnt = copied.nightCnt || 0;
		copied.dayCnt = copied.dayCnt || 0;
		copied.eatCnt = copied.eatCnt || 0;
		copied.trafficAmt = copied.trafficAmt || 0;
		copied.lodgingAmt = copied.lodgingAmt || 0;
		copied.mealAmt = copied.mealAmt || 0;
		copied.dailyAmt = copied.dailyAmt || 0;
		copied.specialAmt = copied.specialAmt || 0;
		copied.totalAmt = calcRptTravelerTotal(copied);
		copied.etc = copied.etc || '';
		return copied;
	}

	function calcRptTravelerTotal(row) {
		return Number(row.trafficAmt || 0)
			+ Number(row.lodgingAmt || 0)
			+ Number(row.mealAmt || 0)
			+ Number(row.dailyAmt || 0)
			+ Number(row.specialAmt || 0);
	}

	function updateActualTripPeriodFromRptTravelers() {
		if (!rptTravelerGridView || !rptTravelerGridView.target) return;
		var minStart = '';
		var maxEnd = '';

		$.each(rptTravelerGridView.target.getList() || [], function(idx, row) {
			var start = buildComparableDateTime(row.tripStDt, row.tripStTm);
			var end = buildComparableDateTime(row.tripEdDt, row.tripEdTm);
			if (start && (!minStart || start < minStart)) minStart = start;
			if (end && (!maxEnd || end > maxEnd)) maxEnd = end;
		});

		$('#actStDtm').val(formatComparableDateTime(minStart));
		$('#actEdDtm').val(formatComparableDateTime(maxEnd));
		onActDateChange();
	}

	function buildComparableDateTime(dateText, timeText) {
		var dt = normalizeDateText(dateText);
		if (!dt) return '';
		var tm = normalizeTimeText(timeText) || '00:00';
		return dt.replace(/-/g, '') + tm.replace(':', '');
	}

	function normalizeDateText(dateText) {
		if (!dateText) return '';
		var text = String(dateText).trim();
		if (/^\d{8}$/.test(text)) {
			return text.substring(0, 4) + '-' + text.substring(4, 6) + '-' + text.substring(6, 8);
		}
		if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
		var m = moment(text);
		return m.isValid() ? m.format('YYYY-MM-DD') : '';
	}

	function normalizeTimeText(timeText) {
		if (!timeText) return '';
		var text = String(timeText).trim();
		if (/^\d{4}$/.test(text)) {
			return text.substring(0, 2) + ':' + text.substring(2, 4);
		}
		if (/^\d{2}:\d{2}$/.test(text)) return text;
		if (/^\d{1,2}$/.test(text)) return ('0' + text).slice(-2) + ':00';
		return '';
	}

	function formatComparableDateTime(yyyymmddhhmm) {
		if (!yyyymmddhhmm || yyyymmddhhmm.length < 12) return '';
		return formatToDate(yyyymmddhhmm) + ' ' + formatToTime(yyyymmddhhmm);
	}

	function buildExpenseDetailRowsFromTravelers(m01, travelerList) {

		var itemDefs = [

			{ key: 'lodgingAmt', name: '숙박비' },
			{ key: 'mealAmt', name: '식대' },
			{ key: 'dailyAmt', name: '일비' },
			{ key: 'specialAmt', name: '특별비' }
		];

		$.each(itemDefs, function(idx, def) {
			var total = 0;
			$.each(travelerList || [], function(_, traveler) {
				total += Number(traveler[def.key] || 0);
			});
			if (!total) return true;
			rows.push({

				useDesc: '출장신청서 출장자별 ' + def.name + ' 합계',

				currCd: currCd,

	function checkFormValidation() {

		$('#popForm [required]').each(function() {
			var $el = $(this);

			var val = $.trim($el.val() || '');
			if (!val) {

	// 실제 출장기간 변경 시 처리
	function onActDateChange() {
		var stDtm = $('#actStDtm').val();
		var edDtm = $('#actEdDtm').val();
		var reqPeriod = $('#reqTripPeriod').val() || '';
		var reqPeriodArr = reqPeriod.split(' ~ ');
		var reqSt = reqPeriodArr[0] || '';
		var reqEd = reqPeriodArr[1] || '';

		if (!stDtm || !edDtm || !reqSt || !reqEd) return;

		var actStDate = moment(stDtm).format('YYYYMMDD');
		var actEdDate = moment(edDtm).format('YYYYMMDD');
		var reqStDate = reqSt.replace(/-/g, '');
		var reqEdDate = reqEd.replace(/-/g, '');

		// 출장 기간 초과 여부 판단
		if (actStDate < reqStDate || actEdDate > reqEdDate) {
			$('#extendRsn').show();
			$('#extendRsnHidden').hide();
			$('#extendRsn').prop('required', true).attr('msg', '출장연장사유');
			$('#extendRsn').closest('td').prev('th').addClass('hit');
		} else {
			$('#extendRsn').hide();
			$('#extendRsnHidden').show();
			$('#extendRsn').prop('required', false).removeAttr('msg');
			$('#extendRsn').closest('td').prev('th').removeClass('hit');
		}
	}

		text.trim().split(/\r?\n/).forEach(function(line, rowOffset) {

				var key = keys[(startCol || 0) + colOffset];

	function isKrwCurrency(currCd) {
		if (!currCd) return false;
		if (currCd === 'KRW' || currCd === 'WON') return true;
		var nm = getComboName(comboCurrCd, currCd) || '';
		return nm.indexOf('원') > -1 || nm.toUpperCase().indexOf('WON') > -1;
	}

	function isUsdCurrency(currCd) {
		if (!currCd) return false;
		if (currCd === 'USD') return true;
		var nm = getComboName(comboCurrCd, currCd) || '';
		return nm.indexOf('달러') > -1 || nm.toUpperCase().indexOf('USD') > -1;
	}

	function getSettlementNumber(value) {
		var normalized = String(value === null || value === undefined ? '' : value).replace(/,/g, '');
		var numberValue = Number(normalized);
		return isNaN(numberValue) ? 0 : numberValue;
	}

	function formatSettlementKrw(value) {
		return Math.trunc(getSettlementNumber(value)).toLocaleString('en-US');
	}

	function formatSettlementUsd(value) {
		return getSettlementNumber(value).toLocaleString('en-US', {
			minimumFractionDigits: 2,
			maximumFractionDigits: 2
		});
	}

	function formatSettlementInput(input, isUsd) {
		var value = String(input.value || '').replace(/,/g, '');
		if (!isUsd) {
			input.value = value.replace(/[^0-9]/g, '').replace(/^0+(?=\d)/, '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
			return;
		}

		value = value.replace(/[^0-9.]/g, '');
		var parts = value.split('.');
		var integerPart = (parts.shift() || '').replace(/^0+(?=\d)/, '');
		var decimalPart = parts.join('').substring(0, 2);
		input.value = (integerPart ? integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',') : '')
			+ (value.indexOf('.') >= 0 ? '.' + decimalPart : '');
	}

	// KRW 정산 계산
	function calcSettlementKrw() {
		var list = expenseDetailGridView.target.getList();
		var cardSubtotal = 0;
		var cashSubtotal = 0;

		list.forEach(row => {
			if (!isKrwCurrency(row.currCd)) return;

			var amt = parseInt(row.amt) || 0;
			var payNm = getComboName(comboPayMthdCd, row.payMthdCd) || '';
			if (payNm.indexOf('카드') > -1) {
				cardSubtotal += amt;
			} else if (payNm.indexOf('현금') > -1 || payNm.indexOf('쿠폰') > -1) {
				cashSubtotal += amt;
			}
		});

		var usedTotal = cardSubtotal + cashSubtotal;
		var advRcvAmt = getSettlementNumber($('#advRcvAmtKrw').val());
		var settleAmt = advRcvAmt - usedTotal;

		$('#cardSubtotalKrw').val(formatSettlementKrw(cardSubtotal));
		$('#cashSubtotalKrw').val(formatSettlementKrw(cashSubtotal));
		$('#usedTotalKrw').val(formatSettlementKrw(usedTotal));
		$('#settleAmtKrw').val(formatSettlementKrw(settleAmt));
	}

	// USD 정산 계산
	function calcSettlementUsd() {
		var list = expenseDetailGridView.target.getList();
		var cardSubtotal = 0;
		var cashSubtotal = 0;

		list.forEach(row => {
			if (!isUsdCurrency(row.currCd)) return;

			var amt = parseFloat(row.amt) || 0;
			var payNm = getComboName(comboPayMthdCd, row.payMthdCd) || '';

				cardSubtotal += amt;
			} else if (payNm.indexOf('현금') > -1 || payNm.indexOf('쿠폰') > -1) {
				cashSubtotal += amt;
			}
		});

		var usedTotal = cardSubtotal + cashSubtotal;
		var advRcvAmt = getSettlementNumber($('#advRcvAmtUsd').val());
		var settleAmt = advRcvAmt - usedTotal;

		$('#cardSubtotalUsd').val(formatSettlementUsd(cardSubtotal));
		$('#cashSubtotalUsd').val(formatSettlementUsd(cashSubtotal));
		$('#usedTotalUsd').val(formatSettlementUsd(usedTotal));
		$('#settleAmtUsd').val(formatSettlementUsd(settleAmt));
	}

	// 저장
	function saveTripRpt() {
		if (isTripRptLocked()) return;

		// 결재 진행중이라도 신청인의 팀장(또는 신청인 본인이 팀장)인 경우: 부서장평가/결재자판단만 별도 API로 저장

		if (generalLocked && (isTeamManager || isApproverTeamManager) && !isRptPaid()) {
			saveTripRptMngEval();
			return;
		}

		if (!checkFormValidation()) return;


		// 출장자 출발/도착 일시 필수 검증
		var travelerList = rptTravelerGridView.target.getList() || [];

			return;
		}
		var hasInvalidTraveler = false;
		$.each(travelerList, function(idx, item) {
			if (!item.tripStDt || !item.tripStTm || !item.tripEdDt || !item.tripEdTm) {
				hasInvalidTraveler = true;
				return false;
			}
		});

		var expenseList = expenseDetailGridView.target.getList() || [];
		if (expenseList.length === 0) {
			var $gridContainer = $('[data-ax5grid="expenseDetailGrid"]');
			$gridContainer.addClass('error-outline');

	// 유틸 함수: YYYY-MM-DD 또는 YYYY-MM-DD HH:mm -> YYYYMMDDHH24MI
	function formatToYYYYMMDDHHMM(dtLocal) {
		if (!dtLocal) return '';
		var m = moment(dtLocal, ['YYYY-MM-DD HH:mm', 'YYYY-MM-DD', moment.ISO_8601], true);
		if (!m.isValid()) return '';
		return m.format('YYYYMMDDHHmm');
	}

	// 유틸 함수: YYYYMMDDHH24MI -> YYYY-MM-DD
	function formatToDate(yyyymmddhhmi) {
		if (!yyyymmddhhmi || yyyymmddhhmi.length < 8) return '';
		var year = yyyymmddhhmi.substring(0, 4);
		var month = yyyymmddhhmi.substring(4, 6);
		var day = yyyymmddhhmi.substring(6, 8);
		return year + '-' + month + '-' + day;
	}

	function formatToTime(yyyymmddhhmi) {
		if (!yyyymmddhhmi || yyyymmddhhmi.length < 10) return '';
		var time = yyyymmddhhmi.length >= 12 ? yyyymmddhhmi.substring(8, 12) : yyyymmddhhmi.substring(8, 10) + '00';
		return time.substring(0, 2) + ':' + time.substring(2, 4);
	}

	function formatDateFromAny(value) {
		if (!value) return '';
		if (typeof value === 'number') {
			return moment(value).isValid() ? moment(value).format('YYYY-MM-DD') : '';
		}
		var text = String(value);
		if (/^\d{8}/.test(text)) {
			return formatToDate(text);
		}
		return moment(text).isValid() ? moment(text).format('YYYY-MM-DD') : text;
	}

	function formatNumberText(value) {
		if (value === null || value === undefined || value === '') return '';
		var num = Number(String(value).replace(/,/g, ''));
		return isNaN(num) ? value : num.toLocaleString();
	}

	function setFormDisabled(disabled) {

			$popForm.find('input[type="checkbox"], input[type="radio"]').addClass('readonly-check').css('pointer-events', 'none');

	function applyRptEditPolicy() {
		if ($('#actionType').val() === 'C') return;

		var applicantId = $('#reqViewReqId').val() || '';
		var isTeamManager = isApplicantTeamManager(applicantId);
		var isApproverTeamManager = isCurrentApproverTeamManager(applicantId);

		// 결재 진입 상태 시 락 판정 (기본적으로 결재선 승인이 완료되었거나 회계 지급 완료된 경우 하드 락)
		var locked = isApprovalEntryMode() || hasCompletedRptApproval() || isRptPaid();
		var $popArea = $('#popForm').closest('.popup_area');

		if (locked) {
			setFormDisabled(true);
			$popArea.find('#saveBtn, #deleteBtn').hide();
			$popArea.find('.add_btn_small a').hide();
			setRptGridEditable(false);
		} else {
			setFormDisabled(false);
			$popArea.find('#saveBtn').show();
			$popArea.find('#deleteBtn').toggle(!!$('#tripRptNo').val());
			$popArea.find('.add_btn_small a').show();
			setRptGridEditable(true);

			// 일반 기안자 편집 시에는 부서장평가, 최종평가, 결재자판단 조작 불가능하도록 락 유지
			$('#deptEvalCd, #finalEvalCd').prop('disabled', true);
			$('input[name="aprvEvalCd"]').prop('disabled', true).addClass('readonly-check').css('pointer-events', 'none');
		}

		// [특별 권한 정책] 신청인이 팀장이거나 현재 로그인한 사용자가 신청인의 팀장(결재자)인 경우
		if (isTeamManager || isApproverTeamManager) {
			var isCompleted = isRptPaid(); // 지급 완료된 경우 외에는 본인 결재 차례 시 수정 가능해야 함
			if (!isCompleted) {
				// 전체 폼이 락(disabled) 상태일지라도, 이 두 곳(부서장평가, 결재자판단)만 예외적으로 활성화(수정 가능) 처리
				$('#deptEvalCd').prop('required', true).attr('msg', '부서장평가');
				$('#deptEvalCd').closest('td').prev('th').addClass('hit');
				$('#deptEvalCd').prop('disabled', false).css('pointer-events', 'auto');

				$('input[name="aprvEvalCd"]').closest('td').prev('th').addClass('hit');
				$('input[name="aprvEvalCd"]').removeClass('readonly-check').prop('disabled', false).css('pointer-events', 'auto');

				// 저장 버튼 활성화 (보여줌)
				$popArea.find('#saveBtn').show();
			}
		}
	}

	function isTripRptLocked() {
		var applicantId = $('#reqViewReqId').val() || '';
		var isTeamManager = isApplicantTeamManager(applicantId);
		var isApproverTeamManager = isCurrentApproverTeamManager(applicantId);

		var isCompleted = isRptPaid(); // 지급 완료된 경우 외에는 저장 허용

		}
		return isApprovalEntryMode() || isCompleted;
	}

			, "creatPgm": "PM5102P01"
			, "chkSentYn": "Y"					//기발송 수신자 제외(중복방지)
			, "customMessage": buildTripRptKakaoMessage(sanctnDiv2, clntNm, teleNo)	//본문은 복명서 정보로 직접 조립 (제목은 기존 그대로)
		};
		commKaKaoSendTodo(param);
	}

	// 알림톡 본문 조립 - 표준 양식(내용/업무/요청일시/요청자/확인문구/회사연락처) 참고: mobile/modal/WB2001P01.html
	function buildTripRptKakaoMessage(sanctnDiv2, clntNm, teleNo) {
		var tripPlace = $('#reqViewTripPlace').val() || '';
		var clntPjtNm = $('#reqViewClntPjtNm').val() || '';
		var tripDivNm = $('#reqViewTripDiv option:selected').text() || '';
		if (tripDivNm === '선택') tripDivNm = '';

		var list = (rptTravelerGridView && rptTravelerGridView.target) ? rptTravelerGridView.target.getList() : [];
		var names = [];
		var stDt = '';
		var edDt = '';
		$.each(list, function (idx, row) {
			if (row.userNm) names.push(row.userNm);
			if (row.tripStDt && (!stDt || row.tripStDt < stDt)) stDt = row.tripStDt;
			if (row.tripEdDt && (!edDt || row.tripEdDt > edDt)) edDt = row.tripEdDt;
		});
		var travelerTxt = names.length === 0 ? '' : (names.length === 1 ? names[0] : names[0] + '외 ' + (names.length - 1) + '명');
		var period = (stDt && edDt) ? stDt + '~' + edDt : '';

		var info = tripPlace + ', ' + clntPjtNm + ', ' + tripDivNm;
		var msg = '내용 : [출장복명서, ' + info + '] ' + sanctnDiv2 + ' 요청 건';
		msg += '\n업무 : ' + info + ', ' + period + ' ' + travelerTxt;
		var tripResult = $('#tripResult').val() || '';
		if (tripResult) {
			msg += '\n' + tripResult;
		}
		msg += '\n\n요청일시 : #{sendDt}';			//수신자 loop에서 치환됨
		msg += '\n요청자 : ' + jwt.userNm;
		msg += '\n\n' + sanctnDiv2 + ' 확인 바랍니다.';
		msg += '\n\n' + clntNm + '/' + teleNo;
		return msg;
	}

	//to-do결재요청 알림톡
	function commKaKaoSendTodo(param) {
		//알림톡수신번호 채번
		var maxMessageId = null;			//message id(unique key)
		var talkMessage = null;				//발송될 내용 template
		var mobile = null;					//수신인 휴대전화번호
		var todoDiv2CodeNm = null;
		var sendList = [];
		let talkParam = {};
		let talkBody = {};
		let sendCnt = 0;
		postAjaxSync("/user/bm/bm18/selectMaxMessageIdTodo", param, null, function (data) {
			if (data.resultList.length > 0) {
				if (data.resultList[0].maxMessageId != "") {
					sendList = data.resultList;
				} else {
					alert("알림톡 발송을 위한 messageId 생성에 실패 했습니다.");
					return;
				}
			}
		});

		//대상 loop
		$.each(sendList, function (key, sendObj) {
			maxMessageId = sendObj.maxMessageId;
			talkMessage = sendObj.messageDesc;
			mobile = sendObj.telNo;
			//로그용
			param.rcvId = sendObj.todoId;			//todo 수신id
			param.rcvNm = sendObj.name;				//todo 수신자명
			param.nameTo = sendObj.name;			//todo 수신자명
			todoDiv2CodeNm = sendObj.todoTitl;
			param.todoDiv2CodeNm = todoDiv2CodeNm;
			param.sendDt = sendObj.sendDt;

			if (mobile == "" || mobile == null) {
				alert('수신전화번호가 없습니다.\r\n[' + sendObj.name + '] 사용자의 전화번호를 확인해 주십시오.');
				return;
			}
			if ((talkMessage == "" || talkMessage == null) && !param.customMessage) {
				alert('발송할 내용이 없습니다.\r\n알림톡템플릿관리를 확인해 주십시오.');
				return;
			}
			//message 치환 (customMessage가 있으면 화면에서 조립한 본문 사용, 제목은 기존 그대로)
			let message = param.customMessage ? param.customMessage : talkMessage;
			let splitStr = Array.from(message.matchAll('\\{(.*?)\\}'), match => `${match[0]}`);
			$.each(splitStr, function (key2, val) {
				let compKey = val.substring(1, val.length - 1);
				if (compKey != "" && compKey != "undefined") {
					if (typeof (param[compKey]) != "undefined") {
						let val2 = '#' + val;
						message = message.replaceAll(val2, param[compKey]);
					}
				}
			});

			talkParam.authToken = "e/eDfZOFCsrBqadaECQ0+g==";
			talkParam.serverName = "gyitt2400";
			talkParam.paymentType = "P";
			talkBody.service = "2310086157";			//서비스번호
			talkBody.messageId = maxMessageId;			//고객사에서 관리하는 메시지No - 40byte (unique 값)
			talkBody.title = param.title;				//알림톡 타이틀
			talkBody.message = message;					//알림톡 메시지 (1000 byte)
			talkBody.mobile = mobile;					//휴대전화번호
			talkBody.template = "10003";				//템플릿관리화면 템플릿ID
			let talkJson = JSON.stringify(talkBody);
			sendCnt = kakaoSendReal(talkJson, talkParam, param);
		});
		//대상 loop end
		if (sendCnt > 0) {
			kakaoCnt++;
		}
	}

	function gridResize(gridObj, size) {
		var gridName = '';
		if (gridObj && gridObj.target) {
			if (gridObj.target.$target && gridObj.target.$target.get(0)) {
				gridName = gridObj.target.$target.attr('data-ax5grid') || '';
			} else if (gridObj.target.config && gridObj.target.config.target) {
				gridName = $(gridObj.target.config.target).attr('data-ax5grid') || '';
			}
		}
		// ax5grid 초기화 직후에는 $target/config.target이 아직 없을 수 있으므로
		// 래퍼에 보관한 selector를 기준으로도 그리드를 식별한다.
		if (!gridName && gridObj && gridObj.gridTargetSelector) {
			gridName = $(gridObj.gridTargetSelector).attr('data-ax5grid') || '';
		}
		if (!gridObj || !gridObj.target || !gridObj.target.setHeight) return;
		if (size === undefined || size === null) {
			size = gridObj.target.getList ? gridObj.target.getList().length : 0;
		}

		var tagHeight;
		if (gridName === 'approval_grid_modal' || gridName === 'approval_grid_mng_modal') {
			tagHeight = (size || 0) * 26 + 78; // 가로 스크롤바 영역 18px 보정
			tagHeight = tagHeight < 100 ? 100 : tagHeight;
			tagHeight = tagHeight > 260 ? 260 : tagHeight;
		} else {
			tagHeight = (size) * 27 + 115;
			tagHeight = tagHeight > 750 ? 750 : tagHeight;
			tagHeight = tagHeight < 140 ? 140 : tagHeight;
		}
		gridObj.target.setHeight(tagHeight);
	}
