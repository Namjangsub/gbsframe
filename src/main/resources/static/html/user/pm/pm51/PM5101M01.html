<script type="text/javascript">

	function formatApprovalStatus(totCnt, doneCnt, stsNm) {
		var tot = Number(totCnt || 0);
		var nm = stsNm || "미상신";
		if (tot === 0) nm = "결재자없음";
		var done = Number(doneCnt || 0);
		var color = "red";

		if (tot === 0) {
			color = "red";
		} else if (tot > 0 && done === 0) {
			color = "gray";
		} else if (tot > 0 && done > 0 && done < tot) {
			color = "green";
		} else if (tot > 0 && done === tot) {
			color = "blue";
		}

		return '<i class="fas fa-circle" style="color: ' + color + ';" title="' + nm + '"></i>';
	}

	var gridView = {
		initView: function () {
			this.target = new ax5.ui.grid();
			this.target.setConfig({
				target: $('[data-ax5grid="grid"]'),
				showRowSelector: true,
				multipleSelect: false,
				sortable: true,
				showLineNumber: true,
				frozenColumnIndex: 5,
				header: {
					align: "center",
					selector: true
				},
				body: {
					onClick: function () {
						this.self.select(this.dindex);
					},
					onDBLClick: function () {
						updateTripReqModal(this.item.tripReqNo);
					}
				},
				page: {
					display: false
				},
				columns: [
					{ key: "tripStDtm", label: "출장일자", width: 80, align: "center", formatter: function() {
						if (!this.value) return "";
						var val = this.value.replace(/[^0-9]/g, "");
						if (val.length >= 8) return val.substring(0, 4) + "-" + val.substring(4, 6) + "-" + val.substring(6, 8);
						return this.value;
					}},
					{ key: "clntNm", label: "고객사", width: 150, align: "left" },
					{ key: "clntPjtNm", label: "프로젝트", width: 80, align: "left" },
					{ key: "tripDivNm", label: "구분", width: 50, align: "center" },
					{ key: "tripPeriod", label: "출장기간", width: 150, align: "center", formatter: function() {
						if (!this.value) return "";
						var parts = this.value.split("~");
						var res = [];
						parts.forEach(function(p) {
							var val = p.replace(/[^0-9]/g, "");
							if (val.length >= 8) {
								res.push(val.substring(0,4) + "-" + val.substring(4,6) + "-" + val.substring(6,8));
							} else {
								res.push(p);
							}
						});
						return res.join(" ~ ");
					}},
					{
						key: "aprvStsNm", label: "결재상태", width: 70, align: "center",
						formatter: function() {
							return formatApprovalStatus(this.item.appTotCnt, this.item.appDoneCnt, this.item.aprvStsNm);
						}
					},
					{
						key: "tripRptYn", label: "복명서", width: 60, align: "center",
						formatter: function() {
							var val = this.item.tripRptYn || 'N';
							if (val === 'N') {
								return '<i class="fas fa-circle" style="color: red;" title="N"></i>';
							} else {
								return '<i class="fas fa-circle" style="color: blue;" title="Y"></i>';
							}
						}
					},
					{ key: "payAprvStsNm", label: "지급결재", width: 70, align: "center",
						formatter: function() {
							return formatApprovalStatus(this.item.payAppTotCnt, this.item.payAppDoneCnt, this.item.payAprvStsNm);
						}
					},
					{ key: "tripTypeCdsNm", label: "유형", width: 90, align: "left" },
					{ key: "travelerList", label: "출장자", width: 100, align: "left" },
					{ key: "tripPlace", label: "출장지", width: 150, align: "left" },
					{ key: "salesCd", label: "SalesCd", width: 110, align: "center" },
					{ key: "equipNm", label: "장비명", width: 120, align: "left" },
					{ key: "currCdNm", label: "통화단위", width: 70, align: "center" },
					{ key: "payDt", label: "지급일자", width: 80, align: "center" },
					{ key: "payNm", label: "지급담당", width: 70, align: "center" },
					{ key: "tripReqNo", label: "출장신청서번호", width: 120, align: "center" },
				]
			});

			return this;
		},

		setData: function (_pageNo) {
			var targetObj = this.target;
			var formData = {
				"pageNo": _pageNo + 1,
			};

			$.each($('#main_area [data-search]'), function (idx, elem) {
				var val = elem.value;
				// 날짜는 하이픈 제거
				if ($(elem).hasClass("input_calendar")) {
					val = deleteHyphenStr(val);
				}
				formData[$(elem).data('search')] = val;
			});

			postAjax("/user/pm/pm51/selectTripReqList", formData, null, function (data) {
				try {
					var list = data.result || [];
					if (list) {
						targetObj.setData({
							list: list,
							page: { totalElements: list.length }
						});
					}
				} catch (error) {
					customAlert("오류 발생!! 전산실 연락 바랍니다: " + error.message);
				}
			});
		}
	}

	$(document).ready(function () {
		mainDefaultLoad("생산관리", "출장신청서");
		setCommonSelect($("#main_area select[data-kind]"));
		authChk();

		// 시작일/종료일 셋팅 (당월)
		$('#srchStDt_S').val(moment(new Date()).startOf("month").format("YYYY-MM-DD"));
		$('#srchEdDt_S').val(moment(new Date()).endOf("month").format("YYYY-MM-DD"));
		$('#coCd_S').val(jwt.coCd || $('#coCd_S').val());

		// 날짜 범위 선택기
		$('#srchStDt_S, #srchEdDt_S').on('click', function () {
			DateRangePicker.open({
				startDt: $('#srchStDt_S').val() || null,
				endDt: $('#srchEdDt_S').val() || null,
				excludeSelectors: ['#srchStDt_S', '#srchEdDt_S'],
				onApply: function (sd, ed) {
					$('#srchStDt_S').val(sd);
					$('#srchEdDt_S').val(ed);
					gridView.setData(0);
				}
			});
		});

		// 검색조건 변경 시 자동 검색
		$('[data-search]').on("change", function () {
			gridView.setData(0);
		});

		gridView.initView().setData(0);
	});

	// 초기화
	function initSearch() {
		$(".contents.search input[type='text']").val("");
		$("#tripDiv_S").val("");
		$("#aprvStsCd_S").val("");
		$("#srchStDt_S").val(dateToStr(moment(new Date()).startOf("month").toDate()));
		$("#srchEdDt_S").val(dateToStr(moment(new Date()).endOf("month").toDate()));
		gridView.setData(0);
	}

	// 신규 팝업
	function insertTripReqModal() {
		var paramObj = {
			"actionType": "C",
			"pgmId": "PM5101P01"
		};
		openModal("/static/html/user/pm/pm51/PM5101P01.html", 1700, 860, "출장신청서 등록", paramObj, function (data) {
			gridView.setData(0);
		});
	}

	// 수정 팝업
	function updateTripReqModal(tripReqNo) {
		var paramObj = {
			"actionType": "U",
			"tripReqNo": tripReqNo,
			"pgmId": "PM5101P01"
		};
		openModal("/static/html/user/pm/pm51/PM5101P01.html", 1700, 860, "출장신청서 수정", paramObj, function (data) {
			gridView.setData(0);
		});
	}

	// 삭제
	function deleteTripReq() {
		var row = getSelectedTripReqRow("삭제할 행을 선택해주세요.");
		if (!row) return;

		// 1. 1명이라도 결재처리를 완료한 신청서는 삭제 불가
		if (row.appDoneCnt > 0) {
			alert("결재처리가 이미 진행중이거나 완료된 출장신청서는 삭제할 수 없습니다.");
			return;
		}

		// 2. 복명서가 작성된 경우 삭제 불가 처리
		if (row.tripRptYn === 'Y') {
			alert("이미 복명서가 작성된 출장신청서는 삭제할 수 없습니다.");
			return;
		}

		// 3. 본인이 작성/신청한 문서인지 확인 (관리자 예외 처리 필요시 수정)
		if (jwt.userId !== row.creatId && jwt.userId !== row.reqId) {
			alert("본인이 작성하거나 신청한 출장신청서만 삭제할 수 있습니다.");
			return;
		}

		if (!confirm("선택한 출장신청서를 삭제하시겠습니까?")) return;

		var paramObj = {
			"tripReqNo": row.tripReqNo,
			"pgmId": "PM5101M01",
			"userId": jwt.userId
		};

		putAjax("/user/pm/pm51/deleteTripReq", paramObj, null, function (data) {
			alert(data.resultMessage);
			if (data.resultCode === 200) {
				gridView.setData(0);
			}
		});
	}

	// 복명서 작성
	function createReportModal() {
		var selectedRows = gridView.target.getList("selected");
		if (!selectedRows || selectedRows.length === 0) {
			alert("복명서 작성/수정할 행을 선택해주세요.");
			return;
		}

		if (selectedRows.length > 1) {
			alert("한 건만 선택해주세요.");
			return;
		}

		var row = selectedRows[0];
		if (!row.tripRptNo) {
			postAjax("/user/pm/pm51/selectTripRptList", { tripReqNo: row.tripReqNo }, null, function (data) {
				var rpt = data.result && data.result.length ? data.result[0] : null;
				if (rpt && rpt.tripRptNo) {
					openModal("/static/html/user/pm/pm51/PM5102P01.html", 1600, 860, "출장복명서 수정", {
						actionType: "U",
						tripRptNo: rpt.tripRptNo,
						pgmId: "PM5102P01"
					}, function () {
						gridView.setData(0);
					});
				} else {
					openModal("/static/html/user/pm/pm51/PM5102P01.html", 1600, 860, "출장복명서 등록", {
						actionType: "C",
						tripReqNo: row.tripReqNo
					}, function () {
						gridView.setData(0);
					});
				}
			});
			return;
		}
		if (row.tripRptNo) {
			// 이미 복명서가 작성된 경우 -> 수정 모드로 진입
			var openReport = function (tripRptNo) {
				openModal("/static/html/user/pm/pm51/PM5102P01.html", 1600, 860, "출장복명서 수정", {
					actionType: "U",
					tripRptNo: tripRptNo,
					pgmId: "PM5102P01"
				}, function () {
					gridView.setData(0);
				});
			};
			if (row.tripRptNo) openReport(row.tripRptNo);
			else postAjax("/user/pm/pm51/selectTripRptList", { tripReqNo: row.tripReqNo }, null, function (data) {
				var rpt = data.result && data.result.length ? data.result[0] : null;
				if (rpt && rpt.tripRptNo) openReport(rpt.tripRptNo);
				else alert("출장복명서 정보를 찾을 수 없습니다.");
			});
		} else {
			// 복명서가 작성되지 않은 경우 -> 신규 등록 모드로 진입
			openModal("/static/html/user/pm/pm51/PM5102P01.html", 1600, 860, "출장복명서 등록", {
				actionType: "C",
				tripReqNo: row.tripReqNo
			}, function () {
				gridView.setData(0);
			});
		}
	}

	function isAccountingUser() {
		var deptId = jwt.deptId || '';
		return deptId.substring(0, 5) === 'GUN20' || deptId.substring(0, 5) === 'GUN80';
	}

	function getSelectedTripReqRow(msg) {
		var selectedRows = gridView.target.getList("selected");
		if (!selectedRows || selectedRows.length === 0) {
			alert(msg || "처리할 행을 선택해주세요.");
			return null;
		}
		return selectedRows[0];
	}

	function updatePayDone() {
		if (!isAccountingUser()) {
			alert("회계팀만 지급완료 처리할 수 있습니다.");
			return;
		}
		var row = getSelectedTripReqRow("지급완료 처리할 행을 선택해주세요.");
		if (!row) return;
		if (row.payDt) {
			alert("이미 지급완료 처리된 출장신청서입니다.");
			return;
		}

		openModal("/static/html/user/pm/pm51/PM5101P01.html", 1700, 860, "출장신청서 지급처리", {
			actionType: "PAY",
			tripReqNo: row.tripReqNo
		}, function () {
			gridView.setData(0);
		});
	}

	function updatePayCancel() {
		if (!isAccountingUser()) {
			alert("회계팀만 지급완료 취소할 수 있습니다.");
			return;
		}
		var row = getSelectedTripReqRow("지급완료 취소할 행을 선택해주세요.");
		if (!row) return;
		if (!row.payDt) {
			alert("지급완료 처리된 출장신청서가 아닙니다.");
			return;
		}
		if (!confirm("지급완료를 취소하시겠습니까?")) return;

		putAjax("/user/pm/pm51/updateTripReqPayCancel", {
			tripReqNo: row.tripReqNo,
			userId: jwt.userId,
			deptId: jwt.deptId || '',
			pgmId: "PM5101M01"
		}, null, function (data) {
			alert(data.resultMessage);
			if (data.resultCode === 200) gridView.setData(0);
		});
	}

	// 출력
	function printTripReqM01() {
		var selectedRows = gridView.target.getList("selected");
		if (selectedRows.length === 0) {
			alert("출력할 항목을 선택해주세요.");
			return;
		}

		if (selectedRows.length > 1) {
			alert("출력은 1건씩 가능합니다.");
			return;
		}

		var row = selectedRows[0];

		var fileName = "PM5101R01.jrf";
		var arg = "coCd#" + jwt.coCd
				+ "#tripReqNo#" + row.tripReqNo
				+ "#";

		callReport(fileName, arg, 1150, 720, '출장신청서');
	}

	// 엑셀 다운로드
	function excelDown() {
		var paramObj = { "pageNo": 1, "recordCnt": 9999999 };
		$.each($('[data-search]'), function (idx, elem) {
			var val = elem.value;
			if ($(elem).hasClass("input_calendar")) {
				val = deleteHyphenStr(val);
			}
			paramObj[$(elem).data("search")] = val;
		});

		postAjax("/user/pm/pm51/selectTripReqList", paramObj, null, function (data) {
			var list = data.result || [];
			var excelData = [];

			list.forEach(row => {
				excelData.push({
					신청번호: row.tripReqNo,
					출장일자: (function(v) {
						if (!v) return "";
						var val = v.replace(/[^0-9]/g, "");
						if (val.length >= 8) return val.substring(0, 4) + "-" + val.substring(4, 6) + "-" + val.substring(6, 8);
						return v;
					})(row.tripStDtm),
					고객사: row.clntNm,
					프로젝트: row.clntPjtNm,
					SalesCd: row.salesCd,
					구분: row.tripDivNm,
					유형: row.tripTypeCdsNm,
					출장자: row.travelerList,
					출장지: row.tripPlace,
					장비명: row.equipNm,
					출장기간: (function(v) {
						if (!v) return "";
						var parts = v.split("~");
						var res = [];
						parts.forEach(function(p) {
							var val = p.replace(/[^0-9]/g, "");
							if (val.length >= 8) {
								res.push(val.substring(0,4) + "-" + val.substring(4,6) + "-" + val.substring(6,8));
							} else {
								res.push(p);
							}
						});
						return res.join(" ~ ");
					})(row.tripPeriod),
					통화단위: row.currCdNm,
					결재상태: (row.appTotCnt === 0) ? "결재자없음" : row.aprvStsNm,
					복명서여부: row.tripRptYn
				});
			});

			var wb = XLSX.utils.book_new();
			var ws = XLSX.utils.json_to_sheet(excelData);
			XLSX.utils.book_append_sheet(wb, ws, "출장신청서");
			var todayDate = new Date().format('yyyyMMddHHmmss');
			XLSX.writeFile(wb, "출장신청서_" + todayDate + ".xlsx");
		});
	}

</script>
