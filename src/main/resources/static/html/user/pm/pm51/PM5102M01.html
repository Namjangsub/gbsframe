						<td>
							<div class="date_input" style="display:flex;align-items:center;gap:0px;">

						<th>결재상태</th>

						</td>

					<tr>
						<th>출장자명</th>

		<!-- 버튼 영역 -->
		<div class="contents no_bg">
			<div class="contents_tit">
				<span style="height: 30px; line-height: 30px;font-size: 15px;margin-left: 15px">출장복명서 목록</span>
				<span style="margin-left: 15px; font-size: 12px; color: #666;">
					[결재상태: 
					<i class="fas fa-circle" style="color: red;"></i> 결재자없음
					<i class="fas fa-circle" style="color: gray; margin-left: 5px;"></i> 결재신청
					<i class="fas fa-circle" style="color: green; margin-left: 5px;"></i> 결재진행중

					<a onclick="printTripRptM01();" style="height: 30px; line-height: 28px; width: 120px;" title="출장복명서가 출력됩니다."><i class="fas fa-print"></i>출장복명서출력</a>
					<a onclick="excelDown();" style="height: 30px; line-height: 28px; width: 90px;"><i class="fas fa-file-excel"></i>엑셀다운로드</a>

				<select id="recordCnt_S" name="recordCnt_S" class="prae_select" data-search="recordCnt" onchange="gridView.setData(0);">

		<!-- 그리드 -->

	<!-- 복명대상 신청서 선택 모달 (숨김 상태) -->
	<div id="selectReqModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
		<div style="background: white; width: 800px; max-height: 90vh; border-radius: 4px; display: flex; flex-direction: column; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
			<div style="padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;">
				<h4 style="margin: 0;">복명대상 신청서 선택</h4>
				<button type="button" onclick="closeSelectReqModal();" style="background: none; border: none; font-size: 20px; cursor: pointer;">&times;</button>
			</div>
			<div style="flex: 1; overflow-y: auto; padding: 10px;">
				<div class="ax5_grid" data-ax5grid="selectReqGrid" data-ax5grid-config="{}" style="height: 400px; width: 100%;"></div>
			</div>
			<div style="padding: 10px; border-top: 1px solid #ddd; text-align: right;">
				<button type="button" onclick="confirmSelectReq();" class="btn btn-primary" style="margin-right: 5px;">선택</button>
				<button type="button" onclick="closeSelectReqModal();" class="btn btn-default">취소</button>
			</div>
		</div>

<script type="text/javascript">

	function formatApprovalStatus(totCnt, doneCnt, stsNm) {
		var tot = totCnt || 0;
		var nm = stsNm || "미상신";
		if (tot === 0) nm = "결재자없음";
		var done = doneCnt || 0;
		var color = "red";

		if (tot === 0) {
			color = "red";
		} else if (tot > 0 && done === 0) {
			color = "gray";
		} else if (tot > 0 && done > 0 && done < tot) {
			color = "green";
		} else if (tot > 0 && done === tot) {
			color = "blue";
		}

		return '<i class="fas fa-circle" style="color: ' + color + ';" title="' + nm + '"></i>';
	}

	var gridView = {
		initView: function () {
			this.target = new ax5.ui.grid();
			this.target.setConfig({
				target: $('[data-ax5grid="grid"]'),
				showRowSelector: true,
				multipleSelect: false,
				sortable: true,
				header: {
					align: "center",
					selector: true
				},
				body: {
					onClick: function () {
						this.self.select(this.dindex);
					},
					onDBLClick: function () {
						if (this.item && this.item.tripRptNo) {
							updateTripRptModal(this.item.tripRptNo);
						}
					}
				},
				page: { display: false },
				columns: [
					{ key: "rptDt", label: "복명서일자", width: 80, align: "center", formatter: function() {
						if (!this.value) return "";
						var val = this.value.replace(/[^0-9]/g, "");
						if (val.length >= 8) return val.substring(0, 4) + "-" + val.substring(4, 6) + "-" + val.substring(6, 8);
						return this.value;
					}},
					{ key: "clntNm", label: "고객사", width: 150, align: "left" },
					{ key: "clntPjtNm", label: "프로젝트", width: 80, align: "left" },
					{ key: "tripDivNm", label: "구분", width: 60, align: "center" },
					{ key: "actPeriod", label: "출장기간", width: 150, align: "center", formatter: function() {
						if (!this.value) return "";
						var parts = this.value.split("~");
						var res = [];
						parts.forEach(function(p) {
							var val = p.replace(/[^0-9]/g, "");
							if (val.length >= 8) {
								res.push(val.substring(0,4) + "-" + val.substring(4,6) + "-" + val.substring(6,8));
							} else {
								res.push(p);
							}
						});
						return res.join(" ~ ");
					}},
					{ 
						key: "aprvStsNm", label: "결재상태", width: 70, align: "center",
						formatter: function() {
							return formatApprovalStatus(this.item.appTotCnt, this.item.appDoneCnt, this.item.aprvStsNm);
						}
					},
					{ key: "tripTypeCdsNm", label: "유형", width: 100, align: "left" },
					{ key: "travelerList", label: "출장자", width: 100, align: "left" },
					{ key: "tripPlace", label: "출장지", width: 150, align: "left" },
					{ key: "salesCd", label: "SalesCd", width: 120, align: "center" },
					{ key: "equipNm", label: "장비명", width: 120, align: "left" },
					{ key: "currCdNm", label: "통화단위", width: 80, align: "center" },
					{ key: 'settleAmtKrw', label: '정산(KRW)', width: 100, align: 'right', formatter: "money" },
					{ key: 'settleAmtUsd', label: '정산(USD)', width: 100, align: 'right', formatter: "money" },
					{ key: 'finalEvalNm', label: '평가', width: 60, align: 'center' },
					{ key: 'tripRptNo', label: '복명번호', width: 120, align: 'center' },
					{ key: 'tripReqNo', label: '신청번호', width: 120, align: 'center' }
				]
			});

			return this;
		},

		setData: function (_pageNo) {
			var targetObj = this.target;
			var formData = {
				"pageNo": _pageNo + 1,
			};

			$.each($('#main_area [data-search]'), function (idx, elem) {
				var val = elem.value;
				if ($(elem).hasClass("input_calendar")) {
					val = deleteHyphenStr(val);
				}
				formData[$(elem).data('search')] = val;
			});

			postAjax("/user/pm/pm51/selectTripRptList", formData, null, function (data) {
				try {
					var list = data.result || [];
					list = list.map(function(row) {
						row.travelerList = row.travelerList || '-';
						row.actPeriod = (row.actStDtm || '').substring(0, 8) + ' ~ ' + (row.actEdDtm || '').substring(0, 8);
						return row;
					});

					targetObj.setData({
						list: list,
						page: { totalElements: list.length }
					});
				} catch (error) {
					customAlert("Grid data load failed: " + error.message);
				}
			});
		}
	}


	var selectReqGridView = null;

	$(document).ready(function () {
		mainDefaultLoad("생산관리", "출장복명서");
		setCommonSelect($("#main_area select[data-kind]"));
		authChk();

		// 시작일/종료일 셋팅 (당월)
		$('#srchStDt_S').val(moment(new Date()).startOf("month").format("YYYY-MM-DD"));
		$('#srchEdDt_S').val(moment(new Date()).endOf("month").format("YYYY-MM-DD"));

		// 날짜 범위 선택기
		$('#srchStDt_S, #srchEdDt_S').on('click', function () {
			DateRangePicker.open({
				startDt: $('#srchStDt_S').val() || null,
				endDt: $('#srchEdDt_S').val() || null,
				excludeSelectors: ['#srchStDt_S', '#srchEdDt_S'],
				onApply: function (sd, ed) {
					$('#srchStDt_S').val(sd);
					$('#srchEdDt_S').val(ed);
					gridView.setData(0);
				}
			});
		});

		// 검색조건 변경 시 자동 검색
		$('[data-search]').on("change", function () {
			gridView.setData(0);
		});

		gridView.initView().setData(0);
	});

	// 초기화
	function initSearch() {
		$(".contents.search input[type='text']").val("");
		$("#tripDiv_S").val("");
		$("#aprvStsCd_S").val("");
		$("#srchStDt_S").val(dateToStr(moment(new Date()).startOf("month").toDate()));
		$("#srchEdDt_S").val(dateToStr(moment(new Date()).endOf("month").toDate()));
		gridView.setData(0);
	}

	// 신규 팝업 - 복명대상 선택 모달
	function insertTripRptModal() {
		// 복명대상 신청서 조회
		postAjax("/user/pm/pm51/selectTripReqForRpt", { coCd: jwt.coCd }, null, function (data) {
			try {
				var list = data.result || [];
				if (list.length === 0) {
					alert("복명 대상 신청서가 없습니다.");
					return;
				}

				// 선택 그리드 초기화 및 표시
				initSelectReqGrid();
				selectReqGridView.setData({
					list: list,
					page: { totalElements: list.length }
				});
				$('#selectReqModal').css('display', 'flex');
			} catch (error) {
				customAlert("오류 발생: " + error.message);
			}
		});
	}

	// 선택 모달 그리드 초기화
	function initSelectReqGrid() {
		selectReqGridView = new ax5.ui.grid();
		selectReqGridView.setConfig({
			target: $('[data-ax5grid="selectReqGrid"]'),
			showRowSelector: true,
			multipleSelect: false,
			sortable: true,
			header: {
				align: "center",
				selector: true
			},
			body: {
				onClick: function () {
					this.self.select(this.dindex);
				},
				onDBLClick: function () {
					this.self.select(this.dindex);
					confirmSelectReq();
				}
			},
			page: { display: false },
			columns: [
				{ key: 'tripReqNo', label: '신청번호', width: 120, align: 'center' },
				{ key: 'tripDiv', label: '구분', width: 80, align: 'center' },
				{ key: 'tripPlace', label: '출장지', width: 150, align: 'left' },
				{ key: 'equipNm', label: '설비명', width: 120, align: 'left' },
				{ key: 'tripPeriod', label: '기간', width: 150, align: 'center' }
			]
		});
	}

	// 선택 모달 닫기
	function closeSelectReqModal() {
		$('#selectReqModal').css('display', 'none');
		selectReqGridView = null;
	}

	// 선택 확인
	function confirmSelectReq() {
		var selectedRows = selectReqGridView ? selectReqGridView.getList("selected") : [];
		if (!selectedRows || selectedRows.length === 0) {
			alert("신청서를 선택해주세요.");
			return;
		}

		if (selectedRows.length > 1) {
			alert("1건만 선택해주세요.");
			return;
		}

		var selectedRow = selectedRows[0];
		closeSelectReqModal();

		// PM5102P01 팝업 열기
		var paramObj = {
			"actionType": "C",
			"tripReqNo": selectedRow.tripReqNo,
			"pgmId": "PM5102P01"
		};
		openModal("/static/html/user/pm/pm51/PM5102P01.html", 1400, 860, "출장복명서 등록", paramObj, function (data) {
			gridView.setData(0);
		});
	}

	// 수정 팝업
	function updateTripRptModal(tripRptNo) {
		var paramObj = {
			"actionType": "U",
			"tripRptNo": tripRptNo,
			"pgmId": "PM5102P01"
		};
		openModal("/static/html/user/pm/pm51/PM5102P01.html", 1400, 860, "출장복명서 수정", paramObj, function (data) {
			gridView.setData(0);
		});
	}

	// 삭제
	function deleteTripRptM01() {
		var selectedRows = gridView.target.getList("selected");
		if (selectedRows.length === 0) {
			alert("삭제할 항목을 선택해주세요.");
			return;
		}

		if (selectedRows.length > 1) {
			alert("삭제는 1건씩 가능합니다.");
			return;
		}

		var row = selectedRows[0];
		
		if (row.appTotCnt > 0) {
			alert("결재가 진행중이거나 완료된 복명서는 삭제할 수 없습니다.");
			return;
		}

		if (!confirm("선택한 출장복명서를 삭제하시겠습니까?")) return;

		var param = {
			tripRptNo: row.tripRptNo,
			fileTrgtKey: row.tripRptNo,
			userId: jwt.userId
		};

		putAjax("/user/pm/pm51/deleteTripRpt", param, null, function(data) {
			if (data.resultCode == 200) {
				alert(data.resultMessage);
				gridView.setData(0);
			} else {
				alert(data.resultMessage);
			}
		});
	}

	// 출력
	function printTripRptM01() {
		var selectedRows = gridView.target.getList("selected");
		if (selectedRows.length === 0) {
			alert("출력할 항목을 선택해주세요.");
			return;
		}

		if (selectedRows.length > 1) {
			alert("출력은 1건씩 가능합니다.");
			return;
		}

		var row = selectedRows[0];
		
		var fileName = "PM5102R01.jrf";
		var arg = "coCd#" + jwt.coCd
				+ "#tripRptNo#" + row.tripRptNo
				+ "#";

		callReport(fileName, arg, 1150, 720, '출장복명서');
	}

	// 엑셀 다운로드
	function excelDown() {
		var paramObj = { "pageNo": 1, "recordCnt": 9999999 };
		$.each($('[data-search]'), function (idx, elem) {
			var val = elem.value;
			if ($(elem).hasClass("input_calendar")) {
				val = deleteHyphenStr(val);
			}
			paramObj[$(elem).data("search")] = val;
		});

		postAjax("/user/pm/pm51/selectTripRptList", paramObj, null, function (data) {
			var list = data.result || [];
			var excelData = [];

			list.forEach(row => {
				excelData.push({
					복명번호: row.tripRptNo,
					신청번호: row.tripReqNo,
					구분: row.tripDiv,
					출장자: row.travelerList || '-',
					"실제기간": (row.actStDtm || '').substring(0, 8) + ' ~ ' + (row.actEdDtm || '').substring(0, 8),
					경비합계: row.totalAmt,
					정산결과: row.settleAmt,
					최종평가: row.finalEvalCd,
					결재상태: row.aprvStsCd
				});
			});

			var wb = XLSX.utils.book_new();
			var ws = XLSX.utils.json_to_sheet(excelData);
			XLSX.utils.book_append_sheet(wb, ws, "출장복명서");
			var todayDate = new Date().format('yyyyMMddHHmmss');
			XLSX.writeFile(wb, "출장복명서_" + todayDate + ".xlsx");
		});
	}

</script>
