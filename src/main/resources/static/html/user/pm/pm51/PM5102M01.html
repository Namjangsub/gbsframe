<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=0.6, user-scalable=no">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/bootstrap/css/bootstrap-theme.min.css">
<link rel="stylesheet" href="/static/bootstrap/css/dashboard.css">
<link rel="stylesheet" href="/static/bootstrap/css/bootstrap-datepicker.css">
<link rel="stylesheet" href="/static/fontawesome/css/all.css">
<link rel="stylesheet" href="/static/css/ax5/ax5mask.css">
<link rel="stylesheet" href="/static/css/ax5/ax5modal.css">
<link rel="stylesheet" href="/static/css/ax5/ax5toast.css">
<link rel="stylesheet" href="/static/css/tui-grid/4.21.22/tui-grid.css">
<link rel="stylesheet" href="/static/css/jstree/style.min.css">
<link rel="stylesheet" href="/static/css/gnb.css">
<link rel="stylesheet" href="/static/css/main.css">
<link rel="stylesheet" href="/static/css/sub.css">
<link rel="stylesheet" href="/static/css/common.css">

<script src="/static/js/jquery-latest.min.js"></script>
<script src="/static/js/jquery.serializeObject.js"></script>
<script src="/static/bootstrap/js/bootstrap.min.js"></script>
<script src="/static/bootstrap/js/bootstrap-datepicker.min.js"></script>
<script src="/static/bootstrap/js/bootstrap-datepicker.ko.min.js"></script>
<script src="/static/js/moment/moment-with-locales.js"></script>
<script src="/static/js/ax5/ax5core.min.js"></script>
<script src="/static/js/ax5/ax5mask.min.js"></script>
<script src="/static/js/ax5/ax5modal.min.js"></script>
<script src="/static/js/ax5/ax5toast.min.js"></script>
<script src="/static/js/tui-grid/4.21.22/tui-grid.min.js"></script>
<script src="/static/js/jstree/jstree.min.js"></script>
<script src="/static/js/global.js"></script>
<script src="/static/js/fileTree.js"></script>
<script src="/static/js/exceljs.min.js"></script>
<script src="/static/js/jquery.blockUI.js"></script>
<script src="/static/js/manualPopup.js"></script>
<script src="/static/js/common/GridColumnConfig.js"></script>
</head>

<body>
	<div id="head_area"></div>
	<div id="top_area"></div>
	<div id="main_area">
		<!-- 페이지 상단 -->
		<div class="contents no_bg">
			<ul class="btn_ul">
				<li class="btn_r">
					<a onclick="manualPopup();"><button type="button" class="bg_gray" onclick="manualPopup();">도움말</button></a>
					<a onclick="initSearch();"><button class="bg_gray">초기화</button></a>
					<a onclick="gridView.setData(0);"><button class="bg_gray">검 색</button></a>
				</li>
			</ul>
		</div>

		<!-- 검색 조건 -->
		<div class="contents search">
			<div class="">
				<table class="table_input type04">
					<tr>
						<th class="hit">기간</th>
						<td>
							<div class="date_input" style="display:flex;align-items:center;gap:0px;">
								<input id="srchStDt" name="srchStDt" class="input_calendar" onkeyup="dateMask(this);" autocomplete="off" msg="시작일자" data-search="srchStDt" placeholder="시작일자">
								<span>~</span>
								<input id="srchEdDt" name="srchEdDt" class="input_calendar" onkeyup="dateMask(this);" autocomplete="off" msg="종료일자" data-search="srchEdDt" placeholder="종료일자">
							</div>
						</td>

						<th>출장구분</th>
						<td>
							<select id="tripDiv" name="tripDiv" data-kind="PM51DIV" data-search="tripDiv">
								<option value="">전체</option>
							</select>
						</td>

						<th>결재상태</th>
						<td>
							<select id="aprvStsCd" name="aprvStsCd" data-search="aprvStsCd">
								<option value="">전체</option>
							</select>
						</td>
					</tr>
					<tr>
						<th>출장자명</th>
						<td>
							<input type="text" id="travelerNm" name="travelerNm" data-search="travelerNm" placeholder="출장자명">
						</td>
						<th colspan="3"></th>
					</tr>
				</table>
				<input type="hidden" id="userId" name="userId">
				<input type="hidden" id="pgmId" name="pgmId" value="PM5102M01">
				<input type="hidden" id="coCd_S" name="coCd_S" data-search="coCd" value="GUN">
			</div>
		</div>

		<!-- 버튼 영역 -->
		<div class="contents no_bg">
			<div class="contents_tit">
				<span style="height: 30px; line-height: 30px;font-size: 15px;margin-left: 15px">출장복명서 목록</span>
				<div class="add_btn_small pdl10">
					<a onclick="insertTripRptModal();" style="height: 30px; line-height: 28px; width: 60px;" authchk>신규</a>
					<a onclick="excelDown();" style="height: 30px; line-height: 28px; width: 90px;"><i class="fas fa-file-excel"></i>엑셀다운로드</a>
				</div>
				<select id="recordCnt" class="prae_select" data-search="recordCnt" onchange="gridView.setData(0);">
					<option value="25">25</option>
					<option value="50">50</option>
					<option value="100" selected>100</option>
					<option value="9999999">전체</option>
				</select>
			</div>
		</div>

		<!-- 그리드 -->
		<div class="contents">
			<div id="grid" style="height: 700px; width: 100%;"></div>
		</div>
	</div>

	<!-- 복명대상 신청서 선택 모달 (숨김 상태) -->
	<div id="selectReqModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
		<div style="background: white; width: 800px; max-height: 90vh; border-radius: 4px; display: flex; flex-direction: column; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
			<div style="padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;">
				<h4 style="margin: 0;">복명대상 신청서 선택</h4>
				<button type="button" onclick="closeSelectReqModal();" style="background: none; border: none; font-size: 20px; cursor: pointer;">&times;</button>
			</div>
			<div style="flex: 1; overflow-y: auto; padding: 10px;">
				<div id="selectReqGrid" style="height: 100%; width: 100%;"></div>
			</div>
			<div style="padding: 10px; border-top: 1px solid #ddd; text-align: right;">
				<button type="button" onclick="confirmSelectReq();" class="btn btn-primary" style="margin-right: 5px;">선택</button>
				<button type="button" onclick="closeSelectReqModal();" class="btn btn-default">취소</button>
			</div>
		</div>
	</div>
</body>

</html>

<script type="text/javascript">

	var gridView = {
		initView: function () {
			tui.Grid.applyTheme('default', {
				cell: {
					normal: { showVerticalBorder: true, showHorizontalBorder: true, border: '#dcdcdc' },
					header: { showVerticalBorder: true, showHorizontalBorder: true, border: '#dcdcdc', background: '#f7f7f7' }
				}
			});

			this.target = new tui.Grid({
				el: document.getElementById('grid'),
				scrollX: true,
				scrollY: true,
				bodyHeight: 'fitToParent',
				rowHeight: 'auto',
				minRowHeight: 40,
				columns: [
					{ header: '복명번호', name: 'tripRptNo', width: 120, align: 'center' },
					{ header: '신청번호', name: 'tripReqNo', width: 120, align: 'center' },
					{ header: '구분', name: 'tripDiv', width: 80, align: 'center' },
					{ header: '출장자', name: 'travelerList', width: 150, align: 'left' },
					{ header: '실제기간', name: 'actPeriod', width: 120, align: 'center' },
					{ header: '경비합계', name: 'totalAmt', width: 150, align: 'right' },
					{ header: '정산결과', name: 'settleAmt', width: 150, align: 'right' },
					{ header: '최종평가', name: 'finalEvalCd', width: 100, align: 'center' },
					{ header: '결재상태', name: 'aprvStsCd', width: 100, align: 'center' }
				],
				columnOptions: {
					resizable: true,
					frozenCount: 0
				}
			});

			const grid = this.target;

			// 더블클릭 시 상세 팝업
			grid.on('dblclick', (ev) => {
				if (ev.rowKey !== undefined && ev.rowKey !== null) {
					const row = grid.getRow(ev.rowKey);
					if (row) {
						updateTripRptModal(row.tripRptNo);
					}
				}
			});

			return this;
		},

		setData: function (_pageNo) {
			var targetObj = this.target;
			var formData = {
				"pageNo": _pageNo + 1,
			};

			$.each($('#main_area [data-search]'), function (idx, elem) {
				var val = elem.value;
				// 날짜는 하이픈 제거
				if ($(elem).hasClass("input_calendar")) {
					val = deleteHyphenStr(val);
				}
				formData[$(elem).data('search')] = val;
			});

			postAjax("/user/pm/pm51/selectTripRptList", formData, null, function (data) {
				try {
					var list = data.result || [];
					if (list) {
						// 출장자 목록 추가
						list = list.map(row => {
							row.travelerList = row.travelerList || '-';
							row.actPeriod = (row.actStDtm || '').substring(0, 8) + ' ~ ' + (row.actEdDtm || '').substring(0, 8);
							return row;
						});

						targetObj.setData({
							list: list,
							page: {
								totalElements: list.length
							}
						});
					}
				} catch (error) {
					customAlert("오류 발생!! 전산실 연락 바랍니다: " + error.message);
				}
			});
		}
	}

	var selectReqGridView = null;

	$(document).ready(function () {
		mainDefaultLoad("생산관리", "출장복명서");
		setCommonSelect($("#main_area select[data-kind]"));
		authChk();

		// 시작일/종료일 셋팅 (당월)
		$('#srchStDt').val(moment(new Date()).startOf("month").format("YYYY-MM-DD"));
		$('#srchEdDt').val(moment(new Date()).endOf("month").format("YYYY-MM-DD"));

		// 날짜 범위 선택기
		$('#srchStDt, #srchEdDt').on('click', function () {
			DateRangePicker.open({
				startDt: $('#srchStDt').val() || null,
				endDt: $('#srchEdDt').val() || null,
				excludeSelectors: ['#srchStDt', '#srchEdDt'],
				onApply: function (sd, ed) {
					$('#srchStDt').val(sd);
					$('#srchEdDt').val(ed);
					gridView.setData(0);
				}
			});
		});

		// 검색조건 변경 시 자동 검색
		$('[data-search]').on("change", function () {
			gridView.setData(0);
		});

		gridView.initView().setData(0);
	});

	// 초기화
	function initSearch() {
		$(".contents.search input[type='text']").val("");
		$("#tripDiv").val("");
		$("#aprvStsCd").val("");
		$("#srchStDt").val(dateToStr(moment(new Date()).startOf("month").toDate()));
		$("#srchEdDt").val(dateToStr(moment(new Date()).endOf("month").toDate()));
		gridView.setData(0);
	}

	// 신규 팝업 - 복명대상 선택 모달
	function insertTripRptModal() {
		// 복명대상 신청서 조회
		postAjax("/user/pm/pm51/selectTripReqForRpt", { coCd: jwt.coCd }, null, function (data) {
			try {
				var list = data.result || [];
				if (list.length === 0) {
					alert("복명 대상 신청서가 없습니다.");
					return;
				}

				// 선택 그리드 초기화 및 표시
				initSelectReqGrid();
				selectReqGridView.setData({ list: list });
				$('#selectReqModal').css('display', 'flex');
			} catch (error) {
				customAlert("오류 발생: " + error.message);
			}
		});
	}

	// 선택 모달 그리드 초기화
	function initSelectReqGrid() {
		if (selectReqGridView) {
			selectReqGridView.destroy();
		}

		tui.Grid.applyTheme('default', {
			cell: {
				normal: { showVerticalBorder: true, showHorizontalBorder: true, border: '#dcdcdc' },
				header: { showVerticalBorder: true, showHorizontalBorder: true, border: '#dcdcdc', background: '#f7f7f7' }
			}
		});

		selectReqGridView = new tui.Grid({
			el: document.getElementById('selectReqGrid'),
			scrollX: false,
			scrollY: true,
			bodyHeight: 'fitToParent',
			rowHeight: 40,
			columns: [
				{ header: '신청번호', name: 'tripReqNo', width: 120, align: 'center' },
				{ header: '구분', name: 'tripDiv', width: 80, align: 'center' },
				{ header: '출장지', name: 'tripPlace', width: 150, align: 'left' },
				{ header: '장비명', name: 'equipNm', width: 120, align: 'left' },
				{ header: '예상기간', name: 'tripPeriod', width: 150, align: 'center' }
			],
			columnOptions: {
				resizable: true,
				frozenCount: 0
			}
		});
	}

	// 선택 모달 닫기
	function closeSelectReqModal() {
		$('#selectReqModal').css('display', 'none');
		if (selectReqGridView) {
			selectReqGridView.destroy();
			selectReqGridView = null;
		}
	}

	// 선택 확인
	function confirmSelectReq() {
		var selectedRows = selectReqGridView.getCheckedRows();
		if (!selectedRows || selectedRows.length === 0) {
			alert("신청서를 선택해주세요.");
			return;
		}

		if (selectedRows.length > 1) {
			alert("1건만 선택해주세요.");
			return;
		}

		var selectedRow = selectedRows[0];
		closeSelectReqModal();

		// PM5102P01 팝업 열기
		var paramObj = {
			"actionType": "C",
			"tripReqNo": selectedRow.tripReqNo,
			"pgmId": "PM5102P01"
		};
		openModal("/static/html/user/pm/pm51/PM5102P01.html", 1200, 900, "출장복명서 등록", paramObj, function (data) {
			gridView.setData(0);
		});
	}

	// 수정 팝업
	function updateTripRptModal(tripRptNo) {
		var paramObj = {
			"actionType": "U",
			"tripRptNo": tripRptNo,
			"pgmId": "PM5102P01"
		};
		openModal("/static/html/user/pm/pm51/PM5102P01.html", 1200, 900, "출장복명서 수정", paramObj, function (data) {
			gridView.setData(0);
		});
	}

	// 엑셀 다운로드
	function excelDown() {
		var paramObj = { "pageNo": 1, "recordCnt": 9999999 };
		$.each($('[data-search]'), function (idx, elem) {
			var val = elem.value;
			if ($(elem).hasClass("input_calendar")) {
				val = deleteHyphenStr(val);
			}
			paramObj[$(elem).data("search")] = val;
		});

		postAjax("/user/pm/pm51/selectTripRptList", paramObj, null, function (data) {
			var list = data.result || [];
			var excelData = [];

			list.forEach(row => {
				excelData.push({
					복명번호: row.tripRptNo,
					신청번호: row.tripReqNo,
					구분: row.tripDiv,
					출장자: row.travelerList || '-',
					"실제기간": (row.actStDtm || '').substring(0, 8) + ' ~ ' + (row.actEdDtm || '').substring(0, 8),
					경비합계: row.totalAmt,
					정산결과: row.settleAmt,
					최종평가: row.finalEvalCd,
					결재상태: row.aprvStsCd
				});
			});

			var wb = XLSX.utils.book_new();
			var ws = XLSX.utils.json_to_sheet(excelData);
			XLSX.utils.book_append_sheet(wb, ws, "출장복명서");
			var todayDate = new Date().format('yyyyMMddHHmmss');
			XLSX.writeFile(wb, "출장복명서_" + todayDate + ".xlsx");
		});
	}

</script>

</body>
</html>
