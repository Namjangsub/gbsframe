<div id="wbsTaskPopup" class="popup_area of_a" style="width: 100%; height: 100%;">
    <div class="tit_contents">
        <h4 class="tit">▣ 상세 TASK 완료 처리</h4>
    </div>
    <div class="popup_table">
        <form id="popForm">
            <input type="hidden" id="coCd" name="coCd">
            <input type="hidden" id="salesCd" name="salesCd">
            <input type="hidden" id="wbsPlanCodeId" name="wbsPlanCodeId">
            <input type="hidden" id="userId" name="userId">
            <input type="hidden" id="pgmId" name="pgmId" value="WB0701P02">
            
            <div class="ax5_grid" data-ax5grid="popup-grid-task" style="height: 400px; width: 100%;"></div>
        </form>
    </div>
    <div class="popup_bottom_btn">
        <button type="button" class="btn btn-primary" onclick="removeSelectedTasks();">선택 취소</button>
        <button type="button" class="btn btn-primary" onclick="completeSelectedTasks();">선택 완료 처리</button>
        <button type="button" class="btn btn-secondary" onclick="modalStack.close();">닫기</button>
    </div>
</div>

<script type="text/javascript">
    var gridViewTask = {
        initView: function() {
            this.target = new ax5.ui.grid();
            this.target.setConfig({
                showRowSelector: true,
                multipleSelect: true,
                target: $('[data-ax5grid="popup-grid-task"]'),
                header: { align: "center" },
                body: {
	 			    trStyleClass: function () {
	 			        if (!this.item) return "";
	 			        if (this.item.closeYn == "Y") return "grid-font-pupple";
	 			    }
	 		   },
                columns: [
                    {key: "wbsPlanCodeNm", label: "TASK명", width: 160, align: "left"},
                    {key: "wbsPlanMngNm", label: "담당자", width: 60, align: "center"},
                    {key: "wbsPlansDt", label: "계획시작일", width: 80, align: "center"},
                    {key: "wbsPlaneDt", label: "계획종료일", width: 80, align: "center"},
                    {key: "actProg", label: "진행율", width: 50, align: "right", formatter: function() { return (this.value || 0) + "%"; }},
                    {key: "wbsRsltssDt", label: "실적시작일", width: 80, align: "center"},
                    {key: "wbsRsltseDt", label: "실적종료일", width: 80, align: "center"},
                    {key: "wbsRsltsCnts", label: "비고", width: "*", align: "left"},
                    {key: "closeYn", label: "완료", width: 40, align: "center", hidden: true},
                    {key: "planVerNo", label: "VerNo", width: 40, align: "center", hidden: true},
                ]
            });
            return this;
        },
        setData: function() {
            var targetObj = this.target;
            var param = {
                coCd: $("#popForm #coCd").val(),
                salesCd: $("#popForm #salesCd").val(),
                wbsPlanCodeKind: $("#popForm #wbsPlanCodeId").val()
            };
            postAjax("/user/wb/wb07/selectWbsLevel2ListForPop", param, null, function(data) {
            	targetObj.setData({
                    list: data.result,
                    page: { totalElements: data.result.length }
                });
            });
        }
    };

    $(document).ready(function() {
        var paramObj = modalStack.last().paramObj;
        Object.keys(paramObj).forEach(function(key) {
            $("#popForm #" + key).val(paramObj[key]);
        });
        
        gridViewTask.initView().setData();
    });

    function removeSelectedTasks() {
        var selectedList = gridViewTask.target.getList("selected");
        // selectedList에서 closeYn이 Y인 경우만 선택 (이미 완료된 것만 취소 가능)
        selectedList = selectedList.filter(function(item) {
            return item.closeYn === 'Y';
        });

        if (selectedList.length == 0) {
            alert("취소 처리할(완료된) TASK를 선택하세요.");
            return;
        }

        if (!confirm("선택한 " + selectedList.length + "건의 TASK 완료를 취소하시겠습니까?")) {
            return;
        }

        var param = {
            taskList: selectedList.map(function(item) {
                return $.extend({}, item, {
                    rsltsFileTrgtKey: item.rsltsFileTrgtKey || item.rsltsFileTrgtKey,
                    taskId: item.taskId || item.wbsPlanCodeId,
                    planVerNo: item.planVerNo || item.verNo
                });
            }),
            common: {
                coCd: $("#popForm #coCd").val(),
                userId: jwt.userId,
                pgmId: "WB0701P02",
                planVerNo: selectedList[0].planVerNo
            }
        };

        postAjax("/user/wb/wb07/removeActualConfirmedBatch", param, null, function(res) {
            if (res && res.resultCode === 200) {
                alert(res.resultMessage || "선택한 " + (res.successCount || selectedList.length) + "건의 TASK 완료가 취소되었습니다.");
                if (typeof parent.searchData === "function") {
                    parent.searchData(false);
                }
                modalStack.close();
            } else {
                customAlert(res.resultMessage || "처리 중 오류가 발생했습니다.");
            }
        });
    }

    function completeSelectedTasks() {
        var selectedList = gridViewTask.target.getList("selected");
        // selectedList에서 closeYn이 Y인 경우 제외
        selectedList = selectedList.filter(function(item) {
            return item.closeYn !== 'Y';
        });

        if (selectedList.length == 0) {
            alert("완료 처리할 TASK를 선택하세요.");
            return;
        }

        if (!confirm("선택한 " + selectedList.length + "건의 TASK를 완료 처리하시겠습니까?")) {
            return;
        }
        
        var param = {
            taskList: selectedList.map(function(item) {
                // 백엔드 updateWbsLevel2ActGantt에서 기대하는 기본값 처리
                return $.extend({}, item, {
                    rsltsFileTrgtKey: item.rsltsFileTrgtKey || "0",
                    taskId: item.taskId || item.wbsPlanCodeId,
                    planVerNo: item.planVerNo || item.verNo
                });
            }),
            common: {
                coCd: $("#popForm #coCd").val(),
                userId: jwt.userId,
                pgmId: "WB0701P02",
                planVerNo: selectedList[0].planVerNo // 공통 버전 정보
            }
        };

        postAjax("/user/wb/wb07/completeActualConfirmedBatch", param, null, function(res) {
            if (res && res.resultCode === 200) {
                alert(res.resultMessage || "선택한 " + (res.successCount || selectedList.length) + "건의 TASK가 완료 처리되었습니다.");
                // 부모 창의 searchData(false) 호출하여 간트바 새로 그리기
                if (typeof parent.searchData === "function") {
                    parent.searchData(false);
                }
                modalStack.close();
            } else {
                customAlert(res.resultMessage || "처리 중 오류가 발생했습니다.");
            }
        });
    }

</script>
