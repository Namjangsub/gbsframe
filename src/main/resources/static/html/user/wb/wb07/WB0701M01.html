  (function(){
    "use strict";

    /***********************

    const MS = 86400000;
    let AUTO_ZOOM_DONE = false; // 최초 조회 1회만 자동 줌 적용
    const confirmedSalesCd = new Set(); // salesCd별 버전 변경 확인 완료 목록

    function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }
    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    function ymd(d){
      const yy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${yy}-${mm}-${dd}`;
    }
    function parseYMD(s){
      if(!s) return null;
      const parts = String(s).split('-').map(Number);
      if(parts.length !== 3 || parts.some(Number.isNaN)) return null;
      return new Date(parts[0], parts[1]-1, parts[2]);
    }

    function timestampToYmd(ts){
      if(!ts) return null;
      const d = new Date(ts);
      return ymd(d);
    }

    // normalize date input to 'YYYY-MM-DD' if possible (supports number timestamp, 'YYYY-MM-DD', 'YYYYMMDD')
    function toYmdStr(v){
      if(v === null || v === undefined || v === '') return null;
      if(typeof v === "number") return timestampToYmd(v);
      const s = String(v).trim();
      if(/^\d{8}$/.test(s)) return s.replace(/(\d{4})(\d{2})(\d{2})/, "$1-$2-$3");
      if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      return s; // fallback
    }

    function DatePickerEditor(props){
      this.props = props;
      this.el = document.createElement('input');
      this.el.type = 'text';
      this.el.className = 'extra-grid-input';
      this.el.style.width = '100%';
      this.el.autocomplete = 'off';

      const initial = toYmdStr(props.value);
      this.el.value = initial || '';
    }
    DatePickerEditor.prototype.getElement = function(){
      return this.el;
    };
    DatePickerEditor.prototype.getValue = function(){
      return String(this.el.value || '').trim();
    };
    DatePickerEditor.prototype.mounted = function(){
      const self = this;
      try{
        $(self.el)
          .datepicker({
            format: 'yyyy-mm-dd',
            language: 'ko',
            autoclose: true
          })
          .on('changeDate', function(){
            setTimeout(function(){
              try{ self.el.blur(); }catch(e){}
            }, 0);
          })
          .on('show', function(){
            try{ $(this).css('z-index', 9999); }catch(e){}
          });

        const d = parseYMD(self.el.value);
        if(d) $(self.el).datepicker('setDate', d);
        self.el.focus();
        $(self.el).datepicker('show');
      }catch(e){
        // if datepicker isn't available, fallback to plain input
        self.el.focus();
      }
    };
    DatePickerEditor.prototype.beforeDestroy = function(){
      try{ $(this.el).datepicker('destroy'); }catch(e){}
    };
    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    /* =========================
     * 툴팁 기능
     * ========================= */
    function showBarTooltip(rowObj, mouseX, mouseY){
      if($("#ganttOverlapPicker").is(":visible")) return;

      const $tooltip = $("#barTooltip");

      // 상태에 따른 스타일
      const statusMap = {
        "PLN": { text: "계획", color: "#6b7280" },
        "ING": { text: "진행", color: "#f59e0b" },
        "DONE": { text: "완료", color: "#10b981" },
        "HOLD": { text: "보류", color: "#ef4444" }
      };
      const status = statusMap[rowObj.status] || { text: rowObj.status || "PLN", color: "#6b7280" };

      // 진행률 표시
      const progress = rowObj.actProg || 0;
      const progressText = rowObj.actSt ? `${progress}%` : "시작전";
      // 툴팁 내용 구성
      const title = rowObj.fullNm || rowObj.deptNm || 'N/A';
      const content = `
        <div class="title">${escapeHtml(title)}</div>
        <div class="info">
          <div><span class="label">단계:</span> <span class="value">${escapeHtml(rowObj.wbsPlanCodeNm || "미정")}</span></div>
          <div><span class="label">담당:</span> <span class="value">${escapeHtml(rowObj.wbsPlanMngNm || "미정")}</span></div>
          <div><span class="label">상태:</span> <span class="value" style="color:${status.color}">${status.text}</span></div>
          <div><span class="label">계획:</span> <span class="value">${rowObj.wbsPlansDtFm} ~ ${rowObj.wbsPlaneDtFm}</span></div>
          ${rowObj.actSt ? `<div><span class="label">실적:</span> <span class="value">${rowObj.actSt}${rowObj.actEnd ? ' ~ ' + rowObj.actEnd : ''}</span></div>` : ''}
          ${rowObj.actSt ? `<div><span class="label">진행률:</span> <span class="value">${progress}%</span></div>` : ''}
          ${rowObj.memo ? `<div><span class="label">메모:</span> <span class="value">${escapeHtml(rowObj.memo)}</span></div>` : ''}
        </div>
      `;

      $tooltip.html(content);
      updateTooltipPosition(mouseX, mouseY);
      $tooltip.addClass("show");
    }

    function hideBarTooltip(){
      $("#barTooltip").removeClass("show");
    }

    function updateTooltipPosition(mouseX, mouseY){
      const $tooltip = $("#barTooltip");
      const tooltipWidth = $tooltip.outerWidth();
      const tooltipHeight = $tooltip.outerHeight();
      const windowWidth = $(window).width();
      const windowHeight = $(window).height();

      // 툴팁 위치 계산 (커서 오른쪽 위쪽 우선)
      let left = mouseX + 15;
      let top = mouseY - 15;

      // 오른쪽 경계 체크
      if(left + tooltipWidth > windowWidth) {
        left = mouseX - tooltipWidth - 15;
      }

      // 아래쪽 경계 체크
      if(top + tooltipHeight > windowHeight) {
        top = mouseY + 15;
      }

      // 위쪽 경계 체크
      if(top < 0) {
        top = mouseY + 15;
      }

      // 왼쪽 경계 체크
      if(left < 0) {
        left = mouseX + 15;
      }

      $tooltip.css({
        left: Math.max(0, left) + "px",
        top: Math.max(0, top) + "px"
      });
    }
    // business-day aware: count only weekdays (Mon-Fri)
    function daysBetween(a, b){
      const da = (typeof a === 'number') ? new Date(a) : parseYMD(a);
      const db = (typeof b === 'number') ? new Date(b) : parseYMD(b);
      if(!da || !db) {
        console.warn("Invalid date:", a, b);
        return 0;
      }
      da.setHours(0,0,0,0);
      db.setHours(0,0,0,0);
      if(da.getTime() === db.getTime()) return 0;

      let start = new Date(da), end = new Date(db);
      let sign = 1;
      if(start > end){ sign = -1; [start, end] = [end, start]; }

      let cnt = 0;
      const cur = new Date(start);
      // ✅ 중요: start는 포함하지 않고, start+1부터 시작
      cur.setDate(cur.getDate() + 1);
      while(cur <= end){
        const wd = cur.getDay();
        // 평일: 월(1) ~ 금(5)
        if(wd !== 0 && wd !== 6) cnt++;
        cur.setDate(cur.getDate() + 1);
      }
      return sign * cnt;
    }

    // add business days (Mon-Fri) to a yyyy-mm-dd date string
    function addDays(ymdStr, n){
      const d = parseYMD(ymdStr);

      if(!d) {
        console.warn("Invalid date string:", ymdStr);
        return ymd(new Date());
      }

      // n = 0: 입력 날짜 그대로 반환
      if(n === 0) return ymd(d);

      const step = n > 0 ? 1 : -1;
      let remaining = Math.abs(n);

      // ✅ 루프: remaining이 0이 될 때까지
      while(remaining > 0){
        d.setDate(d.getDate() + step);

        const wd = d.getDay();
        // 평일(월~금)인 경우만 카운트 감소
        if(wd !== 0 && wd !== 6) remaining--;
      }

      return ymd(d);
    }

    function toast(msg){
      const $t = $("#toast");
      $t.stop(true,true).text(msg).fadeIn(120);
      setTimeout(()=> $t.fadeOut(280), 1600);
    }

    /***********************
     * 1) 환경/초기값
     ************************/

    	    if(key.includes("/")) key = key.split("/")[0].trim(); // "영/설" 들어와도 첫 토큰으로
    	    if(comboCdMap[key]) key = comboCdMap[key];
    	    return key;
    	  }

    	  function getMeta(key){
    	    const k = normalizeKey(key);
    	    if(!k) return null;

    	    // 1) deptCd
    	    if(byCd.has(k)) return byCd.get(k);

    	    // 2) short (예: "영")
    	    if(byShort.has(k)) return byShort.get(k);

    	    // 3) deptNm (예: "영업")
    	    if(byNm.has(k)) return byNm.get(k);

    	    const m = getMeta(raw);
    	    // 약어(short) 대신 공정명(deptNm)을 강제 사용
    	    if(m) return (raw === m.deptNm ? raw : m.deptNm);

    /**
     * ✅ Phase 2.1: Virtual Scrolling 엔진
     * - 가시 영역만 렌더, 나머지는 spacer로 대체
     */
    const VirtualScroller = (() => {
      let rowHeight = 40;      // CSS var(--rowH)
      let renderStart = 0;
      let renderEnd = 0;
      let rawRowCount = 0;

      const BUFFER = 5;        // 상하 버퍼 행 수
      const MIN_ROWS = 50;     // 최소 렌더 행 수

      return {
        /**
         * @param {number} scrollTop - 스크롤 위치 (px)
         * @param {number} viewportHeight - 보이는 높이 (px)
         * @param {number} totalRows - 전체 행 수
         * @return {Object} {renderStart, renderEnd, spacerTopHeight, spacerBottomHeight}
         */
        calculateVisibleRange(scrollTop, viewportHeight, totalRows) {
          rawRowCount = totalRows;

          // 1. 보이는 영역의 행 인덱스 계산
          const firstVisible = Math.max(0, Math.floor(scrollTop / rowHeight));
          const lastVisible = Math.ceil((scrollTop + viewportHeight) / rowHeight);

          // 2. 버퍼 추가 (빠른 스크롤 시 깜빡임 방지)
          renderStart = Math.max(0, firstVisible - BUFFER);
          renderEnd = Math.min(totalRows, lastVisible + BUFFER);

          // 3. 최소 행 수 보장 (성능상 효율)
          const wanted = Math.min(MIN_ROWS, totalRows);
          if(renderEnd - renderStart < wanted) {
            const mid = Math.floor((renderStart + renderEnd) / 2);
            renderStart = Math.max(0, mid - Math.floor(wanted / 2));
            renderEnd = Math.min(totalRows, renderStart + wanted);
          }

          return {
            renderStart: renderStart,
            renderEnd: renderEnd,
            spacerTopHeight: renderStart * rowHeight,
            spacerBottomHeight: Math.max(0, (totalRows - renderEnd) * rowHeight)
          };
        },

        /**
         * 특정 행 인덱스로 스크롤
         */
        scrollToIndex(container, index) {
          const targetTop = index * rowHeight;
          container.scrollTop = targetTop;
        },

        /**
         * 현재 가시 행 범위
         */
        getVisibleRange() {
          return { start: renderStart, end: renderEnd, rowHeight: rowHeight };
        },

        /**
         * 행 높이 업데이트 (줌 변경 시)
         */
        setRowHeight(height) {
          rowHeight = Math.max(20, height);
        }
      };
    })();

    /**
     * ✅ Phase 3.1: Undo/Redo 히스토리 관리자
     */
    window.UndoRedoManager = (() => {
      let history = [];
      let currentIdx = -1;
      const MAX_HISTORY = 50;  // 최대 50개 상태 유지

      /**
       * 깊은 복사 함수
       */
      const deepClone = (obj) => {
        if (obj === null || typeof obj !== 'object') return obj;
        if (obj instanceof Array) return obj.map(item => deepClone(item));
        if (obj instanceof Map) {
          const newMap = new Map();
          obj.forEach((val, key) => newMap.set(key, deepClone(val)));
          return newMap;
        }
        if (obj instanceof Set) return new Set(obj);
        const cloned = Object.create(Object.getPrototypeOf(obj));
        for (const key in obj) {
          if (obj.hasOwnProperty(key)) {
            cloned[key] = deepClone(obj[key]);
          }
        }
        return cloned;
      };

      return {
        /**
         * 현재 상태를 히스토리에 추가
         */
        push(state) {
          // 현재 인덱스 이후의 히스토리 제거 (새로운 분기)
          history = history.slice(0, currentIdx + 1);

          // 새 상태 추가
          history.push(deepClone(state));
          currentIdx++;

          // 최대 크기 제한
          if (history.length > MAX_HISTORY) {
            history.shift();
            currentIdx--;
          }

          updateUndoRedoButtons();
        },

        /**
         * 이전 상태 복원
         */
        undo() {
          if (currentIdx > 0) {
            currentIdx--;
            const prevState = history[currentIdx];
            STATE = deepClone(prevState);
            // Undo 후 변경 추적 초기화 (서버 저장 불일치 방지)
            CHANGED_ROWS.clear();
            $(".row-dirty").removeClass("row-dirty");
            $("#btnSave").removeClass("btn-unsaved");
            renderAll();

            toast("실행 취소");
            updateUndoRedoButtons();
          }
        },

        /**
         * 다음 상태 복원
         */
        redo() {
          if (currentIdx < history.length - 1) {
            currentIdx++;
            const nextState = history[currentIdx];
            STATE = deepClone(nextState);
            // Redo 후 변경 추적 초기화 (서버 저장 불일치 방지)
            CHANGED_ROWS.clear();
            $(".row-dirty").removeClass("row-dirty");
            $("#btnSave").removeClass("btn-unsaved");
            renderAll();

            toast("다시 실행");
            updateUndoRedoButtons();
          }
        },

        /**
         * Undo/Redo 가능 여부
         */
        canUndo() { return currentIdx > 0; },
        canRedo() { return currentIdx < history.length - 1; },

        /**
         * 히스토리 초기화
         */
        clear() {
          history = [];
          currentIdx = -1;
          updateUndoRedoButtons();
        }
      };
    })();

    /**
     * ✅ Phase 2.2: Debounce 함수
     */
    function debounce(func, delay) {
      let timeoutId = null;
      return function(...args) {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => func.apply(this, args), delay);
      };
    }

    /**
     * ✅ Phase 2.2: Throttle 함수
     */
    function throttle(func, delay) {
      let lastCallTime = 0;
      return function(...args) {
        const now = Date.now();
        if(now - lastCallTime >= delay) {
          lastCallTime = now;
          func.apply(this, args);
        }
      };
    }

    function mergeIntervalsForSummary(intervals){
      if(!intervals.length) return [];
      intervals.sort((a,b)=>a.start - b.start);
      const merged = [intervals[0]];
      for(let i=1;i<intervals.length;i++){
        const cur = intervals[i];
        const last = merged[merged.length-1];
        const nextDay = new Date(last.end);
        nextDay.setDate(nextDay.getDate() + 1);
        if(cur.start <= nextDay){
          if(cur.end > last.end) last.end = cur.end;
        } else {
          merged.push(cur);
        }
      }
      return merged;
    }

    function buildSummarySegmentsFromRows(rows){
      const intervalsByDept = {};
      rows.forEach(r=>{
        const startStr = (typeof r.wbsPlansDtFm === "number") ? timestampToYmd(r.wbsPlansDtFm) : r.wbsPlansDtFm;
        const endStr   = (typeof r.wbsPlaneDtFm === "number") ? timestampToYmd(r.wbsPlaneDtFm) : r.wbsPlaneDtFm;
        if(!startStr || !endStr) return;
        const parts = normalizeDeptPartsFromRow(r);
        parts.forEach(p=>{
          intervalsByDept[p.deptCd] = intervalsByDept[p.deptCd] || [];
          intervalsByDept[p.deptCd].push({
            start: parseYMD(startStr),
            end: parseYMD(endStr),
            deptNm: p.deptNm
          });
        });
      });

      const segments = [];

      const order = Dept.summaryOrder();
      order.forEach(cd => {
        const list = intervalsByDept[cd] || [];
        if(!list.length) return;
        const merged = mergeIntervalsForSummary(list);
        const deptNm = Dept.nameOfCd(cd) || (merged[0] && merged[0].deptNm) || "";
        merged.forEach(m => {
          segments.push({
            deptCd: cd,
            deptNm: deptNm,
            wbsPlansDtFm: ymd(m.start),
            wbsPlaneDtFm: ymd(m.end)
          });
        });
      });
      
      return segments;
    }

    	const rows = STATE.rows.filter(r => !r.type && String(r.ordrsNo || '') === String(ordrsNo));

    	const $row = $(`.wbs-row.summary-row[data-rowid="${ordrsNo}-SUMMARY"]`);
    	if(!$row.length) return;
    	
    	const $canvas = $row.find(".timeline-canvas");
    	$canvas.find(".bar").remove();
    	
    	segments.forEach(seg=>{
    	    const left = daysBetween(STATE.viewStart, seg.wbsPlansDtFm) * CELL_W;
    	    const w = (daysBetween(seg.wbsPlansDtFm, seg.wbsPlaneDtFm) + 1) * CELL_W;
    	    const cls = deptClass(seg.deptCd || seg.deptNm);
    	    const $bar = $(`
    	      <div class="bar ${cls}" style="left:${left}px;width:${w}px; cursor:default;">
    	        <div class="txt">${seg.deptNm}</div>
    	      </div>
    	    `);
    	    $bar.attr("data-summary", "1");
    	    $canvas.append($bar);
    	  });
    }

    function getSalesCdCellHtml(salesCd, problemUncomplete, unCompletedCount, wbsCloseYn){
      const code = escapeHtml(salesCd || "");
      const pCnt = Number(problemUncomplete || 0) || 0;
      const uCnt = Number(unCompletedCount || 0) || 0;
      const colorStyle = (wbsCloseYn === "Y") ? "color: blue;" : "color: red;";

      if(pCnt === 0 && uCnt === 0){
        return `<span class="sales-code-text" style="${colorStyle}">${code}</span>`;
      }

      let badges = '';
      if(pCnt > 0) badges += `<span class="badge danger">문제:${pCnt}건</span>`;
      if(uCnt > 0) badges += `<span class="badge warning">일정지연:${uCnt}건</span>`;

      if(badges) {
        badges = `<div class="badges-wrap">${badges}</div>`;
      }

      return `<div class="sales-cell-wrap">${badges}<span class="sales-code-text" style="${colorStyle}">${code}</span></div>`;
    }

    function buildSalesCdGroups(rows){

      (rows || []).forEach(r=>{
        if(r.type === 'group' || r.type === 'total' || r.type === 'summary') return;
        if(!r.salesCd || !r.wbsPlansDtFm || !r.wbsPlaneDtFm) return;

        if(!map.has(r.salesCd)){
			  const pc = Number(r.problemCount ?? r.problem_count ?? r.PROBLEM_COUNT ?? r["PROBLEM_COUNT"] ?? 0) || 0;
			  const pu = Number(r.problemUncomplete ?? r.problem_uncomplete ?? r.PROBLEM_UNCOMPLETE ?? r["PROBLEM_UNCOMPLETE"] ?? 0) || 0;
			  const uc = Number(r.unCompleted ?? r.un_completed ?? r.UN_COMPLETED ?? r["UN_COMPLETED"] ?? 0) || 0;
			  
			  const problemText = (pc === 0 && pu === 0) ? "" : `${pc}(${pu})`;
			  const problemCls = (pu > 0) ? "is-bad" : "";
			  
			  // [MOD] SCHEDULE_STATUS 제거 대응: uc(지연건수) 기반으로 상태 결정
			  const scheduleText = (uc > 0) ? "지연" : "";
			  const scheduleCls = (uc > 0) ? "is-bad" : "";

	        	map.set(r.salesCd, {
	        		  salesCd: r.salesCd,
	        		  ordrsNo: r.ordrsNo || '',
	        		  coCd: r.coCd || '',
	        		  clntPjtNm: r.clntPjtNm || r.salesCd,
	        		  clntNm: r.clntNm || '',
	        		  eqpNm: r.eqpNm || r.deptNm || '',
	        		  problemCount: pc,
	        		  problemUncomplete: pu,
	        		  unCompletedCount: uc,
	        		  problemText: problemText,
	        		  problemCls: problemCls,
	        		  scheduleText: scheduleText,
	        		  scheduleCls: scheduleCls,
	        		  remarks: r.remarks || '',
	        		  wbsCloseYn: r.wbsCloseYn || '',
	        		  closeYn: r.closeYn || '',
	        		  rows: []
	        		});
        }
        map.get(r.salesCd).rows.push(r);
      });
      return Array.from(map.values());
    }



    function flattenGroupRows(groups){
      const out = [];
      (groups || []).forEach(g=>{
        if(g.rows && g.rows.length) out.push(...g.rows);
      });
      return out;
    }

    function buildMergeSpans(renderRows){
      const spans = [];
      let runStart = 0;

      for(let i=0;i<renderRows.length;i++){
        if(i===0){ runStart = 0; continue; }
        const prev = renderRows[i-1];
        const cur  = renderRows[i];
        const curKey  = getMachineKey(cur);
        const prevKey = getMachineKey(prev);
        if(curKey && curKey === prevKey) continue;

        const len = i - runStart;
        const startKey = getMachineKey(renderRows[runStart]);
        if(len > 1 && startKey){
          spans.push({ key:startKey, label:getMachineLabelHtml(renderRows[runStart]), start:runStart, length:len });
        }
        runStart = i;
      }

      const tailLen = renderRows.length - runStart;
      const tailKey = getMachineKey(renderRows[runStart]);
      if(tailLen > 1 && renderRows[runStart] && tailKey){
        spans.push({ key:tailKey, label:getMachineLabelHtml(renderRows[runStart]), start:runStart, length:tailLen });
      }
      return spans;
    }

    function buildRenderRows(rows){
      const baseRows = buildSalesCdGroups(rows);
      const renderRows = [];
      let bucket = [];
      let currentOrd = null;

      baseRows.forEach(r=>{

    	  const ord = (r.ordrsNo || '').trim();
    	  if(currentOrd === null) currentOrd = ord;
    	  if(ord !== currentOrd){
    		  renderRows.push(...bucket);

    		  const ordRows = flattenGroupRows(bucket);
    		  renderRows.push({
    		        type: "summary",
    		        ordrsNo: currentOrd,
    		        clntPjtNm: (bucket[0] && bucket[0].clntPjtNm) || "", 
    		        clntNm: (bucket[0] && bucket[0].clntNm) || "",
    		        wbsCloseYn: (bucket[0] && bucket[0].wbsCloseYn) || "",
    		        eqpNm: currentOrd + " 집계",
    		        salesCd: (bucket[0] && bucket[0].salesCd) || "",
    	            problemCount: (bucket[0] && bucket[0].problemCount) || "",
    	            problemUncomplete: (bucket[0] && bucket[0].problemUncomplete) || "",
    	            scheduleStatus: (bucket[0] && bucket[0].scheduleStatus) || "",
    		        remarks: "",
    		        segments: buildSummarySegmentsFromRows(ordRows)
    		      });


    	      bucket = [];
    	      currentOrd = ord;
        }
        bucket.push(r);
      });

      if(bucket.length){
        renderRows.push(...bucket);
        const ordRows = flattenGroupRows(bucket);
        renderRows.push({
            type: "summary",
            ordrsNo: currentOrd,
            clntPjtNm: (bucket[0] && bucket[0].clntPjtNm) || "",
            clntNm: (bucket[0] && bucket[0].clntNm) || "",
	        wbsCloseYn: (bucket[0] && bucket[0].wbsCloseYn) || "",
            eqpNm: currentOrd + " 집계",
            salesCd: (bucket[0] && bucket[0].salesCd) || "",
            problemCount: (bucket[0] && bucket[0].problemCount) || "",
            problemUncomplete: (bucket[0] && bucket[0].problemUncomplete) || "",
            scheduleStatus: (bucket[0] && bucket[0].scheduleStatus) || "",
            remarks: "",
            segments: buildSummarySegmentsFromRows(ordRows)
          });
      }

      return { renderRows, spans: buildMergeSpans(renderRows) };
    }

    function scheduleHideOverlapPicker(delayMs){
      clearTimeout(overlapHideTimer);
      overlapHideTimer = setTimeout(() => {
        // bar와 picker 둘 다 밖이면 닫기
        if(!OVERLAP_HOVER.overBar && !OVERLAP_HOVER.overPicker){
          hideOverlapPicker();
        }
      }, delayMs);
    }

    function cancelHideOverlapPicker(){
      clearTimeout(overlapHideTimer);

    // picker 위로 마우스가 올라가면 닫힘 취소
    function ensureOverlapPicker(){
      let $p = $("#ganttOverlapPicker");
      if($p.length) return $p;

      $p = $(`
        <div id="ganttOverlapPicker">
          <div class="title">
            <span>겹치는 간트바 선택</span>
            <span class="hint">(클릭하여 선택)</span>
          </div>
          <div class="list"></div>
        </div>
      `);
      $("body").append($p);

      // picker 위로 마우스가 올라가면 닫힘 취소
        $p.on("mouseenter", function(){
          OVERLAP_HOVER.overPicker = true;
          cancelHideOverlapPicker();
        });

        $p.on("mouseleave", function(){
          OVERLAP_HOVER.overPicker = false;
          // picker 밖으로 나가면 지연 후 닫기
          scheduleHideOverlapPicker(250);
        });
    	
      // 피커 외부 클릭 시 닫기
      $("body").off("mousedown.wbsOverlap").on("mousedown.wbsOverlap", function(e){
        const $t = $(e.target);
        if($t.closest("#ganttOverlapPicker").length) return;
        hideOverlapPicker();
      });

      // 스크롤/리사이즈 시 닫기(위치 깨짐 방지)
      $("#wbsScroll").on("scroll", hideOverlapPicker);
      $(window).on("resize", hideOverlapPicker);

      return $p;
    }

    function hideOverlapPicker(){
    	lastOverlapKey = null;

    function setActiveBar($bar){
      try{
        // 기존 툴팁 숨기기
        hideBarTooltip();

        $(".bar.is-active").removeClass("is-active");
        $bar.addClass("is-active");
        ACTIVE_BAR_EL = $bar.get(0);

        // ✅ draggable/resizable 재활성화
        // (Overlap Picker 선택 후에도 드래그 가능하도록)
        const isDisabled = $bar.data("draggableDisabled");

        if(isDisabled) {
          try {
            if($bar.data("uiDraggable")) {
              $bar.draggable("option", "disabled", false);
            }
            if($bar.data("uiResizable")) {
              $bar.resizable("option", "disabled", false);
            }
            $bar.data("draggableDisabled", false);
          } catch(e) {
            console.warn("Draggable re-enable error:", e);
          }
        }

        // 선택된 바 정보 표시
        const deptNm = ($bar.data("deptnm") || $bar.find(".txt").text() || "").trim();
        const s = $bar.data("start") || "";
        const e = $bar.data("end") || "";
        if(deptNm && s && e) toast(`선택됨: ${deptNm} (${s} ~ ${e})`);
      }catch(e){
        console.error("setActiveBar error:", e);
      }
    }

    function getBarsAtClientX($canvas, clientX){
      const list = [];
      const bars = $canvas.find(".bar").filter(function(){
        const $b = $(this);
        if($b.hasClass("act-bar")) return false;
        if($b.data("summary") === 1 || $b.data("summary") === "1") return false;
        return true;
      });

      bars.each(function(){
        const el = this;
        const r = el.getBoundingClientRect();
        // clientX가 bar의 가로 범위에 포함되면 겹침 후보
        if(clientX >= r.left && clientX <= r.right){
          list.push($(el));
        }
      });

      // z-index 기준으로 상단 우선
      list.sort((a,b)=>{
        const za = parseInt(a.css("z-index"),10) || 0;
        const zb = parseInt(b.css("z-index"),10) || 0;
        return zb - za;
      });

      return list;
    }

    function showOverlapPicker(items, pageX, pageY){
          hideBarTooltip(); // [MOD] 피커 뜰 때 기존 툴팁 제거
    	  const $p = ensureOverlapPicker();

    	    if(meta && meta.backColor){
    	      $item.find(".swatch").css("background", meta.backColor);

    	    $list.append($item);
    	  });

    	  // 위치 보정은 기존 로직 그대로...
    	  const pad = 12, w = 360, h = 220;
    	  const maxX = window.innerWidth - pad;
    	  const maxY = window.innerHeight - pad;
    	  let x = Math.min(pageX + 12, maxX - w);
    	  let y = Math.min(pageY + 12, maxY - h);
    	  x = Math.max(pad, x);
    	  y = Math.max(pad, y);

    	  $p.css({ left: x + "px", top: y + "px" }).show();
    	}

    function bindOverlapBarPicker(){
      const $wbs = $("#wbs");
      $wbs.off(".overlap");
      hideOverlapPicker();

      $wbs.on("mouseenter.overlap", ".timeline-canvas .bar", function(e){
        const $bar = $(this);
        if($bar.hasClass("dragging") || $bar.hasClass("resizing")) return;

        OVERLAP_HOVER.overBar = true;
        cancelHideOverlapPicker();

        // 좌표는 지연 실행 전에 캡처 (핵심)
        const pageX = e.pageX;
        const pageY = e.pageY;
        const clientX = e.clientX;

        clearTimeout(overlapTimer);
        overlapTimer = setTimeout(()=>{
          const $canvas = $bar.closest(".timeline-canvas");
          if(!$canvas.length) return;

          const overlaps = getBarsAtClientX($canvas, clientX);

          if(overlaps.length <= 1){
            scheduleHideOverlapPicker(120);
            return;
          }

          const key = `${$canvas.closest(".wbs-row").data("rowid") || ""}|${Math.floor(clientX)}|${overlaps.length}`;
          if(key === lastOverlapKey) return;
          lastOverlapKey = key;

          showOverlapPicker(overlaps, pageX, pageY);
        }, 160);
      });

      $wbs.on("mouseleave.overlap", ".timeline-canvas .bar", function(){
        OVERLAP_HOVER.overBar = false;
        clearTimeout(overlapTimer);
        scheduleHideOverlapPicker(450);
      });
    }

    function buildTimelineHeader(viewStart, viewEnd){
      const start = parseYMD(viewStart);
      const end   = parseYMD(viewEnd);
      if(!start || !end) return { $wrap:$('<div class="timeline-header"></div>'), totalDays:0, totalWidth:0 };

      const months = [];
      let iter = new Date(start);
      let currentKey = `${iter.getFullYear()}-${iter.getMonth()}`;
      let count = 0;

      const allDays = [];
      while(iter <= end){
        const key = `${iter.getFullYear()}-${iter.getMonth()}`;
        if(key !== currentKey){
          const [y,m] = currentKey.split('-').map(Number);
          months.push({y, m, days: count});
          currentKey = key;
          count = 0;
        }

        const wd = iter.getDay();
        const isWeekend = (wd === 0 || wd === 6);
        if(!isWeekend){
          allDays.push(new Date(iter));
          count++;
        }
        iter.setDate(iter.getDate()+1);
      }
      { const [y,m] = currentKey.split('-').map(Number); months.push({y, m, days: count}); }

      const $wrap = $('<div class="timeline-header"></div>');
      const $months = $('<div class="timeline-months"></div>');
      months.forEach(m=>{
        if(m.days <= 0) return;
        const w = m.days * CELL_W;
        $months.append(`<div class="timeline-month" data-days="${m.days}" style="width:${w}px">${m.y}년 ${m.m+1}월</div>`);
      });

      const $days = $('<div class="timeline-days"></div>');
      allDays.forEach(d=>{
        $days.append(`<div class="timeline-day">${String(d.getDate()).padStart(2,'0')}</div>`);
      });

      $wrap.append($months).append($days);
      TOTAL_TIMELINE_DAYS = allDays.length;
      return { $wrap, totalDays: allDays.length, totalWidth: allDays.length * CELL_W };
    }

    /***********************
     * 6) 렌더링(핵심)
     ************************/
    const $WBS = $("#wbs");
    let renderRaf = 0;

    /**
     * @typedef {Object} CalcCache
     * @property {string|null} key
     * @property {string[]|null} workdays
     * @property {Object<string, number>} dayIndex
     */
    const CALC_CACHE = {
        key: null,
        workdays: null,
        dayIndex: {}
    };

    /**
     * 가용 업무일 계산 캐싱 함수
     * @param {string} start 'YYYY-MM-DD'
     * @param {string} end 'YYYY-MM-DD'
     * @returns {string[]}
     */
    function getWorkdaysCached(start, end) {
        const key = `${start}_${end}`;
        if (CALC_CACHE.key === key && CALC_CACHE.workdays) {
            return CALC_CACHE.workdays;
        }
        const workdays = getWorkdays(start, end);
        CALC_CACHE.key = key;
        CALC_CACHE.workdays = workdays;
        CALC_CACHE.dayIndex = workdays.reduce((acc, d, i) => {
            acc[d] = i;
            return acc;
        }, {});
        return workdays;
    }

    /**
     * 행 HTML 생성 함수 (Partial Update 지원을 위해 분리)
     * @param {Object} r 행 데이터 객체

    function generateRowHtml(r, idx, ctx) {

                const w = (daysBetween(seg.wbsPlansDtFm, seg.wbsPlaneDtFm) + 1) * CELL_W;

                  <div class="bar ${cls}" data-start="${escapeHtml(seg.wbsPlansDtFm)}" data-end="${escapeHtml(seg.wbsPlaneDtFm)}" style="left:${left}px;width:${w}px; cursor:default;">

                    <div class="cell c-eqpNm">${escapeHtml(r.title || '')}</div>

                    <div class="cell c-problem"></div>
                    <div class="remarks" data-remarks="${safeRemarks}">${remarksHtml}</div>

        // salesCd 그룹 행 (data-row)

        const $row = $(`
          <div class="wbs-row data-row ${badBgCls}" data-rowid="${escapeHtml(r.salesCd)}" data-salescd="${escapeHtml(r.salesCd || '')}" data-ordrsno="${escapeHtml(r.ordrsNo || '')}" data-planverno="${escapeHtml(r.planVerNo || '')}">
            <div class="pane-left">

              <div class="cell c-salesCd ${r.wbsCloseYn == 'Y' ? 'closeY' : ''}">${getSalesCdCellHtml(r.salesCd || '', r.problemUncomplete, r.unCompletedCount, r.wbsCloseYn)}</div>

        (r.rows || []).forEach((rowObj, rowIdx) => {
            const startDate = toYmdStr(rowObj.wbsPlansDtFm);
            const endDate = toYmdStr(rowObj.wbsPlaneDtFm);
            if (!startDate || !endDate) return;

            const left = daysBetween(STATE.viewStart, startDate) * CELL_W;
            const w = (daysBetween(startDate, endDate) + 1) * CELL_W;
            const cls = deptClass(rowObj.deptCd || rowObj.deptNm);
            const deptNmSafe = escapeHtml(rowObj.deptNm || 'N/A');

            const actStYmd = toYmdStr(rowObj.actSt);
            let actEndYmd = toYmdStr(rowObj.actEnd);

            if ((rowObj.actProg && rowObj.actProg > 0) && actStYmd && !actEndYmd) {
                actEndYmd = ymd(new Date());
            }

            const hasAct = !!(actStYmd && actEndYmd && parseYMD(actStYmd) && parseYMD(actEndYmd));

            const $bar = $(`
            <div class="bar ${cls} plan-bar ${hasAct ? 'has-act' : ''}"
                 data-row="${idx}"
                 data-seg="${rowIdx}"
                 data-rowid="${escapeHtml(rowObj.fileTrgtKey || '')}"
                 data-sjfilefrgtkey="${escapeHtml(rowObj.sjFileTrgtKey || '')}"
                 data-salescd="${escapeHtml(rowObj.salesCd || '')}"
                 data-ordrsno="${escapeHtml(rowObj.ordrsNo || '')}"
                 data-deptcd="${escapeHtml(rowObj.deptCd || '')}"
                 data-wbsplanmngid="${escapeHtml(rowObj.wbsPlanMngCd || '')}"
                 data-wbsplanmngnm="${escapeHtml(rowObj.wbsPlanMngNm || '')}"
                 data-wbsplancodeid="${escapeHtml(rowObj.wbsPlanCodeId || '')}"
                 data-wbsplancodenm="${escapeHtml(rowObj.wbsPlanCodeNm || '')}"
                 data-notwbscodecount="${escapeHtml(rowObj.notWbscodeCount || '0')}"
                 data-deptnm="${deptNmSafe}"
                 data-start="${escapeHtml(startDate)}"
                 data-end="${escapeHtml(endDate)}"
                 style="left:${left}px;width:${w}px;">
              <div class="txt">${deptNmSafe}</div>
            </div>
          `);
            $bar.data("rowobj", rowObj);
            $canvas.append($bar);

            if (hasAct) {
                let aSt = actStYmd, aEnd = actEndYmd;
                if (parseYMD(aSt) > parseYMD(aEnd)) { const tmp = aSt; aSt = aEnd; aEnd = tmp; }

                const actLeft = daysBetween(STATE.viewStart, aSt) * CELL_W;
                const actWraw = (daysBetween(aSt, aEnd) + 1) * CELL_W;
                const actW = Math.max(CELL_W, actWraw);

                const p = rowObj.actProg;
                const progTxt = (() => {
                    if (p === null || p === undefined || String(p).trim() === '') return '0%';
                    let val = parseFloat(String(p).replace('%', '').trim());
                    if (isNaN(val)) return '0%';
                    return Number.isInteger(val) ? (val + '%') : (val.toFixed(2) + '%');
                })();
                const pctNum = (() => {
                    const raw = (p === null || p === undefined) ? '' : String(p);
                    const n = parseInt(raw.replace('%', '').trim(), 10);
                    return Number.isFinite(n) ? n : 0;
                })();
                const pctCls = (pctNum >= 100) ? 'act-pct-100' : 'act-pct-not100';

                const st = String(rowObj.status || '').trim().toLowerCase();
                const stCls = st ? ('act-status-' + st) : 'act-status-unk';

                const $act = $(`
              <div class="bar act-bar ${stCls} ${pctCls}" data-act="1" data-start="${escapeHtml(aSt)}" data-end="${escapeHtml(aEnd)}"
                   data-row="${idx}"
                   data-seg="${rowIdx}"
                   style="left:${actLeft}px;width:${actW}px;">
                <div class="txt">${escapeHtml(progTxt)}</div>
              </div>
            `);
                $act.data("rowobj", rowObj);
                $canvas.append($act);
            }
        });

        return $row;
    }

    /**
     * 특정 Sales Code의 행만 업데이트하는 함수 (Partial Update)
     * @param {string} salesCd 
     */
    function updateRowDisplay(salesCd) {
        if (!salesCd) return;
        const $oldRows = $(`.wbs-row[data-salescd="${salesCd}"]`);
        if ($oldRows.length === 0) return;

        const rendered = buildRenderRows(STATE.rows);
        const renderRows = rendered.renderRows;

        const todayOffset = daysBetween(STATE.viewStart, STATE.today);
        const workdays = getWorkdaysCached(STATE.viewStart, STATE.viewEnd);
        const showToday = (todayOffset >= 0 && todayOffset <= workdays.length - 1);

        $oldRows.each(function () {
            const $oldRow = $(this);
            const rowId = $oldRow.data("rowid");
            // renderRows에서 일치하는 행 찾기
            const rIdx = renderRows.findIndex(r => {
                if (r.type === "summary") return ((r.ordrsNo || 'NOORD') + "-SUMMARY") === rowId;
                if (r.type === "total") return (`${r.clntPjtNm}-TOTAL`) === rowId;
                return r.salesCd === salesCd;
            });

            if (rIdx !== -1) {
                const zebraCls = (rIdx % 2 ? 'alt' : '');
                const $newRow = generateRowHtml(renderRows[rIdx], rIdx, { todayOffset, showToday, zebraCls });
                $oldRow.replaceWith($newRow);
                bindBars($newRow); // 해당 행에 대해서만 바인딩 재수행
            }
        });
    }

        const wasInitialLoad = isInitialLoad;
        
        renderWbs();

        // ✅ 최초 로딩 시에만 스크롤/뷰 초기화 (팝업메뉴 작업해나 드래그 시 스크롤 유지)
        if (wasInitialLoad === true) {
          setTimeout(function () {
            try { 
              // fitTimelineToViewport();  //초기 일정에 따른 줌자동계산 실행 보류
              scrollToTodayCenter();
            } catch(e) { 
              console.warn("초기 뷰 설정 실패:", e);

    function renderWbs() {
        // ✅ 스크롤 위치 저장 (재렌더링 후 복원)
        const $wbsScroll = $("#wbsScroll");
        const savedScrollTop = $wbsScroll.length ? $wbsScroll.scrollTop() : 0;
        const savedScrollLeft = $wbsScroll.length ? $wbsScroll.scrollLeft() : 0;

        $WBS.empty();

        const workdays = getWorkdaysCached(STATE.viewStart, STATE.viewEnd);
        const head = buildTimelineHeader(STATE.viewStart, STATE.viewEnd);
        (function () {
            const rootEl = $(":root").get(0);
            if (rootEl && rootEl.style) rootEl.style.setProperty("--timelineW", head.totalWidth + "px");
        })();

        const built = buildRenderRows(STATE.rows);
        const renderRows = built.renderRows;
        const spans = built.spans || [];  // ✅ spans 정의 추가

        const $headerRow = $(`
        <div class="wbs-row header">
          <div class="pane-left">
            <div class="cell c-clntPjtNm" data-header-key="machine" tabindex="0" role="button" aria-label="프로젝트 헤더">프로젝트</div>
            <div class="cell c-eqpNm" data-header-key="equipment" tabindex="0" role="button" aria-label="설비명 헤더">설비명</div>
            <div class="cell c-salesCd" data-header-key="salesCd" tabindex="0" role="button" aria-label="salesCd 헤더">salesCd</div>
          </div>
          <div class="pane-timeline"></div>
          <div class="pane-right">
            <div class="cell c-problem" data-header-key="problem" tabindex="0" role="button" aria-label="문제 헤더">문제</div>
            <div class="cell" data-header-key="remarks" tabindex="0" role="button" aria-label="비고 헤더" style="border-right:0; justify-content:center;">비고 (Remarks)</div>
          </div>
        </div>
      `);
        $headerRow.find(".pane-timeline").append(head.$wrap);
        $WBS.append($headerRow);

        const todayOffset = daysBetween(STATE.viewStart, STATE.today);
        const showToday = (todayOffset >= 0 && todayOffset <= head.totalDays - 1);

        // DocumentFragment를 사용하여 성능 최적화
        const fragment = document.createDocumentFragment();

        for (let idx = 0; idx < renderRows.length; idx++) {
            const r = renderRows[idx];
            const zebraCls = (idx % 2 ? 'alt' : '');
            const $row = generateRowHtml(r, idx, { todayOffset, showToday, zebraCls });
            fragment.appendChild($row.get(0));
        }

        $WBS.get(0).appendChild(fragment);

        if (showToday) {
            const $badge = $(`<div class="today-badge">TODAY</div>`);
            $badge.css("left", (todayOffset * CELL_W) + "px");
            $headerRow.find(".pane-timeline").append($badge);
            $headerRow.find(".pane-timeline").append(
                `<div class="today-line" style="left:${todayOffset * CELL_W}px; top:0; bottom:0; position:absolute;"></div>`
            );
        }

      if(showToday){
        const $badge = $(`<div class="today-badge">TODAY</div>`);
        $badge.css("left", (todayOffset*CELL_W) + "px");
        $headerRow.find(".pane-timeline").append($badge);
        $headerRow.find(".pane-timeline").append(
          `<div class="today-line" style="left:${todayOffset*CELL_W}px; top:0; bottom:0; position:absolute;"></div>`
        );
      }

      // same-machine cell merge
      try{
        const $bodyRows = $WBS.find('.wbs-row').not('.header').not('.group-sep');
 
        $bodyRows.removeClass('merge-master merge-slave');
        $bodyRows.find('.c-clntPjtNm').removeClass('merged-start merged-hidden');
        $bodyRows.find('.clntPjtNm-text').css({ height:'', minHeight:'' });
        $bodyRows.find('.pane-left').css('z-index','');
 
        spans.forEach(sp=>{
          const $first = $($bodyRows.get(sp.start));
          if(!$first || $first.length===0) return;

          const endIdx = sp.start + sp.length - 1;
          const $last = $($bodyRows.get(endIdx));
          if(!$last || $last.length===0) return;
 
          for(let i=0;i<sp.length;i++){
            const $r = $($bodyRows.get(sp.start + i));
            $r.addClass(i===0 ? 'merge-master' : 'merge-slave');
          }
 
          const $firstCell = $first.find('.c-clntPjtNm');
          const $txt = $firstCell.find('.clntPjtNm-text');
 
          $firstCell.removeClass('merged-hidden').addClass('merged-start');
          for(let i=1;i<sp.length;i++){
            $($bodyRows.get(sp.start + i)).find('.c-clntPjtNm').addClass('merged-hidden');
          }

          // Measure after class changes for pixel-perfect merge height.
          // Use DOMRect to avoid cumulative rounding errors (outerHeight summation).
          $first[0].offsetHeight; // force reflow
          const firstRect = $first[0].getBoundingClientRect();
          const lastRect = $last[0].getBoundingClientRect();
          // Leave room so the last row's own border-bottom stays visible.
          // Use floor to avoid overshooting into the next row due to sub-pixel values.
          const totalH = Math.max(0, Math.floor((lastRect.bottom - firstRect.top) - 1));

          $txt.css({ height: totalH + 'px', minHeight: totalH + 'px' })
              .html(sp.label || '');
        });
      }catch(e){
        console.warn('clntPjtNm merge error', e);
      }

      // ✅ 스크롤 위치 복원 (최초 로딩이 아닐 때만, 팝업 메뉴 작업해나 다른 조작에서 스크롤 유지)
      if(!isInitialLoad) {
        $wbsScroll.scrollTop(savedScrollTop);
        $wbsScroll.scrollLeft(savedScrollLeft);
      }

      // ✅ 최초 로딩 완료 표시
      isInitialLoad = false;
    }

    function applyHeaderModeUI(){
      const $card = $(".wbs-card");
      if(!$card.hasClass("overlay-grid-mode")){
        $card.addClass("max-gantt-mode");
      }

      const $header = $("#wbs .wbs-row.header");
      $header.find(".cell.is-focus").removeClass("is-focus");
      if(CURRENT_HEADER_MODE === HEADER_MODE.INFO && CURRENT_HEADER_KEY){
        $header.find(`.cell[data-header-key="${CURRENT_HEADER_KEY}"]`).addClass("is-focus");
      }
    }

    function getRawField(obj, camelKey, upperKey){
      if(!obj) return "";
      const v1 = obj[camelKey];
      if(v1 !== null && v1 !== undefined) return v1;
      const v2 = upperKey ? obj[upperKey] : undefined;
      if(v2 !== null && v2 !== undefined) return v2;
      return "";
    }

    function setHeaderModeByKey(headerKey){
      const key = String(headerKey || "").trim();
      if(INFO_HEADER_KEYS.has(key)){
        CURRENT_HEADER_MODE = HEADER_MODE.INFO;
        CURRENT_HEADER_KEY = key;
        applyHeaderModeUI();
        openExtraGridOverlay();
      } else {
        closeExtraGridOverlay();
        CURRENT_HEADER_MODE = HEADER_MODE.MAX;
        CURRENT_HEADER_KEY = key;
        applyHeaderModeUI();
      }
    }

    function bindHeaderModeEvents(){
      const selector = ".wbs-row.header .cell, .wbs-row.header .timeline-header, .wbs-row.header .timeline-month, .wbs-row.header .timeline-day";
      $WBS.off("click.headerMode", selector).on("click.headerMode", selector, function(){
        const key = $(this).attr("data-header-key") || "timeline";
        setHeaderModeByKey(key);
      });

    }

    function getEqpNmBySalesCd(salesCd){
      if(!salesCd || typeof STATE === 'undefined' || !STATE.rows) return "";
      const sc = String(salesCd).trim();
      const match = STATE.rows.find(x => String(x.salesCd || "").trim() === sc);
      return match ? String(match.eqpNm || match.EQP_NM || "") : "";
    }

    function normalizeGridRow(r){
      const salesCd = String(getRawField(r, "salesCd", "SALES_CD") || "").trim();
      const pu1 = getRawField(r, "problemUncomplete", "PROBLEM_UNCOMPLETE");
      const pu2 = getRawField(r, "problem_uncomplete", "PROBLEM_UNCOMPLETE");
      const problemUncomplete = Number((pu1 !== "" ? pu1 : pu2) || 0) || 0;

      const uc1 = getRawField(r, "unCompleted", "UN_COMPLETED");
      const uc2 = getRawField(r, "un_completed", "UN_COMPLETED");
      const unCompletedCount = Number((uc1 !== "" ? uc1 : uc2) || 0) || 0;
      
      let clntNm = String(getRawField(r, "clntNm", "CLNT_NM") || "");
      let clntPjtNm = String(getRawField(r, "clntPjtNm", "CLNT_PJT_NM") || "");
      let wbsCloseYn = String(getRawField(r, "wbsCloseYn", "WBS_CLOSE_YN") || "N");
      
      // If missing from current row, try to find in main dataset
      if((!clntNm || !clntPjtNm || wbsCloseYn === "N") && salesCd && typeof STATE !== 'undefined' && STATE.rows){
        // robust match logic: trim and ignore case
        const match = STATE.rows.find(x => {
          const xSales = String(x.salesCd || "").trim();
          return xSales === salesCd; 
        });

        if(match){
           if(!clntNm) clntNm = String(match.clntNm || match.CLNT_NM || "");
           if(!clntPjtNm) clntPjtNm = String(match.clntPjtNm || match.CLNT_PJT_NM || "");
           if(wbsCloseYn === "N") wbsCloseYn = String(match.wbsCloseYn || match.WBS_CLOSE_YN || "N");
        }
      }
      
      return {
        clntPrjNm: clntNm + '\n'+ clntPjtNm,
        clntNm: clntNm,
        clntPjtNm: clntPjtNm,
        problemUncomplete: problemUncomplete,
        unCompletedCount: unCompletedCount,
        coCd: String(getRawField(r, "coCd", "CO_CD") || ""),
        salesCd: salesCd,
        wbsCloseYn: wbsCloseYn,

      EXTRA_TUI_GRID.grid.on("focusChange", function(ev){
        try{
          const rowKey = ev ? ev.rowKey : null;
          const prevRowKey = ev ? ev.prevRowKey : null;
          if(prevRowKey !== null && prevRowKey !== undefined){
            EXTRA_TUI_GRID.grid.removeRowClassName(prevRowKey, "row-selected");
          }
          if(selectedRowKey !== null && selectedRowKey !== undefined){
            EXTRA_TUI_GRID.grid.removeRowClassName(selectedRowKey, "row-selected");

          if(rowKey !== null && rowKey !== undefined){
            EXTRA_TUI_GRID.grid.addRowClassName(rowKey, "row-selected");
            selectedRowKey = rowKey;
          }
        }catch(e){
          console.error(e);
        }
      });

      EXTRA_TUI_GRID.grid.on("afterChange", function(ev){
        try{
          if(EXTRA_GRID_APPLYING_SERVER_DATA) return;
          if(ev && ev.origin && (ev.origin !== "cell" && ev.origin !== "paste" && ev.origin !== "delete")) return;
          const changes = (ev && Array.isArray(ev.changes)) ? ev.changes : [];
          const dateCols = ["deliverDay", "modelCompDt", "outCompDt", "camCompDt"];

          // 무한 루프 방지를 위해 플래그 설정
          EXTRA_GRID_APPLYING_SERVER_DATA = true;
          const rowKeysToSave = new Set();

          changes.forEach(change => {
            const { rowKey, columnName, value } = change;
            
            // 날짜 컬럼 검증
            if (dateCols.indexOf(columnName) > -1) {
              const val = String(value || "").trim();
              if (val) {
                const normalized = toYmdStr(val);
                const d = parseYMD(normalized);
                
                if (!d || isNaN(d.getTime())) {
                  EXTRA_TUI_GRID.grid.setValue(rowKey, columnName, "", false);
                } else if (normalized !== value) {
                  EXTRA_TUI_GRID.grid.setValue(rowKey, columnName, normalized, false);
                }
              }
            }
            rowKeysToSave.add(rowKey);
          });
          EXTRA_GRID_APPLYING_SERVER_DATA = false;

          rowKeysToSave.forEach(rk => {

            if(!row) return;
            EXTRA_GRID_DIRTY.set(String(row.salesCd || ""), true);
            EXTRA_GRID_CONFLICT.delete(String(row.salesCd || ""));

            saveExtraGridRowByRowKey(rk);
          });
        }catch(e){
          EXTRA_GRID_APPLYING_SERVER_DATA = false;
          console.error(e);
        }
      });

    function renderExtraGridRows(){
      initExtraTuiGrid();
      const list = EXTRA_GRID_ROWS || [];
      if(!EXTRA_TUI_GRID) return;
      EXTRA_TUI_GRID.setData(buildProjectRowSpanData(list));
      EXTRA_TUI_GRID.refreshLayout();

      // class re-apply (row-dirty, row-conflict, tui-grid-row-delay 수동 관리)
      // TUI Grid의 내부 렌더링 완료 후 안정적으로 클래스를 부여하기 위해 setTimeout 사용
      setTimeout(() => {
        try{
          const grid = EXTRA_TUI_GRID.grid;
          const data = grid.getData();
          (data || []).forEach(r => {
            const salesCd = String(r.salesCd || "");
            const rowKey = r.rowKey;
            
            // 더티/충돌 클래스
            if(EXTRA_GRID_DIRTY.has(salesCd)) grid.addRowClassName(rowKey, "row-dirty");
            if(EXTRA_GRID_CONFLICT.has(salesCd)) grid.addRowClassName(rowKey, "row-conflict");
            
            // [MOD] 문제건수가 있을 때만 배경색 적용 (지연건수 제외)
            if(Number(r.problemUncomplete || 0) > 0){
               grid.addRowClassName(rowKey, "tui-grid-row-delay");
            } else {
               grid.removeRowClassName(rowKey, "tui-grid-row-delay");
            }
          });
          
          // [Scroll State Sync] Restore Scroll Position 
          if(pendingScrollToSalesCd) {
             scrollGridToSalesCd(pendingScrollToSalesCd);
             pendingScrollToSalesCd = null;
          }
        }catch(e){}
      }, 200); // 렌더링 동기화를 위해 대기시간 소폭 증가

    }

    function buildProjectRowSpanData(list){
      const rows = (list || []).map(r => Object.assign({}, r));
      let i = 0;
      while(i < rows.length){
        const key = String(rows[i].clntPrjNm || "").trim();
        let j = i + 1;
        while(j < rows.length && String(rows[j].clntPrjNm || "").trim() === key){
          j++;
        }

        const span = j - i;
        if(key && span > 1){
          const first = rows[i];
          const attrs = Object.assign({}, first._attributes || {});
          const rowSpan = Object.assign({}, attrs.rowSpan || {});
          rowSpan.clntPrjNm = span;
          attrs.rowSpan = rowSpan;
          first._attributes = attrs;
          rows[i] = first;
        }
        i = j;
      }
      return rows;
    }

    function loadExtraGridData(){

      if(GRID_API_AVAILABLE === false){
        loadExtraGridDataFallback(param);
        return;

        if ($(elem).hasClass("input_calendar") ) param[$(elem).data("search")] = $(elem).val().replace(/\-/g, '');
        else param[$(elem).data("search")] = $(elem).val();
      });
      
      postAjax("/user/wb/wb07/selectWb22d02ExtraInfoGrid", param, null, function(resp){

    function collectSalesCdCandidates(filterSalesCd){
      const set = new Set();
      const flt = String(filterSalesCd || "").trim();
      (STATE.rows || []).forEach(r => {
        const salesCd = String(r && r.salesCd ? r.salesCd : "").trim();
        if(!salesCd) return;
        if(flt && salesCd.indexOf(flt) < 0) return;
        set.add(salesCd);
      });
      return Array.from(set.values());
    }

    function postAjaxPromise(url, data){
      return new Promise(resolve => {
        postAjax(url, data, null, function(resp){ resolve(resp); });
      });
    }

    function isAjaxXhr(resp){
      return !!(resp && typeof resp.status === "number" && resp.status >= 100 && resp.status <= 599);
    }

    async function loadExtraGridDataFallback(param){
      const salesList = collectSalesCdCandidates(param.salesCd);
      if(!salesList.length){
        EXTRA_GRID_ROWS = [];
        EXTRA_GRID_DIRTY.clear();
        EXTRA_GRID_CONFLICT.clear();
        renderExtraGridRows();
        return;
      }

      const out = [];
      for(const salesCd of salesList){
        const resp = await postAjaxPromise("/user/wb/wb07/selectWb22d02ExtraInfo", { coCd: param.coCd, salesCd: salesCd });
        if(isAjaxXhr(resp) && resp.status === 404) continue;
        if(isAjaxXhr(resp)) continue;
        if(resp && resp.result){
          out.push(normalizeGridRow(resp.result));
        }
      }
      EXTRA_GRID_ROWS = out;
      EXTRA_GRID_DIRTY.clear();
      EXTRA_GRID_CONFLICT.clear();
      renderExtraGridRows();
      if(out.length){
        toast("Grid 전용 API가 없어 단건 API 집계 방식으로 조회했습니다.");
      }
    }

    function saveExtraGridRowByRowKey(rowKey){
      if(!EXTRA_TUI_GRID) return;
      const row = EXTRA_TUI_GRID.grid.getRow(rowKey);
      if(!row || !row.salesCd) return;
      if(!EXTRA_GRID_DIRTY.has(String(row.salesCd))) return;

      const salesCd = String(row.salesCd || "");
      if(GRID_ROW_SAVE_INFLIGHT.get(salesCd)) return;
      GRID_ROW_SAVE_INFLIGHT.set(salesCd, true);
      const payload = {
        coCd: row.coCd || $("#coCd_S").val() || (jwt && jwt.coCd ? jwt.coCd : ""),
        salesCd: row.salesCd,
        userId: (jwt && jwt.userId) ? jwt.userId : "",
        pgmId: $("#pgmId").val() || "",
        udtDttm: row.udtDttm || "",

        designMng: row.designMng,
        deliverDay: row.deliverDay,
        modelClntNm: row.modelClntNm,
        modelCompDt: row.modelCompDt,
        outClntNm: row.outClntNm,
        outCompDt: row.outCompDt,
        camClntNm: row.camClntNm,
        camCompDt: row.camCompDt,
        machinMngNm: row.machinMngNm,
        mmMemo: row.mmMemo,
        dwgMemo: row.dwgMemo,
        prdMemo: row.prdMemo,
        salesMemo: row.salesMemo,
        pmMemo: row.pmMemo,
        remark: row.remark
      };

      postAjax("/user/wb/wb07/updateWb22d02ExtraInfo", payload, null, function(resp){
        GRID_ROW_SAVE_INFLIGHT.delete(salesCd);

        if(isAjaxXhr(resp)){
          console.error(resp);
          toast("저장 요청에 실패했습니다.");
          return;
        }

        const code = resp ? Number(resp.resultCode) : 0;
        const msg = resp ? String(resp.resultMessage || "") : "";
        const raw = resp ? resp.result : null;

        if((code === 200 || code === 409) && raw){
          const latest = normalizeGridRow(raw);
          if(!latest.problemUncomplete){
            latest.problemUncomplete = Number(row.problemUncomplete || 0) || 0;
          }
          latest.expectedUdtDttm = latest.udtDttm;
          EXTRA_GRID_DIRTY.delete(String(latest.salesCd));
          EXTRA_TUI_GRID.grid.removeRowClassName(rowKey, "row-dirty");

          if(code === 409){
            EXTRA_GRID_CONFLICT.add(String(latest.salesCd));
            EXTRA_TUI_GRID.grid.addRowClassName(rowKey, "row-conflict");
          } else {
            EXTRA_GRID_CONFLICT.delete(String(latest.salesCd));
            EXTRA_TUI_GRID.grid.removeRowClassName(rowKey, "row-conflict");
          }

          EXTRA_GRID_APPLYING_SERVER_DATA = true;
          Object.keys(latest).forEach(k => {
            if(k === "expectedUdtDttm") return;
            // [FIX] 서버 응답에 값이 없더라도 기존의 중요 메타데이터(설비명 등)나 뱃지 정보가 있다면 보존
            const preservedFields = ["eqpNm", "clntNm", "clntPjtNm", "unCompletedCount", "problemUncomplete"];
            if(preservedFields.includes(k)){
               const newVal = latest[k];
               const oldVal = row[k];
               if((newVal === null || newVal === undefined || newVal === "" || newVal === 0) && (oldVal !== null && oldVal !== undefined && oldVal !== "" && oldVal !== 0)){
                  return; // 기존 값 유지
               }
            }
            try{ EXTRA_TUI_GRID.grid.setValue(rowKey, k, latest[k], false); }catch(e){}
          });
          try{ EXTRA_TUI_GRID.grid.setValue(rowKey, "expectedUdtDttm", latest.expectedUdtDttm, false); }catch(e){}
          
          // [MOD] 데이터 갱신 후 배경색 클래스(tui-grid-row-delay) 수동 재적용 (조건: 문제건수 > 0)
          const upRow = EXTRA_TUI_GRID.grid.getRow(rowKey);
          if(Number(upRow.problemUncomplete || 0) > 0){
             EXTRA_TUI_GRID.grid.addRowClassName(rowKey, "tui-grid-row-delay");
          } else {
             EXTRA_TUI_GRID.grid.removeRowClassName(rowKey, "tui-grid-row-delay");
          }
          EXTRA_GRID_APPLYING_SERVER_DATA = false;
          try{
            const liveRow = EXTRA_TUI_GRID.grid.getRow(rowKey);
            if(liveRow){
              liveRow.expectedUdtDttm = latest.expectedUdtDttm;
              liveRow.udtDttm = latest.udtDttm;
            }
          }catch(e){}

          if(code === 409){
            openModal("동시 편집 감지", msg || "다른 사용자가 먼저 수정했습니다. 최신 데이터로 갱신했습니다.");
          }
          return;
        }

        toast(msg || "저장에 실패했습니다.");
      });
    }

    function getTopSalesCdFromGantt() {
      const $scroll = $("#wbsScroll");
      if(!$scroll.length) return null;
      let topCd = null;
      const scrollTop = $scroll.scrollTop();
      const $rows = $scroll.find(".wbs-row.data-row");
      for(let i=0; i<$rows.length; i++){
         const $r = $($rows[i]);
         if($r[0].offsetTop >= scrollTop) {
             topCd = $r.data("salescd");
             break;
         }
      }
      return topCd;
    }

    function scrollGanttToSalesCd(salesCd) {
      if(!salesCd) return;
      const $scroll = $("#wbsScroll");
      const $row = $scroll.find(".wbs-row.data-row[data-salescd='" + salesCd + "']").first();
      if($row.length) {
         // wbsHeadH (52px)
         const offset = $row[0].offsetTop - 52;
         $scroll.scrollTop(offset > 0 ? offset : 0);
      }

    function getTopSalesCdFromGrid() {
      if(!EXTRA_TUI_GRID) return null;
      const bodyArea = document.querySelector("#extraGridOverlay .tui-grid-rside-area .tui-grid-body-area");
      if(bodyArea) {
          const scrollTop = bodyArea.scrollTop;
          const rowIndex = Math.floor(scrollTop / 32);
          const data = EXTRA_TUI_GRID.grid.getData();
          if(data && data[rowIndex]) {
              return data[rowIndex].salesCd;
          }
      }
      return null;
    }

    function scrollGridToSalesCd(salesCd) {
      if(!salesCd || !EXTRA_TUI_GRID) return;
      const data = EXTRA_TUI_GRID.grid.getData();
      const idx = data.findIndex(r => String(r.salesCd) === String(salesCd));
      if(idx >= 0) {
          const targetTop = idx * 32;
          const bodyArea = document.querySelector("#extraGridOverlay .tui-grid-rside-area .tui-grid-body-area");
          const lsideArea = document.querySelector("#extraGridOverlay .tui-grid-lside-area .tui-grid-body-area");
          if(bodyArea) bodyArea.scrollTop = targetTop;
          if(lsideArea) lsideArea.scrollTop = targetTop;
      }
    }

    function bindBars(){
      // jQuery UI 객체 중복 생성 방지: destroy 후 재생성
      $(".bar").each(function(){
        const $b = $(this);

        const segId = $b.data("seg");
        const rowId = $b.data("row");
        if(segId === undefined || rowId === undefined || segId === null || rowId === null) return; // total/summary 제외

        if($b.data("uiDraggable")) { try{ $b.draggable("destroy"); }catch(e){} }
        if($b.data("uiResizable")) { try{ $b.resizable("destroy"); }catch(e){} }

        $b.draggable({
          axis:"x",
          containment:"parent",
          grid:[CELL_W, 1],
          cancel: ".ui-resizable-handle",
          start: function(){
            $(this).addClass("dragging");
            // 원래 위치 저장
            $(this).data("originalLeft", $(this).css("left"));
            $(this).data("originalWidth", $(this).css("width"));
          },
          stop: function(){ $(this).removeClass("dragging"); applyBarChange($(this)); }
        });

        // resizable: 사용자 체감 유지(중간은 부드럽게, stop에서 스냅)
        $b.resizable({
          handles: "e,w",
          grid: [1, 0],
          containment:"parent",
          minWidth: CELL_W,
          create: function(){
            // 핸들에 좌우 화살표 커서 적용
            $(this).find('.ui-resizable-e').css('cursor', 'ew-resize');
            $(this).find('.ui-resizable-w').css('cursor', 'ew-resize');
          },
          start: function(){
            $(this).addClass("resizing");
            $(this).find(".txt").hide();
            // 원래 위치와 크기 저장
            $(this).data("originalLeft", $(this).css("left"));
            $(this).data("originalWidth", $(this).css("width"));
          },
          stop: function(e, ui){
            $(this).removeClass("resizing");
            const ratio = ui.size.width / CELL_W;
            const cells = ratio <= 1.5 ? 1 : Math.round(ratio);
            const snapped = Math.max(CELL_W, cells * CELL_W);
            $(this).css("width", snapped + "px");
            applyBarChange($(this));
            $(this).find(".txt").show();
          }
        });

        $b.off('dblclick.wbs').on('dblclick.wbs', function(){
          if($(this).data('summary') === 1 || $(this).data('summary') === "1") return;

    function showGanttContextMenu(x, y, data) {
      $("#ganttContextMenu").remove();
      
      let isExisting = false;
      // actProg가 0보다 크거나 실적일자가 존재하면 실적이 생성된 상태
      if ((data.actProg && Number(data.actProg) > 0) || (data.actSt && String(data.actSt).trim() !== "" && String(data.actSt) !== "null" && String(data.actSt) !== "undefined")) {
          isExisting = true;
      }
      
      let isCompleted = false;
      // 실적이 있을 때에만 완료 상태 여부 판단
      if (isExisting && (data.actCloseYn === "Y" && Number(data.actProg) === 100)) {
          isCompleted = true;
      }
      
      const disableCreate = isExisting;
      const disableComplete = isCompleted;
      const disableReset = !isCompleted;
      const disableDelete = !isExisting;

      // 팝업메뉴 DOM
      const titleName = data.wbsPlanCodeNm || data.fullNm || "선택 공정";
      const mngName = data.wbsPlanMngNm || "";
      let sf = data.wbsPlansDtFm || "";
      let ef = data.wbsPlaneDtFm || "";
      if(typeof sf === "number") sf = ymd(new Date(sf));
      if(typeof ef === "number") ef = ymd(new Date(ef));
      const ds = sf ? (ef ? (sf + " ~ " + ef) : sf) : "";

      const $menu = $(`
        <div id="ganttContextMenu" class="gantt-context-menu" style="left:${x}px; top:${y}px;">
          <div class="menu-title" style="padding:8px 12px; font-weight:bold; border-bottom:1px solid #e2e8f0; margin-bottom:4px; font-size:12px; color:#1e293b; background:#f8fafc; border-top-left-radius:6px; border-top-right-radius:6px;">
             ${titleName} <div style="font-size:11px; color:#64748b; font-weight:normal; margin-top:2px;">담당자 : ${mngName}</div>
             <div style="font-size:11px; color:#64748b; font-weight:normal; margin-top:2px;">${ds}</div>
          </div>
          <div class="menu-item action-btn ${disableCreate ? 'disabled' : ''}" data-action="createActualUnconfirmed">⏱️ 실적진행생성(Task:${data.notWbscodeCount})</div>
          <div class="menu-item action-btn ${disableComplete ? 'disabled' : ''}" data-action="completeActualConfirmed">✅ 실적완료(Task:${data.notWbscodeCount})</div>
          <div class="menu-item action-btn ${disableReset ? 'disabled' : ''}" data-action="resetActualUnconfirmed">🔙 실적미확정처리(Task:${data.notWbscodeCount})</div>
          <div class="menu-item action-btn danger ${disableDelete ? 'disabled' : ''}" data-action="deleteActual">🗑️ 실적삭제(Task:${data.notWbscodeCount})</div>
          <div style="border-top:1px solid #e2e8f0; margin:4px 0;"></div>
          <div class="menu-item action-btn" data-action="refresh" style="color:#0284c7;">🔄 새로고침</div>
        </div>
      `);
      $menu.find(".action-btn").not(".disabled").on("click", function() {
        const action = $(this).data("action");
        callGanttAction(action, data);
      });

      $("body").append($menu);
      $(document).one("mousedown", function(e) { 
        if(!$(e.target).closest('#ganttContextMenu').length) {
          $("#ganttContextMenu").remove(); 
        }
      });
    }

    window.callGanttAction = function(action, data) {
      $("#ganttContextMenu").remove();

      // ✅ 새로고침 액션 처리 (백엔드에서 최신 데이터 재조회)
      if (action === 'refresh') {
        toast("데이터를 새로고침하고 있습니다...");
        if (typeof searchData === "function") searchData(false);
        return;
      }

      // 우클릭했던 Bar DOM 요소
      const $bar = data.$bar; 
      data.$bar = ""; 
      const isActual = data.isActBar;
      
      // plan-bar 드래그 시 역산하는 것과 완전히 동일한 로직 적용
      if ($bar && $bar.length > 0) {
          const leftPx = parseInt($bar.css("left"), 10) || 0;
          const widthPx = Math.max(CELL_W, parseInt($bar.css("width"), 10) || CELL_W);

          const startOffset = Math.round(leftPx / CELL_W);
          const rawDays = widthPx / CELL_W;
          const daysLen = Math.max(1, rawDays <= 1.5 ? 1 : Math.round(rawDays));

          const newStart = addDays(STATE.viewStart, startOffset);
          const newEnd   = addDays(newStart, daysLen - 1);

          // clamp to view
          const minStart = STATE.viewStart;
          const maxEnd   = STATE.viewEnd;
          let s = newStart;
          let e = newEnd;

          if(daysBetween(minStart, s) < 0) s = minStart;
          if(daysBetween(e, maxEnd) < 0) e = maxEnd;

          // console.log("드래그된 위치 기반 시작일:", s);
          // console.log("드래그된 리사이즈 기반 종료일:", e);
          
          data.computedStart = s;
          data.computedEnd = e;
      }

      // if (action=='deleteActual') {
	    //   if (!confirm('실적 삭제하겠습니까?')) {
	    //     return;
	    //   } 
      // } else if (action=='completeActualConfirmed') {  //실적 완료
      //     // data.wbsPlansDtFm = data.computedStart;
      //     // data.wbsPlaneDtFm = data.computedEnd;
      // } 
      

      const param = {
        action: action,
        ...data,
        coCd: $("#coCd_S").val(),
        userId: jwt?.userId,
        pgmId: "WB0701M01"
      };

      const urlMap = {
        'createActualUnconfirmed': '/user/wb/wb07/createActualUnconfirmed',
        'completeActualConfirmed': '/user/wb/wb07/completeActualConfirmed',
        'resetActualUnconfirmed': '/user/wb/wb07/resetActualUnconfirmed',
        'deleteActual': '/user/wb/wb07/deleteActual'
      };
      
      
      if (data.notWbscodeCount > 1) {
    	  // 상세계획 현황 팝업으로 표시하고 완료처리할수 있게
    	  // 목록 선택 후 완료 처리할수 있는 팝업처리
    	  
    	  var paramObj = {
    	      coCd: $("#coCd_S").val(),
    	      salesCd: data.salesCd,
    	      wbsPlanCodeId: data.wbsPlanCodeId,
    	      wbsPlanCodeNm: data.wbsPlanCodeNm,
    	      userId: jwt?.userId
    	  };
    	  
    	  openSecondModal("/static/html/user/wb/wb07/WB0701P02.html", 800, 600, "상세 TASK 완료 처리", paramObj, function() {
            // 해당 TASK 수정작업 진행시에는 간트바 새로그리기 
    	      if (typeof searchData === "function") searchData(false);
    	  });
    	  
      } else {
        
        if (action=='deleteActual') {
          if (!confirm('실적 삭제하겠습니까?')) {
            return;
          } 
        } 
	      postAjax(urlMap[action], param, null, function(res) {
	        if(res && res.resultCode === 200) {
	          toast("처리가 완료되었습니다.");
	          if(typeof searchData === "function") searchData(false);
	        } else {
	          customAlert(res?.resultMessage || "처리 중 오류가 발생했습니다.");
	        }
	      });
      }
    }

    function applyBarChange($bar){

        const isActBar = $bar.hasClass("act-bar");
      // 일정확정된 자료는 버전 변경 확인 (salesCd별로 한 번만)
      const salesCd = $bar.data("salescd") || $bar.closest('.wbs-row').data('salescd');
      if (!isActBar) {
	      if ($bar.data("rowobj") && $bar.data("rowobj").wbsCloseYn == "Y" && salesCd && !confirmedSalesCd.has(salesCd)){
	        if (!confirm('일정확정된 자료는 Version이 변경됩니다. 진행하시겠습니까?')) {
	          // 취소 시 원래 위치와 크기로 복원 
	          const originalLeft = $bar.data("originalLeft");
	          const originalWidth = $bar.data("originalWidth");
	          if (originalLeft !== undefined) {
	            $bar.css("left", originalLeft);
	          }
	          if (originalWidth !== undefined) {
	            $bar.css("width", originalWidth);
	          }
	          return;
	        } else {
	          // 확인 완료된 salesCd 기록
	          confirmedSalesCd.add(salesCd);
	        }
	      }
      }

      // 1) 키 값은 절대 free variable 금지: 항상 DOM/data에서 추출
	  const ORDRS_NO =
	    ($bar && $bar.data) ? ($bar.data("ordrsno")) : null
	    || $bar?.closest?.(".wbs-row")?.data?.("ordrsno")
	    || $bar?.attr?.("data-ordrsno")
	    || "";

	  const SALES_CD =
	    ($bar && $bar.data) ? ($bar.data("salescd")) : null
	    || $bar?.closest?.(".wbs-row")?.data?.("salescd")
	    || "";
	

      const rowId = $bar.data("rowid") || $bar.data("row");
      const leftPx = parseInt($bar.css("left"), 10) || 0;
      const widthPx = Math.max(CELL_W, parseInt($bar.css("width"), 10) || CELL_W);

      const startOffset = Math.round(leftPx / CELL_W);
      const rawDays = widthPx / CELL_W;
      const daysLen = Math.max(1, rawDays <= 1.5 ? 1 : Math.round(rawDays));

      const newStart = addDays(STATE.viewStart, startOffset);
      const newEnd   = addDays(newStart, daysLen - 1);

      // clamp to view
      const minStart = STATE.viewStart;
      const maxEnd   = STATE.viewEnd;
      let s = newStart;
      let e = newEnd;

      if(daysBetween(minStart, s) < 0) s = minStart;
      if(daysBetween(e, maxEnd) < 0) e = maxEnd;

      // snap visual
      $bar.css({ left: (startOffset * CELL_W) + "px", width: (daysLen * CELL_W) + "px" });

      // 데이터 업데이트(원본 rowobj 우선)
      let row = $bar.data("rowobj") || (STATE.rows || []).find(x=>x.rowId===rowId);
      if(!row){
        const deptNm = ($bar.data("deptnm") || "").trim();
        const oldStart = $bar.data("start");
        const oldEnd = $bar.data("end");
        if(SALES_CD && deptNm && oldStart && oldEnd){
          row = (STATE.rows || []).find(x=>x.salesCd===SALES_CD && x.deptNm===deptNm && x.wbsPlansDtFm===oldStart && x.wbsPlaneDtFm===oldEnd);
        }
      }
      if(!row) return;

        // 수정권한이 있는지 점검하고 총괄PM이거나 공통코드의  SELECT CODE_ETC FROM TB_CM05M01 WHERE CODE_ID = 'SPECRTS01'
		// 1. 총괄PM, 일정관리 담당자, 각단계 팀장, 전기는 한동주과장 가능
		// 
		const prdMngEtc = SPECRTS01;
		const prdMngIds = prdMngEtc.replace(/\s/g, '').split(',').filter(Boolean);
		const cu = jwt.userId;
		const hasSms = prdMngIds.includes(cu) || row.smrizeId == cu || row.teamMngId == cu || (row.fullNm == '전기' && cu == 'canmtb')  || cu =='js.nam';
		
		if (!hasSms){
			alert('총괄PM, 일정관리담당자, 담당팀장만 일정 변경 가능합니다.');
			return;
		}
		
      
      if (isActBar) {
          // ✅ 새로 추가: 중복 호출 방지
          if(isApplyingActualChange) {
            console.warn("이미 변경 중입니다. 잠시만 기다려주세요.");
            return;
          }

          // ✅ 플래그 설정
          isApplyingActualChange = true;

          // 실정 Bar를 이동 또는 크기 변경식 아무 처리없이 Bar 크기만 변경함
          if (row.actCloseYn == "N") {
  			      isApplyingActualChange = false;
  			      return;
          }
          
        // [User Request] 하위 TASK가 2개 이상(> 1)인 경우 변경 불가 처리
        if (Number(row.notWbscodeCount || 0) > 1) {
            alert('하위 TASK가 2개 이상인 경우 Gantt에서 일괄 변경할 수 없습니다. 상세 팝업을 이용하세요.');
            const originalLeft = $bar.data("originalLeft");
            const originalWidth = $bar.data("originalWidth");
            if (originalLeft !== undefined) $bar.css("left", originalLeft);
            if (originalWidth !== undefined) $bar.css("width", originalWidth);
            return;
        }

        const param = {
          coCd: row.coCd || "",
          salesCd: row.salesCd,
          wbsPlanCodeId: row.wbsPlanCodeId,
          wbsPlansDtFm: s,
          wbsPlaneDtFm: e,
          userId: jwt ? jwt.userId : "",
          pgmId: $("#pgmId").val() || "WB0701M01"
        };
        
        postAjax("/user/wb/wb07/wbsLevel2PlanChange", param, null, function(res) {
          try {
            if (res && res.resultCode === 200) {
              toast(`일정 변경 완료: ${row.deptNm} (${s} ~ ${e})`);
              row.actSt = s;
              row.actEnd = e;
              $bar.data("start", s);
              $bar.data("end", e);
              $bar.attr("data-start", s);
              $bar.attr("data-end", e);

              // ✅ 재조회 전에 플래그 초기화
              isApplyingActualChange = false;

              if(typeof searchData === "function") searchData(false);
            } else {
              toast("일정 변경 처리에 실패했습니다.");
              const orL = $bar.data("originalLeft");
              const orW = $bar.data("originalWidth");
              if (orL !== undefined) $bar.css("left", orL);
              if (orW !== undefined) $bar.css("width", orW);
              isApplyingActualChange = false;
            }
          } finally {
            isApplyingActualChange = false;
          }
        });
      } else {
	      row.wbsPlansDtFm = s;
	      row.wbsPlaneDtFm = e;
	      $bar.data("start", s);
	      $bar.data("end", e);
	      $bar.attr("data-start", s);
	      $bar.attr("data-end", e);
	
	      toast(`일정 변경: ${row.deptNm} (${s} ~ ${e})`);
	      updateSummaryRowForOrdrs(ORDRS_NO);
	
	      // dirty
	      const $rowEl = $bar.closest(".wbs-row");
	      $rowEl.addClass("row-dirty");
	      const key = row.fileTrgtKey || `${row.salesCd}`;
	      CHANGED_ROWS.set(key, row);
	      
	      // [User Request] Change Save button to red on modification
	      $("#btnSave").addClass("btn-unsaved");
      }
    }

    function bindRemarks(){
      const $wbs = $('#wbs');
      $wbs.off('click.remarks').on('click.remarks', '.remarks', function(){
        const $cell = $(this);
        if($cell.hasClass('editing')) return;

        const raw = String($cell.data('remarks') || '');
        const $input = $('<textarea class="remarks-input"></textarea>').val(raw);
        $cell.addClass('editing').empty().append($input);
        $input.focus().select();

        const commit = () => {
          const val = String($input.val() || '').trim();
          const originalVal = String($cell.data('remarks') || '');

          // 값이 변경되지 않았으면 리턴
          if(val === originalVal) {
            $cell.removeClass('editing');
            $cell.html(val ? escapeHtml(val) : '<small>&nbsp;</small>');
            return;
          }

          $cell.removeClass('editing');
          $cell.data('remarks', val);
          $cell.html(val ? escapeHtml(val) : '<small>&nbsp;</small>');

          // 로컬 STATE 업데이트
          const $row = $cell.closest('.wbs-row');
          const salesCd = $row.data('salescd');
          let updatedRow = null;

          if(salesCd){
            STATE.rows.forEach(row => {
              if(row.salesCd === salesCd) {
                row.remarks = val;
                updatedRow = row;
              }
            });
          } else {
            const rowId = $row.data('rowid');
            updatedRow = STATE.rows.find(x => x.rowId === rowId);
            if(updatedRow) updatedRow.remarks = val;
          }

          // 백엔드에 remarks 수정사항 전송
          if(updatedRow) {
            const updateData = {
              sjFileTrgtKey: updatedRow.sjFileTrgtKey || '',
              salesCd: updatedRow.salesCd || '',
              remarks: val,
              coCd: updatedRow.coCd || jwt?.coCd || '',
              pgmId: $('#pgmId').val() || '',
              userId: jwt?.userId || ''
            };

//             console.log('Remarks 업데이트 요청:', updateData);

            // 백엔드 API 호출
            postAjax("/user/wb/wb07/updateWbsRemarks", updateData, null, function(response) {
              if(response && response.resultCode === 200) {
                toast('비고가 성공적으로 저장되었습니다.');
//                 console.log('Remarks 업데이트 성공');
              } else {
                toast('비고 저장에 실패했습니다. 다시 시도해 주세요.');
                console.error('Remarks 업데이트 실패:', response);
                // 실패 시 로컬 상태도 원래대로 복원
                $cell.data('remarks', originalVal);
                $cell.html(originalVal ? escapeHtml(originalVal) : '<small>&nbsp;</small>');
                if(updatedRow) updatedRow.remarks = originalVal;
              }
            }, function(error) {
              toast('비고 저장 중 오류가 발생했습니다.');
              console.error('Remarks 업데이트 오류:', error);
              // 오류 시 로컬 상태 복원
              $cell.data('remarks', originalVal);
              $cell.html(originalVal ? escapeHtml(originalVal) : '<small>&nbsp;</small>');
              if(updatedRow) updatedRow.remarks = originalVal;
            });
          }
        };

        const cancel = () => {
          $cell.removeClass('editing');
          $cell.html(raw ? escapeHtml(raw) : '<small>&nbsp;</small>');
        };

        $input.on('blur', commit);
      });
    }

     function collectChanges() {
      const changes = [];

    	  // 공통: row -> changes에 적재
    	  const pushChange = (row) => {
