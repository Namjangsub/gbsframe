    .kpi-section    { margin-bottom: 12px; }

                      padding: 10px; text-align: center; height: 100%;
                      display: flex; flex-direction: column; }
    .kpi-card-title { font-size: 13px; font-weight: bold; color: #333;
                      margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px;
                      flex-shrink: 0; }

    .kpi-chart-area > div { margin: 0 auto; }
    .kpi-chart-area table { margin: 0 auto; }
    .search-bar     { background: #f5f5f5; border: 1px solid #ddd; border-radius: 4px;
                      padding: 8px 12px; margin-bottom: 12px; }
    .search-bar select, .search-bar input { height: 28px; font-size: 12px; }
    .search-bar .btn { height: 28px; padding: 0 14px; font-size: 12px; line-height: 28px; }

        <div>

                    <th class="hit">회사</th>
                    <td>
                        <select id="coCd_S" name="coCd_S" data-kind="CO" data-search="coCd">
                            <option value="">전체</option>

                    </td>
                    <th>과제마감</th>

                    <td id="planDtTd">

        </div>
        <div class="col-5th">
            <div class="kpi-card">
                <div class="kpi-card-title">일정 지연 미완료 (%)</div>
                <div id="chart_bar_delay" class="kpi-chart-area" style="height:200px;"></div>
            </div>
        </div>
        <div class="col-5th">
            <div class="kpi-card">
                <div class="kpi-card-title">공수 일치 항목 (%)</div>
                <div id="chart_bar_align" class="kpi-chart-area" style="height:200px;"></div>

<script type="text/javascript">
/* =========================================================
   WB2701M01 — WBS KPI 대시보드
   ========================================================= */

google.charts.load('current', { packages: ['corechart', 'gauge'], language: 'ko' });

$(document).ready(function() {
    mainDefaultLoad("WBS관리", "WBS KPI 대시보드");
    setCommonSelect($('#main_area select[data-kind]'));
    $('#coCd_S').val(jwt.coCd);
    setDatePicker();
    togglePlanDtSearch();
    bindSearchEvents();
    google.charts.setOnLoadCallback(loadAllKpi);
});

/* 공통 AJAX 파라미터 수집 */
function getSearchParam() {
    var endYn = $('#endYn_S').val();
    var useDt = (endYn === '' || endYn === 'Y');
    return {
        coCd:          $('#coCd_S').val(),
        salesCd:       $('#salesCd_S').val(),
        wbsRsltssDt:   useDt ? $('#wbsRsltssDt_S').val() : '',
        wbsRsltseDt:   useDt ? $('#wbsRsltseDt_S').val() : '',
        endYn:         endYn
    };
}

/* 전체 KPI 조회 */
function loadAllKpi() {
    var param = getSearchParam();
    if (!param.coCd) {
        alert('회사를 선택하세요.');
        return;
    }
    loadResourceKpi(param);
    loadGaugeKpi(param);
    loadIssueKpi(param);
    loadBreakdownKpi(param);
}

/* 과제마감 선택에 따라 계획기간 표시/숨김 */
function togglePlanDtSearch() {
    var isEndBefore = $('#endYn_S').val() === 'N';
    if (isEndBefore) {
        $('#planDtTh, #planDtTd').css('visibility', 'hidden');
        $('#wbsRsltssDt_S, #wbsRsltseDt_S')
            .removeAttr('required')
            .removeAttr('data-search');
    } else {
        $('#planDtTh, #planDtTd').css('visibility', 'visible');
        $('#wbsRsltssDt_S').attr('required', true).attr('data-search', 'wbsRsltssDt');
        $('#wbsRsltseDt_S').attr('required', true).attr('data-search', 'wbsRsltseDt');
        if (!$('#wbsRsltssDt_S').val()) setDatePicker();
    }
}

/* 검색 이벤트 바인딩 */
function bindSearchEvents() {
    $('.contents.search')
        .off('change.kpiSearch', '[data-search]')
        .on('change.kpiSearch', '[data-search]', function() {
            if (this.id === 'endYn_S') togglePlanDtSearch();
            loadAllKpi();
        });
}

/* 초기화 */
function initSearch() {
    $('.contents.search').off('change.kpiSearch', '[data-search]');
    $('#salesCd_S').val('');
    $('#wbsRsltssDt_S').val('');
    $('#wbsRsltseDt_S').val('');
    $('#endYn_S').val('N');
    togglePlanDtSearch();
    bindSearchEvents();
    clearAllCharts();
}

function clearAllCharts() {
    ['chart_plan_pie','chart_rslts_pie','chart_issues_bar',
     'chart_gauge_status','chart_gauge_schedule','chart_gauge_alignment','chart_gauge_risk',
     'chart_gauge_delay','chart_bar_delay',
     'chart_bar_critical','chart_bar_late','chart_bar_align','chart_bar_risk'
    ].forEach(function(id) { $('#' + id).html(''); });
}

/* ── 1. 리소스 파이 차트 ─────────────────────────── */
function loadResourceKpi(param) {
    $.ajax({
        type: 'POST',
        url: '/user/wb/wb27/selectResourceKpi',
        contentType: 'application/json; charset=utf-8',
        dataType: 'json',
        data: JSON.stringify(param),
        beforeSend: function(req) { req.setRequestHeader('Authorization', authorizationToken); },
        success: function(data) {
            var rows = data.resultList || [];
            if (!rows.length) { $('#chart_plan_pie, #chart_rslts_pie').html('<p style="color:#aaa;margin-top:80px;">데이터 없음</p>'); return; }
            // 계획 기간 분포: 단계별 계획 일수 합계
            var daysTotal = rows.reduce(function(s, r) { return s + (parseFloat(r['PLAN_DAYS']) || 0); }, 0);
            if (daysTotal > 0) {
                drawPieChart('chart_plan_pie', rows, 'WBS_PLAN_CODE_NM', 'PLAN_DAYS', '계획 일수(일)');
            } else {
                $('#chart_plan_pie').html('<p style="color:#aaa;margin-top:80px;">기간 데이터 없음</p>');
            }
            // 실적 공수 분포: 실적이 하나라도 있을 때만 표시
            var rsltsTotal = rows.reduce(function(s, r) { return s + (parseFloat(r['RSLTS_MH']) || 0); }, 0);
            if (rsltsTotal > 0) {
                drawPieChart('chart_rslts_pie', rows, 'WBS_PLAN_CODE_NM', 'RSLTS_MH', '실적 공수(MH)');
            } else {
                $('#chart_rslts_pie').html('<p style="color:#aaa;margin-top:80px;">실적 없음</p>');
            }
        },
        error: function() { $('#chart_plan_pie, #chart_rslts_pie').html('<p style="color:red;margin-top:80px;">조회 오류</p>'); }
    });
}

function drawPieChart(divId, rows, labelKey, valueKey, title) {
    var tableData = [['구분', title]];
    var total = 0;
    rows.forEach(function(r) {
        var v = parseFloat(r[valueKey]) || 0;
        total += v;
        tableData.push([r[labelKey] || r['WBS_PLAN_CODE_ID'] || '미분류', v]);
    });
    if (total <= 0) {
        $('#' + divId).html('<p style="color:#aaa;margin-top:80px;">데이터 없음</p>');
        return;
    }
    var data = google.visualization.arrayToDataTable(tableData);
    var options = {
        title: '',
        legend: { position: 'right', textStyle: { fontSize: 11 } },
        chartArea: { left: 10, top: 10, width: '65%', height: '85%' },
        colors: ['#14B8A6','#38BDF8','#A78BFA','#FB923C','#34D399','#60A5FA'],
        pieSliceTextStyle: { fontSize: 10 },
        tooltip: { textStyle: { fontSize: 11 } }
    };
    new google.visualization.PieChart(document.getElementById(divId)).draw(data, options);
}

/* ── 2. 게이지 차트 ──────────────────────────────── */
function loadGaugeKpi(param) {
    $.ajax({
        type: 'POST',
        url: '/user/wb/wb27/selectGaugeKpi',
        contentType: 'application/json; charset=utf-8',
        dataType: 'json',
        data: JSON.stringify(param),
        beforeSend: function(req) { req.setRequestHeader('Authorization', authorizationToken); },
        success: function(data) {
            var r = data.resultMap || {};
            drawGauge('chart_gauge_status',    '진행률',   parseFloat(r['STATUS_VAL'])    || 0, 100, false);
            drawGauge('chart_gauge_schedule',  '준수율',   parseFloat(r['SCHEDULE_VAL'])  || 0, 100, false);
            drawGauge('chart_gauge_alignment', '일치율',   parseFloat(r['ALIGNMENT_VAL']) || 0, 150, false);
            drawGauge('chart_gauge_risk',      '리스크',   parseFloat(r['RISK_VAL'])      || 0, 100, true);
            drawGauge('chart_gauge_delay',     '지연율',   parseFloat(r['DELAY_VAL'])     || 0, 100, true);
        },
        error: function() {
            ['chart_gauge_status','chart_gauge_schedule','chart_gauge_alignment','chart_gauge_risk']
                .forEach(function(id){ $('#'+id).html('<p style="color:red;">조회 오류</p>'); });
        }
    });
}

function drawGauge(divId, label, value, maxVal, inverted) {
    var data = google.visualization.arrayToDataTable([
        ['구분', '값'],
        [label, value]
    ]);
    var container = document.getElementById(divId);
    var w = Math.min(container.offsetWidth || 200, 200);
    var h = Math.round(w * 0.75);
    var options = {
        width: w, height: h,
        max: maxVal,
        redFrom:    inverted ? maxVal * 0.6 : 0,
        redTo:      inverted ? maxVal       : maxVal * 0.4,
        yellowFrom: inverted ? maxVal * 0.3 : maxVal * 0.4,
        yellowTo:   inverted ? maxVal * 0.6 : maxVal * 0.7,
        greenFrom:  inverted ? 0            : maxVal * 0.7,
        greenTo:    inverted ? maxVal * 0.3 : maxVal,
        minorTicks: 5,
        majorTicks: generateTicks(0, maxVal, 5),
        animation: { duration: 800, easing: 'out' }
    };
    new google.visualization.Gauge(container).draw(data, options);
    /* Google Charts 가 주입한 div/table 을 명시적으로 가운데 정렬 */
    $('#' + divId + ' > div').css({ margin: '0 auto', display: 'block' });
    $('#' + divId + ' table').css({ margin: '0 auto' });
}

function generateTicks(min, max, count) {
    var ticks = [], step = (max - min) / count;
    for (var i = 0; i <= count; i++) { ticks.push(String(Math.round(min + step * i))); }
    return ticks;
}

/* ── 3. 이슈 스택 바 차트 ────────────────────────── */
function loadIssueKpi(param) {
    $.ajax({
        type: 'POST',
        url: '/user/wb/wb27/selectIssueKpi',
        contentType: 'application/json; charset=utf-8',
        dataType: 'json',
        data: JSON.stringify(param),
        beforeSend: function(req) { req.setRequestHeader('Authorization', authorizationToken); },
        success: function(data) {
            var rows = data.resultList || [];
            if (!rows.length) { $('#chart_issues_bar').html('<p style="color:#aaa;margin-top:80px;">데이터 없음</p>'); return; }
            drawIssueBar(rows);
        },
        error: function() { $('#chart_issues_bar').html('<p style="color:red;margin-top:80px;">조회 오류</p>'); }
    });
}

function drawIssueBar(rows) {
    // 4개 중요도: 비상빈상(HH) > 비하빈상(LH) > 비상빈하(HL) > 비하빈하(LL)
    var tableData = [['WBS코드', '비상빈상', '비하빈상', '비상빈하', '비하빈하']];
    rows.forEach(function(r) {
        tableData.push([
            r['WBS_PLAN_CODE_NM'] || r['WBS_PLAN_CODE_ID'] || '미분류',
            parseInt(r['CNT_HH']) || 0,
            parseInt(r['CNT_LH']) || 0,
            parseInt(r['CNT_HL']) || 0,
            parseInt(r['CNT_LL']) || 0
        ]);
    });
    var data = google.visualization.arrayToDataTable(tableData);
    var options = {
        isStacked: true,
        legend: { position: 'bottom', textStyle: { fontSize: 10 } },
        chartArea: { left: 90, top: 10, width: '60%', height: '65%' },
        colors: ['#EF4444', '#F97316', '#FBBF24', '#22C55E'],
        hAxis: { textStyle: { fontSize: 10 } },
        vAxis: { textStyle: { fontSize: 10 } },
        bar: { groupWidth: '60%' }
    };
    new google.visualization.BarChart(document.getElementById('chart_issues_bar')).draw(data, options);
}

/* ── 4. 브레이크다운 바 차트 ─────────────────────── */
function loadBreakdownKpi(param) {
    $.ajax({
        type: 'POST',
        url: '/user/wb/wb27/selectBreakdownKpi',
        contentType: 'application/json; charset=utf-8',
        dataType: 'json',
        data: JSON.stringify(param),
        beforeSend: function(req) { req.setRequestHeader('Authorization', authorizationToken); },
        success: function(data) {
            var rows = data.resultList || [];
            if (!rows.length) {
                ['chart_bar_critical','chart_bar_late','chart_bar_delay','chart_bar_align','chart_bar_risk']
                    .forEach(function(id){ $('#'+id).html('<p style="color:#aaa;margin-top:60px;">데이터 없음</p>'); });
                return;
            }
            drawBreakdownBar('chart_bar_critical', rows, 'CRITICAL_RATE', 'Critical(%)',    '#EF4444');
            drawBreakdownBar('chart_bar_late',     rows, 'LATE_RATE',     '지연 항목(%)',   '#F97316');
            drawBreakdownBar('chart_bar_delay',    rows, 'DELAY_RATE',    '지연율(%)',      '#FBBF24');
            drawBreakdownBar('chart_bar_align',    rows, 'ALIGN_RATE',    '일치 항목(%)',   '#14B8A6');
            drawBreakdownBar('chart_bar_risk',     rows, 'RISK_RATE',     '위험보유율(%)',  '#8B5CF6');
        },
        error: function() {
            ['chart_bar_critical','chart_bar_late','chart_bar_delay','chart_bar_align','chart_bar_risk']
                .forEach(function(id){ $('#'+id).html('<p style="color:red;">조회 오류</p>'); });
        }
    });
}

function drawBreakdownBar(divId, rows, valueKey, label, color) {
    var tableData = [['WBS코드', label]];
    var maxVal = 0;
    rows.forEach(function(r) {
        var v = parseFloat(r[valueKey]) || 0;
        if (v > maxVal) maxVal = v;
        tableData.push([
            r['WBS_PLAN_CODE_NM'] || r['WBS_PLAN_CODE_ID'] || '미분류',
            v
        ]);
    });
    /* 최대값보다 10~20% 여유를 두어 레이블이 잘리지 않도록 */
    var axisMax = maxVal > 0 ? Math.ceil(maxVal * 1.15) : 10;
    var data = google.visualization.arrayToDataTable(tableData);
    var options = {
        legend: 'none',
        colors: [color],
        chartArea: { left: 80, top: 10, width: '80%', height: '75%' },
        vAxis: { minValue: 0, maxValue: axisMax, textStyle: { fontSize: 10 },
                 title: label.indexOf('%') >= 0 ? '%' : '',
                 titleTextStyle: { fontSize: 10 } },
        hAxis: { textStyle: { fontSize: 10 } },
        bar: { groupWidth: '55%' },
        animation: { duration: 600, easing: 'out', startup: true }
    };
    new google.visualization.ColumnChart(document.getElementById(divId)).draw(data, options);
}

/* ── 유틸: 날짜 피커 ─────────────────────────────── */
function setDatePicker() {
    var now = moment().startOf('month');
    $('#wbsRsltssDt_S').val(now.add(-6, 'M').format('YYYY-MM-DD'));
    $('#wbsRsltseDt_S').val(moment(new Date()).endOf('month').format('YYYY-MM-DD'));

    $('#wbsRsltssDt_S, #wbsRsltseDt_S').on('click', function() {
        DateRangePicker.open({
            startDt: $('#wbsRsltssDt_S').val() || null,
            endDt:   $('#wbsRsltseDt_S').val() || null,
            excludeSelectors: ['#wbsRsltssDt_S', '#wbsRsltseDt_S'],
            onApply: function(sd, ed) {
                $('#wbsRsltssDt_S').val(sd);
                $('#wbsRsltseDt_S').val(ed);
                loadAllKpi();
            }
        });
    });
}
