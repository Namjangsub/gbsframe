<div class="popup_area of_a" style="width: 100%; height: 100%;">
	<div class="tit_contents">
		<h4 class="tit">출고전후사진</h4>
	</div>
	<div class="popup_table">
		<div class="form-group">
			<form id="popForm" onSubmit="return false;">
				<input type="hidden" id="coCd" name="coCd">
				<input type="hidden" id="fileTrgtKey" name="fileTrgtKey">

				<table class="popup_table">
					<colgroup>
						<col width="15%">
						<col width="12%">
						<col width="25%">
						<col width="16%">
						<col width="24%">
						<col width="15%">
						<col width="23%">
						<col width="12%">
						<col width="23%">
					</colgroup>

					<thead>
						<tr>
							<td colspan="9" style="height:30px;text-align: left;">
								<div id="ordrsDivNm" style="font-weight: bold; color: blue;">▣ 과제정보</div>
							</td>
						</tr>
					</thead>
					<tr style="text-align: left;">
						<th>과제기본정보</th>
						<th>과제번호</th>
						<td><input type="text" id="sjNo" name="sjNo" readonly></td>
						<th>과제명</th>
						<td colspan="3"><input type="text" id="sjNm" name="sjNm" readonly></td>
						<th>Ver.</th>
						<td><input type="text" id="verNo" name="verNo" readonly></td>
					</tr>

					<tr style="text-align: left;">
						<th>고객기본정보</th>
						<th>고객사</th>
						<td><input type="text" id="clntNm" name="clntNm" readonly></td>
						<th>SALES CODE</th>
						<td><input type="text" id="salesCd" name="salesCd" readonly></td>
						<th>제작처 구분</th>
						<td><input type="text" id="mkerDivNm" name="mkerDivNm" readonly></td>
						<th>차종</th>
						<td><input type="text" id="clntPjtNm" name="clntPjtNm" readonly></td>
					</tr>

					<tr style="text-align: left;">
						<th>실행정보</th>
						<th>제품</th>
						<td><input type="text" id="prdtNm" name="prdtNm" readonly></td>
						<th>총괄PM</th>
						<td><input type="text" id="smrizeNm" name="smrizeNm" readonly></td>
						<th>제작업체</th>
						<td><input type="text" id="mkerNm" name="mkerNm" readonly></td>
						<th style="color: blue;">확정</th>
						<td>
							<input type="hidden" id="closeYn" name="closeYn"><div id="close"></div>
						</td>
					</tr>

					<tr style="text-align: left;">
						<th>납기정보</th>
						<th>시작일</th>
						<td><input id="beginDt" name="beginDt" readonly></td>
						<th>출고일</th>
						<td><input id="deDt" name="deDt" readonly></td>
						<th>설치완료검수일</th>
						<td><input id="acptncDt" name="acptncDt" readonly></td>
						<th>소요일수</th>
						<td><input id="reqreDaycnt" name="reqreDaycnt" readonly></td>
					</tr>
				</table>
			</form>
		</div>
	</div>

	<div class="form-group" style="display: flex; gap: 15px; width: 100%; margin-top: 10px;">
		<div class="photoBox photoBox-before">
			<div class="photoBoxHead">
				<span class="photoBoxTit">
					<i class="photoBoxDot"></i>출고전 사진
					<span class="photoCount" id="beforeCount">0</span>
				</span>
				<button type="button" class="btn btn-primary btn-sm photoAddBtn-before" onclick="$('#beforeFileInput').click();">사진추가</button>
			</div>
			<input type="file" id="beforeFileInput" accept="image/*" multiple style="display:none" onchange="uploadPhotos('before', this.files); this.value='';">
			<div id="beforeThumbs" class="photoThumbArea"></div>
		</div>
		<div class="photoBox photoBox-after">
			<div class="photoBoxHead">
				<span class="photoBoxTit">
					<i class="photoBoxDot"></i>출고후 사진
					<span class="photoCount" id="afterCount">0</span>
				</span>
				<button type="button" class="btn btn-primary btn-sm photoAddBtn-after" onclick="$('#afterFileInput').click();">사진추가</button>
			</div>
			<input type="file" id="afterFileInput" accept="image/*" multiple style="display:none" onchange="uploadPhotos('after', this.files); this.value='';">
			<div id="afterThumbs" class="photoThumbArea"></div>
		</div>
	</div>
</div>

<div class="popup_bottom_btn">
	<button type="button" class="close_btn" onclick="modalStack.close();">닫기</button>
</div>

<style>
	.photoBox { flex: 1; border: 1px solid #ddd; border-top: 4px solid #ccc; border-radius: 4px; padding: 10px; background: #fff; }
	.photoBox-before { border-top-color: #e08e0b; }
	.photoBox-after  { border-top-color: #2e7d32; }

	.photoBoxHead { display:flex; justify-content: space-between; align-items:center; margin-bottom: 8px; padding: 6px 8px; border-radius: 4px; }
	.photoBox-before .photoBoxHead { background: #fdf3e2; }
	.photoBox-after  .photoBoxHead { background: #e8f3e9; }

	.photoBoxTit { font-size: 15px; font-weight: bold; display:flex; align-items:center; gap: 6px; }
	.photoBox-before .photoBoxTit { color: #a3620a; }
	.photoBox-after  .photoBoxTit { color: #205e27; }

	.photoBoxDot { width: 9px; height: 9px; border-radius: 50%; display:inline-block; }
	.photoBox-before .photoBoxDot { background: #e08e0b; }
	.photoBox-after  .photoBoxDot { background: #2e7d32; }

	.photoCount {
		font-size: 11px; font-weight: bold; color: #fff; border-radius: 10px;
		padding: 1px 7px; margin-left: 2px;
	}
	.photoBox-before .photoCount { background: #e08e0b; }
	.photoBox-after  .photoCount { background: #2e7d32; }

	.photoAddBtn-before { background-color: #e08e0b; border-color: #e08e0b; }
	.photoAddBtn-after  { background-color: #2e7d32; border-color: #2e7d32; }

	.photoThumbArea { display:flex; flex-wrap:wrap; gap:10px; min-height: 420px; align-content: flex-start; }

	.photoThumbCard { position: relative; width: 130px; }
	.photoThumbCard img { width: 130px; height: 100px; object-fit: cover; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background:#f5f5f5; }
	.photoThumbCard .photoDelBtn {
		position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; line-height: 18px;
		border-radius: 50%; background: #d9534f; color: #fff; text-align: center; cursor: pointer; font-size: 12px;
	}
	.photoThumbCard .photoFileNm { font-size: 11px; color: #666; text-align: center; margin-top: 3px; word-break: break-all; }
</style>

<script type="text/javascript">
	// 출고전/출고후 사진은 기존 WBS계획등록(WB2201P01) 첨부파일과 겹치지 않도록 별도 FILE_TRGT_TYP을 사용함
	// comonCd는 전/후 구분 없이 기존 공통코드 FITR05(사진, 미디어)로 통일함 (신규 코드/권한 등록 불필요)
	// 이 팝업은 열 때마다 <script>가 같은 전역 스코프에 재주입되므로 const/let(재선언 시 SyntaxError) 대신 var를 사용함
	var SHIP_PHOTO_TYP = { before: 'WB2201P07_BF', after: 'WB2201P07_AF' };
	var SHIP_PHOTO_COMON_CD = { before: 'FITR05', after: 'FITR05' };
	// attachImageView.html이 실제 이미지로 인식하는 확장자와 동일하게 맞춤(썸네일도 동일 기준으로 판단)
	var IMAGE_EXTS = ['jpg','jpeg','png','gif','bmp','webp','svg','heic','ico','tif','tiff'];

	var coCd = null;
	var fileTrgtKey = null;
	var beforeList = [];
	var afterList = [];
	// TB_CM08M01 저장 시 거래처/제품/프로젝트/수주번호도 같이 저장되도록 selectSjInfo 조회 결과에서 채움
	var clntCd = null;
	var prdtCd = null;
	var prjctCd = null;
	var ordrsNo = null;

	$(document).ready(function() {
		var paramObj = modalStack.last().paramObj;
		coCd = paramObj.coCd;
		fileTrgtKey = paramObj.fileTrgtKey;

		$('#coCd').val(paramObj.coCd);
		$('#salesCd').val(paramObj.salesCd);
		$('#fileTrgtKey').val(paramObj.fileTrgtKey);

		loadSjInfo(paramObj.coCd, paramObj.salesCd);
		loadPhotoList();
	});

	// 과제정보 헤더는 WB2201P01(WBS계획등록)과 동일한 조회를 재사용함
	function loadSjInfo(_coCd, _salesCd) {
		var paramObj = { "coCd": _coCd, "salesCd": _salesCd };
		postAjax("/user/wb/wb22/selectSjInfo", paramObj, null, function(data) {
			var row = data.resultList;
			if (row == undefined) return;

			$.each(row, function(key, val) {
				if (key == "fileTrgtKey") return; // 과제 단위 키이므로 라인(품목) 단위 fileTrgtKey를 덮어쓰지 않음
				$("#popForm #" + key).val(val);
				if (key == "closeYn") {
					var color = val == "Y" ? "color-circle_02.png" : "color-circle_01.png";
					$("#popForm #close").html('<img src="/static/img/' + color + '" align="center" style="width: 10px;height: 10px;"></img>');
				}
			});

			// CM08 저장용: selectSjInfo가 내려주는 키는 popForm 인풋 id와 이름이 다르므로 별도로 매핑
			clntCd = row.clntCd;
			prdtCd = row.prdtCd;
			prjctCd = row.clntPjt;
			ordrsNo = row.ordrsNo;

			$("#popForm #ordrsDivNm").text('▣ 과제정보 [' + row.salesCd + '] - ' + row.ordrsDivNm);
		});
	}

	function loadPhotoList() {
		var paramObj = { "coCd": coCd, "fileTrgtKey": fileTrgtKey };
		postAjax("/user/wb/wb22/selectShipmentPhotoList", paramObj, null, function(data) {
			// attachImageView.html의 PDF변환/다운로드는 목록에 넘긴 file.coCd를 직접 사용하므로
			// 서버 응답값 유무와 상관없이 이 팝업이 알고 있는 coCd로 보정해줌
			beforeList = (data.beforeList || []).map(function(f) { f.coCd = coCd; return f; });
			afterList = (data.afterList || []).map(function(f) { f.coCd = coCd; return f; });
			renderThumbs('before', beforeList);
			renderThumbs('after', afterList);
		});
	}

	function renderThumbs(type, list) {
		var $area = (type == 'before') ? $('#beforeThumbs') : $('#afterThumbs');
		$('#' + type + 'Count').text(list.length);
		$area.empty();
		if (!list.length) {
			$area.append('<div style="color:#999; padding: 10px;">등록된 사진이 없습니다.</div>');
			return;
		}
		$.each(list, function(idx, file) {
			var ext = (file.fileName || '').split('.').pop().toLowerCase();
			var $img = $('<img>').on('click', function() {
				imageViewPopup(coCd, file.fileKey, file.fileName, list);
			});

			if (IMAGE_EXTS.includes(ext)) {
				loadThumbnail(file.fileKey, $img); // 실제 이미지는 서버에서 받아와 썸네일로 표시
			} else {
				$img.attr('src', getIconSrcByExt(ext)); // 이미지가 아니면 확장자별 아이콘만 표시
			}

			var $card = $('<div class="photoThumbCard"></div>');
			$card.append($img);
			$card.append($('<div class="photoDelBtn">&times;</div>').on('click', function() {
				deletePhoto(file.fileKey);
			}));
			$card.append($('<div class="photoFileNm"></div>').text(file.fileName));
			$area.append($card);
		});
	}

	// fileDownloadAuth2는 pdfjs-viewer 헤더가 있어야 응답하므로 <img src>로 직접 요청할 수 없어 XHR로 blob을 받아 표시함
	function loadThumbnail(fileKey, $img) {
		var xhr = new XMLHttpRequest();
		xhr.open("GET", "/admin/cm/cm08/fileDownloadAuth2?fileKey=" + fileKey + "&userId=" + jwt.userId + "&coCd=" + coCd, true);
		xhr.responseType = "blob";
		xhr.setRequestHeader("Authorization", authorizationToken);
		xhr.setRequestHeader("X-GBS-Source", "pdfjs-viewer");
		xhr.onload = function() {
			if (xhr.status === 200) {
				$img.attr('src', window.URL.createObjectURL(xhr.response));
			}
		};
		xhr.send();
	}

	function getIconSrcByExt(ext) {
		const base = '/static/img/svg';
		const videoExts = ['mp4','webm','mov','avi','mkv','flv','wmv','mpg','mpeg','m4v','3gp','ts','ogg'];

		if (ext === 'pdf') return `${base}/pdf.svg`;
		if (videoExts.includes(ext)) return `${base}/video.svg`;
		return `${base}/image.svg`; // 그 외(hwp, docx 등) 미리보기 아이콘이 없으므로 기본 파일 아이콘으로 대체
	}

	function uploadPhotos(type, files) {
		if (!files || files.length == 0) return;

		var formData = new FormData();
		formData.append("pgmId", SHIP_PHOTO_TYP[type]);
		formData.append("fileTrgtKey", fileTrgtKey);
		formData.append("coCd", coCd);
		formData.append("salesCd", $('#salesCd').val());
		formData.append("userId", jwt.userId);
		formData.append("comonCd", SHIP_PHOTO_COMON_CD[type]);
		// 통합파일관리(CM1201M01) 등에서 거래처/제품/프로젝트/수주번호가 함께 조회되도록 전달
		formData.append("clntCd", clntCd || "");
		formData.append("prdtCd", prdtCd || "");
		formData.append("prjctCd", prjctCd || "");
		formData.append("ordrsNo", ordrsNo || "");

		$.each(files, function(idx, file) {
			formData.append("files", file);
		});

		// CM08의 공용 /fileUpload는 salesCd/clntCd/prdtCd 등을 저장하지 않으므로
		// WB22 전용 업로드 엔드포인트(CM08Svc.uploadFile 재사용)를 사용함
		filePostAjax("/user/wb/wb22/uploadShipmentPhoto", formData, function(data) {
			if (data.resultCode == 200) {
				loadPhotoList();
			} else {
				customAlert(data.resultMessage || "사진 업로드에 실패했습니다.");
			}
		});
	}

	function deletePhoto(fileKey) {
		if (!confirm("사진을 삭제하시겠습니까?")) return;

		var paramObj = { "fileKey": fileKey, "userId": jwt.userId, "coCd": coCd };
		deleteAjax("/admin/cm/cm08/deleteFileCallAuth", paramObj, null, function(data) {
			if (data.resultCode == 200) {
				loadPhotoList();
			} else {
				customAlert(data.resultMessage || "사진 삭제에 실패했습니다.");
			}
		});
	}
</script>
