<script type="text/javascript">

	var jm = null;
	var sameTimeResult = "N";
	const sunsetBliss = ['#0d47a1', '#006494', '#006d77', '#166088', '#218380', '#73d2de', '#ffbc42', '#d81159', '#8f2d56', '#218380', '#73d2de'];

	// 줌 & 팬 상태 제어 변수
	var zoomScale = 1.0;
	var zoomOffset = { x: 0, y: 0 };
	var isDragging = false;
	var isSpacePressed = false;
	var dragStartPos = { x: 0, y: 0 };
	var dragStartOffset = { x: 0, y: 0 };

	// 줌 & 팬 CSS transform 적용 함수
	function updateTransform() {
		var $inner = $('#jsmind_container .jsmind-inner');
		if ($inner.length > 0) {
			$inner.css({
				'transform': 'translate(' + zoomOffset.x + 'px, ' + zoomOffset.y + 'px) scale(' + zoomScale + ')',
				'transform-origin': '0 0'
			});
		}
	}

	// 마인드맵의 크기를 계산하여 컨테이너 화면에 딱 맞게 정렬(Auto Fit)하는 함수
	function fitToContainer() {
		if (!jm || !jm.mind) return;

		var container = document.getElementById('jsmind_container');
		var containerWidth = container.clientWidth;
		var containerHeight = container.clientHeight;

		var nodes = jm.mind.nodes;
		var minX = Infinity, maxX = -Infinity;
		var minY = Infinity, maxY = -Infinity;
		var hasNodes = false;

		for (var id in nodes) {
			var node = nodes[id];
			var view = node._data.view;
			if (!view) continue;

			var x = view.abs_x;
			var y = view.abs_y;
			var w = view.width;
			var h = view.height;

			// 유효한 좌표와 크기를 가진 노드들만 수집
			if (typeof x === 'number' && typeof y === 'number' && w > 0 && h > 0) {
				hasNodes = true;
				if (x < minX) minX = x;
				if (x + w > maxX) maxX = x + w;
				if (y < minY) minY = y;
				if (y + h > maxY) maxY = y + h;
			}
		}

		if (!hasNodes) {
			zoomScale = 1.0;
			zoomOffset = { x: 0, y: 0 };
			updateTransform();
			return;
		}

		var mapWidth = maxX - minX;
		var mapHeight = maxY - minY;

		// 넉넉한 마진 패딩 확보 (사방 40px)
		var padding = 40;
		var scaleX = (containerWidth - padding * 2) / mapWidth;
		var scaleY = (containerHeight - padding * 2) / mapHeight;

		// 가로/세로 비율 중 더 작게 맞추는 쪽을 채택하여 전체 노드가 보이도록 보장
		var fitScale = Math.min(scaleX, scaleY);

		// 최대 배율은 1.0(원본), 최소 배율은 0.65로 제한하여 가독성이 무너지지 않도록 함
		zoomScale = Math.max(0.65, Math.min(1.0, fitScale));

		// 마인드맵 영역의 중심이 컨테이너의 중심에 오도록 offset 계산
		var mapCenterX = minX + mapWidth / 2;
		var mapCenterY = minY + mapHeight / 2;
		var containerCenterX = containerWidth / 2;
		var containerCenterY = containerHeight / 2;

		zoomOffset.x = containerCenterX - mapCenterX * zoomScale;
		zoomOffset.y = containerCenterY - mapCenterY * zoomScale;

		updateTransform();
	}

	// 화면 해상도 및 창 크기에 맞추어 마인드맵 컨테이너 높이를 동적으로 조절하는 함수
	function resizeContainer() {
		var $container = $('#jsmind_container');
		if ($container.length === 0) return;

		var offset = $container.offset();
		var windowHeight = $(window).height();

		// 브라우저 창 바닥으로부터 여백(마진) 25px 확보
		var dynamicHeight = windowHeight - offset.top - 25;

		// 최소 높이 400px 보장하여 너무 극단적으로 작아지는 것 방지
		dynamicHeight = Math.max(400, dynamicHeight);

		$container.css('height', dynamicHeight + 'px');

		// 컨테이너 높이가 변경되었으므로 jsMind 내부 영역 리사이즈 수행
		if (jm) {
			jm.resize();
		}
	}

	var gridView = {
		initView: function(){
			$(document).on('mouseenter', 'jmnode', function(e) {
				var nodeid = $(this).attr('nodeid');
				if (!jm) return;
				var node = jm.get_node(nodeid);
				if (!node || !node.data) return;

				var data = node.data;
				if (data.data && typeof data.data === 'object') {
					data = data.data;
				}

				if (data.todoKey || data.todoNo || data.todoDiv2CodeId) {
					showTooltip(e, node);
				}
			}).on('mouseleave', 'jmnode', function() {
				$('#node-tooltip').hide();
			}).on('mousemove', 'jmnode', function(e) {
				moveTooltip(e);
			}).on('dblclick', 'jmnode', function(e) {
				var nodeid = $(this).attr('nodeid');
				if (!jm) return;
				var node = jm.get_node(nodeid);
				if (!node || !node.data) {
					return;
				}

				// Handle jsMind nested data wrapping if any
				var data = node.data;
				if (data.data && typeof data.data === 'object') {
					data = data.data;
				}


				// Invoke if it's an actual To-Do item with a valid identifier
				if (data.todoKey || data.todoNo || data.todoDiv2CodeId) {
					gridView.openFile(data);
				}
			});

			return this;
		},
		openFile: function (item) {
			if (!item) return;

			item = getTodoInfo(item);

			// 방어 코드: 연결된 화면 경로가 없는 경우 404 서버 에러 및 강제 로그아웃 방지
			if (!item.pgPath || item.pgPath === 'undefined' || item.pgPath.trim() === '') {
				customAlert("결재 화면 경로가 존재하지 않습니다. 시스템 관리자에게 문의바랍니다.");
				return false;
			}

			let addParam = {
				"viewMode": 1,
				"todoView": "INQ",
				"todoKey": item.todoKey,
				"coCd": item.coCd,
				"todoCoCd": item.coCd,
				"todoDiv1CodeId": item.todoDiv1CodeId,
				"todoFileTrgtKey": item.todoFileTrgtKey,
				"etcField2": item.etcField2,
				"gridObj" :item
			};

			let paramObj = {};
			if (item.todoDiv2CodeId != "TODODIV9999") {
				try {
					paramObj = JSON.parse(item.pgParam || '{}');
				} catch(e) { paramObj = {}; }
				Object.assign(paramObj, addParam);
			}

			// popupCallType 분기에 따라 파라미터 재구성 (공통 맵핑 덮어쓰기 방지)
			if (item.popupCallType == 'ISS' || item.popupCallType == 'RSLT' || item.popupCallType == 'REQ' || item.popupCallType == 'RES') {
				try {
					paramObj = JSON.parse(item.pgParamTo || '{}');
				} catch(e) { paramObj = {}; }
				paramObj.coCd = item.coCd;
				paramObj.userId = jwt.userId;
			}

	function getGroupColor(item) {
		var nodeId = item.nodeId;
		var level = Number(item.nodeLevel); // 문자열 데이터를 숫자로 변환하여 비교

		// 최상위 루트 (결재/공유) - 진한 블루
		if (nodeId === 'APPR') return '#0d47a1';
		if (nodeId === 'SHARE') return '#3C47E3';

		var rootKey = (item.parentNodeId || item.nodeId || '');
        var isShare = rootKey.indexOf('SHARE') === 0;

		// L2: 수주번호
        if (level == 2) return isShare ? '#4B54DD' : '#1565c0';

        // L3: Sales Code
        if (level == 3) return isShare ? '#565ED6' : '#1976d2';
		// 기타 폴더 (Item 등)
		return '#f0f0f0';
	}

	function renderMind(nodeList) {
		if (!nodeList || nodeList.length === 0) {
			if (jm) {
				jm.show({meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' }, format: 'node_array',
						data: [{ id: 'root', topic: '조회된 데이터가 없습니다.', isroot: true }]});
			}
			return;
		}

		var nodeArray = [];
		var chkUserId = $('#salesMngId_S').val();

		// 루트 노드
		nodeArray.push({ id: 'root', topic: 'TO-DO LIST', isroot: true,
						'background-color': '#90caf9', 'foreground-color': '#000000' });

		nodeList.forEach(function(item) {
			var nodeType  = item.nodeType;
			var nodeId    = item.nodeId;
			var parentId  = item.parentNodeId;
			var nodeName  = item.nodeName;

			var nodeObj = {
				id: nodeId,
				parentid: parentId,
				topic: '<div class="node-text-wrapper">' + nodeName + '</div>',
				data: Object.assign({histYn: 'N'}, item) // 기본적으로 histYn은 'N'으로 설정하여 바인딩
			};

			if (nodeType === 'GROUP') {
				nodeObj['background-color'] = getGroupColor(item);
				nodeObj['foreground-color'] = (item.nodeLevel === 3) ? '#333' : '#fff'; // L3는 밝은색이므로 어두운 글자
				nodeArray.push(nodeObj);
			} else if (nodeType === 'ITEM') {
				var isMyTask = true;
				var isDone = true;
				var todoInfo = getTodoInfo(item);
				isDone = (todoInfo.sanctnSttus === 'Y');
				isMyTask = (todoInfo.todoId === chkUserId);


				if (isDone || !isMyTask) {
					// 완료되었거나 타인의 결재 건: 회색 처리
					nodeObj['background-color'] = '#f0f0f0';
					nodeObj['foreground-color'] = '#777';
				} else {
					// 내 결재 대기 건: 유형별 강조 색상
					var isWbsIssue = (nodeName.indexOf('문제') > -1 || nodeName.indexOf('조치') > -1);
					var isPurchase = (nodeName.indexOf('발주') > -1);

					if (isWbsIssue) {
						// WBS문제/조치: 조금 더 진한 연빨강
						nodeObj['background-color'] = '#ffcdd2';
					} else if (isPurchase) {
						// 발주요청/결과: 주황형 노란색
						nodeObj['background-color'] = '#fefed2';
					} else {
						// 나머지 내 결재 노드: 흰색
						nodeObj['background-color'] = '#fefed2';
					}

					nodeObj['foreground-color'] = '#333';
					nodeObj.topic = '<div style="display:flex;align-items:center;width:100%;"><div class="node-text-wrapper" style="flex:1;">' + nodeName + '</div><i class="fa fa-exclamation-circle" style="color:red;font-size:14px;flex-shrink:0;margin-left:5px;" title="결재대기"></i></div>';
				}
				nodeArray.push(nodeObj);
			}
		});

		var mind = {
			meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' },
			format: 'node_array',
			data: nodeArray
		};

		if (jm) {
			try {
				jm.show(mind);
				// 컨테이너 크기를 현재 뷰포트에 맞게 동적으로 먼저 조절
				resizeContainer();
				// 마인드맵 데이터 수에 비례하여 화면에 가득 차도록 자동 확대/축소 및 정렬 (Auto Fit)
				fitToContainer();
				// 렌더링 지연 오차 대비를 위해 100ms 후 한 번 더 보정
				setTimeout(fitToContainer, 100);
			} catch (e) {
				console.error('jsMind show error:', e);
				jm.show({meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' }, format: 'node_array',
						data: [{ id: 'root', topic: '렌더링 오류 발생 (F12 확인)', isroot: true }]});
			}
		}
	}

		function getValueIgnoreCase(obj, key) {
			if (!obj) return '';
			if (obj[key] !== undefined && obj[key] !== null && obj[key] !== '') return obj[key];
			var upperKey = key.toUpperCase();
			if (obj[upperKey] !== undefined && obj[upperKey] !== null && obj[upperKey] !== '') return obj[upperKey];
			// Extended case matching
			for (var k in obj) {
				if (k.toLowerCase() === key.toLowerCase() || k.toLowerCase().replace(/_/g, '') === key.toLowerCase()) {
					if (obj[k]) return obj[k];
				}
			}
			return '';
		}

		// ordrsNoVal 동적 계산 (salesCd 앞 5자리)
		if (!data.ordrsNoVal && data.salesCd && data.salesCd.length >= 5) {
			data.ordrsNoVal = data.salesCd.substring(0, 5);
		}

		fields.forEach(function(f) {
			var val = getValueIgnoreCase(data, f.key) || f.default;
			if (val !== undefined && val !== null && val !== '') {
				html += '<tr><th>' + f.label + '</th><td>' + val + '</td></tr>';
			}
		});

		html += '</table>';

		$('#node-tooltip').html(html).show();
		moveTooltip(e);
	}

	function moveTooltip(e) {
		var tooltip = $('#node-tooltip');
		var offset = 15;

		var top = e.pageY + offset;
		var left = e.pageX + offset;

		if (left + tooltip.outerWidth() > $(window).width()) {
			left = e.pageX - tooltip.outerWidth() - offset;
		}
		if (top + tooltip.outerHeight() > $(window).height()) {
			top = e.pageY - tooltip.outerHeight() - offset;
		}

		tooltip.css({
			top: top,
			left: left
		});
	}

		// ==========================================
		// 선택된 노드 Ctrl + C (복사) 기능 지원
		// ==========================================
		document.addEventListener('keydown', function(e) {
			// 사용자가 검색창(input) 등에서 타이핑 중일 때는 작동하지 않도록 예외 처리
			var activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
			if (activeTag === 'input' || activeTag === 'textarea' || activeTag === 'select') {
				return;
			}

			// Ctrl + C (Mac은 Cmd + C) 단축키 감지
			if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
				if (jm) {
					// 현재 선택된 마인드맵 노드 가져오기
					var selected_node = jm.get_selected_node();

					if (selected_node) {
						// 1. 노드의 topic 값 가져오기 (여기에 느낌표 <i> 태그 등 HTML이 섞여 있음)
						var rawTopic = selected_node.topic;

						// 2. HTML 태그 찌꺼기 제거하고 순수 텍스트만 추출하는 꼼수
						var tempDiv = document.createElement("div");
						tempDiv.innerHTML = rawTopic;
						var plainText = (tempDiv.textContent || tempDiv.innerText || "").trim();

						// 3. 클립보드에 복사하기 (구형 시스템 호환성을 위해 textarea 활용 방식 사용)
						var textArea = document.createElement("textarea");
						textArea.value = plainText;
						// 화면에 안 보이게 숨김
						textArea.style.position = "fixed";
						textArea.style.left = "-9999px";
						document.body.appendChild(textArea);

						// 선택 및 복사
						textArea.select();
						try {
							document.execCommand('copy');
							// 복사가 잘 되었는지 살짝 알려주는 알림 (원하시면 주석 해제)
							// alert("복사되었습니다:\n" + plainText);
						} catch (err) {
							console.error('클립보드 복사 실패', err);
						} finally {
							// 쓴 textarea는 바로 폐기
							document.body.removeChild(textArea);
						}
					}
				}
			}
		});

		// ==========================================
		// 마인드맵 확대/축소 (Ctrl + Mouse Wheel) 및 이동 (Space + Drag) 기능 이벤트 바인딩
		// ==========================================
		var container = document.getElementById('jsmind_container');

		// 1. 확대/축소 (Ctrl + Mouse Wheel)
		container.addEventListener('wheel', function(e) {
			if (e.ctrlKey) {
				e.preventDefault();

				var rect = container.getBoundingClientRect();
				var mouseX = e.clientX - rect.left;
				var mouseY = e.clientY - rect.top;

				// 줌 전 맵 기준 마우스 상대 좌표
				var mapX = (mouseX - zoomOffset.x) / zoomScale;
				var mapY = (mouseY - zoomOffset.y) / zoomScale;

				// 줌 배율 변경 (휠 위: 확대, 휠 아래: 축소)
				var scaleStep = 0.1;
				var nextScale = zoomScale + (e.deltaY < 0 ? scaleStep : -scaleStep);

				// 줌 범위 제한 (0.3배 ~ 3.0배)
				nextScale = Math.max(0.3, Math.min(3.0, nextScale));

				// 새로운 오프셋 계산 (마우스가 가리키는 지점이 줌 변환 후에도 화면상 동일 지점에 유지)
				zoomOffset.x = mouseX - mapX * nextScale;
				zoomOffset.y = mouseY - mapY * nextScale;
				zoomScale = nextScale;

				updateTransform();
			}
		}, { passive: false });

		// 2. Space 키 감지 (입력창 포커스 중이 아닐 때만 작동)
		$(document).on('keydown', function(e) {
			var activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
			if (activeTag === 'input' || activeTag === 'textarea' || activeTag === 'select') {
				return;
			}
			if (e.code === 'Space' || e.key === ' ' || e.keyCode === 32) {
				// 기본 브라우저 스크롤 이벤트 차단
				e.preventDefault();
				if (!isSpacePressed) {
					isSpacePressed = true;
					$('#jsmind_container').css('cursor', 'grab');
				}
			}
		});

		$(document).on('keyup', function(e) {
			if (e.code === 'Space' || e.key === ' ' || e.keyCode === 32) {
				isSpacePressed = false;
				isDragging = false;
				$('#jsmind_container').css('cursor', 'default');
			}
		});

		// 3. 마우스 드래그를 이용한 위치 이동
		$('#jsmind_container').on('mousedown', function(e) {
			if (isSpacePressed && e.button === 0) { // Space 키가 눌려있고 마우스 왼쪽 클릭
				isDragging = true;
				$(this).css('cursor', 'grabbing');
				dragStartPos.x = e.clientX;
				dragStartPos.y = e.clientY;
				dragStartOffset.x = zoomOffset.x;
				dragStartOffset.y = zoomOffset.y;
				e.preventDefault(); // 텍스트 선택 방지
			}
		});

		$(document).on('mousemove', function(e) {
			if (isDragging) {
				var dx = e.clientX - dragStartPos.x;
				var dy = e.clientY - dragStartPos.y;

				zoomOffset.x = dragStartOffset.x + dx;
				zoomOffset.y = dragStartOffset.y + dy;

				updateTransform();
			}
		});

		$(document).on('mouseup mouseleave', function() {
			if (isDragging) {
				isDragging = false;
				if (isSpacePressed) {
					$('#jsmind_container').css('cursor', 'grab');
				} else {
					$('#jsmind_container').css('cursor', 'default');
				}
			}
		});

		// 화면 창 크기가 변경될 때 컨테이너 높이 및 줌/팬 영역 자동 보정
		$(window).on('resize', function() {
			resizeContainer();
			fitToContainer();
		});

		// 초기 로딩 시 해상도에 맞게 컨테이너 높이 설정
		resizeContainer();

		gridView.initView().setData(0);

	})

	//-------------------------------------------------------
	// 결재 노드 데이터 정규화 (popupCallType에 따른 키 매핑)
	//-------------------------------------------------------
	function getTodoInfo(item) {
		var res = Object.assign({}, item);
		res.sanctnSttus = item.sanctnSttus || '';

		if (item.popupCallType === 'ISS') {
			res.sanctnSttus = item.baseIssSanctnSttus || '';
			res.todoKey = item.baseIssTodoKey || '';
			res.todoId = item.baseIssTodoId || '';
		}
		else if (item.popupCallType === 'RSLT') {
			res.sanctnSttus = item.issRsltSanctnSttus || '';
			res.todoKey = item.issRsltTodoKey || '';
			res.todoId = item.issRsltTodoId || '';
		}
		else if (item.popupCallType === 'REQ') {
			res.sanctnSttus = item.reqSanctnSttus || '';
			res.todoKey = item.reqTodoKey || '';
			res.todoId = item.reqTodoId || '';
			res.rsltSameTimeResult = item.rsltSameTimeResult || '';
		}
		else if (item.popupCallType === 'RES') {
			res.sanctnSttus = item.rsltSanctnSttus || '';
			res.todoKey = item.rsltTodoKey || '';
			res.todoId = item.rsltTodoId || '';
		}
		return res;
	}
