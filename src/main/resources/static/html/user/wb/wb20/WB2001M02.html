<script type="text/javascript">

var jm = null;
const sunsetBliss = ['#0d47a1', '#006494', '#006d77', '#166088', '#218380', '#73d2de', '#ffbc42', '#d81159', '#8f2d56', '#218380', '#73d2de'];

var gridView = {
	initView: function(){
        $(document).on('mouseenter', 'jmnode', function(e) {
            var nodeid = $(this).attr('nodeid');
            if (!jm) return;
            var node = jm.get_node(nodeid);
            if (!node || !node.data) return;
            
            var data = node.data;
            if (data.data && typeof data.data === 'object') {
                data = data.data;
            }

            if (data.todoKey || data.todoNo || data.todoDiv2CodeId) {
                showTooltip(e, node);
            }
        }).on('mouseleave', 'jmnode', function() {
            $('#node-tooltip').hide();
        }).on('mousemove', 'jmnode', function(e) {
            moveTooltip(e);
        }).on('dblclick', 'jmnode', function(e) {
            var nodeid = $(this).attr('nodeid');
            if (!jm) return;
            var node = jm.get_node(nodeid);
            if (!node || !node.data) {
                return;
            }
            
            // Handle jsMind nested data wrapping if any
            var data = node.data;
            if (data.data && typeof data.data === 'object') {
                data = data.data;
            }

            
            // Invoke if it's an actual To-Do item with a valid identifier
            if (data.todoKey || data.todoNo || data.todoDiv2CodeId) {
                gridView.openFile(data);
            }
        });
        
		return this;
	},
    openFile: function (item) {
        if (!item) return;

		let addParam = {"viewMode": 1, "todoView": "INQ", "todoKey":item.todoKey, "gridObj" :item};
		let paramObj = {};
		if (item.todoDiv2CodeId != "TODODIV9999") {
			paramObj = JSON.parse(item.pgParam || '{}');
			Object.assign(paramObj, addParam);
		}
		
		var callbackFn = function() { gridView.setData(0); };
		if (item.todoDiv2CodeId =="TODODIV1030" || item.todoDiv2CodeId =="TODODIV2060" ||
			item.todoDiv2CodeId =="TODODIV1090" || item.todoDiv2CodeId =="TODODIV2090" ) { //이슈현황 화면 call
			openModal("/static/html" + item.pgPath, 1200, 870, "", paramObj, callbackFn);
		} else if (item.todoDiv2CodeId =="TODODIV1060"){	//프로젝트 이슈 call
			openModal("/static/html" + item.pgPath, 900, 880, "프로젝트이슈 To-Do", paramObj, callbackFn);
		} else if (item.todoDiv2CodeId =="TODODIV2100"){	//수주현황 결재 call
			openModal("/static/html" + item.pgPath, $('body').width(), $('body').height()-40, "수주복표원가  To-Do", paramObj, callbackFn);
		} else if (item.todoDiv2CodeId =="TODODIV1120" || item.todoDiv2CodeId =="TODODIV2120"){	//PFU 결재 call
			openModal("/static/html" + item.pgPath, 1700, $('body').height()-40, "PFU 결재 화면", paramObj, callbackFn);
		} else if (item.todoDiv2CodeId == "TODODIV2170") {
				openModal("/static/html" + item.pgPath, 1600, 850, "", paramObj, callbackFn)
		} else if (item.todoDiv2CodeId == "TODODIV9999") {			//문제현황임
			 wbsIssModal(item);
		} else {
			openModal("/static/html" + item.pgPath, 1600, 850, "", paramObj, callbackFn);
		}
    },
	setData: function(_pageNo) {
		var todoId = "";
		var isAdmin = jwt.authInfo.indexOf('AUTH001');
		if( isAdmin < 0 ) todoId = jwt.userId;
		var formData = {
				"coCd" : ""
				, "todoFromDt" : deleteHyphenStr($("#todoFromDt").val())
				, "todoToDt" : deleteHyphenStr($("#todoToDt").val())
				, "salesCd" : $("#salesCd_S").val()
				, "salesMngId" : $("#salesMngId_S").val()
				, "salesMngNm" : $("#salesMngNm_S").val()
				, "todoDiv" : $("#todoDiv_S").val()
				, "pageNo" : 1 
				, "recordCnt" : 9999999
				, "isAdmin" : isAdmin
				, "todoId" : todoId
				, "sanctnSttus" : $("#sanctnSttus_S").val()
				, "todoDivDetail" : $("#todoDivDetail").val()
				, "todoNo" : $("#todoNo_S").val()
				}
		
		$('#jsmind_container').empty();
		
		var mindOptions = {
			container: 'jsmind_container',
			editable: false, 
			theme: 'greensea',
			support_html: true,
			view:{ line_width: 2, line_color: '#ccc' },
			layout: { hspace: 50, vspace: 10, pspace: 13, align: 'left' }
		};
		jm = new jsMind(mindOptions);

		if (jm) {
			jm.show({meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' }, format: 'node_array', data: [{ id: 'root', topic: '데이터를 불러오는 중입니다...', isroot: true }]});
		}

		postAjax("/user/wb/wb20/selectToDoList", formData, null, function(data){
			try {
				renderMind(data.resultList);
			} catch (error) {
				alert("오류 발생!! 전산실 연락 바랍니다", error.message);
			}
		});
	}
}

function renderMind(dbList) {
    if (!dbList || dbList.length === 0) {
        if(jm) {
            jm.show({meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' }, format: 'node_array', data: [{ id: 'root', topic: '조회된 데이터가 없습니다.', isroot: true }]});
        }
        return;
    }

    var nodeArray = [];
    var createdGroups = {};
    
    function addGroup(id, parentId, topic, bgColor) {
        if (!createdGroups[id]) {
            var node = { id: id, parentid: parentId, topic: topic };
            if (bgColor) {
                node['background-color'] = bgColor;
                node['foreground-color'] = '#fff';
            }
            nodeArray.push(node);
            createdGroups[id] = true;
        }
    }

    var validDbList = [];
    var uniqueDiv1Nms = {};

    dbList.forEach(function(item) {
        if (item.todoDiv1CodeId === 'TODODIV99') return;
        if (item.todoDiv2CodeNm === '문제미완료현황') return;
        validDbList.push(item);
        if (item.todoDiv1CodeNm) uniqueDiv1Nms[item.todoDiv1CodeNm] = true;
    });

    if (validDbList.length === 0) {
        if (jm) {
            jm.show({meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' }, format: 'node_array', data: [{ id: 'root', topic: '조회된 데이터가 없습니다.', isroot: true }]});
        }
        return;
    }

    var rootNm = 'TO-DO LIST';

    nodeArray.push({ id: 'root', topic: rootNm, isroot: true, 'background-color': sunsetBliss[1], 'foreground-color': '#fff' });
    createdGroups['root'] = true;

    validDbList.forEach(function(item) {
        var div1Nm = item.todoDiv1CodeNm || '기타구분';
        var div1Id = 'root'; 

        if (div1Nm !== rootNm) {
            div1Id = 'div1_' + div1Nm;
            addGroup(div1Id, 'root', div1Nm, sunsetBliss[1]);
        }
        var salesCd = item.salesCd || '';
        var orderNo = '기타';
        var isRealOrder = false;

        if (salesCd) {
            var prefix = salesCd.split('-')[0];
            // 수주번호 여부: - 가 있거나, prefix가 숫자만으로 된 경우(ex. 25231)
            if (salesCd.indexOf('-') > -1 || /^\d+$/.test(prefix)) {
                orderNo = prefix;
                isRealOrder = true;
            }
        }

        var div2Id = div1Id + '_' + orderNo;
        addGroup(div2Id, div1Id, orderNo, sunsetBliss[3]);
        
        var parentForProg = div2Id;
        var pgmNm = item.todoDiv2CodeNm || '기타';
        var pgmId = item.todoDiv2CodeId || '';

        if (isRealOrder) {
            // "목표원가 부분은 수주관련 결재 내용인데 ... 수주번호 바로 밑에"
            if (pgmNm.indexOf('목표원가') > -1 || pgmNm.indexOf('수주변경') > -1 || pgmId === 'TODODIV2100' || pgmId === 'TODODIV1100') {
                 // 바로 수주번호에 연결
                 parentForProg = div2Id;
            } else {
                 // "SALES_CD가 있는건 PFU, 과제, WBS..." 
                 var salesCdId = div2Id + '_' + salesCd;
                 if (salesCd !== orderNo) {
                     addGroup(salesCdId, div2Id, salesCd, sunsetBliss[4]);
                 } else {
                     salesCdId = div2Id; // 중복 폴더 생성 건너뛰고 부모를 바로 orderNo 폴더로 지정
                 }

                 var folderTopic = pgmNm;
                 if (pgmId === 'TODODIV2120' || pgmId === 'TODODIV1120') folderTopic = 'PFU';
                 else if (pgmId === 'TODODIV2110') folderTopic = '과제';
                 else if (pgmId === 'TODODIV1015' || pgmId === 'TODODIV2015') folderTopic = 'WBS계획';
                 else if (pgmId === 'TODODIV2040' || pgmId === 'TODODIV1040') folderTopic = '물류';
                 else if (pgmId === 'TODODIV2060' || pgmId === 'TODODIV1060' || pgmId === 'TODODIV9999' || pgmId === 'TODODIV2020' || pgmId === 'TODODIV2030' || pgmId === 'TODODIV2090' || pgmNm.indexOf('문제') > -1) {
                     folderTopic = '문제';
                 }

                 var folderId = salesCdId + '_' + folderTopic;
                 addGroup(folderId, salesCdId, folderTopic, sunsetBliss[5]);
                 parentForProg = folderId;

                 // "문제 밑에 문제등록 결재, 그밑에 발주 결재, 문제조치..."
                 if (folderTopic === '문제') {
                     var subFolderTopic = '기타문제';
                     if (pgmId === 'TODODIV1060' || pgmId === 'TODODIV2060') subFolderTopic = '문제등록';
                     else if (pgmId === 'TODODIV2020') subFolderTopic = '발주요청';
                     else if (pgmId === 'TODODIV2090') subFolderTopic = '문제조치';
                     else if (pgmId === 'TODODIV2030') subFolderTopic = '발주결과';
                     else subFolderTopic = pgmNm;

                     var subFolderId = folderId + '_' + subFolderTopic;
                     addGroup(subFolderId, folderId, subFolderTopic, sunsetBliss[6]);
                     parentForProg = subFolderId;
                 }
                 
                 // Fallback safety to ensure whatever parent we derived actually exists in the jsMind tree
                 if (!createdGroups[parentForProg]) {
                     addGroup(parentForProg, div2Id, folderTopic, sunsetBliss[5]);
                 }
            }
        } else {
            // "기타 밑에 문제번호가 오는게 맞긴한데... (기타 밑에 중간 폴더 제거. 바로 Leaf Node가 붙음)"
            parentForProg = div2Id;
        }

        // Ensure absolute mathematical uniqueness by appending the current nodeArray length. 
        // This guarantees jsMind will NEVER silently overwrite nodes regardless of what data comes from the server.
        var leafId = 'todo_' + (item.todoKey || item.todoNo) + '_' + (item.todoDiv2CodeId || 'NONE') + '_' + (item.sanctnSn || 'NONE') + '_' + nodeArray.length;
        
        var leafTopic = '';
        if (!isRealOrder) {
             leafTopic = pgmNm + '(' + (item.todoNo || '없음') + ')';
        } else {
             // 20자 제한과 이름(creatNm)을 모두 제거하고 제목만 그대로 씁니다.
             leafTopic = item.todoTitl || '무제';
        }
		var leafNode = {
			id: leafId,
			parentid: parentForProg,
			topic: leafTopic, // 일단 기본 제목만 넣음
			data: Object.assign({}, item)
		};
		if (item.sanctnSttus === 'Y') {
			// 결재 완료: 회색 배경
			leafNode['background-color'] = '#f0f0f0'; 
			leafNode['foreground-color'] = '#777';
		} else {
			// 결재 대기: 흰색 배경 + 아이콘 추가
			leafNode['background-color'] = '#ffe6e6';
			leafNode['foreground-color'] = '#333';
			
			// [핵심] 객체의 topic 속성에 직접 아이콘 태그를 붙임
			leafNode.topic += ' <span style="display:inline-block; white-space:nowrap; vertical-align:middle;"><i class="fa fa-exclamation-circle" style="color:red; font-size:14px; margin-left:4px;" title="결재대기"></i>&nbsp;</span>';
		}

        // if (item.sanctnSttus !== 'Y') {
        //      leafTopic += ' <i class="fa fa-exclamation-circle" style="color:red; font-size:14px; margin-left:4px;" title="결재대기"></i>';
        // }

        // if (!parentForProg || !createdGroups[parentForProg]) {
        //     console.error("Missing parent group:", parentForProg, "for leaf topic:", leafTopic);
        // }

        // var leafNode = {
        //     id: leafId,
        //     parentid: parentForProg,
        //     topic: leafTopic,
        //     data: Object.assign({}, item)
        // };
        
        // if (item.sanctnSttus === 'Y') {
        //     leafNode['background-color'] = '#f0f0f0'; 
        //     leafNode['foreground-color'] = '#777';
        // } else {
        //     leafNode['background-color'] = '#fff';
        //     leafNode['foreground-color'] = '#333';
        // }

        nodeArray.push(leafNode);
    });
    
    // Safety net: ensure an isroot exists to prevent jsmind from crashing
    var rootExists = false;
    for (var i = 0; i < nodeArray.length; i++) {
        if (nodeArray[i].isroot) {
            rootExists = true;
            break;
        }
    }
    
    if (!rootExists) {
        nodeArray.unshift({ id: 'root', topic: '결재(검색결과 없음)', isroot: true, 'background-color': '#006494', 'foreground-color': '#fff' });
    }

    var mind = {
        meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' },
        format: 'node_array',
        data: nodeArray
    };

    if (jm) {
        try {
            jm.show(mind);
        } catch (e) {
            console.error("jsMind show error:", e);
            jm.show({meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' }, format: 'node_array', data: [{ id: 'root', topic: '렌더링 오류 발생 (F12 확인)', isroot: true }]});
        }
    }
}

function showTooltip(e, node) {
    if (!node || !node.data) return;
    
    var data = node.data;
    if (data.data && typeof data.data === 'object') {
        data = data.data;
    }

    var html = '<div class="tooltip-header">' + (getValueIgnoreCase(data, 'todoTitl') || getValueIgnoreCase(data, 'topic') || 'To-Do 정보') + '</div>';
    html += '<table>';
    
    var fields = [
        { key: 'todoDiv1CodeNm', label: '구분' },
        { key: 'todoDiv2CodeNm', label: '발생프로그램명' },
        { key: 'salesCd', label: 'SALES CODE' },
        { key: 'todoNo', label: '관련번호' },
        { key: 'creatNm', label: '최초요청자' },
        { key: 'creatDttm', label: '요청일자' },
        { key: 'shwTodoNo', label: '관리번호' },
        { key: 'todoNm', label: '대상자명' },
        { key: 'todoCfDt', label: '결재일자' },
        { key: 'todoCfOpn', label: '의견' }
    ];

    function getValueIgnoreCase(obj, key) {
        if (!obj) return '';
        if (obj[key] !== undefined) return obj[key];
        var upperKey = key.toUpperCase();
        if (obj[upperKey] !== undefined) return obj[upperKey];
        var lowerKey = key.toLowerCase();
        if (obj[lowerKey] !== undefined) return obj[lowerKey];
        // CamelCase conversion check (e.g. todoDiv1CodeNm -> TODO_DIV1_CODE_NM)
        var snakeKey = key.replace(/[A-Z]/g, letter => `_${letter.toLowerCase()}`).toUpperCase();
        if (obj[snakeKey] !== undefined) return obj[snakeKey];
        return '';
    }

    fields.forEach(function(f) {
        var val = getValueIgnoreCase(data, f.key);
        if (val !== undefined && val !== null && val !== '') {
            html += '<tr><th>' + f.label + '</th><td>' + val + '</td></tr>';
        }
    });
    
    html += '</table>';
    
    $('#node-tooltip').html(html).show();
    moveTooltip(e);
}

function moveTooltip(e) {
    var tooltip = $('#node-tooltip');
    var offset = 15;
    
    var top = e.pageY + offset;
    var left = e.pageX + offset;
    
    if (left + tooltip.outerWidth() > $(window).width()) {
        left = e.pageX - tooltip.outerWidth() - offset;
    }
    if (top + tooltip.outerHeight() > $(window).height()) {
        top = e.pageY - tooltip.outerHeight() - offset;
    }

    tooltip.css({
        top: top,
        left: left
    });
}

		var activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
		if (activeTag === 'input' || activeTag === 'textarea' || activeTag === 'select') {
			return;
		}

		// Ctrl + C (Mac은 Cmd + C) 단축키 감지
		if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {

					var tempDiv = document.createElement("div");
					tempDiv.innerHTML = rawTopic;
					var plainText = (tempDiv.textContent || tempDiv.innerText || "").trim();
					
					// 3. 클립보드에 복사하기 (구형 시스템 호환성을 위해 textarea 활용 방식 사용)
					var textArea = document.createElement("textarea");
					textArea.value = plainText;
					// 화면에 안 보이게 숨김
					textArea.style.position = "fixed";
					textArea.style.left = "-9999px";
					document.body.appendChild(textArea);
					
					// 선택 및 복사
					textArea.select();
					try {
						document.execCommand('copy');
						// 복사가 잘 되었는지 살짝 알려주는 알림 (원하시면 주석 해제)
						// alert("복사되었습니다:\n" + plainText); 
					} catch (err) {
						console.error('클립보드 복사 실패', err);
					} finally {
						// 쓴 textarea는 바로 폐기
						document.body.removeChild(textArea);
					}
				}
			}
		}
	});

	gridView.initView().setData(0);
	excelView.initView();

})

	//결재취소 처리
	function toDoConfirmCancel(){
		if (!jm) return;
		var selected_node = jm.get_selected_node();
		if (!selected_node || !selected_node.data) {
			customAlert("선택된 결재 항목이 없습니다.");
			return false;
		}
		
		var row = selected_node.data;
		if (row.data && typeof row.data === 'object' && row.data.todoKey) {
			row = row.data;
		}

		if (!row.todoKey) {
			customAlert("결재 대상 트리의 마지막 끝단(To-Do)을 선택해주세요.");
			return false;
		}
		if (row.todoDiv2CodeId == "TODODIV9999") {
			return false;
		} 
		if( row ) {
			if (row.todoDiv1CodeId == "TODODIV99") {
				customAlert("문제미완료현황은 결재 건이 아닙니다.")
				return false;
			}
			if (row.sanctnSttus != 'Y') {
				alert("결재완료건이 아닙니다.");
				return false;
			}
			if (row.todoId != jwt.userId) {
				alert("결재/확인은 담당자만 처리가능합니다. ");
				return false;
			}
// 			if( row.todoDiv1CodeNm == "결재") {
				if (confirm("결재 취소 처리하시겠습니까?")) {
					var paramMap = {
							"coCd":row.coCd
							, "todoKey":row.todoKey
							, "todoNo":row.todoNo
							, "sanctnSn":row.sanctnSn
							, "salesCd":row.salesCd
							, "todoDiv1CodeId":row.todoDiv1CodeId
							, "todoDiv2CodeId":row.todoDiv2CodeId
							, "todoFileTrgtKey":row.todoFileTrgtKey
							, "pgmId": "WB2001M01"
							, "userId": jwt.userId
							, "deptId": jwt.deptId.slice(0,5)
					};
					postAjaxSync("/user/wb/wb20/updateApprovalCancle", paramMap, null, function(data){
// 						alert(data.resultMessage);
						if (data.resultCode == 200) {
							gridView.setData(0);
						}
					});

				}
// 			}
		}

	}

	function toDoConfirmAll () {
		var rowList = [];

//         $.each(rowList, function(index, row){

			return false;

//         if(dataEvalCheck) {

// 			return false;
//         }
		// 일괄 결재시 투입공수를 입력해야하는 결재는 return
		const alwaysBlocked = ["TODODIV2090","TODODIV2030"];
		const hasBlocked = rowList.some(row => {
			if (alwaysBlocked.includes(row.todoDiv2CodeId)) {
				return true;
			}
			if (row.todoDiv2CodeId === "TODODIV2020") {
				// selectQtyReqInfo 내부에서 sameTimeResult 전역변수를 세팅한다고 가정
				selectQtyReqInfo(row.todoNo);
				return sameTimeResult === "Y";
			}
			// 그 외는 블록 없음
			return false;
		});

		if (hasBlocked) {
			customAlert("투입공수를 입력해야하는 결재가 있습니다.");
			return false;
		}

		if(!confirm("일괄 결재 및 확인 처리 하시겠습니까?")) return false;
		$.each(rowList, function(index, row){
			if( row.todoDiv1CodeNm == "공유" ) {
				if( row.sanctnSttus == "N" ) {
					var formData = new FormData();
					formData.append("todoKey", row.todoKey);
					formData.append("salesCd", row.salesCd);
					formData.append("todoDiv1CodeId", row.todoDiv1CodeId);
					formData.append("todoDiv2CodeId", row.todoDiv2CodeId);
					formData.append("todoFileTrgtKey", row.todoFileTrgtKey);
					formData.append("creatId", jwt.userId);
					formData.append("creatPgm", "WB2001M01");
					filePutAjax("/user/wb/wb20/toDoCfDtUpdate", formData, function(data){
						if(data.resultCode == 200){
							//처리 성공하였습니다.
						}
					});
				}
			} else if( row.todoDiv1CodeNm == "결재" ) {
				if( row.sanctnSttus == "N" ) {
					//입력값 set
					var paramMap = {
							"todoId"    : jwt.userId
							, "todoCfOpn" : "일괄승인"			//본인 결재의견
							, "coCd"		:row.coCd
							, "todoKey"	:row.todoKey
							, "todoNo"		:row.todoNo
							, "sanctnSn"	:row.sanctnSn
							, "salesCd"	:row.salesCd
							, "todoDiv1CodeId":row.todoDiv1CodeId
							, "todoDiv2CodeId":row.todoDiv2CodeId
							, "todoFileTrgtKey":row.todoFileTrgtKey
							, "pgmId"		: "WB2001M01"
							, "userId"		: jwt.userId
							, "issNo"		: row.todoNo
					}
					postAjaxSync("/user/wb/wb20/insertApprovalLine", paramMap, null, function(data){
						if(data.resultCode == 200){
							//처리 성공하였습니다.
// 							postAjaxSync("/user/qm/qm01/updateReqStChk", paramMap, null, function(data){
// 								if(data.resultCode == 200){
// 						        	//처리 성공하였습니다.
// 								}
// 							});

						} else {
							alert("승인중 오류가 발생 되었습니다.");
						}
					});
				} // if( row.sanctnSttus == "N" ) {
			}
			gridView.initView().setData(0);
		});  //$.each end
	}
