<script type="text/javascript">

	var jm = null;
	const sunsetBliss = ['#0d47a1', '#006494', '#006d77', '#166088', '#218380', '#73d2de', '#ffbc42', '#d81159', '#8f2d56', '#218380', '#73d2de'];

	var gridView = {
		initView: function(){
			$(document).on('mouseenter', 'jmnode', function(e) {
				var nodeid = $(this).attr('nodeid');
				if (!jm) return;
				var node = jm.get_node(nodeid);
				if (!node || !node.data) return;
				
				var data = node.data;
				if (data.data && typeof data.data === 'object') {
					data = data.data;
				}

				if (data.todoKey || data.todoNo || data.todoDiv2CodeId) {
					showTooltip(e, node);
				}
			}).on('mouseleave', 'jmnode', function() {
				$('#node-tooltip').hide();
			}).on('mousemove', 'jmnode', function(e) {
				moveTooltip(e);
			}).on('dblclick', 'jmnode', function(e) {
				var nodeid = $(this).attr('nodeid');
				if (!jm) return;
				var node = jm.get_node(nodeid);
				if (!node || !node.data) {
					return;
				}
				
				// Handle jsMind nested data wrapping if any
				var data = node.data;
				if (data.data && typeof data.data === 'object') {
					data = data.data;
				}

				
				// Invoke if it's an actual To-Do item with a valid identifier
				if (data.todoKey || data.todoNo || data.todoDiv2CodeId) {
					gridView.openFile(data);
				}
			});
			
			return this;
		},
		openFile: function (item) {
			if (!item) return;

			let addParam = {"viewMode": 1, "todoView": "INQ", "todoKey":item.todoKey, "gridObj" :item};
			let paramObj = {};
			if (item.todoDiv2CodeId != "TODODIV9999") {
				paramObj = JSON.parse(item.pgParam || '{}');
				Object.assign(paramObj, addParam);
			}
			
			var callbackFn = function() { gridView.setData(0); };
			if (item.todoDiv2CodeId =="TODODIV1030" || item.todoDiv2CodeId =="TODODIV2060" ||
				item.todoDiv2CodeId =="TODODIV1090" || item.todoDiv2CodeId =="TODODIV2090" ) { //이슈현황 화면 call
				openModal("/static/html" + item.pgPath, 1200, 870, "", paramObj, callbackFn);
			} else if (item.todoDiv2CodeId =="TODODIV1060"){	//프로젝트 이슈 call
				openModal("/static/html" + item.pgPath, 900, 880, "프로젝트이슈 To-Do", paramObj, callbackFn);
			} else if (item.todoDiv2CodeId =="TODODIV2100"){	//수주현황 결재 call
				openModal("/static/html" + item.pgPath, $('body').width(), $('body').height()-40, "수주복표원가  To-Do", paramObj, callbackFn);
			} else if (item.todoDiv2CodeId =="TODODIV1120" || item.todoDiv2CodeId =="TODODIV2120"){	//PFU 결재 call
				openModal("/static/html" + item.pgPath, 1700, $('body').height()-40, "PFU 결재 화면", paramObj, callbackFn);
			} else if (item.todoDiv2CodeId == "TODODIV2170") {
					openModal("/static/html" + item.pgPath, 1600, 850, "", paramObj, callbackFn)
			} else if (item.todoDiv2CodeId == "TODODIV9999") {			//문제현황임
				wbsIssModal(item);
			} else {
				openModal("/static/html" + item.pgPath, 1600, 850, "", paramObj, callbackFn);
			}
		},
		setData: function(_pageNo) {
			var salesMngId = $("#salesMngId_S").val();
			var salesMngNm = $("#salesMngNm_S").val();
			
			// ID와 이름이 모두 없으면 본인 ID 기준 검색
			if (!salesMngId && !salesMngNm) {
				salesMngId = jwt.userId;
			}

			var formData = {
					"coCd"          : ""
					, "todoFromDt"  : deleteHyphenStr($("#todoFromDt").val())
					, "todoToDt"    : deleteHyphenStr($("#todoToDt").val())
					, "todoDiv"     : $("#todoDiv_S").val()
					, "salesMngId"  : salesMngId
					, "salesMngNm"  : salesMngNm
					, "salesCd"     : $("#salesCd_S").val()
					, "todoNo"      : $("#todoNo_S").val()
					, "todoDivDetail" : $("#todoDivDetail").val()
					, "sanctnSttus" : $("#sanctnSttus_S").val()
					}
			
			$('#jsmind_container').empty();
			
			var mindOptions = {
				container: 'jsmind_container',
				editable: false, 
				theme: 'greensea',
				support_html: true,
				view:{ line_width: 2, line_color: '#ccc' },
				layout: { hspace: 50, vspace: 10, pspace: 13, align: 'left' }
			};
			jm = new jsMind(mindOptions);

			if (jm) {
				jm.show({meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' }, format: 'node_array', data: [{ id: 'root', topic: '데이터를 불러오는 중입니다...', isroot: true }]});
			}

			postAjax("/user/wb/wb20/selectToDoMindMap", formData, null, function(data){
				try {
					renderMind(data.resultList);
				} catch (error) {
					alert("오류 발생!! 전산실 연락 바랍니다 " + error.message);
				}
			});
		}
	}

	function getGroupColor(item) {
		var nodeId = item.nodeId;
		var nodeName = item.nodeName || "";

		if (nodeId === 'APPR' || nodeId === 'SHARE') return '#006494';
		
		// "수주번호" 리터럴 폴더 색상
		if (nodeName === '수주번호' || nodeId.indexOf('_ORDER') > -1) return '#166088';
		
		// 문제, 조치 등 이슈 핵심 관련은 빨간색
		if (nodeName.match(/문제|조치/)) return '#d81159';
		
		// 발주/출장/결과 등은 이슈 하위에 있을 때(즉, ISS_NO가 있는 아이템의 부모 폴더일 때)만 빨간색
		// SQL에서 ISS_NO가 포함된 NODE_ID를 생성할 것이므로 이를 체크
		if (nodeName.match(/발주|출장|결과/) && nodeId.indexOf('_ISS_') > -1) return '#d81159';

		// SALES_CD 값 (26001-01NVFUP 등) 73d2de
		if (item.nodeLevel === 5 || (nodeId.indexOf('_S_') > -1 && nodeId.indexOf('_S_EMPTY') === -1)) return '#73d2de';
		
		// 기타 폴더 006d77
		return '#006d77';
	}

	function renderMind(nodeList) {
		if (!nodeList || nodeList.length === 0) {
			if (jm) {
				jm.show({meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' }, format: 'node_array',
						data: [{ id: 'root', topic: '조회된 데이터가 없습니다.', isroot: true }]});
			}
			return;
		}

		var nodeArray = [];

		// 루트 노드
		nodeArray.push({ id: 'root', topic: 'TO-DO LIST', isroot: true,
						'background-color': '#0d47a1', 'foreground-color': '#fff' });

		nodeList.forEach(function(item) {
			var nodeType  = item.nodeType;
			var nodeId    = item.nodeId;
			var parentId  = item.parentNodeId;
			var nodeName  = item.nodeName;

			if (nodeType === 'GROUP') {
				var bgColor = getGroupColor(item);
				nodeArray.push({
					id: nodeId,
					parentid: parentId,
					topic: nodeName,
					'background-color': bgColor,
					'foreground-color': '#fff'
				});
			} else if (nodeType === 'ITEM') {
				var leafNode = {
					id: nodeId,
					parentid: parentId,
					topic: nodeName,
					data: Object.assign({}, item)
				};
				if (item.sanctnSttus === 'Y') {
					leafNode['background-color'] = '#f0f0f0';
					leafNode['foreground-color'] = '#777';
				} else {
					leafNode['background-color'] = '#ffe6e6';
					leafNode['foreground-color'] = '#333';
					leafNode.topic += ' <span style="display:inline-block;white-space:nowrap;vertical-align:middle;"><i class="fa fa-exclamation-circle" style="color:red;font-size:14px;margin-left:4px;" title="결재대기"></i>&nbsp;</span>';
				}
				nodeArray.push(leafNode);
			}
		});

		var mind = {
			meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' },
			format: 'node_array',
			data: nodeArray
		};

		if (jm) {
			try {
				jm.show(mind);
			} catch (e) {
				console.error('jsMind show error:', e);
				jm.show({meta: { name: 'ToDoMap', author: 'GBS', version: '1.0' }, format: 'node_array',
						data: [{ id: 'root', topic: '렌더링 오류 발생 (F12 확인)', isroot: true }]});
			}
		}
	}




	function showTooltip(e, node) {
		if (!node || !node.data) return;
		
		var data = node.data;
		if (data.data && typeof data.data === 'object') {
			data = data.data;
		}

		var html = '<div class="tooltip-header">' + (getValueIgnoreCase(data, 'todoTitl') || getValueIgnoreCase(data, 'topic') || 'To-Do 정보') + '</div>';
		html += '<table>';
		
		var fields = [
			{ key: 'todoDiv1CodeNm', label: '구분' },
			{ key: 'todoDiv2CodeNm', label: '발생프로그램명' },
			{ key: 'salesCd', label: 'SALES CODE' },
			{ key: 'todoNo', label: '관련번호' },
			{ key: 'creatNm', label: '최초요청자' },
			{ key: 'creatDttm', label: '요청일자' },
			{ key: 'shwTodoNo', label: '관리번호' },
			{ key: 'todoNm', label: '대상자명' },
			{ key: 'todoCfDt', label: '결재일자' },
			{ key: 'todoCfOpn', label: '의견' }
		];

		function getValueIgnoreCase(obj, key) {
			if (!obj) return '';
			if (obj[key] !== undefined) return obj[key];
			var upperKey = key.toUpperCase();
			if (obj[upperKey] !== undefined) return obj[upperKey];
			var lowerKey = key.toLowerCase();
			if (obj[lowerKey] !== undefined) return obj[lowerKey];
			// CamelCase conversion check (e.g. todoDiv1CodeNm -> TODO_DIV1_CODE_NM)
			var snakeKey = key.replace(/[A-Z]/g, letter => `_${letter.toLowerCase()}`).toUpperCase();
			if (obj[snakeKey] !== undefined) return obj[snakeKey];
			return '';
		}

		fields.forEach(function(f) {
			var val = getValueIgnoreCase(data, f.key);
			if (val !== undefined && val !== null && val !== '') {
				html += '<tr><th>' + f.label + '</th><td>' + val + '</td></tr>';
			}
		});
		
		html += '</table>';
		
		$('#node-tooltip').html(html).show();
		moveTooltip(e);
	}

	function moveTooltip(e) {
		var tooltip = $('#node-tooltip');
		var offset = 15;
		
		var top = e.pageY + offset;
		var left = e.pageX + offset;
		
		if (left + tooltip.outerWidth() > $(window).width()) {
			left = e.pageX - tooltip.outerWidth() - offset;
		}
		if (top + tooltip.outerHeight() > $(window).height()) {
			top = e.pageY - tooltip.outerHeight() - offset;
		}

		tooltip.css({
			top: top,
			left: left
		});
	}

	function initSearch() {
		// datepicker를 제외한 select, input 값 모두 초기화
		$(".contents.search select").val("");
		$(".contents.search input[type='text']:not(.input_calendar)").val("");

		// ==========================================
		document.addEventListener('keydown', function(e) {
			// 사용자가 검색창(input) 등에서 타이핑 중일 때는 작동하지 않도록 예외 처리
			var activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
			if (activeTag === 'input' || activeTag === 'textarea' || activeTag === 'select') {
				return;
			}

			// Ctrl + C (Mac은 Cmd + C) 단축키 감지
			if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
				if (jm) {
					// 현재 선택된 마인드맵 노드 가져오기
					var selected_node = jm.get_selected_node();

						// 1. 노드의 topic 값 가져오기 (여기에 느낌표 <i> 태그 등 HTML이 섞여 있음)
						var rawTopic = selected_node.topic;
						
						// 2. HTML 태그 찌꺼기 제거하고 순수 텍스트만 추출하는 꼼수
						var tempDiv = document.createElement("div");
						tempDiv.innerHTML = rawTopic;
						var plainText = (tempDiv.textContent || tempDiv.innerText || "").trim();
						
						// 3. 클립보드에 복사하기 (구형 시스템 호환성을 위해 textarea 활용 방식 사용)
						var textArea = document.createElement("textarea");
						textArea.value = plainText;
						// 화면에 안 보이게 숨김
						textArea.style.position = "fixed";
						textArea.style.left = "-9999px";
						document.body.appendChild(textArea);
						
						// 선택 및 복사
						textArea.select();
						try {
							document.execCommand('copy');
							// 복사가 잘 되었는지 살짝 알려주는 알림 (원하시면 주석 해제)
							// alert("복사되었습니다:\n" + plainText); 
						} catch (err) {
							console.error('클립보드 복사 실패', err);
						} finally {
							// 쓴 textarea는 바로 폐기
							document.body.removeChild(textArea);
						}
					}
				}
			}
		});

		gridView.initView().setData(0);

	})

	// 공유확인/결재 처리
	function toDoConfirmApproval(){
		if (!jm) return;
		var selected_node = jm.get_selected_node();
		if (!selected_node || !selected_node.data) {
			customAlert("결재할 항목의 마지막 노드(To-Do)를 선택해주세요.");
			return false;
		}
		
		var row = selected_node.data;
		if (row.data && typeof row.data === 'object' && row.data.todoKey) {
			row = row.data;
		}

		if (!row.todoKey) {
			customAlert("결재 대상 트리의 마지막 끝단(To-Do)을 선택해주세요.");
			return false;
		}
	
		if (row.todoDiv2CodeId == 'TODODIV2090' && row.teamManager == '평가') {
			customAlert("문제조치건은 자료확인 후 결재 진행해주세요.");
			return false;
		} 
		if ((row.todoDiv2CodeId == 'TODODIV2020' || row.todoDiv2CodeId == 'TODODIV2030') && row.teamManager == '평가') {
			customAlert("발주요청서 및 결과처리에 대한 문제조치건은 자료확인 후 결재 진행해주세요.")
			return false;
		}
		if (row.todoDiv2CodeId == "TODODIV9999") {
			return false;
		} else {
			if (row.todoCfDt != undefined) {
				if(!confirm("결재/확인 처리 완료건입니다.  의견 수정하시겟습니까?")) {
					return false;
				}
			}
			if (row.todoId != jwt.userId) {
				customAlert("결재/확인은 담당자만 처리가능합니다. ");
				return false;
			}
			if( row.todoDiv1CodeNm == "공유" ) {
				if( row.sanctnSttus == "N" ) {
					if( confirm("확인 처리 하시겠습니까?") ) {
						toDoConfirm(row);
					}
				} else {
					customAlert("이미 확인처리 하였습니다.");
					return;
				}
			} else if( row.todoDiv1CodeNm == "결재" ) {
				var paramObj = {
						"coCd":row.coCd
						, "salesCd":row.salesCd
						, "todoDiv1CodeId":row.todoDiv1CodeId
						, "todoDiv1CodeNm":row.todoDiv1CodeNm
						, "todoDiv2CodeId":row.todoDiv2CodeId
						, "todoDiv2CodeNm":row.todoDiv2CodeNm
						, "todoFileTrgtKey":row.todoFileTrgtKey
						, "todoNo":row.todoNo
						, "issNo":row.todoNo
						, "reqNo":row.todoNo
						, "todoTitl":row.todoTitl
						, "sanctnSn":row.sanctnSn
						, "pgmId": "WB2001M01"
						, "userId": jwt.userId
						, "histNo" : row.etcField2
				};
				if (row.todoDiv2CodeId == 'TODODIV2020') {
					selectQtyReqInfo(row.todoNo)
					if (sameTimeResult == 'Y') {
						paramObj.sameTimeResultChk = sameTimeResult;
					}
				}
				
				openSecondModal("/static/html/user/wb/wb20/WB2001P01.html", 730, 300, "", paramObj, function(data){
					if (data == "승인완료") {
						gridView.setData(0);
					}
				});
			}
		}
		return;
	}
