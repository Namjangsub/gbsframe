<style>
	#cr0202p03popForm .cr0202p03-highlight-row {
		background: #ff9b46 !important;
	}
</style>

<div id="cr0202p03popForm" class="popup_area of_a" style="width: 100%; height: 100%;">
	<div class="tit_contents">
		<h4 class="tit">미정산잔액 조회</h4>
	</div>
	
	<table>
		<colgroup>
			<col width="10%">
			<col width="15%">
			<col width="10%">
			<col width="15%">
			<col width="10%">
			<col width="15%">
			<col width="10%">
			<col width="15%">
		</colgroup>
		<tr style="height:28px;">
			<th>회사</th>
			<td>
				<select id="coCd" name="coCd" data-kind="CO" data-search="coCd"></select>
			</td>
			<th>고객사</th>
			<td>
				<input type="hidden" id="ordrsClntCd" name="ordrsClntCd" data-search="ordrsClntCd">
				<input type="text" id="ordrsClntNm" name="ordrsClntNm" readonly>
			</td>
		</tr>
	</table>

	<!-- 그리드 -->
	<div class="contents">
		<div class="ax5_grid">
			<div data-ax5grid="unsettled-grid" data-ax5grid-config="{}" style="height: 680px; min-height:200px;"></div>
		</div>
	</div>
</div>

<!-- 하단 버튼 -->
<div class="popup_bottom_btn">
	<button type="button" class="close_btn" onclick="modalStack.close();">닫기</button>
</div>

<script type="text/javascript">
	var coCd = "";
	var ordrsNo = "";
	var ordrsClntCd = "";
	var ordrsClntNm = "";

	ax5.ui.grid.formatter["useYn"] = function () {
		var color = this.value == "Y" ? "color-circle_02.png" : "color-circle_01.png";
		if (this.value == "E"){
			return 'E';
		} else {
			return '<img src="/static/img/'+color+'" style="width: 10px;height: 10px;"></img>';
		}
	};

	function cr0202p03popFormGridColor(dataValue) {
		let rtnColor = "";
		let row = dataValue.item || {};

		if (row.ordrsNo == ordrsNo) {
			rtnColor = "cr0202p03-highlight-row";
		}
		return rtnColor;
	}

	function applyCr0202P03GridColor(columns) {
		$.each(columns, function (idx, column) {
			if (column.columns) {
				applyCr0202P03GridColor(column.columns);
				return true;
			}

			let styleClass = column.styleClass;
			column.styleClass = function () {
				let rtnClass = "";
				let baseClass = "";

				if (typeof styleClass == "function") {
					baseClass = styleClass.call(this);
				} else if (styleClass) {
					baseClass = styleClass;
				}

				if (baseClass) {
					rtnClass += baseClass;
				}

				let colorClass = cr0202p03popFormGridColor(this);
				if (colorClass) {
					rtnClass += (rtnClass ? " " : "") + colorClass;
				}

				return rtnClass;
			};
		});

		return columns;
	}

	var gridViewCr02P03 = {
		initView : function() {
			this.target = new ax5.ui.grid();
			this.target.setConfig({
				lineNumberColumnWidth: 40,
				showLineNumber    : true,
				showRowSelector   : false,
				multipleSelect    : false,
				sortable          : false,
				target : $('[data-ax5grid="unsettled-grid"]'),
				header : {
					align: "center",
					selector: false
				},
				body: {
					onClick: function () {
					},
					onDBLClick: function () { 
					},
					onDataChanged: function () {
					},
					mergeCells : [ "clntPjtNm", "ordrsDivNm", "eqpNm", "ordrsAmt", "pmntMtdNm"
					             , "mngIdNm", "ordrsNo", "ordrsSeq", "ordrsDt"
								 , "billYn", "ordrsPrc", "unUnsettledAmt"],
				},
				columns : applyCr0202P03GridColor([
					{key: "clntPjtNm"			, label: "프로젝트"	, align: "left", width:100},
					{key: undefined				, label: "미정산 발생 수주정보",
						columns: [
							{key: "ordrsNo"		, label: "번호"		, align: "center", width: 60, styleClass: function () { return (this.item.ctrtDoc == "CONTRACT01") ? "grid-font-blue-bold" : "";}},
							{key: "ordrsSeq"	, label: "순번"		, align: "center", width: 50, styleClass: function () { return (this.item.ctrtDoc == "CONTRACT01") ? "grid-font-blue-bold" : "";}},
							{key: "ordrsDt"		, label: "수주일자"	, align: "center", width: 80, styleClass: function () { return (this.item.ctrtDoc == "CONTRACT01") ? "grid-font-blue-bold" : "";}},
							{key: "ordrsDivNm"	, label: "수주구분"	, align: "center", width:70},
							{key: "eqpNm"		, label: "발생설비명"	, align: "left", width:200},
							{key: "ordrger"		, label: "발주자"	, align: "center", width:80},
							{key: "ordrsAmt"	, label: "수주금액"	, align: "right", width: 90, formatter: "money"},
							{key: "pmntMtdNm"	, label: "결재방법"	, align: "center", width: 60},
							{key: "mngIdNm"		, label: "담당자"	, align: "center", width: 60},
						]
					},
					{key: undefined				, label: "정산내역"	, columns: [
						{key: "billYn"			, label: "완료"		, align: "center", width: 60, formatter: "useYn"},
						{key: "ordrsPrc"		, label: "발생금액"	, align: "right", width: 100, formatter: "money", styleClass: function () { return "grid-row-blue grid-font-red-bold"; }},
						{key: "unOrdrsPrc"		, label: "정산금액"	, align: "right", width: 100, formatter: "money", styleClass: function () { return "grid-row-blue grid-no-msg-font-blue-bold"; }},
						{key: "unUnsettledAmt"	, label: "미정산잔액", align: "right", width: 100, formatter: "money"},
					]},
					{key: undefined				, label: "정산상계 수주정보"		,
						columns: [
							{key: "unOrdrsNo"	, label: "번호"		, align: "center", width: 60, styleClass: function () { return (this.item.ctrtDoc == "CONTRACT01") ? "grid-font-blue-bold" : "";}},
							{key: "unOrdrsSeq"	, label: "순번"		, align: "center", width: 50, styleClass: function () { return (this.item.ctrtDoc == "CONTRACT01") ? "grid-font-blue-bold" : "";}},
							{key: "unOrdrsDt"	, label: "수주일자"	, align: "center", width: 80, styleClass: function () { return (this.item.ctrtDoc == "CONTRACT01") ? "grid-font-blue-bold" : "";}},
							{key: "unPmntMtdNm"	, label: "결재방법"	, align: "center", width: 60},
							{key: "unClntPjtNm"	, label: "프로젝트"	, align: "left", width:100},
							{key: "unEqpNm"		, label: "정산설비명"	, align: "left", width:260},
						]
					},
				]),
				footSum: [
					[
						{label: "총계", colspan:7, align:"center"},
						{key: "sumOrdrsAmt"		, collector: "sum", formatter: "money", align: "right"},
						{},
						{},
						{},
						{},
						{},
						{},
						{key: "sumOrdrsPrc"		, collector: "sum", formatter: "money", align: "right"},
						{key: "unOrdrsPrc"		, collector: "sum", formatter: "money", align: "right"},
						{key: "sumUnUnsettledAmt"	, collector: "sum", formatter: "money", align: "right"},
					]
				],
				page: {
					navigationItemCount: 10,
					height: 30,
					display: true,
					firstIcon: '<i class="fa fa-step-backward" aria-hidden="true"></i>',
					prevIcon: '<i class="fa fa-caret-left" aria-hidden="true"></i>',
					nextIcon: '<i class="fa fa-caret-right" aria-hidden="true"></i>',
					lastIcon: '<i class="fa fa-step-forward" aria-hidden="true"></i>',
				}
			});
			return this;
		},
		setData : function(_pageNo) {
			var targetObj = this.target;
			var formData = {};
			$.each($('#cr0202p03popForm [data-search]'), function(idx, elem){
				formData[$(elem).data("search")] = $(elem).val();
			});
			formData["pageNo"]    = 1;
			formData["recordCnt"] = 99999999;
			postAjax("/user/cr/cr20/select_cr20m01_List", formData, null, function(data) {
				try {
					gridHeightResize(gridViewCr02P03, 195);
					var list = data.result;
					
					const seenNo2 = new Set();
					for (let i = 0; i < list.length; i++) {
						list[i].ordrsAmt = gPasFloatChk(list[i].ordrsAmt);
						list[i].ordrsPrc = gPasFloatChk(list[i].ordrsPrc);
						list[i].unOrdrsPrc = gPasFloatChk(list[i].unOrdrsPrc) * (-1);
						list[i].unUnsettledAmt = gPasFloatChk(list[i].unUnsettledAmt);
						if (seenNo2.has(list[i].ordrsNo+list[i].ordrsSeq)) {
							list[i].sumOrdrsAmt = 0;
							list[i].sumOrdrsPrc = 0;
							list[i].sumUnUnsettledAmt = 0;
						} else {
							seenNo2.add(list[i].ordrsNo+list[i].ordrsSeq);
							list[i].sumOrdrsAmt = list[i].ordrsAmt;
							list[i].sumOrdrsPrc = list[i].ordrsPrc;
							list[i].sumUnUnsettledAmt = list[i].unUnsettledAmt;
						}
					}
					
					targetObj.setData({
						list : list,
						page : {
							currentPage : _pageNo,
							pageSize : data.paginationInfo.pageSize,
							totalElements : data.paginationInfo.totalRecordCount,
							totalPages : data.paginationInfo.totalPageCount
						}
					});
				} catch (error) {
					alert("오류 발생!! 전산실 연락 바랍니다", error.message);
					return null;
				}
			});
		}
	}
		
	$(document.body).ready(function () {
		setCommonSelect($("#cr0202p03popForm select[data-kind]"));
		coCd = modalStack.last().paramObj.coCd;
		ordrsNo = modalStack.last().paramObj.ordrsNo;
		ordrsClntCd = modalStack.last().paramObj.ordrsClntCd;
		ordrsClntNm = modalStack.last().paramObj.ordrsClntNm;
		$("#cr0202p03popForm #coCd").val(coCd);
		$("#cr0202p03popForm #coCd").css({'background-color':'#e6e6e6', 'pointer-events':'none'});
		$("#cr0202p03popForm #ordrsClntCd").val(ordrsClntCd);
		$("#cr0202p03popForm #ordrsClntNm").val(ordrsClntNm);
		gridViewCr02P03.initView().setData(0);
	});
</script>
