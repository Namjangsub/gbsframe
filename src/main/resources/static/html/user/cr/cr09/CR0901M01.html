<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=0.6, user-scalable=no">
	<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" href="/static/bootstrap/css/bootstrap-theme.min.css">
	<link rel="stylesheet" href="/static/bootstrap/css/dashboard.css">
	<link rel="stylesheet" href="/static/bootstrap/css/bootstrap-datepicker.css">
	<link rel="stylesheet" href="/static/fontawesome/css/all.css">
	<link rel="stylesheet" href="/static/css/ax5/ax5grid.css">
	<link rel="stylesheet" href="/static/css/ax5/ax5mask.css">
	<link rel="stylesheet" href="/static/css/ax5/ax5modal.css">
	<link rel="stylesheet" href="/static/css/ax5/ax5toast.css">
	<link rel="stylesheet" href="/static/css/ax5/ax5menu.css">
	<link rel="stylesheet" href="/static/css/ax5/ax5calendar.css">
	<link rel="stylesheet" href="/static/css/ax5/ax5picker.css">
	<link rel="stylesheet" href="/static/css/ax5/ax5select.css">
	<link rel="stylesheet" href="/static/css/jstree/style.min.css">
	<link rel="stylesheet" href="/static/css/ax5/ax5combobox.css">
	<link rel="stylesheet" href="/static/css/gnb.css">
	<link rel="stylesheet" href="/static/css/main.css">
	<link rel="stylesheet" href="/static/css/sub.css">
	<link rel="stylesheet" href="/static/css/common.css">
	<script type="text/javascript" src="/static/js/jquery-latest.min.js"></script>
	<script type="text/javascript" src="/static/js/jquery.serializeObject.js"></script>
	<script type="text/javascript" src="/static/bootstrap/js/bootstrap.min.js"></script>
	<script type="text/javascript" src="/static/bootstrap/js/bootstrap-datepicker.min.js"></script>
	<script type="text/javascript" src="/static/bootstrap/js/bootstrap-datepicker.ko.min.js"></script>
	<script type="text/javascript" src="/static/js/moment/moment-with-locales.js"></script>
	<script type="text/javascript" src="/static/js/jstree/jstree.min.js"></script>
	<script type="text/javascript" src="/static/js/ax5/ax5core.min.js"></script>
	<script type="text/javascript" src="/static/js/ax5/ax5grid.min.js"></script>
	<script type="text/javascript" src="/static/js/ax5/ax5mask.min.js"></script>
	<script type="text/javascript" src="/static/js/ax5/ax5modal.min.js"></script>
	<script type="text/javascript" src="/static/js/ax5/ax5toast.min.js"></script>
	<script type="text/javascript" src="/static/js/ax5/ax5formatter.min.js"></script>
	
	<script type="text/javascript" src="/static/js/global.js"></script>
	<script type="text/javascript" src="/static/js/fileTree.js"></script>
	<script src="/static/js/jquery.blockUI.js"></script>

	<!-- 공통결재 -->
	<script src="/static/js/commApproval.js"></script>
	<!-- 도움말 팝업 -->
	<script src="/static/js/manualPopup.js"></script>
</head>

<body>
	<div id="head_area"></div>
	<div id="top_area"></div>

	<div id="main_area">
		<input type="hidden" id="pgmId"  name="pgmId" value="CR0901M01">
		<input type="hidden" id="userId" name="userId">
		<input type="hidden" id="clntCd_S" name="clntCd_S">
		<!-- 페이지 상단 -->
		<div class="contents no_bg">
			<ul class="btn_ul">
				<li class="btn_r">
					<a onclick="manualPopup();"> <button type="button" class="bg_gray">도움말</button></a>
					<a onclick="initSearch();"><button class="bg_gray">초기화</button></a>
					<a onclick="gridView.setData(0);"><button class="bg_gray">검 색</button></a>
	            </li>
            </ul>
        </div>

		<!-- 검색 콘텐츠 -->
		<div class="contents search">
			<div class="">
				<!-- 테이블 인풋 4분할 -->
				<table class="table_input type05">

					<!-- 검색조건 1행 -->
					<tr>
						<th class= "hit">회사</th>
						<td>
							<select id="coCd_S" name="coCd_S" data-kind="CO" data-search required="required" msg="회사" onchange="gridView.setData(0);">
							</select>
						</td>

						<th class= "hit">WBS 예정일</th>
						<td>
							<div class="date_input">
								<input type="text" class="input_calendar" id="wbsDtFr_S" name="wbsDtFr_S" data-search required="required" msg="시작일" onkeyup="dateMask(this);" autocomplete="off" date>
								<span>~</span>
								<input type="text" class="input_calendar" id="wbsDtTo_S" name="wbsDtTo_S" data-search required="required" msg="종료일" onkeyup="dateMask(this);" autocomplete="off" date>
							</div>
						</td>


						<th>영업담당자</th>
						<td>
							<div class="search_form">
								<input type="text" id="mngIdNm_S" name="mngIdNm_S" onkeyup="if(event.keyCode == 13){ gridView.setData(0);}">
								<a onclick="openUserTree('mngIdNm_S');"><i class="i_search_w"></i></a>
							</div>
						</td>
						<th>진행상태</th>
						<td>
							<select id="lgistStatus_S" name="lgistStatus_S" onchange="gridView.setData(0);">
								<option value="">전체</option>
								<option value="PLAN" selected>물류예정</option>
								<option value="COMPL">물류완료</option>
							</select>
						</td>

					</tr>

					<tr>
						<th>Sales CD</th>
						<td>
							<input type="text" id="salesCd_S" name="salesCd_S" onkeyup="if(event.keyCode == 13){ gridView.setData(0);}">
						</td>
						<th>고객사</th>
						<td>
							<div class="search_form" style="width: 100%;">
								<input type="text" id="clntNm_S" name="clntNm_S" onkeyup="if(event.keyCode == 13){ gridView.setData(0);}">
								<a onclick="openClntSearch();"><i class="i_search_w"></i></a>
							</div>
						</td>

						<th>일정담당자</th>
						<td>
							<div class="search_form">
								<input type="text" id="planMngIdNm_S" name="planMngIdNm_S" onkeyup="if(event.keyCode == 13){ gridView.setData(0);}">
								<a onclick="openUserTree('planMngIdNm_S');"><i class="i_search_w"></i></a>
							</div>
						</td>
						<th>물류구분</th>
						<td>
							<select id="lgistType_S" name="lgistType_S" onchange="gridView.setData(0);">
								<option value="">전체</option>
								<option value="수주">수주</option>
								<option value="발주">발주</option>
								<option value="물류">물류</option>
							</select>
						</td>
						
					</tr>
	            </table>
            </div>
        </div>
		<div class="contents no_bg">
			<!-- 콘텐츠 타이틀 -->
        	<div class="contents_tit">
        		<div style="float:left">
        			<span style="height: 30px; line-height: 30px; font-size: 15px; margin-left: 10px;">물류진행 예정정보 현황</span>
        		</div>
	            <div style="float:right">
                    <a class="btn btn-default btn-sm" onclick="excelDown();">
                        <i class="fas fa-file-excel"></i>엑셀다운로드
                    </a>
                    <a class="btn btn-primary btn-sm" onclick="onDBLClickRow();" authchk>
                        <i class="fas fa-edit"></i>물류요청작성
                    </a>
                    <a class="btn btn-primary btn-sm" onclick="updateLgistCompl('Y');" authchk>
                        <i class="fas fa-shipping-fast"></i>배송완료
                    </a>
                    <a class="btn btn-danger btn-sm" onclick="updateLgistCompl('N');" authchk>
                        <i class="fas fa-undo"></i>완료취소
                    </a>
                </div>
        	</div>
		</div>

		<!-- 콘텐츠 -->
		<div class="contents">
		    <!-- 리스트 -->
		      <div class="ax5_grid" data-ax5grid="first-grid" data-ax5grid-config="{}" style="height: 650px; width: 100%" ></div>
		</div>
    </div>

</body>
</html>
<script type="text/javascript">
	ax5.ui.grid.formatter["chkYn"] = function () {
	    var color = this.value == "Y" ? "color-circle_02.png" : "color-circle_01.png";
	    if(this.value == "Y" || this.value == "N") {
	        return '<img src="/static/img/'+color+'" style="width: 10px;height: 10px;"></img>';
	    }
	    else {
	    	return ' ';
	    }
	};
	var gridView = {
		initView: function() {
			this.target = new ax5.ui.grid();
			this.target.setConfig({
				showLineNumber: true,
				lineNumberColumnWidth: 40,
                frozenColumnIndex : 5,
				showRowSelector: true,
				multipleSelect: true,
				sortable: true,
				target: $('[data-ax5grid="first-grid"]'),
				header: {
					align: "center",
					selector: true
				},
				body: {
					onClick: function() {
						this.self.clearSelect();
						this.self.select(this.dindex);
					},
					onDBLClick: function() {
						onDBLClickRow(this.item, this.column.key);
					},
				    mergeCells : ["ordrsNo", "ordrsClntNm", "salesCd"],
				},
				columns: [
					{key: "ordrsNo",       label: "수주번호",     width: 70, align: "center"},
					{key: "ordrsClntNm",   label: "고객사",       width: 150, align: "left"},
// 					{key: "salesCd",       label: "Sales CD",     width: 110, align: "center", styleClass: "grid-cell-blue"},
					{key: "salesCd",       label: "Sales CD",     width: 110, align: "center"},
					{key: "mngIdNm",       label: "영업",         width: 60,  align: "center"},
					{key: "lgistType",     label: "구분",         width: 60, align: "center"},
					{key: "lgistNo",       label: "물류번호",     width: 90, align: "center"},
					{key: "reqNo",         label: "발주요청",     width: 90, align: "center"},
// 					{key: "planMngIdNm",   label: "일정",         width: 60,  align: "center"},
					{key: "wbsStaDt",      label: "시작예정일",   width: 80, align: "center"},
					{key: "wbsEndDt",      label: "종료예정일",   width: 80, align: "center"},
					{key: "lgistComplYn",  label: "배송",         width: 50,  align: "center", formatter: "chkYn"},
					{key: "lgistComplDt",  label: "완료일자",     width: 80, align: "center"},
					{key: "trnsDivNm",     label: "국내/해외",    width: 80, align: "center"},
					{key: "trnsAreaDivNm", label: "운송구분",     width: 70, align: "center"},
					{key: "sendCndDivNm",  label: "발송조건",     width: 70, align: "center"},
					{key: "sendCndDivEtc", label: "발송기타",     width: 80, align: "center"},
					{key: "packKindDivNm", label: "해외포장",     width: 90, align: "center"},
					{key: "arvlPlace",     label: "도착 업체명",     width: 150, align: "left"},
					{key: "arvlChrgCont",  label: "담당자/연락처",   width: 120, align: "left"},
					{key: "arvlAddr",      label: "도착지 주소",     width: 250, align: "left"},
					{key: "fileTrgtKey",   label: "fileTrgtKey",  width: 70,  align: "center", hidden: true},
					{key: "ordrsQty",      label: "수주수량",     width: 70,  align: "right", formatter: "money"}
				]
			});
			return this;
		},
		setData: function(_pageNo) {
			var targetObj = this.target;
			if (inputValidation($('.table_input [required]'))) {
				var paramObj = getSearchParam(".table_input", 1, 99999999);
				paramObj.ordrsClntCd = $("#clntCd_S").val();
				paramObj.clntNm = $("#clntNm_S").val();
				paramObj.salesCd = $("#salesCd_S").val();
				paramObj.mngIdNm = $("#mngIdNm_S").val();
				paramObj.planMngIdNm = $("#planMngIdNm_S").val();
				paramObj.lgistStatus_S = $("#lgistStatus_S").val();
				paramObj.lgistType_S = $("#lgistType_S").val();

				postAjax("/user/cr/cr09/selectLgistPlanList", paramObj, null, function(data) {
					gridHeightResize(gridView, 200);
					var list = data.resultList;
					targetObj.setData({
						list: list,
						page: {
							pageSize: list.length
						}
					});
				});
			}
		}
	}

	function initSearch() {
		$(".contents.search select").val("");
		$(".contents.search input[type='text']:not(.input_calendar)").val("");
		$("#coCd_S").val(jwt.coCd);
		$('#wbsDtFr_S').datepicker("setDate", moment(new Date()).startOf("year").toDate());
		$('#wbsDtTo_S').datepicker("setDate", moment(new Date()).endOf("month").toDate());
		gridView.setData(0);
	}

	$(document).ready(function() {
		mainDefaultLoad("영업관리", "물류진행 예정정보 현황");
		setComboOptions($("#main_area select[data-kind]"));

		$("#coCd_S").val(jwt.coCd);

		$('#wbsDtFr_S').datepicker({
				format: "yyyy-mm-dd",
				language: "ko",
				autoclose: true
			})
			.datepicker("setDate", moment(new Date()).startOf("year").toDate());

		$('#wbsDtTo_S').datepicker({
				format: "yyyy-mm-dd",
				language: "ko",
				autoclose: true
			})
			.datepicker("setDate", moment(new Date()).endOf("month").toDate());

		gridView.initView().setData(0);
	});

	function onDBLClickRow(item, key) {
		if(!item){
			const selList = gridView.target.getList("selected");
			if (selList.length === 0) {
				customAlert("처리할 항목을 선택해주세요.");
				return;
			}
			item = selList[0];
		}
        if(!item){
            customAlert("선택된 항목이 없습니다.");
            return;
        }
		if (key === "salesCd") {
			// Sales CD 클릭 시 수주내역 조회 팝업
			var paramObj = this.item;
// 			openModal("/static/html/user/cr/cr02/CR0202P01.html", 1400, 880, "수주내역 조회", paramObj);
		} else {
			if (item.salesCd) {
				// 더블클릭 시 물류진행요청 팝업
				var paramObj = item;
				paramObj.reqId = jwt.userId;
				paramObj.reqIdNm = jwt.userNm;
	
				if (item.lgistNo) {
					paramObj.actionType = "U";
				} else {
					// 물류요청서가 아닌 경우 물류요청서 등록 화면 (C)
					if (!confirm("물류요청서 신규 작성 하시겠습니까?")) {
						return false;
					}
					paramObj.actionType = "C";
					
				}
	
				openModal("/static/html/user/cr/cr10/CR1001P01.html", 1400, 880, "물류진행요청", paramObj, function() {
					gridView.setData(0);
				});
			}
		}
	}

	// 배송완료/취소 처리
	function updateLgistCompl(status) {
		const selList = gridView.target.getList("selected");
		if (selList.length === 0) {
			customAlert("처리할 항목을 선택해주세요.");
			return;
		}

		if(!selList[0].lgistNo){
			customAlert("배송요청서가 작성되지 않은 항목입니다.");
			return;
		}

		if(status === 'Y' && selList[0].lgistComplYn === 'Y'){
			customAlert("이미 배송완료 처리된 항목입니다.");
			return;
		}

		if(status === 'N' && selList[0].lgistComplYn === 'N'){
			customAlert("배송완료 처리되지 않은 항목입니다.");
			return;
		}

		const msg = status === 'Y' ? "배송완료 처리하시겠습니까?" : "완료취소 처리하시겠습니까?";
		if (!confirm(selList.length + "건의 항목을 " + msg)) return;

		const paramList = selList.map(item => ({
			lgistNo: item.lgistNo,
			userId: jwt.userId
		}));

		var url = status === 'Y' ? "/user/cr/cr09/updateLgistCompl" : "/user/cr/cr09/cancelLgistCompl";

		postAjax(url, paramList, null, function(data) {
			customAlert(data.resultMessage);
			if (data.resultCode === 200) {
				gridView.setData(0);
			}
		});
	}

	function openClntSearch() {
		openModal("/static/html/cmn/modal/clntSearch.html", 650, 650, "거래처 검색", {}, function(grid) {
			var row = grid.target.getList("selected")[0];
			$('#clntCd_S').val(row.clntCd);
			$('#clntNm_S').val(row.clntNm);
			gridView.setData(0);
		});
	}

	function openUserTree(targetId) {
		var paramObj = {
			"coCd": $("#coCd_S").val(),
			"userNm": $("#" + targetId).val(),
			"useYn": "Y"
		};
		openSecondModal("/static/html/cmn/modal/userSearch.html", 450, 650, "사용자 검색", paramObj, function(tree) {
			var checkedId = tree.get_checked()[0];
			var checkedNode = tree.get_node(checkedId);
			$("#" + targetId).val(checkedNode.text);
			gridView.setData(0);
		});
	}

	function excelDown() {
		var todayDate = new Date().format('yyyyMMddHHmmss');
		gridView.target.exportExcel("물류진행예정현황_" + todayDate + ".xls");
	}
</script>
<style>
    .grid-cell-blue {
        color: blue;
        cursor: pointer;
    }
</style>
